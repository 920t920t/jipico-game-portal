<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Play Game | My Game Portal</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="play.css">
    <!-- Supabase SDK -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="supabase_config.js"></script>
</head>

<body>
    <div class="background-animation"></div>
    <header style="display:flex; justify-content:space-between; align-items:center; padding: 1.5rem 5%;">
        <div style="display:flex; align-items:center; gap:1.5rem;">
            <a href="index.html" class="back-link">← ホームに戻る</a>
            <div class="logo" style="margin:0;">じぴこの<span class="highlight">ゲームポータル</span></div>
        </div>
        <nav>
            <button id="auth-btn" class="login-btn">ログイン(実装予定)</button>
            <div id="user-profile" style="display:none; align-items:center; gap:10px;">
                <span id="user-display-name" style="font-size:0.9rem; color:var(--secondary);"></span>
                <button id="logout-btn" class="login-btn" style="padding:0.4rem 1rem; font-size:0.8rem;">ログアウト</button>
            </div>
        </nav>
    </header>

    <!-- Auth Modal (Re-used) -->
    <div id="auth-modal" class="modal-overlay" style="display:none;">
        <div class="auth-card">
            <button class="modal-close" id="close-auth">&times;</button>
            <div id="auth-form-container">
                <h2 id="auth-modal-title">ログイン(実装予定)</h2>
                <p id="auth-modal-desc">アカウントにログインしてデータを同期しよう</p>
                <div class="auth-inputs">
                    <div class="input-group">
                        <label for="auth-email">メールアドレス</label>
                        <input type="email" id="auth-email" placeholder="example@mail.com">
                    </div>
                    <div class="input-group">
                        <label for="auth-password">パスワード</label>
                        <input type="password" id="auth-password" placeholder="••••••••">
                    </div>
                </div>
                <div id="auth-error-msg"
                    style="color:var(--accent-pink); font-size:0.8rem; margin-bottom:1rem; display:none;"></div>
                <button id="auth-submit-btn" class="btn-main"
                    style="width:100%; padding:1rem; margin-bottom:1.5rem;">ログイン(実装予定)</button>
                <p class="auth-switch">まだアカウントをお持ちでないですか？ <a href="#" id="switch-to-signup">新規登録</a></p>
            </div>
        </div>
    </div>

    <main class="play-container">
        <div style="display:flex; justify-content:space-between; align-items:flex-end; margin-bottom:1rem;">
            <h1 id="game-title" style="margin:0;">Loading...</h1>
            <div id="view-count-area" style="font-size:0.9rem; color:#888; font-family:'Outfit', sans-serif;">
                これまで <span id="view-count" style="color:var(--secondary); font-weight:700;">--</span> 人がアクセスしました
            </div>
        </div>

        <div class="game-wrapper">
            <iframe id="game-iframe" src="" frameborder="0" allowfullscreen></iframe>
        </div>

        <div class="screenshot-gallery" id="screenshot-gallery">
            <!-- スクリーンショットがここに動的に追加される -->
        </div>

        <div class="game-details">
            <div class="info-section">
                <h2>📖 ゲーム説明</h2>
                <p id="game-description"></p>

                <h3>🎮 操作方法</h3>
                <p id="game-controls"></p>

                <h3>🐛 既知のバグ・情報</h3>
                <p id="game-bugs"></p>
            </div>

            <div class="comment-section">
                <h2>💬 みんなのコメント</h2>
                <p style="font-size:0.8rem; color:#888; margin-bottom:1rem;">
                    ゲームの感想やアドバイスを共有しよう！ログインなしでも匿名で投稿できます。</p>
                <div class="comment-form">
                    <input type="text" id="comment-name" placeholder="名無しさん (任意)" maxlength="20">
                    <textarea id="comment-text" placeholder="ゲームの感想やアドバイスを書こう！" rows="3" required></textarea>
                    <button id="submit-comment" class="submit-btn">コメントを送信</button>
                </div>

                <div id="comments-list" class="comments-list">
                    <!-- コメントがここに追加される -->
                </div>
            </div>
        </div>
    </main>

    <script src="play.js"></script>
</body>

</html>
