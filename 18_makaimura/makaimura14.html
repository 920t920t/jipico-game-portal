// ==================== PLAYER 3D MODEL ====================
let threeRuntimePromise = null;
const THREE_CLASSIC_SOURCES = [
  './asset/vendor/three146.min.js',
  './asset/vendor/GLTFLoader146.js'
];
const GLB_EMBED_SCRIPTS = {
  'asset/walk.glb': './asset/vendor/walk.glb.b64.js',
  'asset/run.glb': './asset/vendor/run.glb.b64.js',
  'asset/jump.glb': './asset/vendor/jump.glb.b64.js'
};

function loadClassicScript(src) {
  return new Promise((resolve, reject) => {
    const existing = document.querySelector(`script[data-runtime-src="${src}"]`);
    if(existing) {
      if(existing.dataset.loaded === '1') {
        resolve();
        return;
      }
      existing.addEventListener('load', () => resolve(), {once:true});
      existing.addEventListener('error', () => reject(new Error(`Failed to load ${src}`)), {once:true});
      return;
    }
    const s = document.createElement('script');
    s.src = src;
    s.async = true;
    s.dataset.runtimeSrc = src;
    s.addEventListener('load', () => {
      s.dataset.loaded = '1';
      resolve();
    }, {once:true});
    s.addEventListener('error', () => reject(new Error(`Failed to load ${src}`)), {once:true});
    document.head.appendChild(s);
  });
}

function ensureThreeRuntime() {
  if(window.THREE && window.THREE.GLTFLoader) return Promise.resolve(window.THREE);
  if(threeRuntimePromise) return threeRuntimePromise;
  threeRuntimePromise = (async () => {
    for(const src of THREE_CLASSIC_SOURCES) {
      await loadClassicScript(src);
    }
    if(window.THREE && window.THREE.GLTFLoader) return window.THREE;
    throw new Error('THREE or GLTFLoader is unavailable');
  })();
  return threeRuntimePromise;
}

function decodeBase64ToArrayBuffer(base64) {
  const binary = atob(base64);
  const len = binary.length;
  const bytes = new Uint8Array(len);
  for(let i=0; i<len; i++) bytes[i] = binary.charCodeAt(i);
  return bytes.buffer;
}

class PlayerModel3D {
  constructor() {
    this.ready = false;
    this.failed = false;
    this.error = null;
    this.scene = null;
    this.camera = null;
    this.renderer = null;
    this.group = null;
    this.states = {};
    this.currentState = 'walk';
    this.drawSize = 56;
    this.renderSize = 196;
  }

  async load() {
    if(this.ready || this.failed) return;
    try {
      const THREE = await ensureThreeRuntime();

      this.scene = new THREE.Scene();
      this.camera = new THREE.PerspectiveCamera(26, 1, 0.1, 20);
      this.camera.position.set(0, 0.95, 3.6);
      this.camera.lookAt(0, 0.85, 0);
      this.renderer = new THREE.WebGLRenderer({alpha:true, antialias:true});
      this.renderer.setSize(this.renderSize, this.renderSize, false);
      this.renderer.setPixelRatio(1);
      this.renderer.setClearColor(0x000000, 0);
      this.renderer.outputColorSpace = THREE.SRGBColorSpace;

      this.group = new THREE.Group();
      this.scene.add(this.group);

      const hemi = new THREE.HemisphereLight(0x9ee8d3, 0x0b1a18, 1.1);
      const dir = new THREE.DirectionalLight(0xc8fff0, 1.4);
      dir.position.set(1.6, 2.5, 1.8);
      this.scene.add(hemi);
      this.scene.add(dir);

      const [walkGLB, runGLB, jumpGLB] = await Promise.all([
        this._loadGLB('asset/walk.glb'),
        this._loadGLB('asset/run.glb'),
        this._loadGLB('asset/jump.glb')
      ]);

      this.states.walk = this._createState('walk', walkGLB);
      this.states.run = this._createState('run', runGLB);
      this.states.jump = this._createState('jump', jumpGLB);

      this._setState('walk', true);
      this.ready = true;
    } catch (err) {
      this.failed = true;
      this.error = err;
      console.error('3D player load failed.', err);
      throw err;
    }
  }

  async _loadGLB(path) {
    try {
      return await this._loadGLBFromURL(path);
    } catch(err) {
      const msg = String(err?.message || err);
      // file:// 実行では GLB fetch が失敗しやすいため、内包データへフォールバックする。
      if(!/fetch|network|load|status\s*0/i.test(msg.toLowerCase())) {
        throw new Error(`GLB URL load failed (${path}): ${msg}`);
      }
      await this._ensureEmbeddedGLB(path);
      const b64 = window.__GLB_B64?.[path];
      if(!b64) throw new Error(`Embedded GLB is missing: ${path}`);
      const ab = decodeBase64ToArrayBuffer(b64);
      return await this._parseGLBBuffer(ab, path);
    }
  }

  _loadGLBFromURL(path) {
    return new Promise((resolve, reject) => {
      const loader = new window.THREE.GLTFLoader();
      loader.load(path, resolve, undefined, reject);
    });
  }

  async _ensureEmbeddedGLB(path) {
    if(window.__GLB_B64 && window.__GLB_B64[path]) return;
    const scriptPath = GLB_EMBED_SCRIPTS[path];
    if(!scriptPath) throw new Error(`No embedded script mapping for ${path}`);
    await loadClassicScript(scriptPath);
    if(!window.__GLB_B64 || !window.__GLB_B64[path]) {
      throw new Error(`Embedded GLB load failed for ${path}`);
    }
  }

  _parseGLBBuffer(arrayBuffer, originalPath) {
    return new Promise((resolve, reject) => {
      const loader = new window.THREE.GLTFLoader();
      const basePath = originalPath.includes('/') ? originalPath.slice(0, originalPath.lastIndexOf('/') + 1) : '';
      loader.parse(arrayBuffer, basePath, resolve, reject);
    });
  }

  _createState(name, gltf) {
    const THREE = window.THREE;
    const root = gltf.scene;
    root.traverse(obj => {
      if(obj.isMesh) {
        obj.castShadow = false;
        obj.receiveShadow = false;
        if(obj.material) obj.material.side = THREE.FrontSide;
      }
    });

    const holder = new THREE.Group();
    holder.visible = false;
    holder.add(root);
    this.group.add(holder);
    this._normalizeRoot(holder);

    const mixer = new THREE.AnimationMixer(root);
    const clip = (gltf.animations && gltf.animations.length > 0)
      ? gltf.animations[0]
      : null;
    const action = clip ? mixer.clipAction(clip) : null;
    if(action) {
      action.reset();
      action.play();
    }

    return {name, holder, root, mixer, action};
  }

  _normalizeRoot(holder) {
    const THREE = window.THREE;
    const box = new THREE.Box3().setFromObject(holder);
    const size = new THREE.Vector3();
    const center = new THREE.Vector3();
    box.getSize(size);
    box.getCenter(center);

    const targetHeight = 1.18;
    const s = targetHeight / Math.max(0.001, size.y);
    holder.scale.set(s, s, s);

    const box2 = new THREE.Box3().setFromObject(holder);
    const center2 = new THREE.Vector3();
    box2.getCenter(center2);
    holder.position.x -= center2.x;
    holder.position.z -= center2.z;
    holder.position.y -= box2.min.y;
  }

  _setState(name, immediate=false) {
    if(!this.states[name]) return;
    if(this.currentState === name && !immediate) return;
    Object.values(this.states).forEach(st => { st.holder.visible = false; });
    const active = this.states[name];
    active.holder.visible = true;
    if(active.action) {
      active.action.reset();
      active.action.play();
    }
    this.currentState = name;
  }

  update(player, dtSec) {
    if(!this.ready) return;
    const moving = Math.abs(player.vx) > 0.08;
    const running = Math.abs(player.vx) > MOVE_SPEED * 0.82;
    let nextState = 'walk';
    if(!player.onGround || player.state === 'jump' || player.state === 'fall') nextState = 'jump';
    else if(running) nextState = 'run';
    else if(moving) nextState = 'walk';
    this._setState(nextState);

    const st = this.states[this.currentState];
    if(st && st.action) {
      if(this.currentState === 'walk' && !moving) {
        st.action.paused = true;
      } else {
        st.action.paused = false;
        st.action.timeScale = this.currentState === 'run' ? 1.15 : 1.0;
      }
    }
    if(st && st.mixer) st.mixer.update(dtSec);

    // Keep root motion from drifting while preserving animation pose.
    const rootBone = st?.root?.getObjectByName('Root');
    if(rootBone) {
      rootBone.position.x = 0;
      rootBone.position.z = 0;
    }

    this.group.rotation.y = player.facingRight ? -Math.PI/2 : Math.PI/2;
  }

  renderTo2D(ctx2d, player, camX, camY) {
    if(!this.ready) return false;
    if(player.invincibleTimer > 0 && Math.floor(player.invincibleTimer/4)%2===0) return false;
    if(player.dead && Math.floor(player.deathTimer/4)%2!==0) return false;

    this.renderer.clear();
    this.renderer.render(this.scene, this.camera);

    const size = this.drawSize;
    const sx = player.x - camX - size * 0.5;
    const sy = player.y - camY - size + 4;
    ctx2d.drawImage(this.renderer.domElement, sx, sy, size, size);
    return true;
  }
}

// ==================== PLAYER CLASS ====================
class Player {
  constructor() { this.reset(); }
  
  reset(x, y) {
    this.x = x || 48; this.y = y || 160;
    this.vx = 0; this.vy = 0;
    this.facingRight = true;
    this.airLockedDir = 0;
    this.onGround = false;
    this.jumps = 0; // 0=grounded, 1=first jump used, 2=double jump used
    this.coyoteTimer = 0;
    this.jumpBufferTimer = 0;
    this.invincibleTimer = 0;
    this.attackCooldown = 0;
    this.chargeTimer = 0;
    this.state = 'idle'; // idle, run, jump, fall, attack, crouch, damage, death
    this.animFrame = 0;
    this.animTimer = 0;
    this.dead = false;
    this.deathTimer = 0;
    this.width = 12; this.height = 24;
    this.spriteW = 16; this.spriteH = 28;
  }
  
  getHitbox() {
    return {
      x: this.x - this.width/2,
      y: this.y - (this.state === 'crouch' ? 14 : this.height),
      w: this.width,
      h: this.state === 'crouch' ? 14 : this.height
    };
  }
  
  update(stage) {
    if(this.dead) {
      this.deathTimer++;
      if(this.deathTimer > 72) { // 1.2 seconds
        EventBus.emit('player:death');
      }
      return;
    }
    
    const wasOnGround = this.onGround;
    
    // Invincibility
    if(this.invincibleTimer > 0) this.invincibleTimer--;
    if(this.attackCooldown > 0) this.attackCooldown--;
    
    // Movement (airborne direction is locked at jump start)
    let inputDir = 0;
    if(!this.dead && this.state !== 'damage') {
      if(Input.isDown('left')) inputDir = -1;
      if(Input.isDown('right')) inputDir = 1;
    }
    if(this.onGround && inputDir !== 0) this.facingRight = inputDir > 0;
    let moveDir = this.onGround ? inputDir : this.airLockedDir;
    
    // Crouch
    if(Input.isDown('down') && this.onGround && this.state !== 'attack') {
      this.state = 'crouch';
      moveDir = 0;
    } else if(this.state === 'crouch' && !Input.isDown('down')) {
      this.state = 'idle';
    }
    
    if(this.state !== 'crouch') {
      if(this.onGround) this.airLockedDir = moveDir;
      const moveSpeed = this.onGround ? MOVE_SPEED : MOVE_SPEED * JUMP_HORIZ_MULT;
      this.vx = moveDir * moveSpeed;
    } else {
      this.vx = 0;
    }
    
    // Wind gimmick
    if(stage && stage.gimmicks) {
      stage.gimmicks.forEach(g => {
        if(g.type === 'wind' && this.x >= g.x && this.x <= g.x + g.range) {
          this.vx += g.force;
        } else if(g.type === 'wave' && this.x >= g.x && this.x <= g.x + g.range) {
          this.vx += Math.sin((GS.frame + (g.phase || 0)) * (g.freq || 0.05)) * (g.force || 0.08);
        }
      });
    }
    
    // Coyote time
    if(wasOnGround) this.coyoteTimer = COYOTE_TIME;
    else if(this.coyoteTimer > 0) this.coyoteTimer--;
    
    // Jump buffer
    if(Input.isJustPressed('jump')) {
      this.jumpBufferTimer = JUMP_BUFFER;
    }
    if(this.jumpBufferTimer > 0) this.jumpBufferTimer--;
    
    // Jump
    if(this.jumpBufferTimer > 0 || Input.isJustPressed('jump')) {
      if(this.onGround || this.coyoteTimer > 0) {
        if(inputDir !== 0) this.airLockedDir = inputDir;
        else if(Math.abs(this.vx) > 0.01) this.airLockedDir = Math.sign(this.vx);
        this.vy = JUMP_VEL;
        this.onGround = false;
        this.jumps = 1;
        this.coyoteTimer = 0;
        this.jumpBufferTimer = 0;
        Audio.playSE('jump');
      } else if(this.jumps < 2) {
        if(inputDir !== 0) {
          this.airLockedDir = inputDir;
          this.facingRight = inputDir > 0;
        }
        this.vx = this.airLockedDir * MOVE_SPEED * JUMP_HORIZ_MULT;
        this.vy = DJUMP_VEL;
        this.jumps = 2;
        this.jumpBufferTimer = 0;
        Audio.playSE('jump');
      }
    }
    
    // Gravity with apex modifier
    const grav = (Math.abs(this.vy) < APEX_THRESHOLD && this.vy < 0) ? APEX_GRAVITY : GRAVITY;
    this.vy += grav;
    if(this.vy > MAX_FALL) this.vy = MAX_FALL;
    
    // Attack
    if(Input.isJustPressed('attack') && this.attackCooldown <= 0 && this.state !== 'damage') {
      this.attack(stage);
    }
    
    // Charge attack (gold armor)
    if(GS.armorLevel >= 2 && Input.isDown('attack')) {
      this.chargeTimer++;
    } else {
      if(this.chargeTimer >= 30 && GS.armorLevel >= 2) {
        this.chargeAttack(stage);
      }
      this.chargeTimer = 0;
    }
    
    // Apply velocity with substep for collision safety
    const steps = Math.max(1, Math.ceil(Math.max(Math.abs(this.vx), Math.abs(this.vy)) / 4));
    const svx = this.vx / steps, svy = this.vy / steps;
    this.onGround = false;
    for(let s=0; s<steps; s++) {
      this.x += svx;
      this.y += svy;
      this.resolveCollision(stage);
    }
    
    if(this.onGround) {
      this.jumps = 0;
      this.airLockedDir = this.vx === 0 ? 0 : Math.sign(this.vx);
    }
    
    // Fall off map
    if(this.y > stage.height * TILE + 32) {
      this.die();
    }
    
    // Clamp to stage bounds
    this.x = clamp(this.x, 8, stage.width * TILE - 8);
    
    // Update state
    if(!this.dead && this.state !== 'crouch' && this.state !== 'damage') {
      if(!this.onGround) {
        this.state = this.vy < 0 ? 'jump' : 'fall';
      } else if(Math.abs(this.vx) > 0.1) {
        this.state = 'run';
      } else {
        this.state = 'idle';
      }
    }
    
    // Animation
    this.animTimer++;
    if(this.state === 'run') {
      if(this.animTimer >= 5) { this.animTimer=0; this.animFrame=(this.animFrame+1)%6; }
    } else if(this.state === 'idle') {
      if(this.animTimer >= 15) { this.animTimer=0; this.animFrame=(this.animFrame+1)%4; }
    } else {
      this.animFrame = 0;
    }
  }
  
  resolveCollision(stage) {
    const hb = this.getHitbox();
    const left = Math.floor(hb.x / TILE);
    const right = Math.floor((hb.x + hb.w) / TILE);
    const top = Math.floor(hb.y / TILE);
    const bottom = Math.floor((hb.y + hb.h) / TILE);
    
    for(let ty = top; ty <= bottom; ty++) {
      for(let tx = left; tx <= right; tx++) {
        if(ty < 0 || ty >= stage.height || tx < 0 || tx >= stage.width) continue;
        const tid = stage.terrain[ty]?.[tx];
        if(!tid) continue;
        const tc = TILE_COLORS[tid];
        if(!tc) continue;
        
        // Hazards
        if(tc.hazard) {
          const tileBox = {x:tx*TILE, y:ty*TILE, w:TILE, h:TILE};
          if(aabbOverlap(hb, tileBox)) {
            this.takeDamage(true); // instant death for lava/spikes
            return;
          }
          continue;
        }
        
        // Solid terrain
        if(tc.terrain) {
          const tileBox = {x:tx*TILE, y:ty*TILE, w:TILE, h:TILE};
          if(aabbOverlap(hb, tileBox)) {
            // Resolve overlap
            const overlapX = Math.min(hb.x+hb.w - tileBox.x, tileBox.x+TILE - hb.x);
            const overlapY = Math.min(hb.y+hb.h - tileBox.y, tileBox.y+TILE - hb.y);
            
            if(overlapY < overlapX) {
              if(this.vy > 0 && hb.y+hb.h - tileBox.y < 12) {
                this.y = tileBox.y;
                this.vy = 0;
                this.onGround = true;
              } else if(this.vy < 0 && tileBox.y+TILE - hb.y < 12) {
                this.y = tileBox.y + TILE + this.height;
                this.vy = 0;
              }
            } else {
              if(Math.abs(this.vx) > 0.01 && this.vy >= -0.1 && overlapY <= PLAYER_STEP_UP_PIXELS + 1) {
                if(this.tryStepUp(stage)) {
                  return;
                }
              }
              if(this.vx > 0) this.x = tileBox.x - this.width/2;
              else if(this.vx < 0) this.x = tileBox.x + TILE + this.width/2;
              this.vx = 0;
            }
          }
        }
        
        // One-way platforms
        if(tc.platform) {
          const platTop = ty * TILE;
          if(this.vy > 0 && this.y - this.vy <= platTop + 2 && this.y >= platTop) {
            const platBox = {x:tx*TILE, y:platTop, w:TILE, h:4};
            if(hb.x + hb.w > platBox.x && hb.x < platBox.x + platBox.w) {
              this.y = platTop;
              this.vy = 0;
              this.onGround = true;
            }
          }
        }
        
        // Crumbling platforms
        if(tc.crumble) {
          const platTop = ty * TILE;
          if(this.vy >= 0 && this.y - this.vy <= platTop + 2 && this.y >= platTop) {
            const platBox = {x:tx*TILE, y:platTop, w:TILE, h:6};
            if(hb.x + hb.w > platBox.x && hb.x < platBox.x + platBox.w) {
              this.y = platTop;
              this.vy = 0;
              this.onGround = true;
              // Start crumble timer
              if(!stage._crumbleTimers) stage._crumbleTimers = {};
              const key = `${tx},${ty}`;
              if(!stage._crumbleTimers[key]) {
                stage._crumbleTimers[key] = { timer:30, tx, ty, origTile:tid };
              }
            }
          }
        }
      }
    }
    
    // Moving platforms
    if(stage.gimmicks) {
      stage.gimmicks.forEach(g => {
        if(g.type === 'movingPlatH' || g.type === 'movingPlatV') {
          const px = g._cx || g.x;
          const py = g._cy || g.y;
          if(this.vy >= 0 && Math.abs(this.y - py) < 4 && this.x > px - 4 && this.x < px + 48 + 4) {
            this.y = py;
            this.vy = 0;
            this.onGround = true;
            if(g.type === 'movingPlatH') this.x += (g._dx || 0);
            if(g.type === 'movingPlatV') this.y += (g._dy || 0);
          }
        }
      });
    }
  }

  tryStepUp(stage) {
    const originalY = this.y;
    for(let step=1; step<=PLAYER_STEP_UP_PIXELS; step++) {
      this.y = originalY - step;
      const hb = this.getHitbox();
      if(!hasSolidTerrainCollision(stage, hb)) {
        this.onGround = true;
        return true;
      }
    }
    this.y = originalY;
    return false;
  }
  
  attack(stage) {
    const weapon = getWeaponRuntimeSpec(GS.currentWeapon, false);
    this.attackCooldown = weapon.cooldown;
    this.state = 'attack';
    Audio.playSE('attack');
    
    // Determine direction
    let dx = this.facingRight ? 1 : -1;
    let dy = 0;
    if(Input.isDown('up')) { dy = -1; dx = 0; }
    else if(Input.isDown('down') && !this.onGround) { dy = 1; dx = 0; }
    // Diagonal
    if(Input.isDown('up') && (Input.isDown('left')||Input.isDown('right'))) {
      dy = -1; dx = this.facingRight ? 1 : -1;
    }
    if(Input.isDown('down') && (Input.isDown('left')||Input.isDown('right')) && !this.onGround) {
      dy = 1; dx = this.facingRight ? 1 : -1;
    }
    
    EventBus.emit('player:attack', {
      x: this.x, y: this.y - this.height/2,
      dx, dy, weapon: GS.currentWeapon
    });
  }
  
  chargeAttack(stage) {
    Audio.playSE('attack');
    // Super version - fires 3 projectiles
    const dx = this.facingRight ? 1 : -1;
    for(let i=-1;i<=1;i++) {
      EventBus.emit('player:attack', {
        x: this.x, y: this.y - this.height/2 + i*8,
        dx, dy: i*0.3, weapon: GS.currentWeapon, charged: true
      });
    }
  }
  
  takeDamage(instant=false) {
    if(this.invincibleTimer > 0 || this.dead) return;
    
    if(GS.armorLevel > 0 && !instant) {
      GS.armorLevel--;
      this.invincibleTimer = INVINCIBLE_FRAMES;
      this.state = 'damage';
      Audio.playSE('armorBreak');
      GS.screenShake = 6;
      EventBus.emit('player:armorBreak', {x:this.x, y:this.y - this.height/2});
      if(GS.bossActive) GS.noDamageBoss = false;
      setTimeout(() => { if(this.state === 'damage') this.state = 'idle'; }, 300);
    } else {
      this.die();
    }
  }
  
  die() {
    if(this.dead) return;
    this.dead = true;
    this.deathTimer = 0;
    this.state = 'death';
    this.vx = 0;
    this.vy = -3;
    Audio.playSE('damage');
    GS.screenShake = 8;
    GS.noDamageBoss = false;
  }
  
  render(camX, camY) {
    if(this.dead) {
      const progress = Math.min(this.deathTimer / 72, 1);
      const key = `knight_death_${GS.armorLevel}`;
      const sx = this.x - 8 - camX;
      const sy = this.y - this.spriteH - camY - (1-progress)*20;
      // Flash and rise
      if(Math.floor(this.deathTimer/4)%2===0) {
        drawCachedSprite(key, sx, sy, !this.facingRight);
      }
      return;
    }
    
    // Invincibility blink
    if(this.invincibleTimer > 0 && Math.floor(this.invincibleTimer/4)%2===0) return;
    
    const sx = this.x - this.spriteW/2 - camX;
    const sy = this.y - this.spriteH - camY;
    
    let key;
    if(this.state === 'attack') key = `knight_attack_${GS.armorLevel}`;
    else if(this.state === 'jump' || this.state === 'fall') key = `knight_jump_${GS.armorLevel}`;
    else if(this.state === 'run') key = `knight_run_${GS.armorLevel}_${this.animFrame}`;
    else key = `knight_stand_${GS.armorLevel}`;
    
    drawCachedSprite(key, sx, sy, !this.facingRight);
    
    // Charge indicator
    if(this.chargeTimer > 10 && GS.armorLevel >= 2) {
      ctx.fillStyle = `rgba(255,215,0,${0.3 + 0.3*Math.sin(GS.frame*0.2)})`;
      ctx.fillRect(sx-2, sy-2, this.spriteW+4, this.spriteH+4);
    }
  }
}

// ==================== AABB COLLISION ====================
function aabbOverlap(a, b) {
  return a.x < b.x + b.w && a.x + a.w > b.x && a.y < b.y + b.h && a.y + a.h > b.y;
}

function hasSolidTerrainCollision(stage, hb) {
  const left = Math.floor(hb.x / TILE);
  const right = Math.floor((hb.x + hb.w) / TILE);
  const top = Math.floor(hb.y / TILE);
  const bottom = Math.floor((hb.y + hb.h) / TILE);
  for(let ty=top; ty<=bottom; ty++) {
    for(let tx=left; tx<=right; tx++) {
      if(ty < 0 || ty >= stage.height || tx < 0 || tx >= stage.width) continue;
      const tid = stage.terrain[ty]?.[tx];
      if(!tid) continue;
      const tc = TILE_COLORS[tid];
      if(!tc?.terrain) continue;
      const tileBox = {x:tx*TILE, y:ty*TILE, w:TILE, h:TILE};
      if(aabbOverlap(hb, tileBox)) return true;
    }
  }
  return false;
}

// ==================== ENEMY CLASS ====================
class Enemy {
  constructor() { this.active = false; }
  
  init(type, x, y) {
    const def = ENEMY_DEFS[type];
    if(!def) return this;
    this.type = type;
    this.x = x * TILE + TILE/2;
    this.y = y * TILE + TILE;
    this.startX = this.x; this.startY = this.y;
    this.hp = def.hp;
    this.def = def.def;
    this.dmg = def.dmg;
    this.speed = def.speed * ENEMY_SPEED_SCALE;
    this.scoreVal = def.score;
    this.hw = def.hw; this.hh = def.hh;
    this.sw = def.sw; this.sh = def.sh;
    this.behavior = def.behavior;
    this.sprite = def.sprite;
    this.active = true;
    this.facingRight = false;
    this.vx = 0; this.vy = 0;
    this.animFrame = 0;
    this.animTimer = 0;
    this.stateTimer = 0;
    this.behaviorState = 0;
    this.flashTimer = 0;
    this.shootTimer = 0;
    return this;
  }
  
  getHitbox() {
    return { x:this.x - this.hw/2, y:this.y - this.hh, w:this.hw, h:this.hh };
  }
  
  update(playerX, playerY, stage) {
    if(!this.active) return;
    this.stateTimer++;
    this.animTimer++;
    if(this.animTimer >= 10) { this.animTimer=0; this.animFrame=(this.animFrame+1)%4; }
    if(this.flashTimer > 0) this.flashTimer--;
    
    const dx = playerX - this.x;
    const dy = playerY - this.y;
    const dist = Math.sqrt(dx*dx+dy*dy);
    this.facingRight = dx > 0;
    
    const diff = GS.getDifficulty();
    
    switch(this.behavior) {
      case 'walk':
        this.vx = (this.facingRight ? -1 : 1) * this.speed;
        this.vy += GRAVITY;
        if(this.vy > MAX_FALL) this.vy = MAX_FALL;
        break;
        
      case 'sine':
        this.vx = -this.speed;
        this.vy = Math.sin(this.stateTimer * 0.08) * 1.5;
        break;
        
      case 'throw':
        if(dist < 120) {
          this.vx = 0;
          this.shootTimer++;
          if(this.shootTimer > 90) {
            this.shootTimer = 0;
            // Throw bones in 3 directions
            for(let a=-1;a<=1;a++) {
              EventBus.emit('enemy:shoot', {
                x:this.x, y:this.y-this.hh/2,
                dx: (this.facingRight?1:-1)*2.5*diff.bulletSpeed,
                dy: a*1.5,
                sprite:'bone_proj'
              });
            }
          }
        } else {
          this.vx = (this.facingRight ? 1 : -1) * this.speed * 0.5;
        }
        this.vy += GRAVITY;
        if(this.vy > MAX_FALL) this.vy = MAX_FALL;
        break;
        
      case 'dive':
        if(this.behaviorState === 0) {
          // Hovering
          this.vy = Math.sin(this.stateTimer*0.05)*0.5;
          if(dist < 100 && Math.abs(dx) < 60) {
            this.behaviorState = 1;
            this.vy = 4;
          }
        } else {
          // Diving
          this.vy = 3;
          if(this.y > playerY + 32) {
            this.behaviorState = 0;
            this.vy = -2;
          }
        }
        this.vx = dx > 0 ? this.speed * 0.3 : -this.speed * 0.3;
        break;
        
      case 'chase':
        this.vx = (dx > 0 ? 1 : -1) * this.speed;
        this.vy += GRAVITY;
        if(this.vy > MAX_FALL) this.vy = MAX_FALL;
        break;
        
      case 'charge':
        this.vx = (this.facingRight ? -1 : 1) * this.speed;
        break;
        
      case 'jump_attack':
        this.vy += GRAVITY;
        if(this.vy > MAX_FALL) this.vy = MAX_FALL;
        if(this.onGround && dist < 80) {
          this.vy = -5;
          this.vx = (dx > 0 ? 1 : -1) * 2;
        } else if(!this.onGround) {
          // keep velocity
        } else {
          this.vx = (dx > 0 ? 1 : -1) * this.speed * 0.5;
        }
        break;
        
      case 'jump_arc':
        this.vy += GRAVITY * 0.8;
        if(this.y > this.startY + 16) { this.active = false; }
        this.vx = (this.facingRight ? 1 : -1) * this.speed;
        break;
        
      case 'shoot':
        this.vx = 0;
        this.shootTimer++;
        if(this.shootTimer > 120) {
          this.shootTimer = 0;
          const angle = Math.atan2(dy, dx);
          EventBus.emit('enemy:shoot', {
            x:this.x, y:this.y-this.hh/2,
            dx: Math.cos(angle)*2.5*diff.bulletSpeed,
            dy: Math.sin(angle)*2.5*diff.bulletSpeed,
            sprite:'enemy_bullet'
          });
        }
        break;
    }
    
    const prevY = this.y;
    this.x += this.vx;
    this.y += this.vy;
    
    // Ground collision for ground enemies
    this.onGround = false;
    if(['walk','throw','chase','jump_attack'].includes(this.behavior)) {
      const prevRow = clamp(Math.floor(prevY / TILE), 0, stage.height - 1);
      const currRow = clamp(Math.floor(this.y / TILE), 0, stage.height - 1);
      const probeGroundTop = (sampleX) => {
        const cx = clamp(Math.floor(sampleX / TILE), 0, stage.width - 1);
        const fromY = clamp(Math.min(prevRow, currRow) - 1, 0, stage.height - 1);
        const toY = clamp(Math.max(prevRow, currRow) + 2, 0, stage.height - 1);
        for(let ty=fromY; ty<=toY; ty++) {
          const tid = stage.terrain[ty]?.[cx];
          if(tid && TILE_COLORS[tid]?.terrain) return ty * TILE;
        }
        for(let ty=currRow; ty<=Math.min(stage.height - 1, currRow + 4); ty++) {
          const tid = stage.terrain[ty]?.[cx];
          if(tid && TILE_COLORS[tid]?.terrain) return ty * TILE;
        }
        return null;
      };
      const footXs = [this.x, this.x - this.hw * 0.32, this.x + this.hw * 0.32];
      let nearestGroundTop = null;
      footXs.forEach(fx => {
        const top = probeGroundTop(fx);
        if(top !== null && (nearestGroundTop === null || top < nearestGroundTop)) nearestGroundTop = top;
      });
      if(nearestGroundTop !== null) {
        const landingSlack = Math.max(2, Math.abs(this.vy) + 2);
        const crossedDown = this.vy >= 0 && prevY <= nearestGroundTop + landingSlack && this.y >= nearestGroundTop;
        const embedded = this.y > nearestGroundTop && this.y - nearestGroundTop < TILE * 0.72;
        if(crossedDown || embedded) {
          this.y = nearestGroundTop;
          this.vy = 0;
          this.onGround = true;
        }
      }
    }
    
    // Deactivate if too far off screen
    if(this.x < game?.camera?.x - 100 || this.x > game?.camera?.x + VIEW_W + 200 ||
       this.y > stage.height * TILE + 100) {
      this.active = false;
    }
  }
  
  takeDamage(dmg) {
    const actual = Math.max(1, dmg - this.def);
    this.hp -= actual;
    this.flashTimer = 6;
    Audio.playSE('hit');
    
    if(this.hp <= 0) {
      this.active = false;
      Audio.playSE('explode');
      // Score with combo
      GS.combo++;
      GS.comboTimer = 180; // 3 seconds
      const multiplier = Math.min(3.0, 1.0 + GS.combo * 0.1);
      const points = Math.floor(this.scoreVal * multiplier);
      GS.score += points;
      
      // Check extra life
      const prevLives = Math.floor((GS.score - points) / EXTRA_LIFE_SCORE);
      const newLives = Math.floor(GS.score / EXTRA_LIFE_SCORE);
      if(newLives > prevLives && GS.lives < MAX_LIVES) {
        GS.lives++;
        Audio.playSE('1up');
        EventBus.emit('score:1up', {x:this.x, y:this.y});
      }
      
      EventBus.emit('enemy:death', {x:this.x, y:this.y, points});
      
      // Hitstop
      if(SaveMgr.data.settings.hitStop !== false) GS.hitstopFrames = 3;
      
      return true;
    }
    if(SaveMgr.data.settings.hitStop !== false) GS.hitstopFrames = 2;
    return false;
  }
  
	  render(camX, camY) {
	    if(!this.active) return;
	    const sx = this.x - this.sw/2 - camX;
	    const sy = this.y - this.sh - camY;
    
	    if(this.flashTimer > 0) {
	      ctx.fillStyle = '#fff';
	      ctx.fillRect(Math.round(sx), Math.round(sy), this.sw, this.sh);
	    } else {
	      drawCachedSprite(`${this.sprite}_${this.animFrame}`, sx, sy, !this.facingRight);
	      drawEnemyDetailPass(this.type, sx, sy, this.sw, this.sh, GS.frame);
	    }
	  }
}

// ==================== BOSS CLASS ====================
class Boss {
  constructor() { this.active = false; }
  
  init(bossData, loop) {
    this.id = bossData.id;
    this.x = bossData.x;
    this.y = bossData.y;
    this.maxHP = Math.floor(bossData.hp * (loop === 0 ? 1 : 1.5));
    this.hp = this.maxHP;
    this.phase = 0;
    this.active = true;
    this.moveDir = Math.random() > 0.5 ? 1 : -1;
    this.facingRight = this.moveDir > 0;
    this.vx = 0; this.vy = 0;
    this.animFrame = 0;
    this.animTimer = 0;
    this.stateTimer = 0;
    this.attackTimer = 0;
    this.state = 'idle';
    this.flashTimer = 0;
    this.invincible = 0;
    this.sw = 48; this.sh = 48;
    this.hw = 40; this.hh = 40;
    this.patterns = this.getPatterns();
    this.patternIndex = 0;
    return this;
  }
  
  getPatterns() {
    switch(this.id) {
      case 'cerberus': return [
        {type:'charge', duration:76, speed:2.4},
        {type:'shoot3', duration:54, interval:42},
        {type:'idle', duration:42},
      ];
      case 'seadragon': return [
        {type:'jump', duration:64, height:-6.8},
        {type:'shoot3', duration:74, interval:40},
        {type:'sweep', duration:96, speed:1.5},
      ];
      case 'treant': return [
        {type:'groundAttack', duration:78},
        {type:'shoot_rain', duration:96, interval:22},
        {type:'idle', duration:48},
        {type:'charge', duration:68, speed:1.2},
      ];
      case 'demonknight': return [
        {type:'charge', duration:58, speed:2.7},
        {type:'combo', duration:82, attacks:3},
        {type:'idle', duration:34},
        {type:'shoot3', duration:70, interval:32},
      ];
      case 'overlord': return [
        {type:'shoot_spread', duration:95, interval:18},
        {type:'teleport', duration:62},
        {type:'charge', duration:68, speed:2.8},
        {type:'shoot_spread', duration:75, interval:16},
        {type:'idle', duration:34},
      ];
      default: return [{type:'idle',duration:60}];
    }
  }
  
  getHitbox() {
    return {x:this.x-this.hw/2, y:this.y-this.hh, w:this.hw, h:this.hh};
  }
  
  update(playerX, playerY, stage) {
    if(!this.active) return;
    
    this.stateTimer++;
    this.attackTimer++;
    this.animTimer++;
    if(this.animTimer >= 8) { this.animTimer=0; this.animFrame=(this.animFrame+1)%4; }
    if(this.flashTimer > 0) this.flashTimer--;
    if(this.invincible > 0) this.invincible--;

    const arenaLeft = stage.bossAreaStart * TILE + 24;
    const arenaRight = (stage.width - 1) * TILE - 24;
    if(this.x <= arenaLeft + 2) this.moveDir = 1;
    if(this.x >= arenaRight - 2) this.moveDir = -1;
    this.facingRight = this.moveDir > 0;
    
    // Phase transitions
    const hpPercent = this.hp / this.maxHP;
    const newPhase = hpPercent <= 0.33 ? 2 : hpPercent <= 0.66 ? 1 : 0;
    if(newPhase > this.phase) {
      this.phase = newPhase;
      this.invincible = 30;
      this.stateTimer = 0;
      this.patternIndex = 0;
      GS.screenShake = 10;
      EventBus.emit('boss:phaseChange', {phase:this.phase, x:this.x, y:this.y});
    }
    
    // Execute current pattern
    const pattern = this.patterns[this.patternIndex % this.patterns.length];
    const diff = GS.getDifficulty();
    
    if(this.stateTimer >= pattern.duration * (1 + this.phase * 0.08)) {
      this.stateTimer = 0;
      this.patternIndex = (this.patternIndex + 1) % this.patterns.length;
    }
    
    switch(pattern.type) {
      case 'idle':
        this.vx *= 0.84;
        break;
      case 'charge':
        this.vx = this.moveDir * (pattern.speed || 2.4) * BOSS_MOVE_SCALE * (1 + this.phase * 0.08);
        break;
      case 'sweep':
        this.vx = Math.sin(this.stateTimer * 0.06) * (pattern.speed || 1.6) * BOSS_MOVE_SCALE;
        break;
      case 'shoot3':
      case 'shoot_spread':
        this.vx = this.moveDir * 0.45 * BOSS_MOVE_SCALE;
        if(this.attackTimer >= (pattern.interval || 30) * BOSS_ATTACK_INTERVAL_SCALE * (1 + this.phase * 0.08)) {
          this.attackTimer = 0;
          const count = pattern.type === 'shoot_spread' ? 4 + this.phase : 2 + this.phase;
          const baseShotSpeed = 2.2 * diff.bulletSpeed;
          for(let i=0;i<count;i++) {
            const angle = (i/(count-1) - 0.5) * Math.PI * 0.65 + (this.facingRight ? 0 : Math.PI);
            EventBus.emit('enemy:shoot', {
              x:this.x, y:this.y-this.hh/2,
              dx: Math.cos(angle) * baseShotSpeed,
              dy: Math.sin(angle) * baseShotSpeed,
              sprite:'enemy_bullet'
            });
          }
        }
        break;
      case 'shoot_rain':
        this.vx = Math.sin(this.stateTimer * 0.05) * 0.4 * BOSS_MOVE_SCALE;
        if(this.attackTimer >= (pattern.interval || 20) * BOSS_ATTACK_INTERVAL_SCALE) {
          this.attackTimer = 0;
          EventBus.emit('enemy:shoot', {
            x: this.x + randFloat(-50,50), y:this.y - 56,
            dx: randFloat(-0.4,0.4), dy: 1.7 * diff.bulletSpeed,
            sprite:'enemy_bullet'
          });
        }
        break;
      case 'jump':
        if(this.stateTimer === 1) {
          this.vy = pattern.height || -6.5;
          this.vx = this.moveDir * 0.9 * BOSS_MOVE_SCALE;
        }
        break;
      case 'combo':
        if(this.stateTimer % Math.max(24, 30 - this.phase * 4) === 0 && this.stateTimer < pattern.duration) {
          this.vx = this.moveDir * 2.5 * BOSS_MOVE_SCALE;
        } else {
          this.vx *= 0.88;
        }
        break;
      case 'teleport':
        if(this.stateTimer === 1) {
          this.x = randFloat(arenaLeft + 40, arenaRight - 40);
          this.y = Math.min(this.y, (stage.groundY - 1) * TILE);
          this.moveDir *= -1;
          this.facingRight = this.moveDir > 0;
          EventBus.emit('boss:teleport',{x:this.x,y:this.y});
        }
        break;
      case 'groundAttack':
        this.vx *= 0.9;
        if(this.attackTimer >= 34 * BOSS_ATTACK_INTERVAL_SCALE) {
          this.attackTimer = 0;
          EventBus.emit('enemy:shoot', {
            x:clamp(this.x + randFloat(-80,80), arenaLeft + 8, arenaRight - 8),
            y:(stage.groundY-1)*TILE,
            dx:0, dy:-2.2, sprite:'enemy_bullet'
          });
        }
        break;
    }

    if(Math.abs(this.vx) > 0.05) {
      this.moveDir = this.vx > 0 ? 1 : -1;
      this.facingRight = this.moveDir > 0;
    }
    
    // Gravity for bosses
    this.vy += GRAVITY * 0.45;
    if(this.vy > MAX_FALL) this.vy = MAX_FALL;
    
    this.x += this.vx;
    this.y += this.vy;
    
    // Ground collision
    const groundY = stage.groundY * TILE;
    if(this.y > groundY) {
      this.y = groundY;
      this.vy = 0;
    }
    
    // Keep in arena
    this.x = clamp(this.x, arenaLeft, arenaRight);
  }
  
  takeDamage(dmg) {
    if(this.invincible > 0) return false;
    this.hp -= Math.max(1, dmg);
    this.flashTimer = 6;
    Audio.playSE('hit');
    
    if(this.hp <= 0) {
      this.active = false;
      Audio.playSE('bossDie');
      GS.score += 5000 * (1 + GS.currentStage);
      GS.screenShake = 15;
      EventBus.emit('boss:death', {x:this.x, y:this.y});
      return true;
    }
    if(SaveMgr.data.settings.hitStop !== false) GS.hitstopFrames = 3;
    return false;
  }
  
	  render(camX, camY) {
	    if(!this.active) return;
	    const sx = this.x - this.sw/2 - camX;
	    const sy = this.y - this.sh - camY;
    
    if(this.flashTimer > 0) {
      ctx.fillStyle = '#fff';
      ctx.fillRect(Math.round(sx), Math.round(sy), this.sw, this.sh);
	    } else if(this.invincible > 0 && Math.floor(this.invincible/3)%2===0) {
	      // phase transition blink
	    } else {
	      drawCachedSprite(`boss_${this.id}_${this.phase}_${this.animFrame}`, sx, sy, !this.facingRight);
	      drawBossDetailPass(this.id, sx, sy, this.sw, this.sh, this.phase, GS.frame);
	    }
    
    // HP bar
    const barW = 48;
    const barX = sx + (this.sw - barW)/2;
    const barY = sy - 8;
    ctx.fillStyle = '#333'; ctx.fillRect(barX, barY, barW, 4);
    ctx.fillStyle = this.hp/this.maxHP > 0.3 ? '#ff4444' : '#ff8800';
    ctx.fillRect(barX, barY, barW * (this.hp/this.maxHP), 4);
    ctx.strokeStyle = '#000'; ctx.strokeRect(barX, barY, barW, 4);
  }
}

// ==================== PROJECTILE CLASS ====================
class Projectile {
  constructor() { this.active = false; }
  
  init(x, y, dx, dy, weaponIdx, isEnemy=false, sprite=null, charged=false) {
    this.x = x; this.y = y;
    this.isEnemy = isEnemy;
    this.charged = charged;
    
    if(isEnemy) {
      this.vx = dx * ENEMY_PROJECTILE_SPEED_SCALE;
      this.vy = dy * ENEMY_PROJECTILE_SPEED_SCALE;
      this.damage = 1;
      this.hw = 6; this.hh = 6;
      this.sprite = sprite || 'enemy_bullet';
      this.life = 300;
      this.trajectory = 'linear';
    } else {
      const w = getWeaponRuntimeSpec(weaponIdx, charged);
      const speed = w.speed * PLAYER_PROJECTILE_SPEED_SCALE;
      const len = Math.sqrt(dx*dx+dy*dy) || 1;
      this.vx = (dx/len) * speed;
      this.vy = (dy/len) * speed;
      this.damage = w.damage;
      this.hw = w.hw; this.hh = w.hh;
      this.sprite = `proj_${w.spriteId || w.id}`;
      this.life = Math.ceil(w.range / speed);
      this.trajectory = w.trajectory;
      this.weaponIdx = weaponIdx;
      this.homingStrength = w.trajectory === 'homing' ? 0.13 : 0;
      this.startX = x;
    }
    this.active = true;
    this.age = 0;
    this.returning = false;
    return this;
  }
  
  getHitbox() {
    return {x:this.x-this.hw/2, y:this.y-this.hh/2, w:this.hw, h:this.hh};
  }
  
  update() {
    if(!this.active) return;
    this.age++;
    
    switch(this.trajectory) {
      case 'linear':
        this.x += this.vx;
        this.y += this.vy;
        break;
      case 'arc':
        this.x += this.vx;
        this.vy += 0.2;
        this.y += this.vy;
        break;
      case 'boomerang':
        if(!this.returning && this.age > this.life/2) {
          this.returning = true;
          this.vx = -this.vx;
        }
        this.x += this.vx;
        this.y += this.vy;
        break;
      case 'homing': {
        let tx = null, ty = null;
        let bestDist = Infinity;
        if(game?.enemies) {
          game.enemies.forEach(e => {
            if(!e.active) return;
            const ex = e.x;
            const ey = e.y - e.hh * 0.5;
            const dx = ex - this.x;
            const dy = ey - this.y;
            const d2 = dx*dx + dy*dy;
            if(d2 < bestDist) {
              bestDist = d2;
              tx = ex;
              ty = ey;
            }
          });
        }
        if(game?.boss?.active && GS.bossActive) {
          const bx = game.boss.x;
          const by = game.boss.y - game.boss.hh * 0.5;
          const dx = bx - this.x;
          const dy = by - this.y;
          const d2 = dx*dx + dy*dy;
          if(d2 < bestDist) {
            bestDist = d2;
            tx = bx;
            ty = by;
          }
        }
        if(tx != null && ty != null) {
          const speed = Math.sqrt(this.vx*this.vx + this.vy*this.vy) || 0.01;
          const dx = tx - this.x;
          const dy = ty - this.y;
          const len = Math.sqrt(dx*dx + dy*dy) || 1;
          const dvx = (dx/len) * speed;
          const dvy = (dy/len) * speed;
          const turn = this.homingStrength || 0.1;
          this.vx = lerp(this.vx, dvx, turn);
          this.vy = lerp(this.vy, dvy, turn);
        }
        this.x += this.vx;
        this.y += this.vy;
        break;
      }
    }
    
    if(this.age > this.life) this.active = false;
    // Off screen check
    if(this.x < (game?.camera?.x||0)-50 || this.x > (game?.camera?.x||0)+VIEW_W+50 ||
       this.y < (game?.camera?.y||0)-50 || this.y > (game?.camera?.y||0)+VIEW_H+50) {
      this.active = false;
    }
  }
  
  render(camX, camY) {
    if(!this.active) return;
    const spr = spriteCache[this.sprite];
    const sw = spr?.width || 16;
    const sh = spr?.height || 8;
    const sx = this.x - sw/2 - camX;
    const sy = this.y - sh/2 - camY;
    
    if(this.isEnemy) {
      drawCachedSprite(this.sprite, sx, sy, false);
    } else {
      const flipX = this.vx < 0;
      drawCachedSprite(this.sprite, sx, sy, flipX);
    }
    drawProjectileDetailPass(this.isEnemy, sx, sy, sw, sh, this.vx, this.vy, GS.frame);
  }
}

// ==================== PARTICLE SYSTEM ====================
class Particle {
  constructor() { this.active = false; }
  init(x,y,vx,vy,color,life) {
    this.x=x; this.y=y; this.vx=vx; this.vy=vy;
    this.color=color; this.life=life; this.maxLife=life;
    this.active=true; this.size=randFloat(1,3);
    return this;
  }
  update() {
    if(!this.active) return;
    this.x+=this.vx; this.y+=this.vy;
    this.vy+=0.15; this.life--;
    if(this.life<=0) this.active=false;
  }
  render(camX,camY) {
    if(!this.active) return;
    const alpha = this.life/this.maxLife;
    ctx.globalAlpha = alpha;
    ctx.fillStyle = this.color;
    ctx.fillRect(Math.round(this.x-camX), Math.round(this.y-camY), this.size, this.size);
    ctx.globalAlpha = 1;
  }
}

// Score popup
class ScorePopup {
  constructor() { this.active = false; }
  init(x,y,text,color='#fff') {
    this.x=x; this.y=y; this.text=String(text); this.color=color;
    this.life=30; this.active=true;
    return this;
  }
  update() { if(!this.active)return; this.y-=1; this.life--; if(this.life<=0)this.active=false; }
  render(camX,camY) {
    if(!this.active)return;
    ctx.globalAlpha = this.life/30;
    drawText(this.text, this.x-camX - textWidth(this.text)/2, this.y-camY, this.color);
    ctx.globalAlpha = 1;
  }
}

function getPickupSpriteBase(kind) {
  switch(kind) {
    case 'weapon_knife': return 'item_knife';
    case 'weapon_bow': return 'item_bow';
    case 'upgrade_knife': return 'item_up_knife';
    case 'upgrade_bow': return 'item_up_bow';
    default: return 'item_knife';
  }
}

class DropItem {
  constructor() { this.active = false; }
  init(kind, x, y) {
    this.kind = kind;
    this.x = x;
    this.y = y;
    this.vx = randFloat(-0.35, 0.35);
    this.vy = -1.2;
    this.floatPhase = randFloat(0, Math.PI * 2);
    this.onGround = false;
    this.life = FPS * 24;
    this.active = true;
    return this;
  }
  getHitbox() {
    return {x:this.x-6, y:this.y-14, w:12, h:12};
  }
  update(stage) {
    if(!this.active) return;
    this.life--;
    if(this.life <= 0) { this.active = false; return; }
    this.floatPhase += 0.1;
    if(!this.onGround) {
      this.vy += GRAVITY * 0.45;
      if(this.vy > 2) this.vy = 2;
      this.x += this.vx;
      this.y += this.vy;
      const tx = clamp(Math.floor(this.x / TILE), 0, stage.width - 1);
      const probeStart = clamp(Math.floor((this.y - 2) / TILE), 0, stage.height - 1);
      for(let ty=probeStart; ty<stage.height; ty++) {
        const tid = stage.terrain[ty]?.[tx];
        if(!tid || !TILE_COLORS[tid]?.terrain) continue;
        const gy = ty * TILE;
        if(this.y >= gy) {
          this.y = gy;
          this.vy = 0;
          this.onGround = true;
          this.vx = 0;
        }
        break;
      }
    }
  }
  render(camX, camY) {
    if(!this.active) return;
    const base = getPickupSpriteBase(this.kind);
    const frame = (GS.frame >> 4) & 1;
    const sx = this.x - 8 - camX;
    const sy = this.y - 16 - camY + Math.sin(this.floatPhase) * 1.4;
    drawCachedSprite(`${base}_${frame}`, sx, sy);
    const glow = 0.18 + 0.1 * Math.sin(GS.frame * 0.16 + this.x * 0.03);
    ctx.fillStyle = `rgba(255,255,255,${glow})`;
    ctx.fillRect(Math.round(sx + 6), Math.round(sy + 6), 2, 2);
  }
}

// ==================== MAIN GAME CLASS ====================
class Game {
  constructor() {
    this.scene = 'title'; // title, stageselect, intro, playing, paused, gameover, stageclear, ending
    this.player = new Player();
    this.playerModel = new PlayerModel3D();
    this.boss = new Boss();
    this.stage = null;
    this.camera = {x:0, y:0};
    this.enemies = new Pool(()=>new Enemy(), 30);
    this.projectiles = new Pool(()=>new Projectile(), 20);
    this.particles = new Pool(()=>new Particle(), 200);
    this.popups = new Pool(()=>new ScorePopup(), 10);
    this.pickups = [];
    this.menuIndex = 0;
    this.stageSelectIndex = 0;
    this.stageSelectLoop = 0;
    this.sceneTimer = 0;
    this.introText = '';
    this.bootError = '';
    this.lastTime = 0;
    this.accumulator = 0;
    this.running = true;
    
    this.setupEvents();
  }
  
  setupEvents() {
    EventBus.clear();
    
    EventBus.on('player:attack', (data) => {
      // Count active player projectiles
      let count = 0;
      this.projectiles.forEach(p => { if(!p.isEnemy && p.active) count++; });
      const weaponSpec = getWeaponRuntimeSpec(data.weapon, !!data.charged);
      const maxShots = weaponSpec.maxShots || MAX_PROJECTILES;
      if(count >= maxShots && !data.charged) return;
      
      const p = this.projectiles.get();
      p.init(data.x, data.y, data.dx, data.dy, data.weapon, false, null, data.charged);
    });
    
    EventBus.on('enemy:shoot', (data) => {
      const p = this.projectiles.get();
      p.init(data.x, data.y, data.dx, data.dy, 0, true, data.sprite);
    });
    
    EventBus.on('enemy:death', (data) => {
      // Spawn particles
      for(let i=0;i<8;i++) {
        const p = this.particles.get();
        p.init(data.x, data.y, randFloat(-3,3), randFloat(-4,-1),
          ['#ff8844','#ffaa44','#ffdd44','#ff4422'][randInt(0,3)], randInt(15,25));
      }
      // Score popup
      const pop = this.popups.get();
      pop.init(data.x, data.y, data.points);
    });
    
    EventBus.on('player:armorBreak', (data) => {
      for(let i=0;i<12;i++) {
        const p = this.particles.get();
        p.init(data.x, data.y, randFloat(-4,4), randFloat(-5,-1),
          ['#c0c0c0','#808080','#a0a0a0','#e0e0e0'][randInt(0,3)], randInt(20,30));
      }
    });
    
    EventBus.on('boss:death', (data) => {
      for(let i=0;i<30;i++) {
        setTimeout(()=>{
          const p = this.particles.get();
          p.init(data.x+randFloat(-30,30), data.y+randFloat(-30,10),
            randFloat(-3,3), randFloat(-5,-1),
            ['#ff4422','#ff8844','#ffdd44','#ffffff'][randInt(0,3)], randInt(20,40));
        }, i*100);
      }
    });
    
    EventBus.on('boss:phaseChange', (data) => {
      for(let i=0;i<16;i++) {
        const p = this.particles.get();
        p.init(data.x+randFloat(-20,20), data.y+randFloat(-20,10),
          randFloat(-2,2), randFloat(-3,-1), '#ffffff', randInt(15,25));
      }
    });
    
    EventBus.on('player:death', () => {
      GS.lives--;
      if(GS.lives < 0) {
        this.scene = 'gameover';
        this.sceneTimer = 0;
        this.menuIndex = 0;
        Audio.playBGM('gameover');
      } else {
        this.respawnPlayer();
      }
    });
    
    EventBus.on('score:1up', (data) => {
      const pop = this.popups.get();
      pop.init(data.x, data.y, '1UP', '#44ff44');
    });
  }

  getTitleMenuItems() {
    const items = [
      {id:'start', label:'START'},
      {id:'stageselect', label:'STAGE SELECT'},
    ];
    if(SaveMgr.data.progress.timeAttackUnlocked) items.push({id:'timeattack', label:'TIME ATTACK'});
    return items;
  }

  getMaxSelectableStage() {
    return clamp((SaveMgr.data.progress.highestStageCleared ?? -1) + 1, 0, 4);
  }
  
  start() {
    SaveMgr.load();
    GS.hiScore = SaveMgr.getHiScore();
    Audio.init();
    initFont();
    buildSprites();

    Promise.all([
      waitForImageAssets(STAGE1_ASSET_KEYS),
      this.playerModel.load()
    ]).then(() => {
      this.scene = 'title';
      Audio.playBGM('title');
      requestAnimationFrame((t) => this.loop(t));
    }).catch((err) => {
      this.bootError = `3D INIT ERROR: ${err?.message || err}`;
      this.scene = 'title';
      requestAnimationFrame((t) => this.loop(t));
    });
  }
  
  loop(currentTime) {
    if(!this.running) return;
    
    const elapsed = currentTime - this.lastTime;
    this.lastTime = currentTime;
    this.accumulator += Math.min(elapsed, 100);
    
    Input.update();
    
    while(this.accumulator >= FIXED_DT) {
      if(GS.hitstopFrames > 0) {
        GS.hitstopFrames--;
      } else {
        this.update();
      }
      Input.lateUpdate();
      this.accumulator -= FIXED_DT;
    }
    
    this.render();
    requestAnimationFrame((t) => this.loop(t));
  }
  
  update() {
    GS.frame++;
    this.sceneTimer++;
    
    // Combo timer
    if(GS.comboTimer > 0) {
      GS.comboTimer--;
      if(GS.comboTimer <= 0) GS.combo = 0;
    }
    
    // Screen shake decay
    if(GS.screenShake > 0) {
      GS.screenShakeX = (Math.random()-0.5) * GS.screenShake;
      GS.screenShakeY = (Math.random()-0.5) * GS.screenShake;
      GS.screenShake *= 0.85;
      if(GS.screenShake < 0.5) GS.screenShake = 0;
    } else {
      GS.screenShakeX = GS.screenShakeY = 0;
    }
    
    // Handle audio resume on first input
    if(Input.isJustPressed('jump') || Input.isJustPressed('attack') || Input.isJustPressed('pause')) {
      Audio.resume();
    }
    
    switch(this.scene) {
      case 'title': this.updateTitle(); break;
      case 'stageselect': this.updateStageSelect(); break;
      case 'intro': this.updateIntro(); break;
      case 'playing': this.updatePlaying(); break;
      case 'paused': this.updatePaused(); break;
      case 'gameover': this.updateGameOver(); break;
      case 'stageclear': this.updateStageClear(); break;
      case 'ending': this.updateEnding(); break;
    }
  }
  
  updateTitle() {
    const menuItems = this.getTitleMenuItems();
    this.menuIndex = clamp(this.menuIndex, 0, menuItems.length - 1);
    if(Input.isJustPressed('jump') || Input.isJustPressed('attack')) {
      Audio.playSE('menu');
      const selected = menuItems[this.menuIndex]?.id;
      if(selected === 'start') {
        GS.reset();
        GS.currentStage = 0;
        GS.currentLoop = 0;
        GS.checkpoint = 0;
        this.startStage(0);
      } else if(selected === 'stageselect') {
        this.scene = 'stageselect';
        this.sceneTimer = 0;
        this.stageSelectIndex = this.getMaxSelectableStage();
        this.stageSelectLoop = SaveMgr.data.progress.loop2Unlocked ? GS.currentLoop : 0;
      } else if(selected === 'timeattack') {
        GS.reset();
        GS.currentStage = 0;
        GS.currentLoop = 0;
        GS.checkpoint = 0;
        this.startStage(0);
      }
    }
    if(Input.isJustPressed('up')) { this.menuIndex = Math.max(0, this.menuIndex-1); Audio.playSE('menu'); }
    if(Input.isJustPressed('down')) { this.menuIndex = Math.min(menuItems.length - 1, this.menuIndex+1); Audio.playSE('menu'); }
  }

  updateStageSelect() {
    const maxStage = this.getMaxSelectableStage();
    const maxLoop = SaveMgr.data.progress.loop2Unlocked ? 1 : 0;
    this.stageSelectIndex = clamp(this.stageSelectIndex, 0, maxStage);
    this.stageSelectLoop = clamp(this.stageSelectLoop, 0, maxLoop);

    if(Input.isJustPressed('up')) { this.stageSelectIndex = Math.max(0, this.stageSelectIndex - 1); Audio.playSE('menu'); }
    if(Input.isJustPressed('down')) { this.stageSelectIndex = Math.min(maxStage, this.stageSelectIndex + 1); Audio.playSE('menu'); }
    if(maxLoop > 0) {
      if(Input.isJustPressed('left')) { this.stageSelectLoop = Math.max(0, this.stageSelectLoop - 1); Audio.playSE('menu'); }
      if(Input.isJustPressed('right')) { this.stageSelectLoop = Math.min(maxLoop, this.stageSelectLoop + 1); Audio.playSE('menu'); }
    }

    if(Input.isJustPressed('pause')) {
      this.scene = 'title';
      this.sceneTimer = 0;
      this.menuIndex = 0;
      Audio.playSE('menu');
      return;
    }

    if(Input.isJustPressed('jump') || Input.isJustPressed('attack')) {
      Audio.playSE('menu');
      GS.reset();
      GS.currentLoop = this.stageSelectLoop;
      GS.currentStage = this.stageSelectIndex;
      GS.checkpoint = 0;
      this.startStage(this.stageSelectIndex);
    }
  }
  
  updateIntro() {
    if(this.sceneTimer > 120 || Input.isJustPressed('jump') || Input.isJustPressed('attack')) {
      this.scene = 'playing';
      this.sceneTimer = 0;
      Audio.playBGM(this.stage.bgm);
    }
  }
  
  updatePlaying() {
    if(Input.isJustPressed('pause')) {
      this.scene = 'paused';
      this.menuIndex = 0;
      Audio.playSE('pause');
      return;
    }
    
    // Stage timer
    GS.stageTimer -= (1/FPS) * GLOBAL_SPEED_SCALE;
    if(GS.stageTimer <= 60 && !GS.timeWarned) {
      GS.timeWarned = true;
      Audio.playSE('timeWarn');
    }
    if(GS.stageTimer <= 0) {
      GS.stageTimer = 0;
      this.player.die();
    }
    
    // Update player
    this.player.update(this.stage);
    this.playerModel.update(this.player, 1 / FPS);
    
    // Update crumbling platforms
    if(this.stage._crumbleTimers) {
      for(const[key, ct] of Object.entries(this.stage._crumbleTimers)) {
        ct.timer--;
        if(ct.timer <= 0) {
          this.stage.terrain[ct.ty][ct.tx] = 0;
          // Regenerate after 5 seconds
          const stageRef = this.stage;
          const tty = ct.ty, ttx = ct.tx, oTile = ct.origTile;
          setTimeout(() => {
            if(stageRef && stageRef.terrain && stageRef.terrain[tty]) stageRef.terrain[tty][ttx] = oTile;
          }, 5000);
          delete this.stage._crumbleTimers[key];
        }
      }
    }
    
    // Update gimmicks
    if(this.stage.gimmicks) {
      this.stage.gimmicks.forEach(g => {
        if(g.type === 'movingPlatH') {
          if(!g._phase) g._phase = 0;
          g._phase += 0.012 * (g.speed || 1);
          const oldX = g._cx || g.x;
          g._cx = g.x + Math.sin(g._phase) * (g.range/2);
          g._cy = g.y;
          g._dx = (g._cx - oldX);
        } else if(g.type === 'movingPlatV') {
          if(!g._phase) g._phase = 0;
          g._phase += 0.010 * (g.speed || 1);
          const oldY = g._cy || g.y;
          g._cx = g.x;
          g._cy = g.y + Math.sin(g._phase) * (g.range/2);
          g._dy = (g._cy - oldY);
        } else if(g.type === 'cannon') {
          g._timer = (g._timer == null) ? randInt(40, g.interval || 180) : g._timer - 1;
          if(g._timer <= 0) {
            g._timer = g.interval || 180;
            EventBus.emit('enemy:shoot', {
              x: g.x,
              y: g.y,
              dx: (g.dir || -1) * (g.speed || 1.8),
              dy: randFloat(-0.12, 0.12),
              sprite:'enemy_bullet'
            });
          }
        }
      });
    }
    
    // Spawn enemies based on camera position
    if(this.stage.entities) {
      this.stage.entities.forEach(ent => {
        if(ent.triggered) return;
        if(ent.type === 'checkpoint' || ent.type === 'chest') return; // handled separately
        const spawnX = ent.x * TILE;
        if(spawnX > this.camera.x - TILE && spawnX < this.camera.x + VIEW_W + TILE*2) {
          ent.triggered = true;
          if(this.enemies.count < 30) {
            const e = this.enemies.get();
            e.init(ent.type, ent.x, ent.y);
          }
        }
      });
    }
    
    // Update enemies
    this.enemies.forEach((e, i) => {
      e.update(this.player.x, this.player.y, this.stage);
      if(!e.active) this.enemies.release(e);
    });
    
    // Boss trigger
    if(!GS.bossActive && !GS.bossDefeated && this.player.x >= this.stage.bossAreaStart * TILE) {
      GS.bossActive = true;
      GS.noDamageBoss = true;
      this.boss.init(this.stage.boss, GS.currentLoop);
      Audio.playBGM('boss');
    }
    
    // Update boss
    if(GS.bossActive && this.boss.active) {
      this.boss.update(this.player.x, this.player.y, this.stage);
    }
    
    // Update projectiles
    this.projectiles.forEach((p) => {
      p.update();
      if(!p.active) { this.projectiles.release(p); return; }
      
      const phb = p.getHitbox();
      
      if(p.isEnemy) {
        // Check vs player
        if(!this.player.dead && this.player.invincibleTimer <= 0) {
          const plhb = this.player.getHitbox();
          if(aabbOverlap(phb, plhb)) {
            this.player.takeDamage();
            p.active = false;
            this.projectiles.release(p);
          }
        }
      } else {
        // Check vs enemies
        let hit = false;
        this.enemies.forEach(e => {
          if(!e.active || hit) return;
          if(aabbOverlap(phb, e.getHitbox())) {
            e.takeDamage(p.damage);
            if(!WEAPONS[p.weaponIdx]?.piercing) { p.active = false; hit = true; }
          }
        });
        // Check vs boss
        if(!hit && GS.bossActive && this.boss.active) {
          if(aabbOverlap(phb, this.boss.getHitbox())) {
            if(this.boss.takeDamage(p.damage)) {
              // Boss defeated
              GS.bossActive = false;
              GS.bossDefeated = true;
              this.scene = 'stageclear';
              this.sceneTimer = 0;
              Audio.playBGM('clear');
            }
            p.active = false;
          }
        }
        if(!p.active) this.projectiles.release(p);
        
        // Terrain collision for player projectiles
        const tx = Math.floor(p.x/TILE);
        const ty = Math.floor(p.y/TILE);
        if(ty>=0 && ty<this.stage.height && tx>=0 && tx<this.stage.width) {
          const tid = this.stage.terrain[ty]?.[tx];
          if(tid && TILE_COLORS[tid]?.terrain) {
            p.active = false;
            this.projectiles.release(p);
          }
        }
      }
    });
    
    // Enemy-player contact damage
    if(!this.player.dead && this.player.invincibleTimer <= 0) {
      const plhb = this.player.getHitbox();
      this.enemies.forEach(e => {
        if(!e.active) return;
        if(aabbOverlap(plhb, e.getHitbox())) {
          this.player.takeDamage();
        }
      });
      // Boss contact
      if(GS.bossActive && this.boss.active) {
        if(aabbOverlap(plhb, this.boss.getHitbox())) {
          this.player.takeDamage();
        }
      }
    }
    
    // Check entities (chests, checkpoints)
	    if(this.stage.entities) {
	      const plhb = this.player.getHitbox();
	      this.stage.entities.forEach(ent => {
        if(ent.type === 'checkpoint' && !ent.activated) {
          const chb = {x:ent.x*TILE, y:ent.y*TILE, w:TILE, h:TILE*2};
          if(aabbOverlap(plhb, chb)) {
            ent.activated = true;
            GS.checkpoint = ent.id;
            Audio.playSE('chest');
          }
        }
        if(ent.type === 'chest' && !ent.opened) {
          const chb = {x:ent.x*TILE, y:ent.y*TILE, w:TILE, h:TILE};
          // Check if player attacks near chest
          this.projectiles.forEach(p => {
            if(p.isEnemy || !p.active) return;
            if(aabbOverlap(p.getHitbox(), chb)) {
              this.openChest(ent);
              p.active = false;
            }
          });
	        }
	      });
	    }

	    // Update and collect weapon/upgrade pickups
	    for(let i=this.pickups.length-1; i>=0; i--) {
	      const item = this.pickups[i];
	      item.update(this.stage);
	      if(!item.active) {
	        this.pickups.splice(i, 1);
	        continue;
	      }
	      if(!this.player.dead && aabbOverlap(this.player.getHitbox(), item.getHitbox())) {
	        this.applyPickup(item);
	        item.active = false;
	        this.pickups.splice(i, 1);
	      }
	    }
	    
	    // Update particles
	    this.particles.forEach((p) => { p.update(); if(!p.active) this.particles.release(p); });
	    this.popups.forEach((p) => { p.update(); if(!p.active) this.popups.release(p); });
    
    // Camera
    this.updateCamera();
    
    // Hi-score
    if(GS.score > GS.hiScore) {
      GS.hiScore = GS.score;
      SaveMgr.setHiScore(GS.score);
    }
  }
  
	  openChest(ent) {
	    ent.opened = true;
	    Audio.playSE('chest');
	    
	    const diff = GS.getDifficulty();
	    const roll = Math.random();
	    let cumulative = 0;
	    
	    const table = [
	      {type:'weapon_knife', chance:GS.weaponOwned.knife ? 0.06 : 0.22},
	      {type:'weapon_bow', chance:GS.weaponOwned.bow ? 0.06 : 0.22},
	      {type:'upgrade_knife', chance:GS.weaponLevels.knife >= 1 ? 0.02 : 0.12},
	      {type:'upgrade_bow', chance:GS.weaponLevels.bow >= 1 ? 0.02 : 0.12},
	      {type:'armor', chance:diff.armorDrop},
	      {type:'score_small', chance:0.14},
	      {type:'score_big', chance:0.10},
	      {type:'1up', chance:0.05},
	      {type:'trap', chance:0.05 + (GS.currentLoop === 1 ? 0.10 : 0)},
	    ];
    
    // Normalize
    const total = table.reduce((s,t)=>s+t.chance,0);
    
	    for(const item of table) {
	      cumulative += item.chance / total;
	      if(roll <= cumulative) {
	        switch(item.type) {
	          case 'weapon_knife':
	            this.spawnPickup('weapon_knife', ent.x*TILE + 8, ent.y*TILE);
	            break;
	          case 'weapon_bow':
	            this.spawnPickup('weapon_bow', ent.x*TILE + 8, ent.y*TILE);
	            break;
	          case 'upgrade_knife':
	            this.spawnPickup('upgrade_knife', ent.x*TILE + 8, ent.y*TILE);
	            break;
	          case 'upgrade_bow':
	            this.spawnPickup('upgrade_bow', ent.x*TILE + 8, ent.y*TILE);
	            break;
	          case 'armor':
	            const maxArmor = GS.currentLoop === 0 ? 1 : 2;
            if(GS.armorLevel < maxArmor) {
              GS.armorLevel++;
              const pop2 = this.popups.get();
              pop2.init(ent.x*TILE, ent.y*TILE, 'ARMOR UP', '#ffdd44');
            } else {
              GS.score += 500;
            }
            break;
          case 'score_small':
            GS.score += 500;
            const pop3 = this.popups.get();
            pop3.init(ent.x*TILE, ent.y*TILE, '500', '#ffffff');
            break;
          case 'score_big':
            GS.score += 2000;
            const pop4 = this.popups.get();
            pop4.init(ent.x*TILE, ent.y*TILE, '2000', '#ffdd44');
            break;
          case '1up':
            if(GS.lives < MAX_LIVES) { GS.lives++; Audio.playSE('1up'); }
            const pop5 = this.popups.get();
            pop5.init(ent.x*TILE, ent.y*TILE, '1UP', '#44ff44');
            break;
          case 'trap':
            // Spawn enemy
            if(this.enemies.count < 30) {
              const e = this.enemies.get();
              e.init('bat', ent.x, ent.y-1);
            }
            break;
        }
	        return;
	      }
	    }
	  }

	  spawnPickup(kind, x, y) {
	    if(this.pickups.length >= 18) this.pickups.shift();
	    const d = new DropItem().init(kind, x, y);
	    this.pickups.push(d);
	  }

	  applyPickup(item) {
	    const px = item.x;
	    const py = item.y;
	    const pop = this.popups.get();
	    if(item.kind === 'weapon_knife') {
	      GS.weaponOwned.knife = true;
	      GS.currentWeapon = 1;
	      GS.weaponsUsed.add(1);
	      pop.init(px, py, 'KNIFE', '#7ed4ff');
	    } else if(item.kind === 'weapon_bow') {
	      GS.weaponOwned.bow = true;
	      GS.currentWeapon = 2;
	      GS.weaponsUsed.add(2);
	      pop.init(px, py, 'BOW', '#7ed4ff');
	    } else if(item.kind === 'upgrade_knife') {
	      if(GS.weaponLevels.knife < 1) {
	        GS.weaponLevels.knife = 1;
	        pop.init(px, py, 'KNIFE LASER', '#ff8ad8');
	      } else {
	        GS.score += 1200;
	        pop.init(px, py, '1200', '#ffdd88');
	      }
	    } else if(item.kind === 'upgrade_bow') {
	      if(GS.weaponLevels.bow < 1) {
	        GS.weaponLevels.bow = 1;
	        pop.init(px, py, 'HOMING BOW', '#8cffb8');
	      } else {
	        GS.score += 1200;
	        pop.init(px, py, '1200', '#ffdd88');
	      }
	    }
	    Audio.playSE('chest');
	  }
  
	  updateCamera() {
	    if(!this.stage) return;
	    
	    // Target: player at left 1/3
	    let targetX = this.player.x - VIEW_W/3;
	    let targetY = this.player.y - VIEW_H * 0.6;
	    
	    // Boss arena lock (keep left bound, but still follow rightward movement).
	    if(GS.bossActive) {
	      const arenaCamLeft = this.stage.bossAreaStart * TILE;
	      const arenaCamRight = Math.max(arenaCamLeft, this.stage.width * TILE - VIEW_W);
	      const followX = this.player.x - VIEW_W * 0.48;
	      targetX = clamp(followX, arenaCamLeft, arenaCamRight);
	    }
    
    // Smooth follow
    this.camera.x = lerp(this.camera.x, targetX, 0.05);
    this.camera.y = lerp(this.camera.y, targetY, 0.05);
    
    // Clamp
    this.camera.x = clamp(this.camera.x, 0, Math.max(0, this.stage.width*TILE - VIEW_W));
    this.camera.y = clamp(this.camera.y, 0, Math.max(0, this.stage.height*TILE - VIEW_H));
    
    // Integer rounding
    this.camera.x = Math.round(this.camera.x);
    this.camera.y = Math.round(this.camera.y);
  }
  
  updatePaused() {
    if(Input.isJustPressed('pause')) {
      this.scene = 'playing';
      Audio.playSE('pause');
      return;
    }
    if(Input.isJustPressed('up')) { this.menuIndex = Math.max(0, this.menuIndex-1); Audio.playSE('menu'); }
    if(Input.isJustPressed('down')) { this.menuIndex = Math.min(2, this.menuIndex+1); Audio.playSE('menu'); }
    if(Input.isJustPressed('jump') || Input.isJustPressed('attack')) {
      Audio.playSE('menu');
      if(this.menuIndex === 0) { this.scene = 'playing'; }
      else if(this.menuIndex === 1) { this.startStage(GS.currentStage); }
      else if(this.menuIndex === 2) { this.scene = 'title'; this.sceneTimer=0; this.menuIndex=0; Audio.playBGM('title'); }
    }
  }
  
  updateGameOver() {
    if(this.sceneTimer < 60) return; // Wait a moment
    
    if(Input.isJustPressed('up')) { this.menuIndex = Math.max(0, this.menuIndex-1); Audio.playSE('menu'); }
    if(Input.isJustPressed('down')) { this.menuIndex = Math.min(1, this.menuIndex+1); Audio.playSE('menu'); }
    
    if(Input.isJustPressed('jump') || Input.isJustPressed('attack')) {
      Audio.playSE('menu');
      if(this.menuIndex === 0) {
        // Continue
        const diff = GS.getDifficulty();
        GS.consecutiveGameOvers++;
        GS.continues++;
        if(diff.maxContinues >= 0 && GS.continues > diff.maxContinues) {
          // No more continues in loop 2
          this.scene = 'title'; this.sceneTimer=0; this.menuIndex=0; Audio.playBGM('title');
          return;
        }
        GS.score = 0;
        GS.lives = GS.consecutiveGameOvers >= 3 ? 5 : INITIAL_LIVES;
        GS.armorLevel = 1;
        GS.currentWeapon = 0;
        GS.checkpoint = 0;
        this.startStage(GS.currentStage);
      } else {
        this.scene = 'title'; this.sceneTimer=0; this.menuIndex=0; Audio.playBGM('title');
      }
    }
  }
  
  updateStageClear() {
    if(this.sceneTimer > 300 || (this.sceneTimer > 60 && (Input.isJustPressed('jump')||Input.isJustPressed('attack')))) {
      // Advance
      const nextStage = GS.currentStage + 1;
      
      // Save progress
      if(GS.currentStage > SaveMgr.data.progress.highestStageCleared) {
        SaveMgr.data.progress.highestStageCleared = GS.currentStage;
      }
      
      if(nextStage >= 5) {
        // Completed all stages
        if(GS.currentLoop === 0) {
          // First loop complete - start loop 2
          GS.currentLoop = 1;
          GS.currentStage = 0;
          SaveMgr.data.progress.loop2Unlocked = true;
          this.scene = 'ending';
          this.sceneTimer = 0;
          this.introText = 'loop1';
          Audio.playBGM('ending');
        } else {
          // Second loop complete - true ending
          SaveMgr.data.progress.timeAttackUnlocked = true;
          this.scene = 'ending';
          this.sceneTimer = 0;
          this.introText = 'true';
          Audio.playBGM('ending');
        }
        SaveMgr.save();
      } else {
        GS.currentStage = nextStage;
        GS.checkpoint = 0;
        this.startStage(nextStage);
      }
    }
    
    // Time bonus calculation display
    if(this.sceneTimer === 60) {
      const timeBonus = Math.floor(GS.stageTimer) * 10;
      const lifeBonus = GS.lives * 1000;
      GS.score += timeBonus + lifeBonus;
    }
  }
  
  updateEnding() {
    if(this.sceneTimer > 600 || (this.sceneTimer > 120 && (Input.isJustPressed('jump')||Input.isJustPressed('attack')))) {
      if(this.introText === 'loop1') {
        // Go to loop 2
        GS.checkpoint = 0;
        this.startStage(0);
      } else {
        this.scene = 'title'; this.sceneTimer=0; this.menuIndex=0; Audio.playBGM('title');
      }
    }
  }
  
	  startStage(stageNum) {
	    GS.currentStage = stageNum;
	    this.stage = generateStage(stageNum);
	    this.stage.visuals = buildStageVisualSet(this.stage);
	    this.stage._crumbleTimers = {};
    
    // Reset pools
    this.enemies.releaseAll();
    this.projectiles.releaseAll();
    this.particles.releaseAll();
    this.popups.releaseAll();
    this.pickups = [];
    
    // Reset stage state
    GS.bossActive = false;
    GS.bossDefeated = false;
    GS.stageClear = false;
    GS.stageTimer = this.stage.timeLimit;
    GS.timeWarned = false;
    this.boss.active = false;
    
    // Find spawn point
    const cp = this.stage.checkpoints[GS.checkpoint] || this.stage.checkpoints[0];
    this.player.reset(cp.x, cp.y);
    GS.armorLevel = Math.max(GS.armorLevel, 1); // At least iron armor on respawn
    
    // Camera
    this.camera.x = Math.max(0, this.player.x - VIEW_W/3);
    this.camera.y = Math.max(0, this.player.y - VIEW_H*0.6);
    
    this.scene = 'intro';
    this.sceneTimer = 0;
    this.menuIndex = 0;
    Audio.stopBGM();
  }
  
  respawnPlayer() {
    const cp = this.stage.checkpoints[GS.checkpoint] || this.stage.checkpoints[0];
    this.player.reset(cp.x, cp.y);
    GS.armorLevel = 1;
    GS.bossActive = false;
    this.boss.active = false;
    
    // Clear enemies and projectiles near respawn
    this.enemies.releaseAll();
    this.projectiles.releaseAll();
    this.pickups = [];
    
    // Reset entity triggers near player
    if(this.stage.entities) {
      this.stage.entities.forEach(ent => {
        const entX = ent.x * TILE;
        if(Math.abs(entX - cp.x) < VIEW_W) {
          if(ent.type !== 'checkpoint' && ent.type !== 'chest') {
            ent.triggered = false;
          }
        }
      });
    }
    
    this.camera.x = Math.max(0, this.player.x - VIEW_W/3);
    
    // If boss was active, reactivate when entering boss area
    if(GS.bossDefeated) return;
    
    // Play stage BGM again if was in boss fight
    Audio.playBGM(this.stage.bgm);
  }
  
  // ==================== RENDERING ====================
  render() {
    ctx.save();
    
    // Apply screen shake
    if(SaveMgr.data.settings.screenShake !== false) {
      ctx.translate(GS.screenShakeX, GS.screenShakeY);
    }
    
    switch(this.scene) {
      case 'title': this.renderTitle(); break;
      case 'stageselect': this.renderStageSelect(); break;
      case 'intro': this.renderIntro(); break;
      case 'playing': this.renderGame(); break;
      case 'paused': this.renderGame(); this.renderPause(); break;
      case 'gameover': this.renderGame(); this.renderGameOver(); break;
      case 'stageclear': this.renderGame(); this.renderStageClear(); break;
      case 'ending': this.renderEnding(); break;
    }
    
    ctx.restore();
  }
  
  renderTitle() {
    const sky = ctx.createLinearGradient(0, 0, 0, H);
    sky.addColorStop(0, '#050a12');
    sky.addColorStop(0.55, '#0a1820');
    sky.addColorStop(1, '#10242a');
    ctx.fillStyle = sky;
    ctx.fillRect(0,0,W,H);

    this.renderTitleBackdrop();

    // Ornamental frame.
    ctx.strokeStyle = 'rgba(124,166,168,0.35)';
    ctx.lineWidth = 1;
    ctx.strokeRect(6.5, 6.5, W - 13, H - 13);
    ctx.strokeStyle = 'rgba(64,95,98,0.45)';
    ctx.strokeRect(10.5, 10.5, W - 21, H - 21);
    const cornerCol = 'rgba(186,220,224,0.5)';
    ctx.fillStyle = cornerCol;
    [[12,12],[W-16,12],[12,H-16],[W-16,H-16]].forEach(([x,y]) => ctx.fillRect(x,y,4,4));

    // Title
    const titleY = 34 + Math.sin(GS.frame*0.03)*2;
    const logo = "KNIGHT'S ORDEAL";
    const logoX = W/2 - textWidth(logo,2)/2;
    drawText(logo, logoX+2, titleY+2, '#102226', 2);
    drawText(logo, logoX, titleY, '#f7dd7b', 2);
    drawText("GOTHIC ACTION PROTOTYPE", W/2 - textWidth("GOTHIC ACTION PROTOTYPE")/2, titleY+24, '#8fb8bd');

    // Menu card
    ctx.fillStyle = 'rgba(6,16,20,0.66)';
    ctx.fillRect(116, 96, 248, 90);
    ctx.strokeStyle = 'rgba(126,166,170,0.55)';
    ctx.strokeRect(116.5, 96.5, 247, 89);
    ctx.fillStyle = 'rgba(152,206,214,0.08)';
    ctx.fillRect(120, 100, 240, 8);

    const menuItems = this.getTitleMenuItems().map(v => v.label);
    menuItems.forEach((item, i) => {
      const y = 114 + i * 22;
      const selected = i === this.menuIndex;
      if(selected) {
        const gl = 0.16 + 0.08 * Math.sin(GS.frame * 0.18);
        ctx.fillStyle = `rgba(140,210,224,${gl})`;
        ctx.fillRect(126, y-2, 228, 14);
      }
      const col = selected ? '#f6ffff' : '#8aa4a8';
      drawText(item, W/2 - textWidth(item)/2, y, col);
      if(selected) {
        drawText('>', 132, y, '#ffd96a');
        drawText('<', 344, y, '#ffd96a');
      }
    });

    this.renderTitleWeaponShowcase(192);

    // Hi-Score + status strip
    const hi = `HI: ${String(GS.hiScore).padStart(8,'0')}`;
    drawText(hi, W/2 - textWidth(hi)/2, 226, '#c6d0d1');
    const modelStatus = this.playerModel.ready ? '3D READY' : (this.playerModel.failed ? '3D FAIL' : '3D LOADING');
    const modelCol = this.playerModel.ready ? '#6de69a' : (this.playerModel.failed ? '#ff6a6a' : '#ffd77b');
    drawText(modelStatus, 16, 226, modelCol);

    // Bottom hint bar
    ctx.fillStyle = 'rgba(0,0,0,0.36)';
    ctx.fillRect(0, H-26, W, 26);
    drawText('ARROWS:MOVE  SPACE:JUMP  X:ATTACK  ENTER:SELECT', W/2 - textWidth('ARROWS:MOVE  SPACE:JUMP  X:ATTACK  ENTER:SELECT')/2, H-21, '#6f8588');
    const pressCol = Math.floor(GS.frame/25)%2===0 ? '#c2d9dc' : '#6e8588';
    drawText('PRESS JUMP/ATTACK', W/2 - textWidth('PRESS JUMP/ATTACK')/2, H-11, pressCol);
  }

  renderTitleBackdrop() {
    // Stars
    for(let i=0; i<88; i++) {
      const sx = (i * 53 + 17) % W;
      const sy = (i * 29 + 9) % 128;
      const tw = 0.28 + 0.32 * Math.sin(GS.frame * 0.03 + i * 0.7);
      ctx.fillStyle = `rgba(210,240,255,${tw})`;
      ctx.fillRect(sx, sy, 1, 1);
    }

    // Moon + halo.
    ctx.fillStyle = 'rgba(214,242,244,0.22)';
    ctx.beginPath();
    ctx.arc(58, 40, 22, 0, Math.PI * 2);
    ctx.fill();
    ctx.fillStyle = 'rgba(248,254,255,0.85)';
    ctx.beginPath();
    ctx.arc(58, 40, 15, 0, Math.PI * 2);
    ctx.fill();
    ctx.fillStyle = '#0b1720';
    ctx.beginPath();
    ctx.arc(64, 36, 13, 0, Math.PI * 2);
    ctx.fill();

    // Far mountain silhouettes.
    ctx.fillStyle = 'rgba(12,28,34,0.8)';
    for(let i=0; i<8; i++) {
      const x = i * 66 - ((GS.frame * 0.08) % 66);
      const h = 30 + ((i * 11) % 24);
      ctx.beginPath();
      ctx.moveTo(x, 180);
      ctx.lineTo(x + 24, 180 - h);
      ctx.lineTo(x + 58, 180);
      ctx.closePath();
      ctx.fill();
    }

    // Graveyard line.
    ctx.fillStyle = 'rgba(8,18,20,0.95)';
    ctx.fillRect(0, 180, W, 56);
    ctx.fillStyle = 'rgba(34,64,62,0.55)';
    for(let i=0; i<24; i++) {
      const gx = i * 22 + (i % 3);
      const gh = 10 + (i % 4) * 2;
      ctx.fillRect(gx, 180 - gh, 4, gh);
      if(i % 4 === 1) ctx.fillRect(gx - 2, 180 - gh + 3, 8, 2);
    }

    // Drifting fog.
    for(let i=0; i<4; i++) {
      const y = 164 + i * 12;
      const x = -((GS.frame * (0.15 + i * 0.05)) % (W + 140));
      const alpha = 0.09 - i * 0.015;
      ctx.fillStyle = `rgba(142,188,182,${alpha})`;
      ctx.fillRect(x, y, W + 140, 10);
    }
  }

  renderIntro() {
    ctx.fillStyle = '#000';
    ctx.fillRect(0,0,W,H);
    
    const stageName = this.stage?.name || 'STAGE';
    const stageNum = `STAGE ${GS.currentStage + 1}`;
