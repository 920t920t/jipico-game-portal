	  renderGame() {
	    if(!this.stage) return;
	    
	    const camX = this.camera.x;
	    const camY = this.camera.y;
	    
	    // Background
	    const theme = getStageVisualTheme(this.stage.stageNum);
	    const skyGrad = ctx.createLinearGradient(0, 0, 0, H);
	    skyGrad.addColorStop(0, theme.skyTop);
	    skyGrad.addColorStop(1, theme.skyBottom);
	    ctx.fillStyle = skyGrad;
	    ctx.fillRect(0,0,W,H);

	    // World layer (zoomed in)
	    ctx.save();
	    ctx.scale(SCREEN_ZOOM, SCREEN_ZOOM);

	    // Image-based backdrop for stage 1, fallback to procedural parallax.
	    if(!this.renderBackdrop(camX, camY)) this.renderParallaxBG(camX, camY);
	    this.renderDepthLayers(camX, camY);
	    this.renderStageProps(camX, camY, true);

    // Terrain tiles (with culling)
    const startTX = Math.max(0, Math.floor(camX / TILE));
    const endTX = Math.min(this.stage.width, Math.ceil((camX + VIEW_W) / TILE) + 1);
    const startTY = Math.max(0, Math.floor(camY / TILE));
    const endTY = Math.min(this.stage.height, Math.ceil((camY + VIEW_H) / TILE) + 1);

	    if(this.stage.drawTerrain !== false || DEBUG_SHOW_COLLISION_MASK) {
      for(let ty = startTY; ty < endTY; ty++) {
        for(let tx = startTX; tx < endTX; tx++) {
          const tid = this.stage.terrain[ty]?.[tx];
          if(!tid) continue;
	          if(this.stage.drawTerrain !== false) {
	            if(this.stage.stageNum === 0 && tid === 1) {
	              drawGraveyardTile(this.stage, tx, ty, camX, camY, GS.frame);
	            } else {
	              drawTile(tid, tx*TILE - camX, ty*TILE - camY, GS.frame, tx, ty);
	            }
	          } else if(DEBUG_SHOW_COLLISION_MASK) {
            const tc = TILE_COLORS[tid];
            if(tc?.terrain) {
              ctx.fillStyle = 'rgba(255,255,255,0.18)';
              ctx.fillRect(tx*TILE - camX, ty*TILE - camY, TILE, TILE);
            } else if(tc?.platform) {
              ctx.fillStyle = 'rgba(120,220,255,0.35)';
              ctx.fillRect(tx*TILE - camX, ty*TILE - camY, TILE, 4);
            }
          }
        }
	      }
	    }
	    this.renderStageDecals(camX, camY);
	    this.renderStageProps(camX, camY, false);

	    // Moving platforms
	    if(this.stage.gimmicks) {
      this.stage.gimmicks.forEach(g => {
        if(g.type === 'movingPlatH' || g.type === 'movingPlatV') {
          const px = (g._cx || g.x) - camX;
          const py = (g._cy || g.y) - camY;
          ctx.fillStyle = '#7a6a5a';
          ctx.fillRect(px, py, 48, 6);
          ctx.fillStyle = '#5a4a3a';
          ctx.fillRect(px, py+6, 48, 2);
          ctx.fillStyle = '#8a7a6a';
          ctx.fillRect(px, py, 48, 2);
        } else if(g.type === 'cannon') {
          const cx = g.x - camX;
          const cy = g.y - camY;
          ctx.fillStyle = '#3b3b3b';
          ctx.fillRect(cx-6, cy-6, 12, 12);
          ctx.fillStyle = '#777';
          ctx.fillRect(cx-2, cy-3, 8*(g.dir||-1), 3);
        } else if(g.type === 'wind') {
          const wx = g.x - camX;
          const wy = 12;
          const ww = g.range;
          ctx.fillStyle = 'rgba(120,190,255,0.08)';
          ctx.fillRect(wx, wy, ww, VIEW_H - 24);
        } else if(g.type === 'wave') {
          const wx = g.x - camX;
          const ww = g.range;
          const crest = 10 + Math.sin((GS.frame + (g.phase||0))*0.08)*4;
          ctx.fillStyle = 'rgba(100,180,240,0.12)';
          ctx.fillRect(wx, VIEW_H - 26 - crest, ww, 18 + crest);
        }
      });
    }

    // Chests and checkpoints
	    if(this.stage.entities) {
	      this.stage.entities.forEach(ent => {
	        if(ent.type === 'chest') {
	          const ex = ent.x*TILE - camX;
	          const ey = ent.y*TILE - camY;
	          drawCachedSprite(ent.opened ? 'chest_open' : 'chest_closed', ex, ey);
	          ctx.fillStyle = 'rgba(0,0,0,0.18)';
	          ctx.fillRect(Math.round(ex + 2), Math.round(ey + 14), 12, 2);
	          if(!ent.opened) {
	            const shine = 0.16 + 0.12*Math.sin(GS.frame*0.12 + ent.x*0.7);
	            ctx.fillStyle = `rgba(255,220,120,${shine})`;
	            ctx.fillRect(Math.round(ex + 7), Math.round(ey + 7), 2, 2);
	          }
	        }
	        if(ent.type === 'checkpoint') {
	          const fx = ent.x*TILE - camX;
	          const fy = ent.y*TILE - camY;
	          drawCachedSprite(ent.activated ? 'flag_on' : 'flag_off', fx, fy);
	          ctx.fillStyle = 'rgba(0,0,0,0.16)';
	          ctx.fillRect(Math.round(fx + 1), Math.round(fy + 22), 6, 2);
	          if(ent.activated) {
	            const glow = 0.18 + 0.12*Math.sin(GS.frame*0.14 + ent.x*0.4);
	            ctx.fillStyle = `rgba(255,80,70,${glow})`;
	            ctx.fillRect(Math.round(fx + 6), Math.round(fy + 3), 6, 3);
	          }
	        }
	      });
	    }
	    this.pickups.forEach(it => it.render(camX, camY));
	    this.renderActorShadows(camX, camY);

	    // Enemies
	    this.enemies.forEach(e => e.render(camX, camY));

    // Boss
    if(GS.bossActive && this.boss.active) {
      this.boss.render(camX, camY);
    }

    // Player
    if(!this.playerModel.renderTo2D(ctx, this.player, camX, camY)) {
      const phb = this.player.getHitbox();
      ctx.strokeStyle = this.playerModel.failed ? '#ff5555' : '#66ccff';
      ctx.lineWidth = 1;
      ctx.strokeRect(phb.x - camX, phb.y - camY, phb.w, phb.h);
    }

    // Projectiles
    this.projectiles.forEach(p => p.render(camX, camY));

    // Particles
    this.particles.forEach(p => p.render(camX, camY));

    // Popups
	    this.popups.forEach(p => p.render(camX, camY));

	    ctx.restore();
	    this.renderPostFX();

	    // HUD
	    this.renderHUD();
	  }

  renderBackdrop(camX, camY) {
    const backdrop = this.stage.backdrop;
    if(!backdrop) return false;
    if(backdrop.mode === 'fullHeightRepeat' && backdrop.imageKey) {
      const img = imageAssets[backdrop.imageKey];
      if(!img || !img.complete || !img.naturalWidth || !img.naturalHeight) return false;
      const drawH = VIEW_H;
      const scale = drawH / img.naturalHeight;
      const drawW = img.naturalWidth * scale;
      const parallax = backdrop.parallax == null ? 0.22 : backdrop.parallax;
      const scroll = ((camX * parallax) % drawW + drawW) % drawW;
      const startX = -scroll - drawW;
      const y = backdrop.yOffset || 0;
      for(let x=startX; x<VIEW_W + drawW; x+=drawW) {
        ctx.drawImage(img, x, y, drawW, drawH);
      }

      // Fog layers to blend the graveyard floor with background.
      ctx.fillStyle = 'rgba(11, 25, 23, 0.28)';
      ctx.fillRect(0, VIEW_H - 42, VIEW_W, 42);
      const mist = 8 + Math.sin(GS.frame * 0.018) * 4;
      ctx.fillStyle = 'rgba(92, 176, 156, 0.10)';
      ctx.fillRect(0, VIEW_H - 30 - mist, VIEW_W, 20 + mist);
      return true;
    }
    if(backdrop.segments) {
      let drew = false;
      backdrop.segments.forEach(seg => {
        const img = imageAssets[seg.imageKey];
        if(!img || !img.complete || !img.naturalWidth) return;
        const scale = seg.worldW / seg.sw;
        const worldH = seg.sh * scale;
        ctx.drawImage(
          img,
          seg.sx, seg.sy, seg.sw, seg.sh,
          seg.worldX - camX,
          (seg.yOffset || 0) - camY,
          seg.worldW,
          worldH
        );
        drew = true;
      });
      return drew;
    }

    if(backdrop.strips && backdrop.imageKey) {
      const img = imageAssets[backdrop.imageKey];
      if(!img || !img.complete || !img.naturalWidth) return false;
      backdrop.strips.forEach(strip => {
        const scale = strip.worldW / strip.sw;
        const worldH = strip.sh * scale;
        ctx.drawImage(
          img,
          strip.sx, strip.sy, strip.sw, strip.sh,
          strip.worldX - camX,
          (strip.yOffset || 0) - camY,
          strip.worldW,
          worldH
        );
      });
      return true;
    }
    return false;
  }
  
	  renderParallaxBG(camX, camY) {
	    const pal = this.stage.palette;
    
    // Far background (0.3x scroll)
    const bgX = camX * 0.3;
    ctx.fillStyle = pal.base + '30';
    for(let i=0; i<10; i++) {
      const x = (i * 60 - bgX % 60);
      const h = 40 + Math.sin(i*0.7) * 20;
      ctx.fillRect(x, VIEW_H - 80 - h, 40, h);
    }
    
    // Mid background (0.6x scroll)
    const mgX = camX * 0.6;
    ctx.fillStyle = pal.base + '50';
	    for(let i=0; i<15; i++) {
	      const x = (i * 40 - mgX % 40);
	      const h = 30 + Math.sin(i*1.2) * 15;
	      ctx.fillRect(x, VIEW_H - 50 - h, 25, h);
	    }
	  }

	  renderDepthLayers(camX, camY) {
	    if(!this.stage) return;
	    const theme = getStageVisualTheme(this.stage.stageNum);
	    const stageNum = this.stage.stageNum|0;
	    const farScroll = camX * 0.12;
	    const midScroll = camX * 0.2;

	    // Far mountain silhouettes.
	    ctx.fillStyle = theme.far;
	    for(let i=0; i<9; i++) {
	      const mx = i * 60 - (farScroll % 60) - 30;
	      const mh = 20 + ((i * 13 + stageNum * 5) % 26);
	      ctx.beginPath();
	      ctx.moveTo(mx, VIEW_H - 44);
	      ctx.lineTo(mx + 28, VIEW_H - 44 - mh);
	      ctx.lineTo(mx + 60, VIEW_H - 44);
	      ctx.closePath();
	      ctx.fill();
	    }

	    // Mid dark hills.
	    ctx.fillStyle = theme.mid;
	    for(let i=0; i<12; i++) {
	      const hx = i * 46 - (midScroll % 46) - 20;
	      const hh = 14 + ((i * 17 + stageNum * 11) % 16);
	      ctx.beginPath();
	      ctx.moveTo(hx, VIEW_H - 28);
	      ctx.lineTo(hx + 20, VIEW_H - 28 - hh);
	      ctx.lineTo(hx + 46, VIEW_H - 28);
	      ctx.closePath();
	      ctx.fill();
	    }

	    // Dark moon glow. (subtle to avoid arcade HUD conflict)
	    const moonX = VIEW_W * 0.17 - farScroll * 0.12;
	    const moonY = 16 + stageNum * 1.2;
	    ctx.fillStyle = theme.moon;
	    ctx.beginPath();
	    ctx.arc(moonX, moonY, 13, 0, Math.PI * 2);
	    ctx.fill();

	    // Stage 2 sea belt.
	    if(stageNum === 1) {
	      const waveA = Math.sin((GS.frame + camX * 0.04) * 0.06) * 2;
	      const waveB = Math.sin((GS.frame + camX * 0.07) * 0.09) * 1.5;
	      ctx.fillStyle = 'rgba(36, 98, 120, 0.24)';
	      ctx.fillRect(0, VIEW_H - 26 + waveA, VIEW_W, 14);
	      ctx.fillStyle = 'rgba(92, 176, 208, 0.18)';
	      ctx.fillRect(0, VIEW_H - 22 + waveB, VIEW_W, 6);
	    }

	    // Global haze/fog bands.
	    const haze = ctx.createLinearGradient(0, 0, 0, VIEW_H);
	    haze.addColorStop(0.55, 'rgba(0,0,0,0)');
	    haze.addColorStop(1, theme.haze);
	    ctx.fillStyle = haze;
	    ctx.fillRect(0, 0, VIEW_W, VIEW_H);

	    const lowMist = 4 + Math.sin(GS.frame * 0.017) * 2;
	    ctx.fillStyle = theme.fog;
	    ctx.fillRect(0, VIEW_H - 18 - lowMist, VIEW_W, 18 + lowMist);
	  }

	  renderStageDecals(camX, camY) {
	    const visuals = this.stage?.visuals;
	    if(!visuals?.decals?.length) return;
	    visuals.decals.forEach(d => {
	      const x = d.x - camX;
	      const y = d.y - camY;
	      if(x < -20 || x > VIEW_W + 20 || y < -20 || y > VIEW_H + 20) return;
	      if(d.kind === 'groundStain') {
	        ctx.fillStyle = `rgba(10,14,14,${d.alpha || 0.16})`;
	        ctx.fillRect(x, y, d.w || 10, d.h || 3);
	        ctx.fillStyle = 'rgba(78,104,92,0.09)';
	        ctx.fillRect(x + 1, y, Math.max(2, (d.w || 10) - 3), 1);
	      } else if(d.kind === 'hairCrack') {
	        ctx.strokeStyle = `rgba(8,12,12,${d.alpha || 0.2})`;
	        ctx.lineWidth = 1;
	        ctx.beginPath();
	        ctx.moveTo(x, y);
	        ctx.lineTo(x + 2, y + (d.h || 6) * 0.45);
	        ctx.lineTo(x - 1, y + (d.h || 6));
	        ctx.stroke();
	      } else if(d.kind === 'moss') {
	        ctx.fillStyle = `rgba(84,126,112,${d.alpha || 0.14})`;
	        ctx.fillRect(x, y, d.w || 6, 2);
	      } else if(d.kind === 'soot') {
	        ctx.fillStyle = `rgba(32,16,12,${d.alpha || 0.16})`;
	        ctx.fillRect(x, y, d.w || 8, d.h || 6);
	      }
	    });
	  }

	  renderStageProps(camX, camY, backLayer) {
	    const visuals = this.stage?.visuals;
	    if(!visuals) return;
	    const list = backLayer ? visuals.propsBack : visuals.propsFront;
	    if(!list?.length) return;
	    ctx.save();
	    if(backLayer) ctx.globalAlpha = 0.7;
	    list.forEach(p => {
	      const x = Math.round(p.x - camX);
	      const y = Math.round(p.y - camY);
	      if(x < -40 || x > VIEW_W + 40 || y < -80 || y > VIEW_H + 30) return;
	      if(!backLayer) {
	        ctx.fillStyle = 'rgba(0,0,0,0.14)';
	        ctx.beginPath();
	        ctx.ellipse(x, y + 1, 6, 2, 0, 0, Math.PI * 2);
	        ctx.fill();
	      }
	      if(p.kind === 'deadTree') {
	        ctx.fillStyle = '#1c1310';
	        ctx.fillRect(x - 2, y - p.h, 4, p.h);
	        ctx.fillRect(x - 8, y - p.h + 7, 10, 2);
	        ctx.fillRect(x - 1, y - p.h + 12, 8, 2);
	      } else if(p.kind === 'cross') {
	        ctx.fillStyle = '#766f66';
	        ctx.fillRect(x - 1, y - p.h, 2, p.h);
	        ctx.fillRect(x - (p.w>>1), y - p.h + 3, p.w, 2);
	        ctx.fillStyle = 'rgba(0,0,0,0.22)';
	        ctx.fillRect(x - (p.w>>1), y + 1, p.w, 2);
	      } else if(p.kind === 'fence') {
	        ctx.fillStyle = '#4b3e34';
	        const span = p.span || 16;
	        for(let i=0; i<span; i+=4) ctx.fillRect(x + i, y - 7 - (i % 2), 2, 8 + (i % 2));
	        ctx.fillRect(x - 1, y - 4, span + 2, 2);
	      } else if(p.kind === 'mast') {
	        ctx.fillStyle = '#413327';
	        ctx.fillRect(x - 2, y - p.h, 4, p.h);
	        ctx.fillStyle = 'rgba(150,170,180,0.3)';
	        const sailH = Math.max(8, p.h * 0.38);
	        ctx.fillRect(x + 2, y - p.h + 6, 9, sailH);
	      } else if(p.kind === 'post') {
	        ctx.fillStyle = '#47362a';
	        ctx.fillRect(x - 1, y - p.h, 2, p.h);
	        ctx.fillStyle = '#706050';
	        ctx.fillRect(x - 2, y - p.h, 4, 2);
	      } else if(p.kind === 'crate') {
	        ctx.fillStyle = '#4d3928';
	        ctx.fillRect(x - (p.w>>1), y - p.h, p.w, p.h);
	        ctx.fillStyle = '#2b1d14';
	        ctx.fillRect(x - (p.w>>1), y - p.h + 2, p.w, 1);
	        ctx.fillRect(x - 1, y - p.h, 1, p.h);
	      } else if(p.kind === 'pillar') {
	        ctx.fillStyle = '#2b2e36';
	        ctx.fillRect(x - 4, y - p.h, 8, p.h);
	        ctx.fillStyle = '#434a5a';
	        ctx.fillRect(x - 5, y - p.h, 10, 2);
	      } else if(p.kind === 'chain') {
	        ctx.strokeStyle = '#5a5f66';
	        ctx.lineWidth = 1;
	        for(let i=0; i<p.h; i+=4) {
	          ctx.beginPath();
	          ctx.arc(x + ((i>>2) % 2), y - p.h + i, 1.1, 0, Math.PI * 2);
	          ctx.stroke();
	        }
	      } else if(p.kind === 'rock') {
	        ctx.fillStyle = '#45403a';
	        ctx.fillRect(x - (p.w>>1), y - p.h, p.w, p.h);
	        ctx.fillStyle = '#5c554e';
	        ctx.fillRect(x - (p.w>>1) + 1, y - p.h, Math.max(2, p.w - 3), 1);
	      } else if(p.kind === 'stake') {
	        ctx.fillStyle = '#5a3a2a';
	        ctx.beginPath();
	        ctx.moveTo(x - 2, y);
	        ctx.lineTo(x, y - p.h);
	        ctx.lineTo(x + 2, y);
	        ctx.fill();
	      }
	    });
	    ctx.restore();
	  }

	  getGroundPixelYAt(worldX, fallbackY) {
	    if(!this.stage) return fallbackY;
	    const cx = clamp(Math.floor(worldX / TILE), 0, this.stage.width - 1);
	    const surface = this.stage.visuals?.surface;
	    if(surface && surface[cx] != null) return surface[cx] * TILE;
	    for(let y=clamp(Math.floor(fallbackY / TILE) - 2, 0, this.stage.height - 1); y<this.stage.height; y++) {
	      const tid = this.stage.terrain[y]?.[cx];
	      if(tid && TILE_COLORS[tid]?.terrain) return y * TILE;
	    }
	    return fallbackY;
	  }

	  drawBlobShadow(worldX, groundY, rx, ry, alpha, camX, camY) {
	    const sx = worldX - camX;
	    const sy = groundY - camY + 1;
	    if(sx < -40 || sx > VIEW_W + 40 || sy < -20 || sy > VIEW_H + 20) return;
	    ctx.save();
	    ctx.fillStyle = `rgba(0,0,0,${alpha})`;
	    ctx.beginPath();
	    ctx.ellipse(sx, sy, rx, ry, 0, 0, Math.PI * 2);
	    ctx.fill();
	    ctx.restore();
	  }

	  renderActorShadows(camX, camY) {
	    if(!this.stage) return;
	    const pg = this.getGroundPixelYAt(this.player.x, this.player.y);
	    const pDist = Math.max(0, pg - this.player.y);
	    const pAlpha = clamp(0.26 - pDist / 140, 0.08, 0.26);
	    const pRx = 7 + clamp(pDist / 28, 0, 4);
	    this.drawBlobShadow(this.player.x, pg, pRx, 2.6, pAlpha, camX, camY);

	    this.enemies.forEach(e => {
	      if(!e.active) return;
	      const eg = this.getGroundPixelYAt(e.x, e.y);
	      const ed = Math.max(0, eg - e.y);
	      const ea = clamp(0.2 - ed / 160, 0.06, 0.2);
	      const erx = clamp(e.hw * 0.4 + ed / 32, 4, 10);
	      this.drawBlobShadow(e.x, eg, erx, 2.2, ea, camX, camY);
	    });

	    if(GS.bossActive && this.boss.active) {
	      const bg = this.getGroundPixelYAt(this.boss.x, this.boss.y + 4);
	      const bd = Math.max(0, bg - this.boss.y);
	      const ba = clamp(0.28 - bd / 180, 0.1, 0.28);
	      const br = 14 + clamp(bd / 26, 0, 5);
	      this.drawBlobShadow(this.boss.x, bg, br, 3.2, ba, camX, camY);
	    }
	  }

	  renderPostFX() {
	    if(!this.stage) return;
	    const s = this.stage.stageNum|0;
	    const tone = [
	      'rgba(34,70,56,0.08)',
	      'rgba(28,72,94,0.09)',
	      'rgba(86,62,42,0.08)',
	      'rgba(98,36,24,0.10)',
	      'rgba(60,38,94,0.09)'
	    ][clamp(s, 0, 4)];

	    // Stage tone wash.
	    ctx.fillStyle = tone;
	    ctx.fillRect(0, 0, W, H);

	    // Top darkness to keep the scene heavy.
	    const topGrad = ctx.createLinearGradient(0, 0, 0, H * 0.45);
	    topGrad.addColorStop(0, 'rgba(0,0,0,0.24)');
	    topGrad.addColorStop(1, 'rgba(0,0,0,0)');
	    ctx.fillStyle = topGrad;
	    ctx.fillRect(0, 0, W, H * 0.45);

	    // Subtle vignette.
	    const v = ctx.createRadialGradient(W * 0.5, H * 0.48, H * 0.12, W * 0.5, H * 0.5, H * 0.72);
	    v.addColorStop(0, 'rgba(0,0,0,0)');
	    v.addColorStop(1, 'rgba(0,0,0,0.26)');
	    ctx.fillStyle = v;
	    ctx.fillRect(0, 0, W, H);

	    // Light horizontal haze streaks.
	    ctx.fillStyle = 'rgba(255,255,255,0.03)';
	    for(let i=0; i<10; i++) {
	      const y = (i * 29 + (GS.frame >> 1)) % H;
	      ctx.fillRect(0, y, W, 1);
	    }
	  }
  
  renderHUD() {
    // Score
    drawText(`SCORE:${String(GS.score).padStart(8,'0')}`, 4, 4, '#fff');
    
    // Hi-score
    const hiText = `HI:${String(GS.hiScore).padStart(8,'0')}`;
    drawText(hiText, W/2 - textWidth(hiText)/2, 4, '#aaa');
    
    // Lives
    const livesText = `♥×${GS.lives}`;
    drawText(livesText, W - textWidth(livesText) - 4, 4, '#ff4444');
    
    // Weapon
    drawText(getCurrentWeaponLabel(), 4, 14, '#44aaff');
    const upText = `K${GS.weaponLevels.knife ? '+' : '-'} B${GS.weaponLevels.bow ? '+' : '-'}`;
    drawText(upText, 4, 24, '#8cc');
    
    // Stage
    drawText(`STAGE ${GS.currentStage+1}`, W/2 - textWidth('STAGE 0')/2, 14, '#ffd700');
    
    // Timer
    const timeLeft = Math.max(0, Math.ceil(GS.stageTimer));
    const timeColor = timeLeft <= 60 ? (Math.floor(GS.frame/15)%2===0 ? '#ff4444' : '#ffaa44') : '#fff';
    drawText(`TIME:${String(timeLeft).padStart(3,' ')}`, W - textWidth('TIME:000') - 4, 14, timeColor);
    
    // Combo
    if(GS.combo > 1) {
      drawText(`${GS.combo} COMBO!`, W/2 - textWidth(`${GS.combo} COMBO!`)/2, 26, '#ffdd44');
    }

    const modelStatus = this.playerModel.ready ? '3D:ON' : (this.playerModel.failed ? '3D:ERR' : '3D:LOAD');
    const modelColor = this.playerModel.ready ? '#44ff88' : (this.playerModel.failed ? '#ff5555' : '#ffaa44');
    drawText(modelStatus, W - textWidth(modelStatus) - 4, 26, modelColor);
    if(this.bootError) {
      drawText('3D MODEL FAILED TO LOAD', W/2 - textWidth('3D MODEL FAILED TO LOAD')/2, 38, '#ff5555');
      const detail = String(this.bootError).replace('3D INIT ERROR: ', '').slice(0, 52).toUpperCase();
      drawText(detail, W/2 - textWidth(detail)/2, 48, '#ff7777');
    }
    
    // Boss HP bar (large, at bottom)
    if(GS.bossActive && this.boss.active) {
      const barW = 200;
      const barX = W/2 - barW/2;
      const barY = H - 16;
      ctx.fillStyle = 'rgba(0,0,0,0.6)';
      ctx.fillRect(barX-2, barY-2, barW+4, 10);
      ctx.fillStyle = '#333';
      ctx.fillRect(barX, barY, barW, 6);
      ctx.fillStyle = '#ff3333';
      ctx.fillRect(barX, barY, barW * (this.boss.hp/this.boss.maxHP), 6);
      drawText('BOSS', barX - textWidth('BOSS') - 4, barY-1, '#ff4444');
    }
  }
  
  renderPause() {
    ctx.fillStyle = 'rgba(0,0,0,0.7)';
    ctx.fillRect(0,0,W,H);
    
    drawText('PAUSED', W/2 - textWidth('PAUSED',2)/2, 60, '#fff', 2);
    
    const items = ['RESUME', 'RETRY', 'QUIT'];
    items.forEach((item, i) => {
      const y = 120 + i*20;
      const col = i === this.menuIndex ? '#fff' : '#808080';
      drawText(item, W/2 - textWidth(item)/2, y, col);
      if(i === this.menuIndex) drawText('>', W/2 - textWidth(item)/2 - 12, y, '#ffd700');
    });
  }
  
  renderGameOver() {
    ctx.fillStyle = 'rgba(0,0,0,0.8)';
    ctx.fillRect(0,0,W,H);
    
    drawText('GAME OVER', W/2 - textWidth('GAME OVER',2)/2, 60, '#ff4444', 2);
    drawText(`SCORE: ${GS.score}`, W/2 - textWidth(`SCORE: ${GS.score}`)/2, 100, '#fff');
    
    if(this.sceneTimer >= 60) {
      const diff = GS.getDifficulty();
      const canContinue = diff.maxContinues < 0 || GS.continues < diff.maxContinues;
      
      const items = canContinue ? ['CONTINUE', 'QUIT'] : ['QUIT'];
      items.forEach((item, i) => {
        const y = 140 + i*20;
        const col = i === this.menuIndex ? '#fff' : '#808080';
        drawText(item, W/2 - textWidth(item)/2, y, col);
        if(i === this.menuIndex) drawText('>', W/2 - textWidth(item)/2 - 12, y, '#ffd700');
      });
    }
  }
  
  renderStageClear() {
    ctx.fillStyle = 'rgba(0,0,0,0.6)';
    ctx.fillRect(0,0,W,H);
    
    drawText('STAGE CLEAR!', W/2 - textWidth('STAGE CLEAR!',2)/2, 50, '#ffd700', 2);
    
    if(this.sceneTimer >= 60) {
      const timeBonus = Math.floor(Math.max(0, GS.stageTimer)) * 10;
      const lifeBonus = GS.lives * 1000;
      drawText(`TIME BONUS: ${timeBonus}`, W/2 - textWidth(`TIME BONUS: ${timeBonus}`)/2, 100, '#fff');
      drawText(`LIFE BONUS: ${lifeBonus}`, W/2 - textWidth(`LIFE BONUS: ${lifeBonus}`)/2, 116, '#fff');
      drawText(`TOTAL: ${GS.score}`, W/2 - textWidth(`TOTAL: ${GS.score}`)/2, 140, '#ffdd44');
      
      if(GS.noDamageBoss) {
        drawText('NO DAMAGE BOSS!', W/2 - textWidth('NO DAMAGE BOSS!')/2, 160, '#44ff44');
      }
    }
  }
  
  renderEnding() {
    ctx.fillStyle = '#0a0a1a';
    ctx.fillRect(0,0,W,H);
    
    // Stars
    for(let i=0;i<30;i++) {
      const sx = (i*37+GS.frame*0.1)%W;
      const sy = (i*53)%H;
      ctx.fillStyle = `rgba(255,255,255,${0.3+Math.sin(i+GS.frame*0.05)*0.3})`;
      ctx.fillRect(sx,sy,1,1);
    }
    
    if(this.introText === 'loop1') {
      drawText('THE PRINCESS WAS AN ILLUSION.', W/2 - textWidth('THE PRINCESS WAS AN ILLUSION.')/2, 60, '#fff');
      drawText('TO DEFEAT THE TRUE EVIL...', W/2 - textWidth('TO DEFEAT THE TRUE EVIL...')/2, 80, '#fff');
      drawText('THE KNIGHT MUST FIND', W/2 - textWidth('THE KNIGHT MUST FIND')/2, 100, '#fff');
      drawText('THE HOLY SWORD.', W/2 - textWidth('THE HOLY SWORD.')/2, 120, '#ffd700');
      drawText('LOOP 2 BEGINS...', W/2 - textWidth('LOOP 2 BEGINS...')/2, 160, '#ff4444');
    } else {
      drawText('THE EVIL IS VANQUISHED.', W/2 - textWidth('THE EVIL IS VANQUISHED.')/2, 50, '#fff');
      drawText('THE PRINCESS IS SAVED.', W/2 - textWidth('THE PRINCESS IS SAVED.')/2, 70, '#fff');
      drawText("THE KNIGHT'S ORDEAL", W/2 - textWidth("THE KNIGHT'S ORDEAL")/2, 100, '#ffd700');
      drawText('IS OVER.', W/2 - textWidth('IS OVER.')/2, 116, '#ffd700');
      
      drawText('CONGRATULATIONS!', W/2 - textWidth('CONGRATULATIONS!', 2)/2, 150, '#44ff44', 2);
      
      drawText(`FINAL SCORE: ${GS.score}`, W/2 - textWidth(`FINAL SCORE: ${GS.score}`)/2, 190, '#fff');
      
      // Check achievements
      if(GS.weaponsUsed.size >= WEAPONS.length) {
        drawText('ALL WEAPONS USED!', W/2 - textWidth('ALL WEAPONS USED!')/2, 210, '#aa88ff');
      }
    }
    
    if(this.sceneTimer > 120) {
      drawText('PRESS JUMP TO CONTINUE', W/2 - textWidth('PRESS JUMP TO CONTINUE')/2, H-20, 
        Math.floor(GS.frame/30)%2===0 ? '#aaa' : '#555');
    }
  }
}

// ==================== INITIALIZE AND START ====================
let game;
try {
  game = new Game();
  Input.init();
  game.start();
} catch(e) {
  console.error('Game initialization failed:', e);
  document.body.innerHTML = `<div style="color:#fff;padding:20px;font-family:monospace">
    <h2>Game Init Error</h2><pre>${e.message}\n${e.stack}</pre>
    <p>Try refreshing the page or using Chrome/Firefox.</p></div>`;
}
</script>
</body>
