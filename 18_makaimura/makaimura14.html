const clamp = (v,mn,mx) => v < mn ? mn : v > mx ? mx : v;
const lerp = (a,b,t) => a + (b-a)*t;
const rng = (seed) => { let s=seed|0||1; return()=>{s^=s<<13;s^=s>>17;s^=s<<5;return((s>>>0)%10000)/10000;}; };
const randInt = (a,b) => a + Math.floor(Math.random()*(b-a+1));
const randFloat = (a,b) => a + Math.random()*(b-a);

// ==================== OBJECT POOL ====================
class Pool {
  constructor(factory, max) { this.pool=[]; this.active=[]; this.factory=factory; this.max=max; for(let i=0;i<max;i++) this.pool.push(factory()); }
  get() { let o = this.pool.pop(); if(!o){ if(this.active.length>=this.max){o=this.active.shift();} else o=this.factory(); } this.active.push(o); return o; }
  release(o) { const i=this.active.indexOf(o); if(i>=0) this.active.splice(i,1); if(this.pool.length<this.max) this.pool.push(o); }
  releaseAll() { while(this.active.length) this.release(this.active[0]); }
  forEach(fn) { for(let i=this.active.length-1;i>=0;i--) fn(this.active[i],i); }
  get count() { return this.active.length; }
}

// ==================== EVENT BUS ====================
const EventBus = {
  _listeners: {},
  on(e,fn){ (this._listeners[e]||(this._listeners[e]=[])).push(fn); },
  off(e,fn){ const l=this._listeners[e]; if(l){const i=l.indexOf(fn);if(i>=0)l.splice(i,1);} },
  emit(e,...args){ (this._listeners[e]||[]).forEach(fn=>fn(...args)); },
  clear(){ this._listeners={}; }
};

// ==================== INPUT MANAGER ====================
const Input = {
  keys: {}, frameKeys: {}, justPressed: {}, justReleased: {},
  _prev: {},
  actions: ['left','right','up','down','jump','attack','pause'],
  touchState: {},
  
  keyMap: {
    ArrowLeft:'left', ArrowRight:'right', ArrowUp:'up', ArrowDown:'down',
    KeyA:'left', KeyD:'right', KeyW:'up', KeyS:'down',
    Space:'jump', KeyZ:'jump', KeyX:'attack', ShiftLeft:'attack', ShiftRight:'attack',
    Escape:'pause', Enter:'pause'
  },
  
  init() {
    window.addEventListener('keydown', e => { 
      e.preventDefault();
      const k = this.keyMap[e.code]; 
      if(k) this.keys[k]=true; 
    });
    window.addEventListener('keyup', e => { 
      const k = this.keyMap[e.code]; 
      if(k) this.keys[k]=false; 
    });
    // Touch
    const touchMap = {'btn-left':'left','btn-right':'right','btn-up':'up','btn-jump':'jump','btn-attack':'attack'};
    Object.entries(touchMap).forEach(([id,action])=>{
      const el=document.getElementById(id);
      if(!el)return;
      el.addEventListener('touchstart',e=>{e.preventDefault();this.keys[action]=true;},{passive:false});
      el.addEventListener('touchend',e=>{e.preventDefault();this.keys[action]=false;},{passive:false});
    });
  },
  
  update() {
    const frame = {};
    this.actions.forEach(a => { frame[a] = !!this.keys[a]; });

    // Gamepad
    try {
      const gps = navigator.getGamepads ? navigator.getGamepads() : [];
      const gp = gps[0];
      if(gp){
        if(gp.axes[0] < -0.35) frame.left = true;
        if(gp.axes[0] > 0.35) frame.right = true;
        if(gp.axes[1] < -0.35) frame.up = true;
        if(gp.axes[1] > 0.35) frame.down = true;
        if(gp.buttons[0] && gp.buttons[0].pressed) frame.jump = true;
        if(gp.buttons[1] && gp.buttons[1].pressed) frame.attack = true;
        if(gp.buttons[9] && gp.buttons[9].pressed) frame.pause = true;
      }
    }catch(e){}
    this.frameKeys = frame;

    this.actions.forEach(k => {
      this.justPressed[k] = !!this.frameKeys[k] && !this._prev[k];
      this.justReleased[k] = !this.frameKeys[k] && !!this._prev[k];
    });
  },
  
  lateUpdate() {
    this.actions.forEach(k => { this._prev[k] = !!this.frameKeys[k]; });
  },
  
  isDown(k){ return !!this.frameKeys[k]; },
  isJustPressed(k){ return !!this.justPressed[k]; },
  isJustReleased(k){ return !!this.justReleased[k]; }
};

// ==================== AUDIO MANAGER ====================
const Audio = {
  ctx: null, masterGain: null, bgmGain: null, seGain: null,
  bgmVolume: 0.7, seVolume: 0.8, bgmPlaying: null,
  initialized: false,
  
  init() {
    try {
      this.ctx = new (window.AudioContext || window.webkitAudioContext)();
      this.masterGain = this.ctx.createGain();
      this.masterGain.connect(this.ctx.destination);
      this.bgmGain = this.ctx.createGain();
      this.bgmGain.gain.value = this.bgmVolume * 0.3;
      this.bgmGain.connect(this.masterGain);
      this.seGain = this.ctx.createGain();
      this.seGain.gain.value = this.seVolume;
      this.seGain.connect(this.masterGain);
      this.initialized = true;
    } catch(e) { console.warn('Audio init failed:', e); }
  },
  
  resume() {
    if(this.ctx && this.ctx.state === 'suspended') this.ctx.resume();
  },
  
  playNote(freq, duration, type='square', vol=0.3, dest=null) {
    if(!this.initialized) return;
    const t = this.ctx.currentTime;
    const osc = this.ctx.createOscillator();
    const gain = this.ctx.createGain();
    osc.type = type;
    osc.frequency.setValueAtTime(freq, t);
    gain.gain.setValueAtTime(vol, t);
    gain.gain.exponentialRampToValueAtTime(0.001, t + duration);
    osc.connect(gain);
    gain.connect(dest || this.seGain);
    osc.start(t);
    osc.stop(t + duration);
  },
  
  playSE(id) {
    if(!this.initialized) return;
    this.resume();
    const t = this.ctx.currentTime;
    switch(id) {
      case 'jump': this._sweep(200,600,0.08,'square',0.2); break;
      case 'attack': this._noise(0.06,0.3); this._sweep(400,200,0.04,'square',0.15); break;
      case 'hit': this.playNote(300,0.04,'square',0.25); break;
      case 'explode': this._noise(0.2,0.4); break;
      case 'damage': this._sweep(800,200,0.15,'sawtooth',0.3); break;
      case 'armorBreak': this._noise(0.3,0.5); this._sweep(600,100,0.2,'square',0.2); break;
      case 'bossDie': for(let i=0;i<6;i++) setTimeout(()=>this._noise(0.15,0.3),i*200); break;
      case '1up': [523,659,784,1047].forEach((f,i)=>setTimeout(()=>this.playNote(f,0.12,'triangle',0.25),i*80)); break;
      case 'chest': [800,1000,1200].forEach((f,i)=>setTimeout(()=>this.playNote(f,0.08,'square',0.15),i*50)); break;
      case 'pause': this.playNote(440,0.1,'square',0.15); break;
      case 'menu': this.playNote(660,0.05,'square',0.1); break;
      case 'timeWarn': this.playNote(880,0.15,'square',0.3); setTimeout(()=>this.playNote(880,0.15,'square',0.3),200); break;
    }
  },
  
  _sweep(f1,f2,dur,type='square',vol=0.2) {
    if(!this.initialized) return;
    const t=this.ctx.currentTime, osc=this.ctx.createOscillator(), g=this.ctx.createGain();
    osc.type=type; osc.frequency.setValueAtTime(f1,t); osc.frequency.linearRampToValueAtTime(f2,t+dur);
    g.gain.setValueAtTime(vol,t); g.gain.exponentialRampToValueAtTime(0.001,t+dur);
    osc.connect(g); g.connect(this.seGain); osc.start(t); osc.stop(t+dur);
  },
  
  _noise(dur,vol=0.3) {
    if(!this.initialized) return;
    const t=this.ctx.currentTime, buf=this.ctx.createBuffer(1,this.ctx.sampleRate*dur,this.ctx.sampleRate);
    const d=buf.getChannelData(0); for(let i=0;i<d.length;i++) d[i]=(Math.random()*2-1);
    const src=this.ctx.createBufferSource(), g=this.ctx.createGain();
    src.buffer=buf; g.gain.setValueAtTime(vol,t); g.gain.exponentialRampToValueAtTime(0.001,t+dur);
    src.connect(g); g.connect(this.seGain); src.start(t);
  },
  
  // Simple BGM sequencer
  bgmIntervals: [],
  currentBGM: null,
  
  playBGM(id) {
    this.stopBGM();
    if(!this.initialized) return;
    this.resume();
    this.currentBGM = id;
    const seqs = BGM_DATA[id];
    if(!seqs) return;
    let step = 0;
    const bpm = seqs.bpm || 140;
    const interval = 60000 / bpm / 4; // 16th notes
    const play = () => {
      if(this.currentBGM !== id) return;
      seqs.tracks.forEach(track => {
        const note = track.notes[step % track.notes.length];
        if(note > 0) {
          this.playNote(note, interval/1000 * 0.8, track.wave || 'square', (track.vol||0.15)*this.bgmVolume*0.4, this.bgmGain);
        }
      });
      step++;
      this.bgmIntervals.push(setTimeout(play, interval));
    };
    play();
  },
  
  stopBGM() {
    this.currentBGM = null;
    this.bgmIntervals.forEach(clearTimeout);
    this.bgmIntervals = [];
  },
  
  setBGMVolume(v) { this.bgmVolume = v; if(this.bgmGain) this.bgmGain.gain.value = v * 0.3; },
  setSEVolume(v) { this.seVolume = v; if(this.seGain) this.seGain.gain.value = v; }
};

const imageAssets = {};
function loadImageAsset(key, src) {

  img.src = src;
  imageAssets[key] = img;

function waitForImageAssets(keys) {
  return Promise.all(keys.map(key => new Promise(resolve => {
    const img = imageAssets[key];
    if(!img) return resolve();
    if(img.complete && img.naturalWidth > 0) return resolve();
    const done = () => resolve();
    img.addEventListener('load', done, {once:true});
    img.addEventListener('error', done, {once:true});
  })));
}

// Offscreen canvas for sprite caching
const spriteCache = {};
const spriteDetailInfo = {};

function hashString01(str) {
  let h = 2166136261 >>> 0;
  for(let i=0; i<str.length; i++) {
    h ^= str.charCodeAt(i);
    h = Math.imul(h, 16777619);
  }
  return (h >>> 0) / 4294967295;
}

function tintSpriteCanvas(srcCanvas, fill) {
  const c = document.createElement('canvas');
  c.width = srcCanvas.width;
  c.height = srcCanvas.height;
  const cx = c.getContext('2d');
  cx.drawImage(srcCanvas, 0, 0);
  cx.globalCompositeOperation = 'source-in';
  cx.fillStyle = fill;
  cx.fillRect(0, 0, c.width, c.height);
  return c;
}

function getSpriteDetailProfile(key) {
  if(/^boss_/.test(key)) return {outline:0.46, depth:0.34, noiseDark:0.22, noiseLight:0.08, edgeDark:0.16, rim:0.09, glint:0.12};
  if(/^(zombie_|bat_|skeleton_|gargoyle_|mermaid_|woodman_|fireskull_|demon_|mage_)/.test(key)) {
    return {outline:0.42, depth:0.28, noiseDark:0.18, noiseLight:0.07, edgeDark:0.12, rim:0.07, glint:0.1};
  }
  if(/^knight_/.test(key)) return {outline:0.32, depth:0.2, noiseDark:0.08, noiseLight:0.05, edgeDark:0.07, rim:0.06, glint:0.08};
  if(/^(chest_|flag_|proj_|item_|enemy_bullet|bone_proj)/.test(key)) {
    return {outline:0.28, depth:0.16, noiseDark:0.08, noiseLight:0.04, edgeDark:0.06, rim:0.05, glint:0.06};
  }
  return null;
}

function decorateCachedSprite(canvas, key) {
  const profile = getSpriteDetailProfile(key);
  if(!profile) return;
  const cx = canvas.getContext('2d');
  const w = canvas.width, h = canvas.height;
  const data = cx.getImageData(0, 0, w, h);
  const d = data.data;
  const alphaMap = new Uint8Array(w * h);
  const seed = hashString01(key) * 2000;

  for(let i=0; i<w*h; i++) {
    alphaMap[i] = d[i*4 + 3] > 16 ? 1 : 0;
  }

  for(let y=0; y<h; y++) {
    for(let x=0; x<w; x++) {
      const i = y * w + x;
      if(!alphaMap[i]) continue;
      const idx = i * 4;
      let n4 = 0;
      if(x > 0 && alphaMap[i - 1]) n4++;
      if(x < w-1 && alphaMap[i + 1]) n4++;
      if(y > 0 && alphaMap[i - w]) n4++;
      if(y < h-1 && alphaMap[i + w]) n4++;

      const t = h <= 1 ? 0 : y / (h - 1);
      const n = hashNoise01((x + 1) * 53 + (y + 1) * 97 + seed);
      let mult = 1 - profile.depth * t;
      if(n4 <= 2) mult -= profile.edgeDark;
      if(n > 0.92) mult -= profile.noiseDark;
      if(n < 0.05) mult += profile.noiseLight;
      mult = clamp(mult, 0.55, 1.35);

      d[idx] = clamp(Math.round(d[idx] * mult), 0, 255);
      d[idx+1] = clamp(Math.round(d[idx+1] * mult), 0, 255);
      d[idx+2] = clamp(Math.round(d[idx+2] * mult), 0, 255);

      if(n < 0.03) {
        const add = 15 + Math.floor(profile.glint * 90);
        d[idx] = clamp(d[idx] + add, 0, 255);
        d[idx+1] = clamp(d[idx+1] + add, 0, 255);
        d[idx+2] = clamp(d[idx+2] + add, 0, 255);
      }
    }
  }
  const baseCanvas = document.createElement('canvas');
  baseCanvas.width = w;
  baseCanvas.height = h;
  const bcx = baseCanvas.getContext('2d');
  bcx.putImageData(data, 0, 0);

  const shadow = tintSpriteCanvas(baseCanvas, `rgba(0,0,0,${profile.outline})`);
  const rim = tintSpriteCanvas(baseCanvas, `rgba(190,225,240,${profile.rim})`);

  cx.clearRect(0, 0, w, h);
  cx.drawImage(shadow, -1, 0);
  cx.drawImage(shadow, 1, 0);
  cx.drawImage(shadow, 0, -1);
  cx.drawImage(shadow, 0, 1);
  cx.drawImage(baseCanvas, 0, 0);
  cx.drawImage(rim, -1, -1);

  spriteDetailInfo[key] = profile;
}

function cacheSprite(key, w, h, drawFn) {
  const c = document.createElement('canvas');
  c.width = w; c.height = h;
  const cx = c.getContext('2d');
  drawFn(cx);
  decorateCachedSprite(c, key);
  spriteCache[key] = c;
  return c;
}

function drawCachedSprite(key, x, y, flipX=false) {
  const s = spriteCache[key];
  if(!s) return;
  ctx.save();
  if(flipX) {
    ctx.translate(Math.round(x + s.width), Math.round(y));
    ctx.scale(-1, 1);
    ctx.drawImage(s, 0, 0);
  } else {
    ctx.drawImage(s, Math.round(x), Math.round(y));
  }
  ctx.restore();
}

function drawEnemyDetailPass(type, sx, sy, sw, sh, frame) {
  const pulse = 0.45 + 0.35 * Math.sin(frame * 0.18 + sw * 0.12);
  const eyeColors = {
    zombie:'255,110,76',
    skeleton:'255,120,90',
    gargoyle:'255,94,84',
    mermaid:'110,214,242',
    woodman:'164,224,112',
    fireskull:'255,156,48',
    demon:'255,90,74',
    mage:'255,210,94',
    bat:'220,88,220',
  };
  const eye = eyeColors[type];
  if(eye) {
    const ex1 = Math.round(sx + sw * 0.34);
    const ex2 = Math.round(sx + sw * 0.58);
    const ey = Math.round(sy + sh * 0.28);
    ctx.fillStyle = `rgba(${eye},${0.20 + pulse * 0.25})`;
    ctx.fillRect(ex1-1, ey-1, 3, 3);
    ctx.fillRect(ex2-1, ey-1, 3, 3);
    ctx.fillStyle = `rgba(${eye},${0.65 + pulse * 0.25})`;
    ctx.fillRect(ex1, ey, 1, 1);
    ctx.fillRect(ex2, ey, 1, 1);
  }

  // Inner contour and underside AO for depth.
  ctx.fillStyle = 'rgba(0,0,0,0.18)';
  ctx.fillRect(Math.round(sx + 1), Math.round(sy + sh - 3), Math.max(2, sw - 2), 2);
  ctx.fillStyle = 'rgba(180,220,220,0.05)';
  ctx.fillRect(Math.round(sx + 1), Math.round(sy + 1), Math.max(2, sw - 2), 1);

  if(type === 'skeleton') {
    ctx.fillStyle = 'rgba(0,0,0,0.22)';
    for(let i=0; i<3; i++) ctx.fillRect(Math.round(sx + sw * 0.32), Math.round(sy + sh * (0.4 + i*0.12)), Math.round(sw * 0.36), 1);
  } else if(type === 'gargoyle' || type === 'bat') {
    ctx.strokeStyle = 'rgba(0,0,0,0.18)';
    ctx.lineWidth = 1;
    ctx.beginPath();
    ctx.moveTo(Math.round(sx + sw * 0.14), Math.round(sy + sh * 0.42));
    ctx.lineTo(Math.round(sx + sw * 0.34), Math.round(sy + sh * 0.55));
    ctx.moveTo(Math.round(sx + sw * 0.86), Math.round(sy + sh * 0.42));
    ctx.lineTo(Math.round(sx + sw * 0.66), Math.round(sy + sh * 0.55));
    ctx.stroke();
  }
}

function drawBossDetailPass(bossId, sx, sy, sw, sh, phase, frame) {
  const pulse = 0.45 + 0.45 * Math.sin(frame * 0.12 + phase * 0.8);
  const auraColors = {
    cerberus:'255,96,84',
    seadragon:'100,184,242',
    treant:'144,204,94',
    demonknight:'224,112,160',
    overlord:'188,132,255',
  };
  const c = auraColors[bossId] || '255,128,96';
  ctx.fillStyle = `rgba(${c},${0.08 + pulse * 0.08})`;
  ctx.fillRect(Math.round(sx - 2), Math.round(sy - 2), sw + 4, sh + 4);
  ctx.strokeStyle = `rgba(0,0,0,${0.24 + pulse * 0.08})`;
  ctx.lineWidth = 1;
  ctx.strokeRect(Math.round(sx + 1), Math.round(sy + 1), sw - 2, sh - 2);
  ctx.fillStyle = 'rgba(255,255,255,0.08)';
  ctx.fillRect(Math.round(sx + 3), Math.round(sy + 3), Math.max(6, sw - 6), 2);
}

function drawProjectileDetailPass(isEnemy, sx, sy, sw, sh, vx, vy, frame) {
  const speed = Math.sqrt(vx*vx + vy*vy);
  const len = clamp(2 + speed * 0.8, 2, 7);
  const nx = speed > 0.01 ? vx / speed : 1;
  const ny = speed > 0.01 ? vy / speed : 0;
  const trailAlpha = isEnemy ? 0.18 : 0.14;
  const cx = sx + sw * 0.5;
  const cy = sy + sh * 0.5;
  ctx.strokeStyle = isEnemy ? `rgba(255,134,82,${trailAlpha})` : `rgba(220,220,220,${trailAlpha})`;
  ctx.lineWidth = 1;
  ctx.beginPath();
  ctx.moveTo(Math.round(cx), Math.round(cy));
  ctx.lineTo(Math.round(cx - nx * len), Math.round(cy - ny * len));
  ctx.stroke();
  const blink = 0.24 + 0.18 * Math.sin(frame * 0.35 + sx * 0.1);
  ctx.fillStyle = isEnemy ? `rgba(255,208,120,${blink})` : `rgba(255,255,255,${blink*0.8})`;
  ctx.fillRect(Math.round(cx - 1), Math.round(cy - 1), 2, 2);
}

function drawText(text, x, y, color='#fff', scale=1) {
  const str = String(text).toUpperCase();
  ctx.fillStyle = color;
  let cx = x;
  for(let i=0; i<str.length; i++) {
    const rows = FONT_DATA[str[i]];
    if(rows) {
      for(let r=0;r<7;r++) {
        for(let b=7;b>=0;b--) {
          if(rows[r] & (1<<b)) {
            ctx.fillRect(cx + (7-b)*scale, y + r*scale, scale, scale);
          }
        }
      }
    }
    cx += 6 * scale;
  }
}

function textWidth(text, scale=1) { return String(text).length * 6 * scale; }

// ==================== TILE RENDERING ====================
const TILE_COLORS = {
  0: {terrain:null}, // empty
  1: {terrain:'#5a4a3a',top:'#6a5a4a',shadow:'#3a2a1a'}, // stone
  2: {terrain:'#4a6a3a',top:'#5a8a4a',shadow:'#2a4a1a'}, // grass  
  3: {terrain:'#6a5a3a',top:'#8a7a5a',shadow:'#4a3a1a'}, // dirt
  4: {terrain:null, platform:'#7a6a5a'}, // one-way platform
  5: {terrain:'#3a3a4a',top:'#5a5a6a',shadow:'#1a1a2a'}, // dark stone
  6: {terrain:null, hazard:'#ff4422'}, // spikes
  7: {terrain:null, hazard:'#ff6600', lava:true}, // lava
  8: {terrain:'#4a3a2a',top:'#6a5a4a',shadow:'#2a1a0a'}, // wood
  9: {terrain:null, crumble:true, color:'#7a6a5a'}, // crumble platform
};

const TERRAIN_TEXTURE_CACHE = {};
function hashNoise01(n) {
  const s = Math.sin(n * 12.9898) * 43758.5453;
  return s - Math.floor(s);
}

function buildTerrainTexture(tileId, variant) {
  const t = TILE_COLORS[tileId];
  if(!t?.terrain) return null;
  const c = document.createElement('canvas');
  c.width = TILE;
  c.height = TILE;
  const cx = c.getContext('2d');
  cx.fillStyle = t.terrain;
  cx.fillRect(0, 0, TILE, TILE);

  for(let i=0; i<30; i++) {
    const r = hashNoise01((tileId + 1) * 991 + variant * 137 + i * 71);
    const px = Math.floor(hashNoise01(i * 37 + variant * 11 + tileId * 17) * TILE);
    const py = Math.floor(hashNoise01(i * 59 + variant * 13 + tileId * 31) * TILE);
    const shade = Math.floor(8 + r * 26);
    cx.fillStyle = `rgba(${shade},${shade},${shade},${0.12 + r * 0.16})`;
    cx.fillRect(px, py, 1 + (i % 2), 1);
  }

  if(tileId === 8) {
    for(let y=2; y<TILE; y+=3) {
      cx.fillStyle = 'rgba(24,14,8,0.26)';
      cx.fillRect(0, y, TILE, 1);
    }
  } else {
    const mortar = tileId === 5 ? 'rgba(10,10,16,0.24)' : 'rgba(12,16,16,0.22)';
    cx.fillStyle = mortar;
    for(let y=8; y<TILE; y+=8) cx.fillRect(0, y, TILE, 1);
    cx.fillRect(8, 8, 1, 8);
  }

  return c;
}

function getTerrainTexture(tileId, tx=0, ty=0) {
  if(!TILE_COLORS[tileId]?.terrain) return null;
  const variant = Math.floor(tileNoise(tx, ty, tileId + 19) * 3);
  const key = `${tileId}_${variant}`;
  if(!TERRAIN_TEXTURE_CACHE[key]) {
    TERRAIN_TEXTURE_CACHE[key] = buildTerrainTexture(tileId, variant);
  }
  return TERRAIN_TEXTURE_CACHE[key];
}

function drawTile(tileId, x, y, frame, tx=0, ty=0) {
  const t = TILE_COLORS[tileId];
  if(!t) return;
  if(t.terrain) {
    ctx.fillStyle = t.shadow;
    ctx.fillRect(x, y, TILE, TILE);
    const tex = getTerrainTexture(tileId, tx, ty);
    if(tex) ctx.drawImage(tex, x, y, TILE, TILE);
    ctx.fillStyle = t.top;
    ctx.fillRect(x, y, TILE, 2);
    ctx.fillStyle = 'rgba(0,0,0,0.2)';
    ctx.fillRect(x, y + TILE - 1, TILE, 1);
  }
  if(t.platform) {
    ctx.fillStyle = t.platform; ctx.fillRect(x,y,TILE,4);
    ctx.fillStyle = '#5a4a3a'; ctx.fillRect(x,y+4,TILE,2);
  }
  if(t.hazard) {
    if(t.lava) {
      const ly = Math.sin(frame*0.05 + x*0.1)*2;
      ctx.fillStyle='#ff2200'; ctx.fillRect(x,y+ly+4,TILE,TILE-4);
      ctx.fillStyle='#ff6600'; ctx.fillRect(x,y+ly+2,TILE,4);
      ctx.fillStyle='#ffaa00'; ctx.fillRect(x,y+ly,TILE,3);
    } else {
      // Spikes
      for(let i=0;i<4;i++) {
        ctx.fillStyle = t.hazard;
        ctx.beginPath();
        ctx.moveTo(x+i*4, y+TILE);
        ctx.lineTo(x+i*4+2, y+4);
        ctx.lineTo(x+i*4+4, y+TILE);
        ctx.fill();
      }
    }
  }
  if(t.crumble) {
    ctx.fillStyle = t.color; ctx.fillRect(x,y,TILE,6);
    ctx.fillStyle = '#5a4a3a'; ctx.fillRect(x,y+6,TILE,2);
  }
}

function tileNoise(tx, ty, salt=0) {
  const n = Math.sin((tx * 127.1 + ty * 311.7 + salt * 17.9) * 0.13) * 43758.5453123;
  return n - Math.floor(n);
}

function drawGraveyardTile(stage, tx, ty, camX, camY, frame) {
  const x = tx * TILE - camX;
  const y = ty * TILE - camY;
  const topEmpty = !stage.terrain[ty-1]?.[tx];
  const leftSame = !!stage.terrain[ty]?.[tx-1];
  const rightSame = !!stage.terrain[ty]?.[tx+1];

  ctx.fillStyle = '#182727';
  ctx.fillRect(x, y, TILE, TILE);
  const baseTex = getTerrainTexture(1, tx, ty);
  if(baseTex) {
    ctx.save();
    ctx.globalAlpha = 0.5;
    ctx.drawImage(baseTex, x, y, TILE, TILE);
    ctx.restore();
  }

  // Broken stone blocks
  for(let ry=0; ry<2; ry++) {
    for(let rx=0; rx<2; rx++) {
      const n = tileNoise(tx + rx * 7, ty + ry * 11);
      const bx = x + rx * 8;
      const by = y + ry * 8;
      ctx.fillStyle = n > 0.6 ? '#263b3a' : n > 0.32 ? '#223634' : '#1d2f2f';
      ctx.fillRect(bx, by, 8, 8);
      ctx.fillStyle = 'rgba(0,0,0,0.22)';
      ctx.fillRect(bx, by + 7, 8, 1);
    }
  }

  // Hairline cracks
  if(tileNoise(tx, ty, 5) > 0.56) {
    ctx.strokeStyle = 'rgba(7,15,15,0.55)';
    ctx.lineWidth = 1;
    ctx.beginPath();
    ctx.moveTo(x + 2, y + 3 + ((tx + ty) & 1));
    ctx.lineTo(x + 7, y + 8);
    ctx.lineTo(x + 5, y + 13);
    ctx.stroke();
  }

  if(topEmpty) {
    // Moss + cold moonlight rim
    ctx.fillStyle = '#4f6f63';
    ctx.fillRect(x, y, TILE, 2);
    ctx.fillStyle = '#39564e';
    ctx.fillRect(x, y + 2, TILE, 1);
    if(tileNoise(tx, ty, 9) > 0.45) {
      ctx.fillStyle = 'rgba(98, 151, 136, 0.32)';
      ctx.fillRect(x + 1, y, 6, 1);
    }
  }

  // Side shading for depth
  if(!leftSame) {
    ctx.fillStyle = 'rgba(6,10,10,0.24)';
    ctx.fillRect(x, y, 2, TILE);
  }
  if(!rightSame) {
    ctx.fillStyle = 'rgba(120,180,160,0.08)';
    ctx.fillRect(x + TILE - 1, y, 1, TILE);
  }

  // Subtle damp shimmer
  if(topEmpty && tileNoise(tx, ty, 14) > 0.72) {
    const flicker = 0.15 + 0.1 * Math.sin(frame * 0.05 + tx * 0.7);
    ctx.fillStyle = `rgba(95, 198, 176, ${flicker})`;
    ctx.fillRect(x + 10, y + 1, 3, 1);
  }
}

function buildStageVisualSet(stage) {
  const surface = new Array(stage.width).fill(null);
  for(let x=0; x<stage.width; x++) {
    for(let y=0; y<stage.height; y++) {
      const tid = stage.terrain[y]?.[x];
      if(tid && TILE_COLORS[tid]?.terrain) {
        surface[x] = y;
        break;
      }
    }
  }

  const decals = [];
  const propsBack = [];
  const propsFront = [];
  for(let x=3; x<stage.width-3; x++) {
    const top = surface[x];
    if(top == null) continue;
    const seed = tileNoise(x, top, stage.stageNum + 31);
    if(seed > 0.72) {
      decals.push({kind:'groundStain', x:x*TILE + 2, y:top*TILE + 1, w:10 + ((x + top) % 4), h:3 + (x % 2), alpha:0.16 + seed * 0.1});
    }
    if(seed > 0.82) {
      decals.push({kind:'hairCrack', x:x*TILE + 6, y:top*TILE + 5, h:6 + (x % 4), alpha:0.22});
    }
    if((stage.stageNum === 0 || stage.stageNum === 1) && seed < 0.14) {
      decals.push({kind:'moss', x:x*TILE + 1, y:top*TILE, w:6 + (x % 4), alpha:0.14});
    }
    if(stage.stageNum >= 3 && seed > 0.9) {
      decals.push({kind:'soot', x:x*TILE + 2, y:top*TILE + 2, w:8 + (x % 3), h:6, alpha:0.18});
    }

    const px = x * TILE + 8;
    const py = top * TILE;
    if(stage.stageNum === 0) {
      if(seed > 0.92 && x % 5 === 0) propsBack.push({kind:'deadTree', x:px, y:py, h:24 + (x % 9)});
      else if(seed < 0.08 && x % 4 === 0) propsFront.push({kind:'cross', x:px, y:py, w:6 + (x % 3), h:9 + (x % 4)});
      else if(seed > 0.77 && seed < 0.81 && x % 6 === 0) propsFront.push({kind:'fence', x:px, y:py, span:16 + (x % 8)});
    } else if(stage.stageNum === 1) {
      if(x % 28 === 0) propsBack.push({kind:'mast', x:px, y:py, h:28 + (x % 11)});
      if(seed > 0.87 && x % 5 === 0) propsFront.push({kind:'post', x:px, y:py, h:10 + (x % 4)});
      if(seed < 0.07 && x % 7 === 0) propsFront.push({kind:'crate', x:px, y:py, w:8, h:7});
    } else if(stage.stageNum === 2) {
      if(x % 24 === 0) propsBack.push({kind:'pillar', x:px, y:py, h:30 + (x % 10)});
      if(seed > 0.88) propsBack.push({kind:'chain', x:px + ((x % 3) - 1) * 4, y:py - 24, h:18 + (x % 8)});
      if(seed < 0.1 && x % 6 === 0) propsFront.push({kind:'rock', x:px, y:py, w:10 + (x % 5), h:5 + (x % 3)});
    } else {
      if(seed > 0.9 && x % 5 === 0) propsFront.push({kind:'stake', x:px, y:py, h:10 + (x % 5)});
      if(x % 26 === 0) propsBack.push({kind:'pillar', x:px, y:py, h:24 + (x % 12)});
      if(seed < 0.08) propsFront.push({kind:'rock', x:px, y:py, w:8 + (x % 4), h:4 + (x % 3)});
    }
  }
  return {surface, decals, propsBack, propsFront, fogBands:[]};
}

function buildMaskFromProfile(maskKey) {
  const profile = STAGE1_MASK_FALLBACK_PROFILES[maskKey];
  if(!profile) return null;

  const profileScale = STAGE1_FALLBACK_BASE_SAMPLE / STAGE1_TILE_SAMPLING;
  const scaledWidth = Math.max(12, Math.round(profile.width * profileScale));
  const scaledHeight = Math.max(8, Math.round(profile.height * profileScale));
  const sx = (x) => clamp(Math.round(x * profileScale), 0, scaledWidth - 1);
  const sy = (y) => clamp(Math.round(y * profileScale), 0, scaledHeight - 1);

  const terrain = Array.from({length:scaledHeight}, () => new Array(scaledWidth).fill(0));
  const surface = new Array(scaledWidth).fill(null);
  profile.segments.forEach(seg => {
    const from = sx(seg.from|0);
    const to = sx(seg.to|0);
    const len = Math.max(1, to - from);
    for(let x=from; x<=to; x++) {
      const t = (x - from) / len;
      const y = sy(lerp(seg.y1, seg.y2, t));
      surface[x] = y;
      for(let yy=y; yy<scaledHeight; yy++) terrain[yy][x] = 1;
    }
  });
  (profile.gaps || []).forEach(gap => {
    const from = sx(gap.from|0);
    const to = sx(gap.to|0);
    for(let x=from; x<=to; x++) {
      surface[x] = null;
      for(let y=0; y<scaledHeight; y++) terrain[y][x] = 0;
    }
  });
  return {width:scaledWidth, height:scaledHeight, terrain};
}

function getMaskSegment(maskKey) {
  if(STAGE1_MASK_CACHE[maskKey]) return STAGE1_MASK_CACHE[maskKey];
  const img = imageAssets[maskKey];
  if(!img || !img.complete || img.naturalWidth <= 0 || img.naturalHeight <= 0) {
    const fallback = buildMaskFromProfile(maskKey);
    if(fallback) STAGE1_MASK_CACHE[maskKey] = fallback;
    return fallback;
  }

  try {
    const srcW = img.naturalWidth;
    const srcH = img.naturalHeight;
    const width = Math.ceil(srcW / STAGE1_TILE_SAMPLING);
    const height = Math.ceil(srcH / STAGE1_TILE_SAMPLING);
    const terrain = Array.from({length:height}, () => new Array(width).fill(0));

    const canvasMask = document.createElement('canvas');
    canvasMask.width = srcW;
    canvasMask.height = srcH;
    const cx = canvasMask.getContext('2d', {willReadFrequently:true});
    cx.drawImage(img, 0, 0);
    const data = cx.getImageData(0, 0, srcW, srcH).data;

    for(let ty=0; ty<height; ty++) {
      const y0 = ty * STAGE1_TILE_SAMPLING;
      const y1 = Math.min(srcH, y0 + STAGE1_TILE_SAMPLING);
      for(let tx=0; tx<width; tx++) {
        const x0 = tx * STAGE1_TILE_SAMPLING;
        const x1 = Math.min(srcW, x0 + STAGE1_TILE_SAMPLING);
        let white = 0;
        let samples = 0;
        for(let py=y0; py<y1; py+=2) {
          let i = (py * srcW + x0) * 4;
          for(let px=x0; px<x1; px+=2) {
            const a = data[i+3];
            if(a > 32) {
              samples++;
              if(data[i] > 200 && data[i+1] > 200 && data[i+2] > 200) white++;
            }
            i += 8;
          }
        }
        if(samples > 0 && white / samples >= STAGE1_MASK_THRESHOLD) terrain[ty][tx] = 1;
      }
    }
    STAGE1_MASK_CACHE[maskKey] = {width, height, terrain};
    return STAGE1_MASK_CACHE[maskKey];
  } catch(err) {
    console.warn('Mask read failed, using fallback profile:', maskKey, err);
    const fallback = buildMaskFromProfile(maskKey);
    if(fallback) STAGE1_MASK_CACHE[maskKey] = fallback;
    return fallback;
  }
}

function buildSurfaceMap(terrain, width, height) {
  const surface = new Array(width).fill(null);
  for(let x=0; x<width; x++) {
    for(let y=0; y<height; y++) {
      if(terrain[y][x]) {
        surface[x] = y;
        break;
      }
    }
  }
  return surface;
}

function findGroundX(surface, wantedX, fallbackX = 2) {
  const width = surface.length;
  const wx = clamp(Math.floor(wantedX), 0, width - 1);
  if(surface[wx] != null) return wx;
  for(let d=1; d<width; d++) {
    const l = wx - d;
    const r = wx + d;
    if(l >= 0 && surface[l] != null) return l;
    if(r < width && surface[r] != null) return r;
  }
  return clamp(fallbackX, 0, width - 1);
}

function setGroundColumnTop(terrain, x, topY, height, tileId = 1) {
  const yTop = clamp(Math.round(topY), 0, height - 1);
  for(let y=0; y<height; y++) {
    terrain[y][x] = y >= yTop ? tileId : 0;
  }
  return yTop;
}

function smoothStage1Traversal(terrain, width, height, opts = {}) {
  const tileId = opts.tileId || 1;
  const maxStep = opts.maxStep == null ? 2 : opts.maxStep;
  const maxGap = opts.maxGap == null ? 2 : opts.maxGap;
  const leftLimit = clamp(opts.leftLimit == null ? 1 : opts.leftLimit, 0, width - 1);
  const rightLimit = clamp(opts.rightLimit == null ? width - 2 : opts.rightLimit, 0, width - 1);
  if(leftLimit >= rightLimit) return buildSurfaceMap(terrain, width, height);

  let surface = buildSurfaceMap(terrain, width, height);
  const setTop = (x, y) => {
    surface[x] = setGroundColumnTop(terrain, x, y, height, tileId);
  };

  // Fill tiny pits so the route does not break into many micro-gaps.
  for(let x=leftLimit+1; x<rightLimit; x++) {
    if(surface[x] != null) continue;
    let l = x - 1;
    while(l >= leftLimit && surface[l] == null && x - l <= maxGap + 1) l--;
    let r = x + 1;
    while(r <= rightLimit && surface[r] == null && r - x <= maxGap + 1) r++;
    if(l < leftLimit || r > rightLimit) continue;
    if(surface[l] == null || surface[r] == null) continue;
    if(r - l - 1 > maxGap) continue;
    if(Math.abs(surface[l] - surface[r]) > maxStep + 1) continue;
    const bridgeTop = Math.round((surface[l] + surface[r]) * 0.5);
    for(let gx=l+1; gx<r; gx++) setTop(gx, bridgeTop);
  }

  // Forward and backward passes to cap abrupt height changes.
  for(let x=leftLimit+1; x<=rightLimit; x++) {
    if(surface[x] == null || surface[x-1] == null) continue;
    const delta = surface[x] - surface[x-1];
    if(delta > maxStep) setTop(x, surface[x-1] + maxStep);
    else if(delta < -maxStep) setTop(x, surface[x-1] - maxStep);
  }
  for(let x=rightLimit-1; x>=leftLimit; x--) {
    if(surface[x] == null || surface[x+1] == null) continue;
    const delta = surface[x] - surface[x+1];
    if(delta > maxStep) setTop(x, surface[x+1] + maxStep);
    else if(delta < -maxStep) setTop(x, surface[x+1] - maxStep);
  }

  // Remove single-column spikes that snag the player.
  for(let x=leftLimit+1; x<rightLimit; x++) {
    if(surface[x-1] == null || surface[x] == null || surface[x+1] == null) continue;
    const neighborAvg = Math.round((surface[x-1] + surface[x+1]) * 0.5);
    if(Math.abs(surface[x] - neighborAvg) > maxStep) setTop(x, neighborAvg);
  }

  return buildSurfaceMap(terrain, width, height);
}

function enforceStage1LateReachability(terrain, width, height, opts = {}) {
  const tileId = opts.tileId || 1;
  const startX = clamp(opts.startX == null ? Math.floor(width * 0.58) : opts.startX, 1, width - 2);
  const endX = clamp(opts.endX == null ? width - 2 : opts.endX, startX + 1, width - 2);
  const maxGap = Math.max(1, opts.maxGap == null ? 3 : opts.maxGap);

  let surface = buildSurfaceMap(terrain, width, height);
  const setTop = (x, y) => {
    surface[x] = setGroundColumnTop(terrain, x, y, height, tileId);
  };

  let x = startX;
  while(x <= endX) {
    if(surface[x] != null) { x++; continue; }
    const gapStart = x;
    while(x <= endX && surface[x] == null) x++;
    const gapEnd = x - 1;
    const leftX = gapStart - 1;
    const rightX = x;
    if(leftX < 0 || rightX >= width) continue;
    if(surface[leftX] == null || surface[rightX] == null) continue;
    const gapW = gapEnd - gapStart + 1;
    if(gapW <= maxGap) continue;

    // Keep a small pit but guarantee a passable width in late stage.
    const fillCount = gapW - maxGap;
    const fillStart = gapStart + Math.floor((gapW - fillCount) / 2);
    const topY = Math.round((surface[leftX] + surface[rightX]) * 0.5);
    for(let fx=fillStart; fx<fillStart + fillCount; fx++) {
      setTop(fx, topY);
    }
  }

  return buildSurfaceMap(terrain, width, height);
}

function createStage1FromAssets() {
  const segments = [];
  for(const def of STAGE1_SEGMENT_DEFS) {
    const seg = getMaskSegment(def.maskKey);
    if(!seg) return null;
    segments.push({...def, width:seg.width, height:seg.height, terrain:seg.terrain});
  }

  const baseHeight = Math.max(...segments.map(s => s.height));
  const segmentWidth = segments.reduce((sum, s) => sum + s.width, 0);
  const arenaWidth = 64;
  const width = segmentWidth + arenaWidth;
  const height = baseHeight + STAGE1_GROUND_DROP_TILES;
  const terrain = Array.from({length:height}, () => new Array(width).fill(0));

  let offsetX = 0;
  for(const seg of segments) {
    for(let y=0; y<seg.height; y++) {
      for(let x=0; x<seg.width; x++) {
        const dy = y + STAGE1_GROUND_DROP_TILES;
        if(seg.terrain[y][x] && dy < height) terrain[dy][offsetX + x] = 1;
      }
    }
    offsetX += seg.width;
  }

  let surface = buildSurfaceMap(terrain, width, height);
  let bossGroundY = surface[Math.max(0, segmentWidth - 8)];
  if(bossGroundY == null) {
    const gx = findGroundX(surface, segmentWidth - 8, segmentWidth - 24);
    bossGroundY = surface[gx] == null ? Math.floor(height * 0.65) : surface[gx];
  }

  const bossAreaStart = segmentWidth + 6;
  const connectionFrom = Math.max(0, segmentWidth - 4);
  for(let x=connectionFrom; x<bossAreaStart; x++) {
    for(let y=bossGroundY; y<height; y++) terrain[y][x] = 1;
  }
  for(let x=bossAreaStart; x<width; x++) {
    for(let y=bossGroundY; y<height; y++) terrain[y][x] = 1;
  }
  for(let y=0; y<height; y++) terrain[y][width-1] = 1;

  surface = smoothStage1Traversal(terrain, width, height, {
    tileId: 1,
    maxStep: STAGE1_MAX_STEP_TILES,
    maxGap: STAGE1_MAX_GAP_FILL_TILES,
    leftLimit: 1,
    rightLimit: width - 2
  });
  const lateReachStartX = Math.floor((bossAreaStart - STAGE1_LATE_REACH_END_MARGIN_TILES) * STAGE1_LATE_REACH_START_RATIO);
  const lateReachEndX = bossAreaStart - STAGE1_LATE_REACH_END_MARGIN_TILES;
  surface = enforceStage1LateReachability(terrain, width, height, {
    tileId: 1,
    startX: lateReachStartX,
    endX: lateReachEndX,
    maxGap: STAGE1_LATE_MAX_GAP_TILES
  });
  surface = smoothStage1Traversal(terrain, width, height, {
    tileId: 1,
    maxStep: STAGE1_MAX_STEP_TILES,
    maxGap: STAGE1_MAX_GAP_FILL_TILES,
    leftLimit: Math.max(1, lateReachStartX - 4),
    rightLimit: Math.min(width - 2, lateReachEndX + 4)
  });
  bossGroundY = surface[Math.max(0, segmentWidth - 8)] ?? bossGroundY;
  const groundAt = (x, fallback=bossGroundY) => {
    const gx = findGroundX(surface, x, 2);
    return surface[gx] == null ? fallback : surface[gx];
  };

  const entities = [];
  const pushGroundEnemy = (type, x) => {
    const gx = findGroundX(surface, x, 2);
    entities.push({type, x:gx, y:Math.max(1, groundAt(gx)-1), triggered:false});
  };
  const pushFlyEnemy = (type, x, upTiles=4) => {
    const gx = findGroundX(surface, x, 2);
    entities.push({type, x:gx, y:Math.max(2, groundAt(gx)-upTiles), triggered:false});
  };

  const stageEndBeforeBoss = bossAreaStart - 20;
  const groundEnemies = ['zombie','skeleton','woodman','zombie','skeleton','zombie','woodman','skeleton','zombie'];
  groundEnemies.forEach((type, i) => {
    const x = Math.floor(32 + i * (stageEndBeforeBoss - 64) / (groundEnemies.length - 1));
    pushGroundEnemy(type, x);
  });
  [0.12, 0.23, 0.35, 0.48, 0.61, 0.74, 0.87].forEach(r => {
    pushFlyEnemy('bat', Math.floor(stageEndBeforeBoss * r), 5);
  });
  [0.28, 0.56, 0.81].forEach(r => {
    pushFlyEnemy('gargoyle', Math.floor(stageEndBeforeBoss * r), 6);
  });

  const chestXs = [
    Math.floor(segments[0].width * 0.52),
    Math.floor(segments[0].width + segments[1].width * 0.56),
    Math.floor(segments[0].width + segments[1].width + segments[2].width * 0.5)
  ];
  chestXs.forEach(x => {
    const gx = findGroundX(surface, x, 2);
    entities.push({type:'chest', x:gx, y:Math.max(0, groundAt(gx)-1), triggered:false, opened:false});
  });

  const cp1x = findGroundX(surface, Math.floor(segments[0].width * 0.9), 2);
  const cp2x = findGroundX(surface, Math.floor(segments[0].width + segments[1].width * 0.9), cp1x);
  entities.push({type:'checkpoint', x:cp1x, y:Math.max(0, groundAt(cp1x)-2), id:1, activated:false});
  entities.push({type:'checkpoint', x:cp2x, y:Math.max(0, groundAt(cp2x)-2), id:2, activated:false});

  const spawnX = findGroundX(surface, 3, 2);
  const bossSpawnX = Math.min(width - 10, bossAreaStart + 30);

  // Convert occupancy map into terrain tile IDs used by the existing collision system.
  for(let y=0; y<height; y++) {
    for(let x=0; x<width; x++) {
      terrain[y][x] = terrain[y][x] ? 1 : 0;
    }
  }

  return {
    name:'THE GRAVEYARD',
    width,
    height,
    bgColor:'#020406',
    groundY: bossGroundY,
    timeLimit: 900,
    bgm: 'stage12',
    palette:{base:'#1d2b2a', accent:'#7fa798', bg:'#020406'},
    tileBase: 1,
    enemies:['zombie','bat','skeleton'],
    terrain,
    entities,
    gimmicks: [],
    drawTerrain: true,
    backdrop: { mode:'fullHeightRepeat', imageKey:'bg_main', parallax:0.22, yOffset:0 },
    bossAreaStart,
    boss: { id:'cerberus', hp:18, x:bossSpawnX*TILE, y:(bossGroundY-3)*TILE },
    checkpoints: [
      {x: spawnX*TILE, y: Math.max(0, groundAt(spawnX)-1)*TILE},
      {x: cp1x*TILE, y: Math.max(0, groundAt(cp1x)-1)*TILE},
      {x: cp2x*TILE, y: Math.max(0, groundAt(cp2x)-1)*TILE}
    ],
    stageNum: 0
  };
}

function generateProceduralStage(stageNum) {
  const stageConfigs = [
    { name:'THE GRAVEYARD', width:120, height:17, bgColor:'#0a0a1a', groundY:13 + STAGE_GROUND_DROP_TILES, timeLimit:300, bgm:'stage12',
      palette:{base:'#2d1b4e',accent:'#a0a0a0',bg:'#0a0a1a'}, tileBase:1, enemies:['zombie','bat','skeleton'] },
    { name:'GHOST SHIP & MAD SEA', width:146, height:18, bgColor:'#132436', groundY:14 + STAGE_GROUND_DROP_TILES, timeLimit:380, bgm:'stage12',
      palette:{base:'#1a3a5c',accent:'#6ac0d0',bg:'#303040'}, tileBase:5, enemies:['zombie','bat','mermaid','gargoyle'] },
    { name:'SMELTING TOWER', width:168, height:23, bgColor:'#0b121f', groundY:17 + STAGE_GROUND_DROP_TILES, timeLimit:430, bgm:'stage34',
      palette:{base:'#1a3a1a',accent:'#80c040',bg:'#0a1a0a'}, tileBase:2, enemies:['bat','skeleton','woodman','gargoyle'] },
    { name:'FIRE FORTRESS', width:160, height:17, bgColor:'#1a0a0a', groundY:13 + STAGE_GROUND_DROP_TILES, timeLimit:420, bgm:'stage34',
      palette:{base:'#4a1a1a',accent:'#ff8040',bg:'#1a0a0a'}, tileBase:5, enemies:['fireskull','skeleton','demon','gargoyle'] },
    { name:'THRONE OF EVIL', width:180, height:17, bgColor:'#050510', groundY:13 + STAGE_GROUND_DROP_TILES, timeLimit:480, bgm:'stage5',
      palette:{base:'#3a1a4a',accent:'#ffd700',bg:'#050510'}, tileBase:5, enemies:['demon','mage','fireskull','gargoyle'] },
  ];
  
  const cfg = stageConfigs[stageNum];
  const terrain = [];
  const entities = [];
  const gimmicks = [];
  
  // Initialize empty map
  for(let y=0; y<cfg.height; y++) {
    terrain[y] = new Array(cfg.width).fill(0);
  }
  
  // Ground
  for(let x=0; x<cfg.width; x++) {
    for(let y=cfg.groundY; y<cfg.height; y++) {
      terrain[y][x] = cfg.tileBase;
    }
    // Top layer
    if(cfg.groundY < cfg.height) terrain[cfg.groundY][x] = cfg.tileBase;
  }
  
  // Generate terrain features based on stage
  let gapPositions = [];
  const bossAreaStart = cfg.width - 32;
  
  const useGenericScatter = !(stageNum === 1 || stageNum === 2);
  if(useGenericScatter) {
    // Generic pits and occasional platforms (kept sparse).
    const numGaps = 2 + stageNum;
    for(let g=0; g<numGaps; g++) {
      const gx = 18 + Math.floor(g * (bossAreaStart - 28) / Math.max(1, numGaps)) + randInt(-2,2);
      const gw = randInt(2, 2 + Math.min(2, stageNum));
      for(let dx=0; dx<gw; dx++) {
        for(let y=cfg.groundY; y<cfg.height; y++) {
          if(gx+dx >= 0 && gx+dx < cfg.width) terrain[y][gx+dx] = 0;
        }
      }
      gapPositions.push({x:gx, w:gw});
      if(Math.random() > 0.52) {
        const py = cfg.groundY - randInt(2,4);
        for(let dx=0; dx<gw+1; dx++) {
          if(gx+dx >= 0 && gx+dx < cfg.width && py >= 0) terrain[py][gx+dx] = 4;
        }
      }
    }

    const numPlatforms = 2 + Math.floor(stageNum * 0.8);
    for(let p=0; p<numPlatforms; p++) {
      const px = 12 + Math.floor(p * (bossAreaStart - 20) / Math.max(1, numPlatforms)) + randInt(-3,3);
      const pw = randInt(2, 4);
      const py = cfg.groundY - randInt(2, 4);
      for(let dx=0; dx<pw; dx++) {
        if(px+dx >= 0 && px+dx < cfg.width && py >= 0) terrain[py][px+dx] = 4;
      }
    }
  }

  const isSupportTile = (tid) => !!(TILE_COLORS[tid]?.terrain || TILE_COLORS[tid]?.platform || TILE_COLORS[tid]?.crumble);
  const findSupportTop = (x, fallback=cfg.groundY) => {
    const cx = clamp(x, 0, cfg.width - 1);
    for(let y=0; y<cfg.height; y++) {
      if(isSupportTile(terrain[y][cx])) return y;
    }
    return fallback;
  };
  const findRouteSupport = (x, fallback=cfg.groundY) => {
    const cx = clamp(x, 0, cfg.width - 1);
    const nearFloor = Math.max(0, cfg.groundY - 6);
    for(let y=nearFloor; y<cfg.height; y++) {
      if(isSupportTile(terrain[y][cx])) return y;
    }
    return findSupportTop(cx, fallback);
  };
  const findGroundSupport = (x, fallback=cfg.groundY) => {
    const cx = clamp(x, 0, cfg.width - 1);
    const nearFloor = Math.max(0, cfg.groundY - 6);
    for(let y=nearFloor; y<cfg.height; y++) {
      if(TILE_COLORS[terrain[y][cx]]?.terrain) return y;
    }
    for(let y=0; y<cfg.height; y++) {
      if(TILE_COLORS[terrain[y][cx]]?.terrain) return y;
    }
    return fallback;
  };
  const fillColumnFrom = (x, topY, tileId = cfg.tileBase) => {
    if(x < 0 || x >= cfg.width) return;
    const yTop = clamp(topY, 0, cfg.height - 1);
    for(let y=0; y<cfg.height; y++) terrain[y][x] = y >= yTop ? tileId : 0;
  };
  const clearColumnFrom = (x, topY=0) => {
    if(x < 0 || x >= cfg.width) return;
    for(let y=Math.max(0, topY); y<cfg.height; y++) terrain[y][x] = 0;
  };
  const drawPlatform = (x, y, w, tileId=4) => {
    if(y < 0 || y >= cfg.height) return;
    for(let dx=0; dx<w; dx++) {
      const px = x + dx;
      if(px >= 0 && px < cfg.width) terrain[y][px] = tileId;
    }
  };

  // Stage-specific features
  if(stageNum === 1) {
    // Ghost ship + mad sea: flat deck, few raft sections, wave timing.
    for(let x=6; x<bossAreaStart-2; x++) {
      fillColumnFrom(x, cfg.groundY, 8);
    }
    const raftY = cfg.groundY - 1;
    const seaGaps = [
      {x:24, w:5, range:20},
      {x:58, w:6, range:24},
      {x:96, w:5, range:20},
    ].filter(g => g.x + g.w < bossAreaStart - 6);
    seaGaps.forEach((gap, gi) => {
      for(let x=gap.x; x<gap.x+gap.w; x++) {
        clearColumnFrom(x, cfg.groundY);
        terrain[cfg.height-1][x] = 7;
        terrain[cfg.height-2][x] = 7;
      }
      drawPlatform(gap.x-1, raftY, 2, 4);
      drawPlatform(gap.x+gap.w-1, raftY, 2, 4);
      gimmicks.push({
        type:'movingPlatH',
        x:(gap.x + Math.floor(gap.w/2)) * TILE,
        y:raftY * TILE,
        range:gap.range,
        speed:0.45 + gi * 0.04
      });
    });
    for(let mx=18; mx<bossAreaStart-18; mx+=40) {
      const top = findGroundSupport(mx, cfg.groundY);
      for(let y=Math.max(3, top-5); y<top; y++) terrain[y][mx] = 8;
    }
    gimmicks.push({type:'cannon', x:(bossAreaStart-34)*TILE, y:(cfg.groundY-2)*TILE, dir:-1, interval:230, speed:1.45});
    gimmicks.push({type:'cannon', x:(bossAreaStart-58)*TILE, y:(cfg.groundY-3)*TILE, dir:1, interval:260, speed:1.25});
    gimmicks.push({type:'wind', x:30*TILE, range:22*TILE, force:0.05});
    gimmicks.push({type:'wind', x:78*TILE, range:20*TILE, force:-0.045});
    gimmicks.push({type:'wave', x:20*TILE, range:76*TILE, force:0.06, freq:0.055, phase:40});
  } else if(stageNum === 2) {
    // Smelting tower climb: narrow shafts + fewer key moving lifts.
    for(let x=5; x<bossAreaStart-2; x++) fillColumnFrom(x, cfg.groundY, 5);
    const shafts = [28, 66, 104, 136].filter(v => v < bossAreaStart - 10);
    shafts.forEach((shaft, i) => {
      for(let x=shaft; x<shaft+6; x++) {
        clearColumnFrom(x, 3);
        terrain[cfg.height-1][x] = 6;
      }
      const baseY = Math.max(9, cfg.groundY - 2 - i);
      drawPlatform(shaft - 2, baseY, 4, 4);
      drawPlatform(shaft + 5, baseY - 1, 3, 4);
      for(let y=Math.max(1, baseY-6); y<cfg.height; y++) {
        const wx = Math.min(cfg.width-3, shaft + 10);
        terrain[y][wx] = 5;
        terrain[y][wx+1] = 5;
      }
      gimmicks.push({type:'movingPlatV', x:(shaft+2)*TILE, y:baseY*TILE, range:30, speed:0.58});
    });
    const endLiftX = Math.min(bossAreaStart - 18, 122);
    gimmicks.push({type:'movingPlatH', x:endLiftX*TILE, y:(cfg.groundY-2)*TILE, range:24, speed:0.5});
  } else if(stageNum >= 3) {
    // Fortress and final zones: abundant lava and moving platforms.
    for(let i=0; i<4; i++) {
      const lx = 26 + i * 28 + randInt(-3,3);
      for(let dx=0; dx<randInt(4,7); dx++) {
        if(lx+dx < bossAreaStart && lx+dx < cfg.width) {
          terrain[cfg.height-1][lx+dx] = 7;
          terrain[cfg.height-2][lx+dx] = 7;
          for(let y=cfg.groundY; y<cfg.height-2; y++) terrain[y][lx+dx] = 0;
        }
      }
      drawPlatform(lx-1, cfg.groundY-2, 5, 9);
      gimmicks.push({type:'movingPlatH', x:(lx+2)*TILE, y:(cfg.groundY-3)*TILE, range:36, speed:0.7});
    }
    for(let i=0; i<3+stageNum; i++) {
      const mx = 24 + Math.floor(i * (bossAreaStart-34) / (2+stageNum));
      gimmicks.push({type:'movingPlatH', x:mx*TILE, y:(cfg.groundY-3-randInt(0,1))*TILE, range:82, speed:0.7});
    }
  } else {
    for(let i=0; i<2+stageNum; i++) {
      const mx = 20 + Math.floor(i * (bossAreaStart-30) / (2+stageNum));
      gimmicks.push({type:'movingPlatH', x:mx*TILE, y:(cfg.groundY-3)*TILE, range:96, speed:0.7});
    }
  }
  
  // Spikes
  if(stageNum >= 0) {
    for(let i=0; i<3+stageNum*2; i++) {
      const sx = randInt(12, bossAreaStart-5);
      if(terrain[cfg.groundY][sx] === cfg.tileBase && terrain[cfg.groundY-1][sx] === 0) {
        terrain[cfg.groundY-1][sx] = 6;
      }
    }
  }
  
  // Boss area - flat
  for(let x=bossAreaStart; x<cfg.width; x++) {
    for(let y=0; y<cfg.groundY; y++) terrain[y][x] = 0;
    for(let y=cfg.groundY; y<cfg.height; y++) terrain[y][x] = cfg.tileBase;
  }
  // Boss area walls
  for(let y=0; y<cfg.height; y++) {
    terrain[y][cfg.width-1] = cfg.tileBase;
  }
  
  // Entities - enemies
  const enemyCount = 14 + stageNum * 7;
  const flyingTypes = new Set(['bat', 'gargoyle', 'fireskull']);
  for(let i=0; i<enemyCount; i++) {
    const ex = 10 + Math.floor(i * (bossAreaStart-15) / enemyCount);
    const enemyType = cfg.enemies[i % cfg.enemies.length];
    const flying = flyingTypes.has(enemyType);
    let spawnX = ex;
    if(!flying) {
      let bestX = ex;
      let bestDist = Infinity;
      for(let ox=-4; ox<=4; ox++) {
        const tx = clamp(ex + ox, 2, bossAreaStart - 2);
        const groundY = findGroundSupport(tx, -1);
        if(groundY >= 0 && TILE_COLORS[terrain[groundY][tx]]?.terrain) {
          const d = Math.abs(ox);
          if(d < bestDist) {
            bestDist = d;
            bestX = tx;
          }
        }
      }
      spawnX = bestX;
    }
    const supportY = flying ? findRouteSupport(spawnX, cfg.groundY) : findGroundSupport(spawnX, cfg.groundY);
    const ey = flying
      ? Math.max(2, supportY - randInt(4,7))
      : Math.max(1, supportY - 1);
    entities.push({type:enemyType, x:spawnX, y:ey, triggered:false});
  }
  
  // Chests (2-3 per stage)
  for(let i=0; i<2+Math.floor(stageNum/2); i++) {
    const cx = 15 + Math.floor(i * (bossAreaStart-20) / 3);
    let cy = cfg.groundY - 1;
    // Find ground level at this position
    for(let y=0;y<cfg.height;y++) {
      if(terrain[y][cx] > 0 && !TILE_COLORS[terrain[y][cx]]?.hazard) { cy = y-1; break; }
    }
    entities.push({type:'chest', x:cx, y:Math.max(0,cy), triggered:false, opened:false});
  }
  
  // Checkpoints at 30% and 60%
  const cp1x = Math.floor(cfg.width * 0.3);
  const cp2x = Math.floor(cfg.width * 0.6);
  const cp1y = Math.max(1, findRouteSupport(cp1x, cfg.groundY) - 2);
  const cp2y = Math.max(1, findRouteSupport(cp2x, cfg.groundY) - 2);
  entities.push({type:'checkpoint', x:cp1x, y:cp1y, id:1, activated:false});
  entities.push({type:'checkpoint', x:cp2x, y:cp2y, id:2, activated:false});
  
  // Boss trigger
  const bossNames = ['cerberus','seadragon','treant','demonknight','overlord'];
  const bossHPs = [20, 25, 30, 35, 50];
  
  return {
    ...cfg, terrain, entities, gimmicks,
    bossAreaStart,
    boss: { id:bossNames[stageNum], hp:bossHPs[stageNum], x:(cfg.width-10)*TILE, y:(cfg.groundY-4)*TILE },
    checkpoints: [
      {x: 2*TILE, y: (Math.max(1, findRouteSupport(2, cfg.groundY)-2))*TILE},
      {x: cp1x*TILE, y: cp1y*TILE},
      {x: cp2x*TILE, y: cp2y*TILE}
    ],
    stageNum
  };
}

function generateStage(stageNum) {
  if(stageNum === 0) {
    const built = createStage1FromAssets();
    return built || generateProceduralStage(0);
  }
  return generateProceduralStage(stageNum);
}

function getWeaponLevelById(id) {
  if(id === 'knife' || id === 'bow') return GS.weaponLevels[id] || 0;

function getWeaponRuntimeSpec(weaponIdx, charged=false) {
  const base = WEAPONS[weaponIdx] || WEAPONS[0];
  const spec = {...base};
  const level = getWeaponLevelById(base.id);
  spec.level = level;
  spec.spriteId = base.id;
  if(base.id === 'knife' && level >= 1) {
    spec.name = 'KNIFE+';
    spec.damage = base.damage + 2;
    spec.speed = base.speed + 1.8;
    spec.range = base.range + 120;
    spec.hw = 18;
    spec.hh = 5;
    spec.piercing = true;
    spec.maxShots = 9;
    spec.spriteId = 'knife_laser';
  } else if(base.id === 'bow' && level >= 1) {
    spec.name = 'BOW+';
    spec.damage = base.damage + 1;
    spec.speed = base.speed + 0.6;
    spec.trajectory = 'homing';
    spec.range = base.range + 140;
    spec.spriteId = 'bow_homing';
  }
  if(charged) {
    spec.damage = Math.max(1, Math.floor(spec.damage * 2));
    spec.piercing = true;
    spec.range += 40;
  }
  return spec;
}

function getCurrentWeaponLabel() {
  const spec = getWeaponRuntimeSpec(GS.currentWeapon, false);
  return spec.name;
}
