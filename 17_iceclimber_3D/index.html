<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>jipico climber</title>
<style>
* { box-sizing: border-box; }
html, body {
  margin: 0;
  width: 100%;
  height: 100%;
  overflow: hidden;
  background:
    radial-gradient(circle at 20% 20%, rgba(60, 90, 150, 0.18), transparent 40%),
    radial-gradient(circle at 80% 70%, rgba(40, 70, 130, 0.14), transparent 42%),
    #02040f;
  color: #d8e8ff;
  font-family: "Courier New", monospace;
}

#app {
  position: relative;
  width: 100%;
  height: 100%;
}

#menu {
  position: absolute;
  inset: 0;
  display: flex;
  align-items: center;
  justify-content: center;
  z-index: 20;
}

.panel {
  width: min(780px, calc(100vw - 32px));
  border: 3px solid #72a4ff;
  background: rgba(12, 21, 50, 0.9);
  box-shadow: 0 18px 42px rgba(0, 0, 0, 0.6);
  padding: 24px;
  text-align: center;
}

h1 {
  margin: 0;
  color: #d9efff;
  font-size: clamp(28px, 5vw, 56px);
  letter-spacing: 2px;
}

.subtitle {
  margin: 8px 0 22px;
  color: #8ec7ff;
  font-size: clamp(12px, 1.7vw, 22px);
}

.mode-grid {
  display: grid;
  grid-template-columns: repeat(3, minmax(120px, 1fr));
  gap: 12px;
}

.mode-btn {
  border: 2px solid #72a4ff;
  background: linear-gradient(180deg, #1a2d61 0%, #0f1d43 100%);
  color: #d8e8ff;
  padding: 14px 10px;
  font: 700 18px/1 "Courier New", monospace;
  letter-spacing: 1px;
  cursor: pointer;
}

.mode-btn:hover {
  border-color: #b1d1ff;
  background: linear-gradient(180deg, #213974 0%, #132653 100%);
}

.mode-btn.easy { color: #a7f8a9; }
.mode-btn.normal { color: #ffe98b; }
.mode-btn.hard { color: #ff9fa6; }

.note {
  margin: 16px 0 0;
  color: #9eb6de;
  font-size: 13px;
}

#topbar {
  position: absolute;
  top: 0;
  left: 0;
  right: 0;
  height: 46px;
  display: none;
  align-items: center;
  justify-content: space-between;
  gap: 12px;
  padding: 8px 12px;
  background: rgba(8, 15, 30, 0.88);
  border-bottom: 2px solid #5f86c7;
  z-index: 30;
}

#modeLabel {
  font-size: 14px;
  color: #d9efff;
}

.top-actions {
  display: flex;
  gap: 8px;
}

.action-btn {
  border: 1px solid #7fa4df;
  background: #132853;
  color: #d8e8ff;
  padding: 6px 10px;
  font: 700 12px/1 "Courier New", monospace;
  cursor: pointer;
}

.action-btn:hover {
  background: #1a3570;
}

#gameFrame {
  position: absolute;
  inset: 0;
  width: 100%;
  height: 100%;
  border: 0;
  display: none;
  background: #000;
}

#error {
  position: absolute;
  left: 50%;
  bottom: 14px;
  transform: translateX(-50%);
  padding: 8px 12px;
  background: rgba(90, 20, 30, 0.8);
  border: 1px solid rgba(255, 130, 130, 0.8);
  color: #ffd9d9;
  font-size: 12px;
  z-index: 40;
  display: none;
}

.hidden { display: none !important; }
</style>
</head>
<body>
<div id="app">
  <div id="menu">
    <div class="panel">
      <h1>JIPICO CLIMBER 3D</h1>
      <p class="subtitle">MODE SELECT (EASY / NORMAL / HARD)</p>
      <div class="mode-grid">
        <button class="mode-btn easy" data-mode="easy" type="button">EASY</button>
        <button class="mode-btn normal" data-mode="normal" type="button">NORMAL</button>
        <button class="mode-btn hard" data-mode="hard" type="button">HARD</button>
      </div>
      <p class="note">2D版に合わせて、NORMALを基準にEASY/HARDを調整</p>
    </div>
  </div>

  <div id="topbar">
    <div id="modeLabel">MODE: NORMAL</div>
    <div class="top-actions">
      <button id="reloadBtn" class="action-btn" type="button">RELOAD</button>
      <button id="backBtn" class="action-btn" type="button">BACK TO MODE SELECT</button>
    </div>
  </div>

  <iframe id="gameFrame" title="jipico climber 3d"></iframe>
  <div id="error"></div>
</div>

  var menu = document.getElementById('menu');
  var frame = document.getElementById('gameFrame');
  var topbar = document.getElementById('topbar');
  var modeLabel = document.getElementById('modeLabel');
  var reloadBtn = document.getElementById('reloadBtn');
  var backBtn = document.getElementById('backBtn');
  var error = document.getElementById('error');
  var currentMode = null;

  function decodeBase64Utf8(b64) {
    var bin = atob(b64);
    var bytes = new Uint8Array(bin.length);
    for (var i = 0; i < bin.length; i++) bytes[i] = bin.charCodeAt(i);
    return new TextDecoder().decode(bytes);
  }

  function showError(msg) {
    error.textContent = msg;
    error.style.display = 'block';
  }

  function clearError() {
    error.style.display = 'none';
    error.textContent = '';
  }

  function enterMode(mode) {
    var conf = MODE_MAP[mode];
    if (!conf) {
      showError('Unknown mode: ' + mode);
      return;
    }
    clearError();
    currentMode = mode;
    modeLabel.textContent = 'MODE: ' + conf.label;
    menu.classList.add('hidden');
    topbar.style.display = 'flex';
    frame.style.display = 'block';

    try {
      frame.srcdoc = decodeBase64Utf8(conf.b64);
    } catch (e) {
      showError('Failed to build mode document: ' + (e && e.message ? e.message : e));
    }
  }

  function leaveMode() {
    currentMode = null;
    frame.srcdoc = '<!DOCTYPE html><html><body style="margin:0;background:#000"></body></html>';
    frame.style.display = 'none';
    topbar.style.display = 'none';
    menu.classList.remove('hidden');
    clearError();
  }

  function reloadMode() {
    if (!currentMode) return;
    enterMode(currentMode);
  }

  document.querySelectorAll('[data-mode]').forEach(function (btn) {
    btn.addEventListener('click', function () {
      enterMode(btn.getAttribute('data-mode'));
    });
  });

  reloadBtn.addEventListener('click', reloadMode);
  backBtn.addEventListener('click', leaveMode);

  window.addEventListener('keydown', function (e) {
    if (currentMode) return;
    if (e.key === '1') enterMode('easy');
    if (e.key === '2') enterMode('normal');
    if (e.key === '3') enterMode('hard');
  });
})();
</script>
</body>
</html>
