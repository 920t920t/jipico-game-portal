<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>告白デスマーチ 修学旅行編 ～30泊31日の恋と災難～</title>
<style>
:root {
  --color-primary: #ff6b9d;
  --color-secondary: #64dfdf;
  --color-accent: #ffe66d;
  --color-danger: #ff5d73;
  --color-text-bg: rgba(8, 14, 30, 0.72);
  --color-text: #ffffff;
  --color-ui-bg: #0f172a;
  --color-ui-border: rgba(255, 255, 255, 0.18);
  --color-hover: rgba(255,107,157,0.18);
  --glass-bg: rgba(14, 24, 46, 0.58);
  --glass-bg-strong: rgba(10, 18, 34, 0.82);
  --glass-border: rgba(255, 255, 255, 0.2);
  --panel-shadow: 0 12px 45px rgba(0, 0, 0, 0.45);
  --font-ui: "Hiragino Kaku Gothic ProN","Yu Gothic","Meiryo","Noto Sans JP",sans-serif;
  --font-title: "Yu Mincho","Hiragino Mincho ProN","Noto Serif JP","MS PMincho",serif;
  --font-main: var(--font-ui);
}
*{margin:0;padding:0;box-sizing:border-box;}
html,body{width:100%;height:100%;background:radial-gradient(circle at 15% 15%, #1f2937 0%, #020617 50%, #000 100%);font-family:var(--font-main);font-weight:700;overflow:hidden;user-select:none;}
#game-container{position:relative;width:1280px;height:720px;margin:auto;overflow:hidden;background:#0b1020;border:1px solid rgba(255,255,255,0.16);border-radius:24px;box-shadow:0 25px 80px rgba(0,0,0,0.65);}
#game-container.choice-focus{box-shadow:0 22px 90px rgba(0,0,0,0.75),0 0 0 1px rgba(255,230,160,0.28) inset;}
#game-container.choice-focus #bg-layer{transform:scale(1.035) translate(var(--fx-bg-x,0px),var(--fx-bg-y,0px));filter:saturate(1.14) brightness(0.86);}
#game-container.choice-focus #heroine-layer:not(.hidden){transform:translateX(calc(-50% + var(--fx-char-x,0px))) translateY(var(--fx-char-y,0px)) scale(1.04);}
#game-container.choice-focus #choices-area{z-index:22;}
@media(max-width:1280px){#game-container{transform-origin:top left;}}

/* SCREENS */
.screen{position:absolute;inset:0;display:none;flex-direction:column;z-index:1;}
.screen.active{display:flex;}

/* TITLE SCREEN */
#title-screen{background:#090f1f;align-items:center;justify-content:flex-end;text-align:center;padding-bottom:34px;overflow:hidden;}
#title-screen .title-bg{position:absolute;inset:-6% -4%;background-image:linear-gradient(135deg,rgba(8,10,30,0.72),rgba(25,8,24,0.42) 45%,rgba(8,10,30,0.82)),url('asset/bg_nagasaki_nightview.png');background-size:cover;background-position:center;filter:saturate(1.12) contrast(1.06);}
#title-screen .title-vignette{position:absolute;inset:0;background:radial-gradient(circle at 50% 22%,rgba(255,214,231,0.2),rgba(0,0,0,0.62) 70%),linear-gradient(0deg,rgba(6,8,22,0.8),transparent 36%);z-index:1;}
#title-screen .title-cast{position:absolute;left:50%;top:26px;transform:translateX(-50%);z-index:2;display:grid;grid-template-columns:repeat(4,1fr);gap:12px;width:min(1220px,96%);}
#title-screen .cast-card{height:370px;border-radius:22px;overflow:hidden;border:1px solid rgba(255,255,255,0.35);box-shadow:0 14px 36px rgba(0,0,0,0.46);background-size:cover;background-position:center top;position:relative;}
#title-screen .cast-card::after{content:'';position:absolute;inset:0;background:linear-gradient(180deg,rgba(255,255,255,0.08),rgba(0,0,0,0.48));}
#title-screen .cast-card.cast-hina{background-image:url('asset/heroine_hina_normal.png');}
#title-screen .cast-card.cast-mitsuki{background-image:url('asset/heroine_mitsuki_normal.png');}
#title-screen .cast-card.cast-shiori{background-image:url('asset/heroine_shiori_normal.png');}
#title-screen .cast-card.cast-hana{background-image:url('asset/heroine_hana_normal.png');}
#title-screen .title-content{position:relative;z-index:3;width:min(1220px,96%);padding:6px 8px 10px;background:none;border:none;backdrop-filter:none;box-shadow:none;}
#title-screen h1{font-family:var(--font-title);font-weight:900;font-size:clamp(54px,7.1vw,88px);line-height:1.12;white-space:nowrap;color:#f9f2f5;text-shadow:0 0 28px rgba(255,190,225,0.45),0 2px 7px rgba(0,0,0,0.8);margin-bottom:6px;letter-spacing:1.2px;animation:titlePulse 3.2s ease-in-out infinite;}
#title-screen .subtitle{font-size:34px;color:#d9e9ff;margin-bottom:24px;text-shadow:0 0 16px rgba(0,0,0,0.58);}
#title-screen .title-actions{display:flex;flex-wrap:wrap;gap:10px;justify-content:center;}
#title-screen .title-actions .btn{backdrop-filter:blur(8px) saturate(130%);}
@keyframes titlePulse{0%,100%{transform:scale(1);filter:brightness(1);}50%{transform:scale(1.012);filter:brightness(1.06);}}
.btn{display:inline-block;padding:14px 46px;margin:8px;font-size:34px;font-family:var(--font-main);color:#fff;background:linear-gradient(135deg,#ff6b9d,#ff7eb3 60%,#ff8ec1);border:1px solid rgba(255,255,255,0.35);border-radius:999px;cursor:pointer;transition:all 0.25s;text-shadow:0 1px 4px rgba(0,0,0,0.45);letter-spacing:0.8px;box-shadow:0 10px 24px rgba(255,107,157,0.35);}
.btn:hover{transform:translateY(-2px) scale(1.01);box-shadow:0 14px 34px rgba(255,107,157,0.48);border-color:rgba(255,255,255,0.45);}
.btn:active{transform:translateY(0);box-shadow:none;}
.btn-secondary{background:linear-gradient(135deg,#43d9d1,#3bbfb8 55%,#2fa7b5);}
.btn-secondary:hover{box-shadow:0 14px 30px rgba(78,205,196,0.42);}
.btn-small{padding:8px 24px;font-size:28px;margin:4px;}

/* NAME INPUT */
#name-screen{background:linear-gradient(145deg,#0c1327,#182746);align-items:center;justify-content:center;text-align:center;}
#name-screen label{font-size:48px;color:var(--color-accent);margin-bottom:20px;display:block;}
#name-input{padding:13px 24px;font-size:44px;font-family:var(--font-main);background:rgba(255,255,255,0.09);border:1px solid rgba(255,255,255,0.28);border-radius:16px;color:#fff;text-align:center;width:320px;outline:none;backdrop-filter:blur(10px);}
#name-input:focus{border-color:var(--color-accent);box-shadow:0 0 0 3px rgba(255,230,109,0.18);}
#name-input::placeholder{color:rgba(255,255,255,0.3);}

/* GAME SCREEN */
#game-screen{background:#111;}
#game-header{position:absolute;top:0;left:0;right:0;height:84px;background:linear-gradient(180deg,rgba(3,8,20,0.75),rgba(3,8,20,0.18));display:flex;align-items:center;justify-content:space-between;padding:0 16px;z-index:20;font-size:28px;color:#dbe7ff;backdrop-filter:blur(14px) saturate(150%);border-bottom:1px solid rgba(255,255,255,0.14);}
#game-header .hdr-left,#game-header .hdr-right{display:flex;align-items:center;gap:10px;min-width:0;flex-wrap:nowrap;}
#game-header .day-display,#game-header .phase-display,#game-header .money-display{padding:6px 12px;border-radius:999px;background:rgba(8,16,34,0.55);border:1px solid rgba(255,255,255,0.14);font-weight:700;backdrop-filter:blur(10px);}
#game-header .day-display{color:var(--color-accent);}
#game-header .phase-display{color:#c7d2fe;}
#game-header .weather-icon{font-size:40px;padding:4px 8px;border-radius:999px;background:rgba(8,16,34,0.48);border:1px solid rgba(255,255,255,0.1);}
#game-header .money-display{color:var(--color-secondary);}
#menu-btn{background:rgba(8,16,34,0.58);border:1px solid rgba(255,255,255,0.2);color:#fff;padding:6px 14px;border-radius:999px;cursor:pointer;font-size:26px;font-family:var(--font-main);transition:all 0.22s;}
#hdr-phase{font-size:22px!important;white-space:nowrap;}
#menu-btn:hover{background:rgba(255,255,255,0.12);border-color:rgba(255,255,255,0.4);}

/* BACKGROUND */
#bg-layer{position:absolute;inset:0;z-index:1;background-size:cover;background-position:center;transition:opacity 0.5s,filter 0.5s,transform 0.35s ease-out;}
#bg-overlay{position:absolute;inset:0;z-index:2;pointer-events:none;transition:background 0.3s;}

/* HEROINE */
#heroine-layer{position:absolute;bottom:122px;left:50%;transform:translateX(-50%);z-index:5;text-align:center;transition:opacity 0.4s,transform 0.4s,filter 0.35s;}
#heroine-layer.hidden{opacity:0;transform:translateX(-50%) translateY(30px);}
#heroine-img{max-height:470px;max-width:420px;object-fit:contain;background:transparent;border-radius:0;box-shadow:none;filter:drop-shadow(0 18px 38px rgba(0,0,0,0.55));}
#heroine-img.photo-mode{max-height:400px;max-width:340px;object-fit:cover;border-radius:24px;box-shadow:0 12px 45px rgba(255,107,157,0.22);filter:contrast(1.08) saturate(1.18) brightness(1.02);}

/* AFFECTION GAUGE */
#affection-gauge{position:absolute;right:20px;top:96px;width:28px;height:200px;background:rgba(0,0,0,0.5);border-radius:14px;z-index:15;overflow:hidden;border:1px solid rgba(255,255,255,0.15);transition:opacity 0.3s;}
#affection-gauge.hidden{opacity:0;}
#affection-fill{position:absolute;bottom:0;width:100%;background:linear-gradient(0deg,var(--color-primary),#ff9ff3);border-radius:14px;transition:height 0.6s ease-out;}
#affection-label{position:absolute;top:-22px;right:0;width:28px;text-align:center;font-size:22px;color:var(--color-primary);}

/* STRESS GAUGE */
#stress-gauge{position:absolute;left:18px;top:98px;width:170px;z-index:21;transition:opacity 0.3s;padding:8px 10px;background:rgba(8,16,34,0.45);border:1px solid rgba(255,255,255,0.2);border-radius:12px;backdrop-filter:blur(8px);}
#stress-bar-bg{width:100%;height:10px;background:rgba(0,0,0,0.42);border-radius:999px;overflow:hidden;border:1px solid rgba(255,255,255,0.18);}
#stress-fill{height:100%;background:linear-gradient(90deg,var(--color-accent),var(--color-danger));border-radius:999px;transition:width 0.5s;}
#stress-label{font-size:20px;color:#d7e8ff;margin-bottom:4px;line-height:1;}

/* TEXTBOX */
#textbox-area{position:absolute;bottom:12px;left:18px;right:18px;z-index:14;pointer-events:none;}
#speaker-name{min-height:0;padding:6px 26px;font-size:32px;font-weight:700;color:#f0fff9;background:linear-gradient(180deg,#1ac398,#129f83);border:2px solid rgba(255,255,255,0.75);border-radius:999px;display:inline-flex;align-items:center;position:absolute;top:-24px;left:20px;z-index:2;box-shadow:0 6px 20px rgba(0,0,0,0.3);}
#speaker-name:empty{display:none;}
#text-content{min-height:134px;max-height:228px;overflow-y:auto;padding:34px 28px 20px;font-size:32px;line-height:1.58;color:#f8feff;background:linear-gradient(180deg,rgba(15,122,126,0.68),rgba(7,87,94,0.82));cursor:pointer;position:relative;backdrop-filter:blur(8px);border:3px solid rgba(241,255,250,0.62);border-radius:20px;word-break:break-word;pointer-events:auto;box-shadow:0 12px 26px rgba(0,0,0,0.4);}
#text-content .cursor-indicator{display:inline-block;animation:blink 0.8s step-end infinite;margin-left:4px;color:var(--color-primary);}
@keyframes blink{0%,100%{opacity:1;}50%{opacity:0;}}

/* CHOICES */
#choices-area{position:absolute;bottom:250px;left:50%;transform:translateX(-50%);z-index:12;display:flex;flex-direction:column;gap:10px;max-width:1080px;width:92%;transition:opacity 0.3s;max-height:46%;overflow-y:auto;padding-right:6px;}
#choices-area.hidden{opacity:0;pointer-events:none;}
.choice-btn{padding:14px 20px;font-size:32px;font-family:var(--font-main);color:#f8fbff;background:linear-gradient(125deg,rgba(17,31,57,0.86),rgba(20,20,50,0.68));border:1px solid rgba(255,255,255,0.22);border-radius:16px;cursor:pointer;transition:all 0.2s;text-align:left;display:flex;align-items:center;gap:10px;backdrop-filter:blur(10px);}
.choice-btn:hover{background:linear-gradient(125deg,rgba(27,44,74,0.92),rgba(29,24,64,0.74));border-color:rgba(255,255,255,0.35);transform:translateX(6px);box-shadow:0 8px 24px rgba(6,11,26,0.45);}
.choice-btn .choice-num{display:inline-flex;align-items:center;justify-content:center;width:28px;height:28px;border-radius:50%;background:var(--color-primary);font-size:26px;font-weight:bold;flex-shrink:0;}
.choice-btn.important-choice{border-color:rgba(255,224,120,0.82);background:linear-gradient(120deg,rgba(30,25,10,0.76),rgba(44,25,36,0.78));box-shadow:0 0 0 1px rgba(255,224,120,0.22) inset,0 8px 24px rgba(0,0,0,0.45);}
.choice-btn.important-choice .choice-num{background:linear-gradient(180deg,#ffe27a,#f7b955);color:#2e1a00;}

/* LOCATION SELECT */
#location-area{position:absolute;inset:0;z-index:11;display:none;align-items:flex-end;justify-content:center;padding:0 14px 134px;background:linear-gradient(180deg,rgba(2,8,16,0.16),rgba(2,8,16,0.7) 58%,rgba(2,8,16,0.82));backdrop-filter:blur(7px);}
#location-area.active{display:flex;}
.action-shell{width:min(1180px,96%);max-height:76%;padding:16px 18px 18px;border-radius:26px;background:linear-gradient(160deg,rgba(7,16,35,0.86),rgba(9,22,44,0.82));border:1px solid rgba(255,255,255,0.24);box-shadow:0 18px 40px rgba(0,0,0,0.42);}
.action-head{display:flex;align-items:center;justify-content:space-between;gap:14px;margin-bottom:12px;}
.action-head h2{color:#fff1ba;font-size:42px;letter-spacing:0.8px;text-shadow:0 2px 12px rgba(0,0,0,0.5);}
.action-sub{font-size:24px;color:#b9d6ff;opacity:0.9;}
#location-grid,#night-grid{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:12px;max-height:390px;overflow-y:auto;padding-right:6px;}
.loc-btn,.night-btn{padding:12px 12px 13px;font-size:28px;font-family:var(--font-main);color:#fff;background:linear-gradient(145deg,rgba(21,39,74,0.88),rgba(18,18,44,0.82));border:1px solid rgba(255,255,255,0.24);border-radius:18px;cursor:pointer;transition:all 0.22s;text-align:left;word-break:break-word;display:flex;flex-direction:column;gap:4px;align-items:flex-start;position:relative;overflow:hidden;}
.loc-btn:hover,.night-btn:hover{border-color:rgba(255,255,255,0.52);transform:translateY(-2px);box-shadow:0 10px 24px rgba(9,14,34,0.5);}
.loc-btn::before,.night-btn::before{content:'';position:absolute;inset:auto -40% -42% auto;width:170px;height:170px;background:radial-gradient(circle,rgba(255,255,255,0.16),transparent 65%);pointer-events:none;}
.loc-btn.locked{opacity:0.4;pointer-events:none;filter:grayscale(1);}
.loc-btn .loc-icon,.night-btn .night-icon{font-size:34px;display:inline-flex;align-items:center;justify-content:center;width:54px;height:54px;border-radius:50%;background:linear-gradient(180deg,rgba(255,255,255,0.2),rgba(255,255,255,0.08));border:1px solid rgba(255,255,255,0.38);margin-bottom:2px;}
.loc-btn .loc-name,.night-btn .night-name{font-size:27px;font-weight:700;display:block;line-height:1.25;}
.loc-btn .loc-hint,.night-btn .night-effect{font-size:21px;color:#bfe7ff;margin-top:2px;display:block;opacity:0.95;}

/* NIGHT ACTION */
#night-area{position:absolute;inset:0;z-index:11;display:none;align-items:flex-end;justify-content:center;padding:0 14px 134px;background:linear-gradient(160deg,rgba(1,5,19,0.54),rgba(5,13,30,0.88));backdrop-filter:blur(8px);}
#night-area.active{display:flex;}

/* DAY SUMMARY */
#summary-area{position:absolute;inset:0;z-index:11;display:none;flex-direction:column;align-items:center;justify-content:center;background:rgba(3,8,20,0.8);backdrop-filter:blur(8px);}
#summary-area.active{display:flex;}
#summary-box{background:var(--glass-bg-strong);backdrop-filter:blur(15px) saturate(150%);border:1px solid var(--glass-border);border-radius:22px;padding:30px 40px;max-width:780px;max-height:74vh;overflow-y:auto;width:92%;text-align:center;box-shadow:var(--panel-shadow);}
#summary-box h2{color:var(--color-accent);font-size:44px;margin-bottom:16px;}
#summary-stats{text-align:left;font-size:28px;color:#ccc;line-height:2;}
#summary-stats .stat-change.positive{color:var(--color-secondary);}
#summary-stats .stat-change.negative{color:var(--color-danger);}

/* MENU OVERLAY */
#menu-overlay{position:absolute;inset:0;z-index:50;display:none;align-items:center;justify-content:center;background:rgba(3,8,20,0.72);backdrop-filter:blur(6px);}
#menu-overlay.active{display:flex;}
#menu-panel{background:var(--glass-bg-strong);border:1px solid var(--glass-border);backdrop-filter:blur(16px) saturate(150%);border-radius:22px;padding:26px;width:min(96vw,760px);max-height:82vh;overflow-y:auto;box-shadow:var(--panel-shadow);}
#menu-panel h2{color:var(--color-primary);font-size:44px;margin-bottom:20px;text-align:center;}
.menu-section{margin-bottom:20px;}
.menu-section h3{color:var(--color-accent);font-size:30px;margin-bottom:10px;border-bottom:1px solid rgba(255,255,255,0.15);padding-bottom:6px;}
.menu-item{padding:11px 16px;font-size:28px;font-family:var(--font-main);color:#dce7ff;background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.16);border-radius:12px;cursor:pointer;transition:all 0.2s;margin-bottom:8px;display:block;width:100%;text-align:left;}
.menu-item:hover{background:rgba(255,255,255,0.12);border-color:rgba(255,255,255,0.34);color:#fff;transform:translateY(-1px);}

/* STATUS OVERLAY */
#status-overlay{position:absolute;inset:0;z-index:51;display:none;align-items:center;justify-content:center;background:rgba(3,8,20,0.76);backdrop-filter:blur(8px);}
#status-overlay.active{display:flex;}
#status-panel{background:var(--glass-bg-strong);border:1px solid var(--glass-border);backdrop-filter:blur(16px) saturate(150%);border-radius:22px;padding:24px;width:min(96vw,980px);max-height:82vh;overflow-y:auto;box-shadow:var(--panel-shadow);}
#status-panel h2{color:var(--color-primary);font-size:44px;margin-bottom:16px;text-align:center;letter-spacing:0.5px;}
#status-content{display:flex;flex-direction:column;gap:8px;}
.status-layout{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:12px;margin-bottom:14px;}
.status-card{padding:12px;background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.14);border-radius:14px;}
.status-card h4{font-size:26px;color:#c7d2fe;margin-bottom:8px;font-weight:700;letter-spacing:0.4px;}
.status-radar{width:100%;height:220px;display:block;}
.status-radar text{fill:#dbe7ff;font-size:22px;letter-spacing:0.2px;}
.status-radar .grid{fill:none;stroke:rgba(255,255,255,0.16);stroke-width:1;}
.status-radar .axis{stroke:rgba(255,255,255,0.22);stroke-width:1;}
.status-radar .shape{fill:rgba(255,107,157,0.24);stroke:rgba(255,153,186,0.9);stroke-width:2;}
.status-radar .dot{fill:#ffe66d;stroke:#fff;stroke-width:1;}
.stat-meter-row{display:grid;grid-template-columns:90px 1fr 40px;gap:8px;align-items:center;padding:5px 0;}
.stat-meter-row .label{font-size:24px;color:#c7d2fe;}
.stat-meter-row .value{font-size:24px;color:#fff;font-weight:700;text-align:right;}
.meter{height:8px;background:rgba(255,255,255,0.12);border-radius:999px;overflow:hidden;}
.meter-fill{height:100%;background:linear-gradient(90deg,#64dfdf,#6ea8ff 60%,#ff7eb3);border-radius:999px;transition:width 0.35s ease;}
.stat-row{display:flex;justify-content:space-between;padding:8px 0;border-bottom:1px solid rgba(255,255,255,0.06);font-size:28px;color:#ccc;}
.stat-row .stat-val{color:var(--color-accent);font-weight:bold;}
.heroine-status{margin-top:10px;padding:11px;background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.1);border-radius:12px;}
.heroine-status.locked{opacity:0.72;}
.heroine-status .h-top{display:flex;justify-content:space-between;align-items:center;gap:10px;}
.heroine-status .h-name{color:#ffd0df;font-weight:700;font-size:30px;margin-bottom:2px;}
.heroine-status .h-rank{font-size:24px;color:var(--color-secondary);}
.heroine-status .h-aff{font-size:24px;color:#ffe66d;font-weight:700;}
.heroine-status .h-meter{height:8px;background:rgba(255,255,255,0.12);border-radius:999px;overflow:hidden;margin-top:8px;}
.heroine-status .h-fill{height:100%;background:linear-gradient(90deg,#ff9fbf,#ff6b9d);border-radius:999px;transition:width 0.35s ease;}
.status-subgrid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:10px;}

/* SAVE/LOAD OVERLAY */
#saveload-overlay{position:absolute;inset:0;z-index:51;display:none;align-items:center;justify-content:center;background:rgba(3,8,20,0.76);backdrop-filter:blur(6px);}
#saveload-overlay.active{display:flex;}
#saveload-panel{background:var(--glass-bg-strong);border:1px solid var(--glass-border);backdrop-filter:blur(15px);border-radius:22px;padding:26px;width:min(94vw,760px);max-height:82vh;overflow-y:auto;box-shadow:var(--panel-shadow);}
#saveload-panel h2{color:var(--color-primary);font-size:40px;margin-bottom:16px;text-align:center;}
.save-slot{padding:16px;background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.15);border-radius:12px;margin-bottom:10px;cursor:pointer;transition:all 0.2s;}

.save-slot .slot-label{font-size:30px;color:var(--color-accent);font-weight:bold;margin-bottom:4px;}
.save-slot .slot-info{font-size:26px;color:#aaa;}

#settings-overlay.active{display:flex;}
#settings-panel{background:var(--glass-bg-strong);border:1px solid var(--glass-border);backdrop-filter:blur(15px);border-radius:22px;padding:26px;width:min(94vw,720px);max-height:82vh;overflow-y:auto;box-shadow:var(--panel-shadow);}
#settings-panel h2{color:var(--color-primary);font-size:40px;margin-bottom:20px;text-align:center;}
.setting-row{display:flex;justify-content:space-between;align-items:center;padding:12px 0;border-bottom:1px solid rgba(255,255,255,0.11);font-size:28px;color:#d6e3ff;}
.setting-row select,.setting-row input[type="range"]{font-family:var(--font-main);padding:4px 8px;border-radius:8px;background:rgba(255,255,255,0.1);border:1px solid rgba(255,255,255,0.22);color:#fff;outline:none;}
.setting-row input[type="range"]{width:120px;accent-color:var(--color-primary);}

/* SHOP OVERLAY */
#shop-overlay{position:absolute;inset:0;z-index:16;display:none;flex-direction:column;align-items:center;justify-content:center;background:rgba(3,8,20,0.78);backdrop-filter:blur(6px);}
#shop-overlay.active{display:flex;}
#shop-panel{background:var(--glass-bg-strong);border:1px solid var(--glass-border);backdrop-filter:blur(15px) saturate(150%);border-radius:22px;padding:26px;width:min(94vw,820px);max-height:82vh;overflow-y:auto;box-shadow:var(--panel-shadow);}
#shop-panel h2{color:var(--color-accent);font-size:40px;margin-bottom:16px;text-align:center;}
.shop-item{display:flex;justify-content:space-between;align-items:center;padding:12px;background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.15);border-radius:12px;margin-bottom:8px;}

/* ENDING SCREEN */
#ending-screen{background:#000;align-items:center;justify-content:center;text-align:center;z-index:60;}
#ending-screen .end-type{font-size:32px;color:var(--color-secondary);margin-bottom:10px;letter-spacing:3px;}

#ending-screen .end-text{font-size:32px;color:#ccc;line-height:1.9;max-width:600px;margin:0 auto 30px;padding:0 20px;}

/* EFFECTS */
#effect-layer{position:absolute;inset:0;z-index:30;pointer-events:none;overflow:hidden;}
.heart-effect{position:absolute;font-size:56px;animation:heartFloat 1.2s ease-out forwards;pointer-events:none;}
@keyframes heartFloat{0%{opacity:1;transform:translateY(0) scale(0.5);}50%{opacity:1;transform:translateY(-60px) scale(1.1);}100%{opacity:0;transform:translateY(-120px) scale(0.8);}}
.break-heart{position:absolute;font-size:56px;animation:heartBreak 0.9s ease-in forwards;pointer-events:none;}
@keyframes heartBreak{0%{opacity:1;transform:translateY(0) scale(1);}100%{opacity:0;transform:translateY(80px) scale(0.5) rotate(20deg);}}
.screen-flash{position:absolute;inset:0;opacity:0;transition:opacity 0.15s;}
@keyframes shakeAnim{0%,100%{transform:translate(0);}10%{transform:translate(-6px,3px);}20%{transform:translate(5px,-4px);}30%{transform:translate(-3px,5px);}40%{transform:translate(4px,-2px);}50%{transform:translate(-5px,3px);}60%{transform:translate(6px,-4px);}70%{transform:translate(-2px,5px);}80%{transform:translate(3px,-3px);}90%{transform:translate(-4px,2px);}}

/* TUTORIAL TOOLTIP */
.tutorial-tip{position:absolute;z-index:40;background:rgba(255,230,109,0.95);color:#1a1a2e;padding:14px 20px;border-radius:12px;font-size:28px;max-width:330px;box-shadow:0 4px 20px rgba(0,0,0,0.4);animation:tipPop 0.3s ease-out;}
.tutorial-tip::after{content:'';position:absolute;right:24px;bottom:-8px;border-left:8px solid transparent;border-right:8px solid transparent;border-top:8px solid rgba(255,230,109,0.95);}
@keyframes tipPop{from{opacity:0;transform:scale(0.9);}to{opacity:1;transform:scale(1);}}

/* NOTIFICATION */
#notification{position:absolute;top:66px;left:50%;transform:translateX(-50%);z-index:35;padding:10px 24px;border-radius:999px;font-size:26px;color:#fff;opacity:0;transition:opacity 0.3s,transform 0.3s;pointer-events:none;border:1px solid rgba(255,255,255,0.2);backdrop-filter:blur(8px);}
#notification.show{opacity:1;transform:translateX(-50%) translateY(0);}
#notification.positive{background:rgba(78,205,196,0.9);}
#notification.negative{background:rgba(255,71,87,0.9);}
#notification.info{background:rgba(255,230,109,0.9);color:#333;}

/* GALLERY */
#gallery-screen{background:linear-gradient(135deg,#1a1a2e,#16213e);align-items:center;justify-content:flex-start;padding:40px;overflow-y:auto;}
#gallery-screen h1{color:var(--color-primary);font-size:56px;margin-bottom:24px;}
#gallery-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;width:100%;max-width:900px;}
.gallery-card{padding:20px;background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.1);border-radius:12px;text-align:center;font-size:26px;color:#aaa;}
.gallery-card.unlocked{color:#fff;border-color:var(--color-primary);cursor:pointer;}
.gallery-card .g-icon{font-size:60px;margin-bottom:6px;}

/* Responsive scaling */
@media(max-height:720px){#game-container{height:100vh;}}
@media(max-width:980px){

}

/* Reduced motion */
@media(prefers-reduced-motion:reduce){*{animation-duration:0.01ms!important;transition-duration:0.01ms!important;}}

const AudioManager = {
  ctx: null,
  volume: 0,
  enabled: false,

  init() {
    this.enabled = false;
    this.ctx = null;
  },

  ensureContext() {
    return;
  },

  play(name) {
    return;
  },

  _tone(type, freq, dur, vol) {
    const osc = this.ctx.createOscillator();
    const gain = this.ctx.createGain();
    osc.type = type; osc.frequency.value = freq;
    gain.gain.setValueAtTime(vol, this.ctx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.001, this.ctx.currentTime + dur);
    osc.connect(gain); gain.connect(this.ctx.destination);
    osc.start(); osc.stop(this.ctx.currentTime + dur);
  },

  _sweep(type, f1, f2, dur, vol) {
    const osc = this.ctx.createOscillator();
    const gain = this.ctx.createGain();
    osc.type = type; osc.frequency.setValueAtTime(f1, this.ctx.currentTime);
    osc.frequency.linearRampToValueAtTime(f2, this.ctx.currentTime + dur);
    gain.gain.setValueAtTime(vol, this.ctx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.001, this.ctx.currentTime + dur);
    osc.connect(gain); gain.connect(this.ctx.destination);
    osc.start(); osc.stop(this.ctx.currentTime + dur + 0.01);
  },

  _arpeggio(freqs, noteDur, vol) {
    freqs.forEach((f, i) => {
      setTimeout(() => this._tone('sine', f, noteDur * 1.5, vol), i * noteDur * 1000);
    });
  },

  _noise(dur, vol) {
    const buf = this.ctx.createBuffer(1, this.ctx.sampleRate * dur, this.ctx.sampleRate);
    const data = buf.getChannelData(0);
    for (let i = 0; i < data.length; i++) data[i] = (Math.random() * 2 - 1) * 0.5;
    const src = this.ctx.createBufferSource();
    const gain = this.ctx.createGain();
    src.buffer = buf;
    gain.gain.setValueAtTime(vol, this.ctx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.001, this.ctx.currentTime + dur);
    src.connect(gain); gain.connect(this.ctx.destination);
    src.start();
  }
};

function mergeState(base, incoming) {
  if (!incoming || typeof incoming !== 'object') return base;
  Object.keys(incoming).forEach((key) => {
    const value = incoming[key];
    if (value === undefined) return;
    if (Array.isArray(value)) {
      base[key] = value.slice();
      return;
    }
    if (value && typeof value === 'object') {
      if (!base[key] || typeof base[key] !== 'object' || Array.isArray(base[key])) base[key] = {};
      mergeState(base[key], value);
      return;
    }
    base[key] = value;
  });
  return base;
}

function clampNumber(value, min, max, fallback) {
  const n = Number(value);
  if (!Number.isFinite(n)) return fallback;
  return Math.max(min, Math.min(max, n));
}

function sanitizeLoadedState(rawState) {
  if (!rawState || typeof rawState !== 'object') return null;

  const playerName = typeof rawState.player?.name === 'string' && rawState.player.name.trim() ? rawState.player.name.trim() : 'ユウキ';
  const safe = mergeState(createInitialState(playerName), rawState);

  safe.currentDay = Math.max(1, Math.floor(clampNumber(safe.currentDay, 1, CONFIG.MAX_DAYS + 1, 1)));
  safe.currentPhase = typeof safe.currentPhase === 'string' ? safe.currentPhase : 'DAY_START';
  safe.timeOfDay = ['morning','afternoon','evening','night'].includes(safe.timeOfDay) ? safe.timeOfDay : 'morning';
  if (!CONFIG.WEATHERS.some(w => w.id === safe.weather)) safe.weather = 'sunny';

  if (!safe.player || typeof safe.player !== 'object' || Array.isArray(safe.player)) safe.player = createInitialState(playerName).player;
  if (!safe.heroines || typeof safe.heroines !== 'object' || Array.isArray(safe.heroines)) safe.heroines = createInitialState(playerName).heroines;
  if (!safe.flags || typeof safe.flags !== 'object' || Array.isArray(safe.flags)) safe.flags = createInitialState(playerName).flags;
  if (!safe.settings || typeof safe.settings !== 'object' || Array.isArray(safe.settings)) safe.settings = createInitialState(playerName).settings;
  if (!safe.stats || typeof safe.stats !== 'object' || Array.isArray(safe.stats)) safe.stats = createInitialState(playerName).stats;

  safe.player.name = typeof safe.player.name === 'string' && safe.player.name.trim() ? safe.player.name.trim() : 'ユウキ';
  safe.player.talkSkill = clampNumber(safe.player.talkSkill, 0, CONFIG.MAX_STAT, 10);
  safe.player.fashion = clampNumber(safe.player.fashion, 0, CONFIG.MAX_STAT, 10);
  safe.player.stamina = clampNumber(safe.player.stamina, 0, CONFIG.MAX_STAT, CONFIG.INITIAL_STAMINA);
  safe.player.luck = clampNumber(safe.player.luck, 0, CONFIG.MAX_STAT, CONFIG.INITIAL_LUCK);
  safe.player.stress = clampNumber(safe.player.stress, 0, CONFIG.MAX_STRESS, 0);
  safe.player.money = clampNumber(safe.player.money, 0, CONFIG.MAX_MONEY, CONFIG.INITIAL_MONEY);

  ['hina','mitsuki','shiori','hana'].forEach((id) => {
    const hs = safe.heroines[id] || {};
    hs.affection = clampNumber(hs.affection, 0, CONFIG.MAX_AFFECTION, 0);
    hs.met = !!hs.met;
    hs.encounterCount = Math.floor(clampNumber(hs.encounterCount, 0, 999, 0));
    hs.lastMetDay = Math.floor(clampNumber(hs.lastMetDay, 0, CONFIG.MAX_DAYS, 0));
    hs.eventFlags = Array.isArray(hs.eventFlags) ? hs.eventFlags : [];
    hs.giftsGiven = Array.isArray(hs.giftsGiven) ? hs.giftsGiven : [];
    hs.dateCount = Math.floor(clampNumber(hs.dateCount, 0, 999, 0));
    hs.lateCount = Math.floor(clampNumber(hs.lateCount, 0, 999, 0));
    hs.witnessCount = Math.floor(clampNumber(hs.witnessCount, 0, 999, 0));
    hs.topicCursor = Math.floor(clampNumber(hs.topicCursor, 0, 9999, 0));
    hs.spotCursor = Math.floor(clampNumber(hs.spotCursor, 0, 9999, 0));
    safe.heroines[id] = hs;
  });

  if (!Array.isArray(safe.unlockedLocations)) safe.unlockedLocations = [];
  safe.unlockedLocations = safe.unlockedLocations.filter(id => !!CONFIG.LOCATIONS[id]);
  if (safe.unlockedLocations.length === 0) {
    safe.unlockedLocations = ['beach','shopping','library','park','station'];
  }

  if (!Array.isArray(safe.purchaseHistory)) safe.purchaseHistory = [];
  if (!Array.isArray(safe.disasterLog)) safe.disasterLog = [];
  if (!Array.isArray(safe.dailyLog)) safe.dailyLog = [];
  safe.tanakaEncounters = Math.floor(clampNumber(safe.tanakaEncounters, 0, 9999, 0));

  safe.flags.tutorialShown = safe.flags && typeof safe.flags.tutorialShown === 'object' && safe.flags.tutorialShown !== null ? safe.flags.tutorialShown : {};
  safe.flags.prologueDone = !!safe.flags.prologueDone;
  safe.flags.rivalAppeared = !!safe.flags.rivalAppeared;
  safe.flags.confessionReady = !!safe.flags.confessionReady;
  safe.flags.miracleDayUsed = !!safe.flags.miracleDayUsed;
  safe.flags.minorInjuryDays = Math.floor(clampNumber(safe.flags.minorInjuryDays, 0, 10, 0));
  if (!safe.flags.misunderstanding || typeof safe.flags.misunderstanding !== 'object' || Array.isArray(safe.flags.misunderstanding)) {
    safe.flags.misunderstanding = createInitialState(playerName).flags.misunderstanding;
  }
  safe.flags.misunderstanding.active = !!safe.flags.misunderstanding.active;
  safe.flags.misunderstanding.heroineId = HEROINES[safe.flags.misunderstanding.heroineId] ? safe.flags.misunderstanding.heroineId : null;
  safe.flags.misunderstanding.startDay = Math.floor(clampNumber(safe.flags.misunderstanding.startDay, 0, CONFIG.MAX_DAYS, 0));
  safe.flags.misunderstanding.resolveUnlockDay = Math.floor(clampNumber(safe.flags.misunderstanding.resolveUnlockDay, 0, CONFIG.MAX_DAYS, 0));
  safe.flags.misunderstanding.resolvedDay = Math.floor(clampNumber(safe.flags.misunderstanding.resolvedDay, 0, CONFIG.MAX_DAYS, 0));
  safe.flags.misunderstanding.autoResolved = !!safe.flags.misunderstanding.autoResolved;

  if (!CONFIG.TEXT_SPEEDS[safe.settings.textSpeed]) safe.settings.textSpeed = 'normal';
  safe.settings.seVolume = Math.floor(clampNumber(safe.settings.seVolume, 0, 100, 80));
  safe.settings.effectsEnabled = !!safe.settings.effectsEnabled;

  safe.stats.totalChoices = Math.floor(clampNumber(safe.stats.totalChoices, 0, 99999, 0));
  safe.stats.disastersEncountered = Math.floor(clampNumber(safe.stats.disastersEncountered, 0, 99999, 0));
  safe.stats.disastersCleared = Math.floor(clampNumber(safe.stats.disastersCleared, 0, 99999, 0));
  safe.stats.endingsUnlocked = Array.isArray(safe.stats.endingsUnlocked) ? safe.stats.endingsUnlocked : [];

  return safe;
}

const StateManager = {
  _state: null,
  _listeners: {},

  createNew(playerName) {
    this._state = createInitialState(playerName);
  },

  get(path) {
    return path.split('.').reduce((obj, key) => obj && obj[key], this._state);
  },

  set(path, value) {
    const keys = path.split('.');
    const last = keys.pop();
    const parent = keys.reduce((obj, key) => obj[key], this._state);
    if (parent) {
      parent[last] = value;
      this._notify(path, value);
    }
  },

  clamp(path, min, max) {
    const val = this.get(path);
    if (typeof val === 'number') {
      this.set(path, Math.max(min, Math.min(max, val)));
    }
  },

  modify(path, delta) {
    const val = this.get(path);
    if (typeof val === 'number') this.set(path, val + delta);
  },

  _notify(path, value) {
    Object.keys(this._listeners).forEach(p => {
      if (path.startsWith(p) || p.startsWith(path)) {
        this._listeners[p].forEach(cb => { try { cb(value, path); } catch(e){} });
      }
    });
  },

  on(path, cb) {
    if (!this._listeners[path]) this._listeners[path] = [];
    this._listeners[path].push(cb);
  },

  normalizeLoadedState(s) { return sanitizeLoadedState(s); },
  getState() { return JSON.parse(JSON.stringify(this._state)); },
  loadState(s) { this._state = s; },
  getHeroine(id) { return this._state.heroines[id]; },
  getPlayer() { return this._state.player; }
};

// ============================================================
// SAVE MANAGER
// ============================================================
const SaveManager = {
  calcChecksum(data) {
    const str = JSON.stringify(data);
    let hash = 0;
    for (let i = 0; i < str.length; i++) {
      hash = ((hash << 5) - hash) + str.charCodeAt(i);
      hash |= 0;
    }
    return hash.toString(16);
  },

  save(slot) {
    try {
      const state = StateManager.getState();
      const data = {
        version: CONFIG.VERSION,
        savedAt: new Date().toISOString(),
        dayLabel: `Day${state.currentDay} ${this._phaseLabel(state.currentPhase)}`,
        checksum: this.calcChecksum(state),
        gameState: state
      };
      localStorage.setItem(CONFIG.SAVE_KEY_PREFIX + slot, JSON.stringify(data));
      return true;
    } catch(e) {
      console.error('Save failed:', e);
      return false;
    }
  },

  load(slot) {
    try {
      const raw = localStorage.getItem(CONFIG.SAVE_KEY_PREFIX + slot);
      if (!raw) return null;
      const data = JSON.parse(raw);
      const normalized = StateManager.normalizeLoadedState(data && data.gameState);
      if (!normalized) {
        localStorage.removeItem(CONFIG.SAVE_KEY_PREFIX + slot);
        return null;
      }
      return normalized;
    } catch(e) {
      console.error('Load failed:', e);
      try { localStorage.removeItem(CONFIG.SAVE_KEY_PREFIX + slot); } catch(err) {}
      return null;
    }
  },

  getSlotInfo(slot) {
    try {
      const raw = localStorage.getItem(CONFIG.SAVE_KEY_PREFIX + slot);
      if (!raw) return null;
      const data = JSON.parse(raw);
      return { dayLabel: data.dayLabel, savedAt: data.savedAt };
    } catch(e) { return null; }
  },

  autoSave() { this.save(0); },

  deleteSave(slot) {
    try { localStorage.removeItem(CONFIG.SAVE_KEY_PREFIX + slot); } catch(e) {}
  },

  saveGallery(endings) {
    try { localStorage.setItem(CONFIG.GALLERY_KEY, JSON.stringify(endings)); } catch(e) {}
  },

  loadGallery() {
    try {
      const raw = localStorage.getItem(CONFIG.GALLERY_KEY);
      return raw ? JSON.parse(raw) : [];
    } catch(e) { return []; }
  },

  _phaseLabel(phase) {
    const map = { DAY_START:'朝', ACTION_AM:'行動', ENCOUNTER:'会話', DISASTER:'災難', NIGHT:'夜', SUMMARY:'まとめ' };
    return map[phase] || '';
  }
};

  _getSpeakerHeroineId() {
    const name = this._speakerName || '';
    const entry = Object.entries(HEROINES).find(([, h]) => h.name === name);
    return entry ? entry[0] : null;
  },

  _nextHeroineExpression(heroineId) {
    const order = HEROINE_EXPRESSION_ORDER;
    const cursor = Number(this._heroineExprCursor[heroineId]) || 0;
    const exp = order[cursor % order.length] || 'normal';
    this._heroineExprCursor[heroineId] = (cursor + 1) % order.length;
    return exp;
  },

  _pickDifferentExpression(heroineId, candidates) {
    const pool = Array.isArray(candidates) && candidates.length ? candidates : ['normal'];
    const last = this._lastHeroineExpression[heroineId] || '';
    const cursor = Number(this._heroineExprCursor[heroineId]) || 0;
    this._heroineExprCursor[heroineId] = (cursor + 1) % 9999;
    let exp = pool[cursor % pool.length] || pool[0];
    if (exp === last && pool.length > 1) exp = pool[(cursor + 1) % pool.length];
    return exp;
  },

  getChoiceReactionExpression(heroineId, success) {
    if (!HEROINES[heroineId]) return null;
    const pool = success ? ['smile','shy'] : ['troubled','serious','jealous'];
    return this._pickDifferentExpression(heroineId, pool);
  },

  _resolveHeroineExpression(heroineId, text, forcedExpression) {
    if (forcedExpression && HEROINE_EXPRESSION_ORDER.includes(forcedExpression)) return forcedExpression;
    const t = String(text || '');
    if (!t) return 'normal';
    if (/(好き|恋|告白|デート|特別|一緒にいたい|ずっと一緒|隣にいて|手をつない)/.test(t)) return 'date';
    if (/(べ、別|恥ず|照れ|ドキ|顔が熱|近すぎ)/.test(t)) return 'shy';
    if (/(嫉妬|他の子|他の人|私以外|モヤモヤ|ずるい)/.test(t)) return 'jealous';
    if (/(遅刻|時間|規律|計画|確認|要件|手順|まずは)/.test(t)) return 'serious';
    if (/(びっくり|驚|まさか|想定外|意外|信じられ)/.test(t)) return 'surprise';
    if (/(ごめん|困|悩|不安|つら|難しい|迷って|失敗|しんどい)/.test(t)) return 'troubled';
    if (/(ありがとう|嬉しい|うれしい|楽しい|やった|助かった|よかった)/.test(t)) return 'smile';
    const cursor = Number(this._heroineExprCursor[heroineId]) || 0;
    this._heroineExprCursor[heroineId] = (cursor + 1) % 9999;
    if (cursor % 5 !== 4) return 'normal';
    const rarePool = ['smile','shy','serious','troubled'];
    return this._pickDifferentExpression(heroineId, rarePool);
  },

  showHeroine(characterId, expressionHint, contextText) {
    const layer = document.getElementById('heroine-layer');
    const img = document.getElementById('heroine-img');
    if (!layer || !img) return;
    if (!characterId) { layer.classList.add('hidden'); return; }
    const c = HEROINES[characterId] || NPCS[characterId];
    if (c) {
      const fallbackHeroine = 'data:image/svg+xml;charset=UTF-8,' + encodeURIComponent('<svg xmlns="http://www.w3.org/2000/svg" width="400" height="600"><rect width="100%" height="100%" fill="#1a1a2e"/><text x="50%" y="50%" fill="#ffffff" font-size="20" text-anchor="middle" dominant-baseline="middle">IMAGE ERROR</text></svg>');
      const isHeroine = !!HEROINES[characterId];
      let src = c.img || '';
      if (isHeroine) {
        const exp = this._resolveHeroineExpression(characterId, contextText, expressionHint);
        this._lastHeroineExpression[characterId] = exp;
        src = `asset/heroine_${characterId}_${exp}.png`;
      }
      const hasTransparentHint =
        !!c.transparentAsset ||
        /\.((png|webp|avif|svg))(\?.*)?$/i.test(src) ||
        /^data:image\/(png|webp|svg\+xml|avif);/i.test(src);
      img.classList.toggle('photo-mode', !hasTransparentHint);
      img.onerror = () => {
        if (isHeroine && src !== c.img && c.img) {
          img.onerror = () => {
            img.onerror = null;
            img.src = fallbackHeroine;
          };
          img.src = c.img;
          return;
        }
        img.onerror = null;
        img.src = fallbackHeroine;
      };
      img.src = src || fallbackHeroine;
      img.alt = c.name;
      layer.classList.remove('hidden');
    }
  },

  updateAffectionGauge(heroineId) {

  showSpeaker(name) {

  startChoiceFocus() {
    if (this._choiceFocus) return;
    if (!StateManager.get('settings.effectsEnabled')) return;
    const gc = document.getElementById('game-container');
    if (!gc) return;
    this._choiceFocus = true;
    gc.classList.add('choice-focus');
    const applyParallax = (clientX, clientY) => {
      const rect = gc.getBoundingClientRect();
      if (!rect.width || !rect.height) return;
      const nx = ((clientX - rect.left) / rect.width - 0.5) * 2;
      const ny = ((clientY - rect.top) / rect.height - 0.5) * 2;
      gc.style.setProperty('--fx-bg-x', `${(-nx * 10).toFixed(2)}px`);
      gc.style.setProperty('--fx-bg-y', `${(-ny * 8).toFixed(2)}px`);
      gc.style.setProperty('--fx-char-x', `${(nx * 6).toFixed(2)}px`);
      gc.style.setProperty('--fx-char-y', `${(ny * 3).toFixed(2)}px`);
    };
    this._parallaxHandler = (e) => applyParallax(e.clientX, e.clientY);
    this._touchParallaxHandler = (e) => {
      if (!e.touches || !e.touches.length) return;
      const t = e.touches[0];
      applyParallax(t.clientX, t.clientY);
    };
    gc.addEventListener('mousemove', this._parallaxHandler);
    gc.addEventListener('touchmove', this._touchParallaxHandler, { passive: true });
  },

  endChoiceFocus() {
    if (!this._choiceFocus) return;
    const gc = document.getElementById('game-container');
    if (!gc) return;
    this._choiceFocus = false;
    gc.classList.remove('choice-focus');
    gc.style.removeProperty('--fx-bg-x');
    gc.style.removeProperty('--fx-bg-y');
    gc.style.removeProperty('--fx-char-x');
    gc.style.removeProperty('--fx-char-y');
    if (this._parallaxHandler) gc.removeEventListener('mousemove', this._parallaxHandler);
    if (this._touchParallaxHandler) gc.removeEventListener('touchmove', this._touchParallaxHandler);
    this._parallaxHandler = null;
    this._touchParallaxHandler = null;
  },

  _buildRadarChartSVG(items) {
    const size = 220;
    const cx = 110;
    const cy = 110;
    const radius = 76;
    const levels = 4;
    const total = items.length;

    const at = (index, ratio = 1) => {
      const angle = -Math.PI / 2 + (Math.PI * 2 * index / total);
      return { x: cx + Math.cos(angle) * radius * ratio, y: cy + Math.sin(angle) * radius * ratio };
    };

    let grid = '';
    for (let lv = 1; lv <= levels; lv++) {
      const ratio = lv / levels;
      const points = items.map((_, idx) => {
        const p = at(idx, ratio);
        return `${p.x.toFixed(2)},${p.y.toFixed(2)}`;
      }).join(' ');
      grid += `<polygon class="grid" points="${points}"></polygon>`;
    }

    const axes = items.map((_, idx) => {
      const p = at(idx, 1);
      return `<line class="axis" x1="${cx}" y1="${cy}" x2="${p.x.toFixed(2)}" y2="${p.y.toFixed(2)}"></line>`;
    }).join('');

    const shapePoints = items.map((it, idx) => {
      const ratio = Math.max(0, Math.min(100, Number(it.value) || 0)) / 100;
      const p = at(idx, ratio);
      return `${p.x.toFixed(2)},${p.y.toFixed(2)}`;
    }).join(' ');

    const dots = items.map((it, idx) => {
      const ratio = Math.max(0, Math.min(100, Number(it.value) || 0)) / 100;
      const p = at(idx, ratio);
      return `<circle class="dot" cx="${p.x.toFixed(2)}" cy="${p.y.toFixed(2)}" r="3.1"></circle>`;
    }).join('');

    const labels = items.map((it, idx) => {

const TextEngine = {
  _queue: [],
  _currentText: '',
  _charIndex: 0,
  _timer: null,
  _isDisplaying: false,
  _onComplete: null,
  _blipCounter: 0,
  _displayToken: 0,
  _advanceLock: false,
  _autoAdvance: false,

  display(text, onComplete, options) {
    this.stop();
    this._displayToken++;
    const textStr = String(text ?? '');
    const speakerHeroineId = UIManager._getSpeakerHeroineId ? UIManager._getSpeakerHeroineId() : null;
    const expressionHint = options && typeof options.expressionHint === 'string' ? options.expressionHint : null;
    if (speakerHeroineId) UIManager.showHeroine(speakerHeroineId, expressionHint, textStr);
    this._currentText = textStr;
    this._charIndex = 0;
    this._isDisplaying = true;
    this._onComplete = onComplete;
    this._autoAdvance = !!(options && options.autoAdvance);
    this._blipCounter = 0;
    const el = document.getElementById('text-content');
    if (el) el.innerHTML = '';
    const speed = CONFIG.TEXT_SPEEDS[StateManager.get('settings.textSpeed') || 'normal'];
    if (speed === 0) {
      if (el) el.innerHTML = textStr + '<span class="cursor-indicator">▶</span>';
      this._isDisplaying = false;
      if (this._autoAdvance && this._onComplete) {
        const cb = this._onComplete;
        this._onComplete = null;
        setTimeout(cb, 0);
      }
      return;
    }
    this._tick(this._displayToken);
  },

  _tick(token) {
    if (token !== this._displayToken) return;
    if (this._charIndex >= this._currentText.length) {
      this._isDisplaying = false;
      const el = document.getElementById('text-content');
      if (el) el.innerHTML = this._currentText + '<span class="cursor-indicator">▶</span>';
      if (this._autoAdvance && this._onComplete) {
        const cb = this._onComplete;
        this._onComplete = null;
        setTimeout(cb, 80);
      }
      return;
    }
    const el = document.getElementById('text-content');
    this._charIndex++;
    if (el) el.innerHTML = this._currentText.substring(0, this._charIndex);
    this._blipCounter++;
    if (this._blipCounter % 3 === 0) AudioManager.play('text_blip');
    const speed = CONFIG.TEXT_SPEEDS[StateManager.get('settings.textSpeed') || 'normal'];
    this._timer = setTimeout(() => this._tick(token), speed);
  },

  advance() {
    if (this._advanceLock) return;
    this._advanceLock = true;
    setTimeout(() => { this._advanceLock = false; }, 30);
    if (this._isDisplaying) {
      // Skip to end
      clearTimeout(this._timer);
      this._charIndex = this._currentText.length;
      const el = document.getElementById('text-content');
      if (el) el.innerHTML = this._currentText + '<span class="cursor-indicator">▶</span>';
      this._isDisplaying = false;
      if (this._autoAdvance && this._onComplete) {
        const cb = this._onComplete;
        this._onComplete = null;
        setTimeout(cb, 0);
      }
    } else if (this._onComplete) {
      const cb = this._onComplete;
      this._onComplete = null;
      cb();
    }
  },

  stop() {
    clearTimeout(this._timer);
    this._displayToken++;
    this._isDisplaying = false;
    this._onComplete = null;
    this._autoAdvance = false;
    UIManager.endChoiceFocus();
  },

  showChoices(options, callback, meta) {
    const area = document.getElementById('choices-area');
    if (!area) return;
    const important = !!(meta && meta.important);
    area.innerHTML = '';
    area.dataset.locked = '0';
    area.classList.remove('hidden');
    if (important) UIManager.startChoiceFocus();
    options.forEach((opt, i) => {
      const btn = document.createElement('button');
      btn.className = important ? 'choice-btn important-choice' : 'choice-btn';
      btn.type = 'button';
      btn.innerHTML = `<span class="choice-num">${i+1}</span><span>${opt.text}</span>`;
      btn.onclick = () => {
        if (area.dataset.locked === '1') return;
        area.dataset.locked = '1';
        const btns = area.querySelectorAll('.choice-btn');
        btns.forEach((b) => { b.disabled = true; });
        AudioManager.play('click');
        area.classList.add('hidden');
        UIManager.endChoiceFocus();
        callback(i, opt);
      };
      // Staggered animation
      btn.style.opacity = '0';
      btn.style.transform = 'translateX(-20px)';
      btn.style.transition = 'all 0.3s ease-out';
      area.appendChild(btn);
      setTimeout(() => { btn.style.opacity = '1'; btn.style.transform = 'translateX(0)'; }, 100 + i * 100);
    });
  },

  hideChoices() {
    const area = document.getElementById('choices-area');
    if (area) {
      area.dataset.locked = '1';
      area.classList.add('hidden');
    }
    UIManager.endChoiceFocus();
  }
};

// DISASTER ENGINE
// ============================================================
const DisasterEngine = {
  shouldDisasterOccur() {
    const s = StateManager._state;
    const day = s.currentDay;
    let baseRate = 0.3;
    if (day >= 15) baseRate = 0.45;
    if (day >= 23) baseRate = 0.55;
    // Week 1 lower rate
    if (day <= 7) baseRate = 0.2;
    const luck = s.player.luck;
    const rate = baseRate * (150 - luck) / 100;
    return Math.random() < rate;
  },

  getDisaster() {
    const day = StateManager.get('currentDay');
    const eligible = DISASTERS.filter(d => day >= d.dayRange[0] && day <= d.dayRange[1]);
    if (eligible.length === 0) return DISASTERS[Math.floor(Math.random() * DISASTERS.length)];
    return eligible[Math.floor(Math.random() * eligible.length)];
  },

  processDisasterChoice(disaster, optionIndex, heroineId) {
    const opt = disaster.options[optionIndex];
    const s = StateManager._state;

    // Apply stress
    StateManager.modify('player.stress', opt.stress);
    StateManager.clamp('player.stress', 0, CONFIG.MAX_STRESS);

    // Apply affection if heroine present
    if (heroineId && opt.affection) {
      const h = HEROINES[heroineId];
      let bonus = opt.affection;
      // Preference bonus
      if (h.disasterPref === opt.type) bonus = Math.floor(bonus * 1.5);
      StateManager.modify(`heroines.${heroineId}.affection`, bonus);
      StateManager.clamp(`heroines.${heroineId}.affection`, 0, CONFIG.MAX_AFFECTION);
      if (bonus > 0) {
        UIManager.showHeartEffect(true);
        AudioManager.play('affection_up');
      } else if (bonus < 0) {
        UIManager.showHeartEffect(false);
        AudioManager.play('affection_down');
      }
    }

    // Stats tracking
    StateManager.modify('stats.disastersEncountered', 1);
    if (opt.affection > 5) StateManager.modify('stats.disastersCleared', 1);

    // Money bonus for good handling
    if (opt.affection >= 8) {
      const bonus = 200 + Math.floor(Math.random() * 300);
      StateManager.modify('player.money', bonus);
      StateManager.clamp('player.money', 0, CONFIG.MAX_MONEY);
    }

    return opt;
  }
};
