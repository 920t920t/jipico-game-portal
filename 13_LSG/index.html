// GAME LOOP
// ============================================================
const GameLoop = {
  _dayChanges: [],
  _currentEncounterHeroine: null,
  _isAfternoonAction: false,
  _summaryQueued: false,
  _dayEndLocked: false,
  _activeInterference: null,
  _pendingScenes: [],
  _sceneIndex: 0,

  getAffectionRank(aff) {
    if (aff >= 80) return 'loveInterest';
    if (aff >= 60) return 'closeFriend';
    if (aff >= 40) return 'friend';
    if (aff >= 20) return 'acquaintance';
    return 'stranger';
  },

  _getMisunderstandingState() {
    const s = StateManager._state;
    if (!s.flags) s.flags = {};
    if (!s.flags.misunderstanding || typeof s.flags.misunderstanding !== 'object' || Array.isArray(s.flags.misunderstanding)) {
      s.flags.misunderstanding = {
        active: false,
        heroineId: null,
        startDay: 0,
        resolveUnlockDay: 0,
        resolvedDay: 0,
        autoResolved: false
      };
    }
    const m = s.flags.misunderstanding;
    if (!HEROINES[m.heroineId]) m.heroineId = null;
    m.active = !!m.active;
    m.startDay = Math.max(0, Number(m.startDay) || 0);
    m.resolveUnlockDay = Math.max(0, Number(m.resolveUnlockDay) || 0);
    m.resolvedDay = Math.max(0, Number(m.resolvedDay) || 0);
    m.autoResolved = !!m.autoResolved;
    return m;
  },

  _queueOpeningScenes(scenes) {
    if (!Array.isArray(scenes) || !scenes.length) return;
    this._pendingScenes.push(...scenes);
  },

  _playQueuedOpeningScenes(onComplete) {
    if (!Array.isArray(this._pendingScenes) || this._pendingScenes.length === 0) {
      if (typeof onComplete === 'function') onComplete();
      return;
    }
    const scenes = this._pendingScenes.slice();
    this._pendingScenes = [];
    this._playSceneSequence(scenes, null, () => {
      if (typeof onComplete === 'function') onComplete();
    });
  },

  _selectDramaHeroine() {
    const s = StateManager._state;
    const met = Object.entries(s.heroines)
      .filter(([, h]) => !!h.met)
      .sort((a, b) => (b[1].affection || 0) - (a[1].affection || 0));
    if (!met.length) return null;
    if ((met[0][1].affection || 0) < 22) return null;
    return met[0][0];
  },

  _startMisunderstandingArc(day) {
    const s = StateManager._state;
    const m = this._getMisunderstandingState();
    if (m.active || m.resolvedDay > 0) return false;
    if (day < 12 || day > 16) return false;
    if (day < 14) return false;

    const heroineId = this._selectDramaHeroine();
    if (!heroineId) return false;
    const data = MISUNDERSTANDING_ARC_DATA[heroineId];
    if (!data) return false;

    m.active = true;
    m.heroineId = heroineId;
    m.startDay = day;
    m.resolveUnlockDay = 20 + Math.floor(Math.random() * 4); // 20-23
    m.resolvedDay = 0;
    m.autoResolved = false;
    s.flags.rivalAppeared = true;

    const initialPenalty = -8;
    StateManager.modify(`heroines.${heroineId}.affection`, initialPenalty);
    StateManager.clamp(`heroines.${heroineId}.affection`, 0, CONFIG.MAX_AFFECTION);
    this._dayChanges.push({ label: `${HEROINES[heroineId].name} 誤解`, delta: initialPenalty });

    const rumorText = String(data.rumorByRival || '').replace('{player}', s.player.name || 'あなた');
    this._queueOpeningScenes([
      { type:'dialogue', speaker:'students2', text: rumorText, background: 'station' },
      { type:'dialogue', speaker:heroineId, expression:'serious', text: data.startReaction || '……今は少し距離を置きたい。' },
      { type:'thought', text:'（誤解が広がった。まずい。ここで崩れたら全部終わるかもしれない。）' }
    ]);
    return true;
  },

  _autoResolveMisunderstanding(day) {
    const s = StateManager._state;
    const m = this._getMisunderstandingState();
    if (!m.active || !m.heroineId) return false;
    if (day < (m.resolveUnlockDay + 3)) return false;
    const heroineId = m.heroineId;
    const data = MISUNDERSTANDING_ARC_DATA[heroineId] || {};

    m.active = false;
    m.resolvedDay = day;
    m.autoResolved = true;

    const recover = 4;
    StateManager.modify(`heroines.${heroineId}.affection`, recover);
    StateManager.clamp(`heroines.${heroineId}.affection`, 0, CONFIG.MAX_AFFECTION);
    this._dayChanges.push({ label: `${HEROINES[heroineId].name} 誤解の自然解消`, delta: recover });

    this._queueOpeningScenes([
      { type:'dialogue', speaker:'tanaka', text:'「噂の出どころ、先生が締めてくれた。だが本音は本人同士で回収しろよ」', background:'station' },
      { type:'dialogue', speaker:heroineId, expression:'troubled', text: (data.successReply || '……ちゃんと話せてなかったね。') }
    ]);
    return true;
  },

  _updateMisunderstandingTimeline(day) {
    const m = this._getMisunderstandingState();
    this._startMisunderstandingArc(day);
    if (m.active && m.heroineId && day === m.resolveUnlockDay) {
      this._queueOpeningScenes([
        { type:'dialogue', speaker:'tanaka', text:`「${HEROINES[m.heroineId].name}、今なら話を聞く余白がある。言い訳じゃなく本音で行け」`, background:'station' },
        { type:'thought', text:'（今日が誤解を解く勝負日だ。）' }
      ]);
    }
    this._autoResolveMisunderstanding(day);
  },

  _runMisunderstandingResolution(heroineId, onDone) {
    const s = StateManager._state;
    const m = this._getMisunderstandingState();
    const data = MISUNDERSTANDING_ARC_DATA[heroineId];
    if (!m.active || m.heroineId !== heroineId || !data) {
      if (typeof onDone === 'function') onDone();
      return;
    }

    UIManager.showHeroine(heroineId, 'serious', data.resolvePrompt || '');
    UIManager.showSpeaker(HEROINES[heroineId].name);
    TextEngine.display(data.resolvePrompt || '誤解について、今こそ話したい。', () => {
      const choices = [
        { text:'「まず、誤解させたことを謝る」', fit:12 },
        { text:'「状況を順番に説明する」', fit:10 },
        { text:'「今は話題を変えてやり過ごす」', fit:4 }
      ];
      TextEngine.showChoices(choices, (idx, opt) => {
        const fit = Number(opt.fit) || 6;
        const hState = s.heroines[heroineId];
        const baseRate =
          38 +
          s.player.talkSkill * 0.28 +
          hState.affection * 0.2 -
          s.player.stress * 0.12 +
          fit * 3.3;
        const successRate = Math.max(10, Math.min(95, baseRate));
        const success = Math.random() * 100 < successRate;

        if (success) {
          const gain = 8 + Math.floor(Math.random() * 5);
          m.active = false;
          m.resolvedDay = s.currentDay;
          m.autoResolved = false;
          StateManager.modify(`heroines.${heroineId}.affection`, gain);
          StateManager.clamp(`heroines.${heroineId}.affection`, 0, CONFIG.MAX_AFFECTION);
          this._dayChanges.push({ label: `${HEROINES[heroineId].name} 誤解の解消`, delta: gain });
          UIManager.updateAffectionGauge(heroineId);
          UIManager.showNotification('🧩 誤解が解けた。関係が一歩進んだ', 'positive');
          UIManager.showSpeaker(HEROINES[heroineId].name);
          TextEngine.display(data.successReply || '……ありがとう。ちゃんと話せてよかった。', () => {
            if (typeof onDone === 'function') onDone();
          }, { expressionHint: 'shy' });
          return;
        }

        const loss = -(3 + Math.floor(Math.random() * 3));
        StateManager.modify(`heroines.${heroineId}.affection`, loss);
        StateManager.clamp(`heroines.${heroineId}.affection`, 0, CONFIG.MAX_AFFECTION);
        this._dayChanges.push({ label: `${HEROINES[heroineId].name} 誤解のこじれ`, delta: loss });
        UIManager.updateAffectionGauge(heroineId);
        UIManager.showNotification('⚠️ まだ誤解が残っている', 'negative');
        UIManager.showSpeaker(HEROINES[heroineId].name);
        TextEngine.display(data.failReply || '……まだ整理できない。少し時間がほしい。', () => {
          if (typeof onDone === 'function') onDone();
        }, { expressionHint: 'troubled' });
      }, { important: true });
    }, { expressionHint: 'serious' });
  },

  // ---- Start day ----
  startDay() {
    const s = StateManager._state;
    const day = s.currentDay;

    // Check for game over conditions
    if (s.player.stress >= CONFIG.MAX_STRESS) {
      this.triggerEnding('overwork');
      return;
    }

    // All heroines at 0 check after day 10
    if (day > 10) {
      const allZero = Object.values(s.heroines).every(h => h.affection <= 0);
      if (allZero) { this.triggerEnding('bocchi'); return; }
    }

    // Day 31 = ending
    if (day > CONFIG.MAX_DAYS) {
      this.determineEnding();
      return;
    }

    // Reset daily state
    s.actionsTakenToday = 0;
    s.currentPhase = 'DAY_START';
    this._dayChanges = [];
    this._isAfternoonAction = false;
    this._summaryQueued = false;
    this._dayEndLocked = false;
    this._activeInterference = null;
    this._pendingScenes = [];

    // Weather
    s.weather = CONFIG.WEATHERS[Math.floor(Math.random() * CONFIG.WEATHERS.length)].id;
    const weatherData = CONFIG.WEATHERS.find(w => w.id === s.weather);
    if (weatherData) {
      StateManager.modify('player.luck', weatherData.luckMod);
      StateManager.clamp('player.luck', 0, CONFIG.MAX_STAT);
    }

    // Random luck fluctuation
    StateManager.modify('player.luck', Math.floor(Math.random() * 21) - 10);
    StateManager.clamp('player.luck', 0, CONFIG.MAX_STAT);

    // Absence penalty
    Object.entries(s.heroines).forEach(([id, h]) => {
      if (h.met && (day - h.lastMetDay) >= 3) {
        const penalty = -5;
        StateManager.modify(`heroines.${id}.affection`, penalty);
        StateManager.clamp(`heroines.${id}.affection`, 0, CONFIG.MAX_AFFECTION);
        this._dayChanges.push({ label:`${HEROINES[id].name} 疎遠ペナルティ`, delta: penalty });
      }
    });

    // Unlock locations
    Object.entries(CONFIG.LOCATIONS).forEach(([locId, loc]) => {
      if (day >= (loc.unlockDay || 1) && !s.unlockedLocations.includes(locId)) {
        s.unlockedLocations.push(locId);
      }
    });

    // Progress gate rescues
    this.checkProgressGate(day);

    // Stress rescue
    if (s.player.stress >= 80) {
      StateManager.modify('player.stress', -30);
      StateManager.clamp('player.stress', 0, CONFIG.MAX_STRESS);
      this._dayChanges.push({ label:'強制休息（ストレス軽減）', delta: -30 });
    }

    // Injury aftermath from previous night risk
    if ((s.flags.minorInjuryDays || 0) > 0) {
      s.flags.minorInjuryDays = Math.max(0, (s.flags.minorInjuryDays || 0) - 1);
      StateManager.modify('player.stamina', -6);
      StateManager.modify('player.stress', 3);
      StateManager.clamp('player.stamina', 0, CONFIG.MAX_STAT);
      StateManager.clamp('player.stress', 0, CONFIG.MAX_STRESS);
      this._dayChanges.push({ label:'前夜の軽いケガ（体力）', delta: -6 });
      this._dayChanges.push({ label:'前夜の軽いケガ（ストレス）', delta: 3 });
      UIManager.showNotification('🩹 前夜のケガでコンディション低下', 'negative');
    }

    // Miracle day
    if (day >= 28 && !s.flags.miracleDayUsed) {
      const maxAff = Math.max(...Object.values(s.heroines).map(h => h.affection));
      if (maxAff < CONFIG.CONFESSION_THRESHOLD) {
        s.flags.miracleDayUsed = true;
        UIManager.showNotification('✨ 奇跡の一日！好感度UP量2倍！', 'positive');
      }
    }

    // Mid-game misunderstanding arc timeline
    this._updateMisunderstandingTimeline(day);

    // Auto save
    SaveManager.autoSave();

    // Update UI
    s.timeOfDay = 'morning';
    UIManager.updateHeader();
    UIManager.setBackground('beach'); // default morning bg
    UIManager.hideHeroine();
    UIManager.updateStressGauge();

    // Show day start
    AudioManager.play('day_start');
    UIManager.showSpeaker('');
    const dayText = `── Day ${day} ──\n${CONFIG.WEATHERS.find(w=>w.id===s.weather)?.icon || '☀️'} ${this._getWeatherText(s.weather)}`;
    TextEngine.display(dayText, () => {
      // Check tutorials
      this.checkTutorial(day, 'DAY_START');
      this._playQueuedOpeningScenes(() => {
        // Move to morning action
        setTimeout(() => this.startActionPhase(), 300);
      });
    });

    // Click handler for text advance
    const tc = document.getElementById('text-content');
    if (tc) tc.onclick = () => TextEngine.advance();
  },

  _getWeatherText(w) {
    const map = { sunny:'移動日和だ！', cloudy:'曇りか……班長が遅れそう。', rainy:'雨だ。しおりがふやける前に移動しよう。', hot:'暑すぎる……修学旅行で溶ける……' };
    return map[w] || '普通の一日だ。';
  },

  checkProgressGate(day) {
    const s = StateManager._state;
    const maxAff = Math.max(...Object.values(s.heroines).map(h => h.affection));
    if (day === 8 && maxAff < 20) {
      // Force rescue: boost highest heroine by 15
      const best = Object.entries(s.heroines).sort((a,b) => b[1].affection - a[1].affection)[0];
      StateManager.modify(`heroines.${best[0]}.affection`, 15);
      this._dayChanges.push({ label:`${HEROINES[best[0]].name} 救済イベント`, delta: 15 });
    }
    if (day === 15 && maxAff < 40) {
      const best = Object.entries(s.heroines).sort((a,b) => b[1].affection - a[1].affection)[0];
      StateManager.modify(`heroines.${best[0]}.affection`, 15);
      this._dayChanges.push({ label:`${HEROINES[best[0]].name} 接触イベント`, delta: 15 });
    }
    if (day === 23 && maxAff < 60) {
      const best = Object.entries(s.heroines).sort((a,b) => b[1].affection - a[1].affection)[0];
      StateManager.modify(`heroines.${best[0]}.affection`, 20);
      UIManager.showNotification('✨ 奇跡の一日発動！', 'positive');
      this._dayChanges.push({ label:`${HEROINES[best[0]].name} 奇跡の一日`, delta: 20 });
    }
  },

  checkTutorial(day, phase) {
    Object.entries(TUTORIALS).forEach(([key, tut]) => {
      if (tut.day === day && tut.phase === phase && !StateManager.get(`flags.tutorialShown.${key}`)) {
        UIManager.showTutorial(tut.text);
        StateManager.set(`flags.tutorialShown.${key}`, true);
      }
    });
  },

  // ---- Action phase ----
  startActionPhase() {
    const s = StateManager._state;
    s.currentPhase = 'ACTION_AM';
    s.timeOfDay = 'morning';
    this._isAfternoonAction = false;
    UIManager.updateHeader();
    UIManager.hideHeroine();
    UIManager.updateAffectionGauge(null);
    UIManager.setBackground('park');

    this.checkTutorial(s.currentDay, 'ACTION_AM');
    if (s.currentDay === 8) this.checkTutorial(8, 'ACTION_AM');

    const forcedHeroineId = this._getForcedIntroHeroine();
    if (forcedHeroineId && !s.heroines[forcedHeroineId].met) {
      const forcedTexts = {
        hina: '先生から「初日は班のムードメーカーと行動しろ」と指示が出た。',
        mitsuki: '学年主任に呼び止められ、「副会長と行程確認してこい」と言われた。',
        shiori: '班のしおりに誤植が見つかり、詩織と修正版チェックを任される。',
        hana: '宿泊先の掲示板づくりで、花と一緒に準備することになった。'
      };
      const locId = HEROINES[forcedHeroineId]?.defaultLocation || 'park';
      s.currentLocationId = locId;
      UIManager.setBackground(locId);
      UIManager.showHeroine('teacher');
      UIManager.showSpeaker('旅程担当の先生');
      TextEngine.display(forcedTexts[forcedHeroineId] || '今日は先生の指定行動になった。', () => {
        this._doEncounter(locId, forcedHeroineId);
      });
      return;
    }

    UIManager.showLocationSelect();
  },

  _getForcedIntroHeroine() {
    const order = ['hina','mitsuki','shiori','hana'];
    const idx = StateManager.get('currentDay') - 1;
    if (idx < 0 || idx >= order.length) return null;
    return order[idx];
  },

  _pickUnmetHeroine() {
    const s = StateManager._state;
    const order = ['hina','mitsuki','shiori','hana'];
    return order.find(id => !s.heroines[id].met) || null;
  },

  selectLocation(locId) {
    // Backward compatibility for old save states.
    if (locId === 'station') {
      this.selectTalkTarget('tanaka');
      return;
    }
    this.selectTalkTarget('new_friend');
  },

  selectTalkTarget(targetId) {
    UIManager.hideLocationSelect();
    const s = StateManager._state;
    if (!s) return;

    if (targetId === 'tanaka') {
      s.currentLocationId = 'station';
      UIManager.setBackground('station');
      s.tanakaEncounters = (s.tanakaEncounters || 0) + 1;
      this._showTanakaEncounter();
      return;
    }

    let heroineId = targetId;
    if (targetId === 'new_friend') heroineId = this._pickUnmetHeroine();
    if (!heroineId || !HEROINES[heroineId]) {
      UIManager.showNotification('話しかける相手が見つからない。', 'negative');
      this._continueAfterEncounter();
      return;
    }

    const spots = Array.isArray(HEROINES[heroineId].talkSpots) && HEROINES[heroineId].talkSpots.length
      ? HEROINES[heroineId].talkSpots
      : [HEROINES[heroineId].defaultLocation || 'park'];
    const spotCursor = s.heroines[heroineId].spotCursor || 0;
    const locId = spots[spotCursor % spots.length] || HEROINES[heroineId].defaultLocation || 'park';
    s.heroines[heroineId].spotCursor = spotCursor + 1;
    s.currentLocationId = locId;
    UIManager.setBackground(locId);
    this._doEncounter(locId, heroineId);
  },

  _showTanakaEncounter() {
    UIManager.showHeroine('tanaka');
    UIManager.showSpeaker('田中 大地');
    TextEngine.display('「相談モードだ。まず相手を決めてくれ。そこから絞る」', () => {
      UIManager.showSpeaker('田中 大地');
      this._showTanakaHeroineSelect();
    });
  },

  _showTanakaHeroineSelect() {
    const s = StateManager._state;
    const heroineChoices = ['hina', 'mitsuki', 'shiori', 'hana'].map((id) => {
      const hState = s.heroines[id];
      const metLabel = hState.met ? `遭遇${hState.encounterCount}回` : '未接触';
      return {
        text: `${HEROINES[id].name}について聞く（${metLabel}）`,
        heroineId: id
      };
    });
    heroineChoices.push({ text:'やっぱり相談をやめる', heroineId: null });

    const textEl = document.getElementById('text-content');
    if (textEl) textEl.innerHTML = '「誰のことを聞く？ 先に相手を決めろ。話はそれからだ」<span class="cursor-indicator">▶</span>';

    TextEngine.showChoices(heroineChoices, (idx, opt) => {
      if (!opt.heroineId) {
        UIManager.showSpeaker('田中 大地');
        TextEngine.display('「優柔不断も悪くないが、明日は動けよ」', () => {
          this._continueAfterEncounter();
        });
        return;
      }
      this._showTanakaTopicSelect(opt.heroineId);
    });
  },

  _showTanakaTopicSelect(heroineId) {
    UIManager.showHeroine('tanaka');
    UIManager.showSpeaker('田中 大地');
    const targetName = HEROINES[heroineId].name;
    const textEl = document.getElementById('text-content');
    if (textEl) textEl.innerHTML = `「${targetName}の何を知りたい？」<span class="cursor-indicator">▶</span>`;

    const topicChoices = [
      { text:'喜ぶプレゼント', topicId:'gift' },
      { text:'今の距離感と接し方', topicId:'approach' },
      { text:'会話で刺さる話題', topicId:'topic' },
      { text:'次に話しかけるならどこが良いか', topicId:'spot' }
    ];
    topicChoices.push({ text:'やめておく', topicId:null });

    TextEngine.showChoices(topicChoices, (idx, opt) => {
      if (!opt.topicId) {
        UIManager.showSpeaker('田中 大地');
        TextEngine.display('「了解。情報は使うときだけ価値がある」', () => {
          this._continueAfterEncounter();
        });
        return;
      }
      this._showTanakaAdviceFor(heroineId, opt.topicId);
    });
  },

  _showTanakaAdviceFor(heroineId, topicId) {
    try {
      const s = StateManager._state;
      const hData = HEROINES[heroineId];
      const hState = s.heroines[heroineId];
      const rank = this.getAffectionRank(hState.affection);
      const met = !!hState.met;
      let advice = '';

      if (!hData || !hState) {
        advice = '「今の情報だと判断できない。時間を置いてまた聞いてくれ」';
      } else if (!met) {
        advice = `「${hData.name}はまだ未接触だ。自己紹介は短く、相手の予定優先でいけ」`;
      } else if (topicId === 'gift') {
        const liked = (hData.gifts || []).map((gid) => GIFTS[gid]).filter(Boolean);
        const giftText = liked.length ? liked.map((g) => `${g.icon}${g.name}`).join(' / ') : '定番の消耗品';
        advice = `「${hData.name}なら、喜びやすいのは ${giftText} だ。渡す前に一言つけろ」`;
      } else if (topicId === 'approach') {
        const m = this._getMisunderstandingState();
        if (m.active && m.heroineId === heroineId) {
          advice = `「${hData.name}はいま誤解モードだ。正論より先に“誤解させたことへの謝罪”を置け。順番を間違えるな」`;
        } else {
          advice = `「${hData.name}はいま『${rank}』寄り。${RELATIONSHIP_HINTS[rank]}」`;
        }
      } else if (topicId === 'topic') {
        const defaultTopics = {
          hina: '体を動かした話、班で笑った失敗談',
          mitsuki: '段取りの工夫、時間を守って助かった話',
          shiori: '旅先の豆知識、資料の見方のコツ',
          hana: '景色や花の話、誰かに助けられた出来事'
        };
        advice = `「${hData.name}には、“${defaultTopics[heroineId] || '具体的な体験談'}”が刺さりやすい」`;
      } else if (topicId === 'spot') {
        const spots = Array.isArray(hData.talkSpots) && hData.talkSpots.length ? hData.talkSpots : [hData.defaultLocation || 'park'];
        const cursor = Number(hState.spotCursor) || 0;
        const nextSpotId = spots[cursor % spots.length] || hData.defaultLocation || 'park';
        const locName = CONFIG.LOCATIONS[nextSpotId]?.name || '定番スポット';
        advice = `「次に話すなら ${locName} が噛み合いやすい。長話より短く切って次につなげろ」`;
      } else {
        advice = `「${hData.name}についてなら、プレゼントか接し方を聞くのが早い」`;
      }

      UIManager.showHeroine('tanaka');
      UIManager.showSpeaker('田中 大地');
      TextEngine.display(advice, () => {
        this._continueAfterEncounter();
      });
    } catch (err) {
      UIManager.showHeroine('tanaka');
      UIManager.showSpeaker('田中 大地');
      TextEngine.display('「情報の整理中にこけた。今日はここまでにしておこう」', () => {
        this._continueAfterEncounter();
      });
    }
  },

  _doEncounter(locId, forcedHeroineId) {
    const s = StateManager._state;
    s.currentPhase = 'ENCOUNTER';
    UIManager.updateHeader();

    const heroineId = forcedHeroineId || this._rollEncounter(locId);

    if (heroineId) {
      this._currentEncounterHeroine = heroineId;
      const hState = s.heroines[heroineId];

      // First meeting?
      if (!hState.met) {
        hState.met = true;
        hState.lastMetDay = s.currentDay;
        hState.encounterCount = 1;
        UIManager.showHeroine(heroineId);
        UIManager.updateAffectionGauge(heroineId);
        this._playFirstMeeting(heroineId);
        return;
      }

      hState.encounterCount++;
      hState.lastMetDay = s.currentDay;
      UIManager.showHeroine(heroineId);
      UIManager.updateAffectionGauge(heroineId);

      // Regular encounter
      this._playRegularEncounter(heroineId);
    } else {
      UIManager.hideHeroine();
      UIManager.showSpeaker('');
      TextEngine.display('話しかける前に時間切れになってしまった。', () => {
        this._checkDisasterThenContinue();
      });
    }
  },

  _rollEncounter(locId) {
    const s = StateManager._state;
    const candidates = [];
    Object.entries(HEROINES).forEach(([id, h]) => {
      const weight = h.locationWeights[locId] || 0;
      if (weight > 0 && Math.random() < weight) {
        candidates.push({ id, weight });
      }
    });
    if (candidates.length === 0) return null;
    // Pick highest weight
    candidates.sort((a,b) => b.weight - a.weight);
    return candidates[0].id;
  },

  _playFirstMeeting(heroineId) {
    const scenes = SCENARIOS.firstMeet[heroineId];
    if (!scenes) {
      this._continueAfterEncounter();
      return;
    }
    this._playSceneSequence(scenes, heroineId, () => {
      this.checkTutorial(StateManager.get('currentDay'), 'ENCOUNTER');
      this._checkDisasterThenContinue();
    });
  },

  _playRegularEncounter(heroineId, skipDramaResolve) {
    const s = StateManager._state;
    const hData = HEROINES[heroineId];
    const hState = s.heroines[heroineId];
    const rank = this.getAffectionRank(hState.affection);
    const playerName = s.player.name;
    const conversation = this._pickConversationEvent(heroineId, rank);
    const m = this._getMisunderstandingState();

    if (!skipDramaResolve && m.active && m.heroineId === heroineId && s.currentDay >= m.resolveUnlockDay) {
      this._runMisunderstandingResolution(heroineId, () => {
        this._playRegularEncounter(heroineId, true);
      });
      return;
    }

    // Greeting
    const greetings = hData.rankDialogue[rank] || hData.greetings;
    const greeting = greetings[Math.floor(Math.random() * greetings.length)].replace('{player}', playerName);

    UIManager.showSpeaker(hData.name);
    TextEngine.display(greeting, () => {
      if (!conversation) {
        UIManager.showSpeaker(hData.name);
        TextEngine.display('今日は少しだけ顔を見て話せた。それだけで十分な日だ。', () => {
          this._checkDisasterThenContinue();
        });
        return;
      }
      UIManager.showSpeaker(hData.name);
      TextEngine.display(conversation.opener.replace('{player}', playerName), () => {
        UIManager.showSpeaker(hData.name);
        TextEngine.display(conversation.ask.replace('{player}', playerName), () => {
          const proceedToChoices = () => {
            this._playBackstoryRevealIfNeeded(heroineId, () => {
              UIManager.showHeroine(heroineId);
              UIManager.showSpeaker(hData.name);
              this._showConversationChoices(heroineId, conversation, rank);
            });
          };

          const interference = this._rollInterference(heroineId, rank);
          if (!interference) {
            this._activeInterference = null;
            proceedToChoices();
            return;
          }
          this._activeInterference = interference;
          if (interference.stressDelta) {
            StateManager.modify('player.stress', interference.stressDelta);
            StateManager.clamp('player.stress', 0, CONFIG.MAX_STRESS);
            UIManager.updateStressGauge();
            this._dayChanges.push({ label:'横槍による動揺', delta: interference.stressDelta });
          }
          UIManager.showHeroine(interference.speakerId || null);
          UIManager.showSpeaker(interference.speakerName || 'クラスメイト');
          TextEngine.display(interference.text.replace('{player}', playerName).replace('{heroine}', hData.name), () => {
            UIManager.showNotification(
              interference.kind === 'rival' ? '⚔️ 横槍で会話難易度アップ' : '🤝 友人の後押しで追い風',
              interference.kind === 'rival' ? 'negative' : 'positive'
            );
            UIManager.showHeroine(heroineId, interference.kind === 'rival' ? 'serious' : 'smile', '');
            proceedToChoices();
          });
        });
      });
    });
  },

  _pickConversationEvent(heroineId, rank) {
    const s = StateManager._state;
    const byHeroine = CONVERSATION_EVENTS[heroineId] || CONVERSATION_EVENTS.hina;
    const pool = byHeroine[rank] || byHeroine.stranger || [];
    if (!pool.length) return null;
    const cursor = s.heroines[heroineId].topicCursor || 0;
    return pool[cursor % pool.length];
  },

  _rollInterference(heroineId, rank) {
    const s = StateManager._state;
    const day = s.currentDay;
    if (day < 6) return null;
    const metCount = Object.values(s.heroines).filter(h => h.met).length;
    if (metCount < 2) return null;
    const keyDay = day % 5 === 0 || day % 7 === 0 || day >= 22;
    const triggerRate = keyDay ? 0.58 : 0.24;
    if (Math.random() > triggerRate) return null;

    const rivalBias = day >= 18 ? 0.62 : 0.48;
    const kind = Math.random() < rivalBias ? 'rival' : 'friend';
    const pool = INTERFERENCE_EVENTS[kind] || [];
    if (!pool.length) return null;
    const picked = pool[Math.floor(Math.random() * pool.length)];
    const closenessPenalty = (kind === 'rival' && (rank === 'closeFriend' || rank === 'loveInterest')) ? -4 : 0;
    return {
      ...picked,
      kind,
      successRateMod: (picked.successRateMod || 0) + closenessPenalty
    };
  },

  _getBackstoryReveal(heroineId) {
    const s = StateManager._state;
    const hState = s.heroines[heroineId];
    if (!hState) return null;
    if (!Array.isArray(hState.eventFlags)) hState.eventFlags = [];
    const arc = HEROINE_BACKSTORY_ARCS[heroineId] || [];
    for (let i = 0; i < arc.length; i++) {
      const stage = arc[i];
      const threshold = Number(stage.affection) || 0;
      const flag = `backstory_${heroineId}_${stage.id || i}`;
      if (hState.affection >= threshold && !hState.eventFlags.includes(flag)) {
        return { stage, flag };
      }
    }
    return null;
  },

  _playBackstoryRevealIfNeeded(heroineId, onComplete) {
    const picked = this._getBackstoryReveal(heroineId);
    if (!picked) {
      if (typeof onComplete === 'function') onComplete();
      return;
    }
    const s = StateManager._state;
    const hState = s.heroines[heroineId];
    if (!Array.isArray(hState.eventFlags)) hState.eventFlags = [];
    hState.eventFlags.push(picked.flag);

    const stage = picked.stage || {};
    const finalize = () => {
      const delta = Number(stage.trustDelta) || 0;
      if (delta !== 0) {
        StateManager.modify(`heroines.${heroineId}.affection`, delta);
        StateManager.clamp(`heroines.${heroineId}.affection`, 0, CONFIG.MAX_AFFECTION);
        UIManager.updateAffectionGauge(heroineId);
        this._dayChanges.push({ label: `${HEROINES[heroineId]?.name || '相手'} 信頼`, delta });
      }
      if (stage.badge) UIManager.showNotification(stage.badge, delta >= 0 ? 'positive' : 'info');
      if (typeof onComplete === 'function') onComplete();
    };

    const scenes = Array.isArray(stage.scenes) ? stage.scenes : [];
    if (!scenes.length) {
      finalize();
      return;
    }
    this._playSceneSequence(scenes, heroineId, finalize);
  },

  _showConversationChoices(heroineId, conversation, rank) {
    const hData = HEROINES[heroineId];
    const s = StateManager._state;
    const hState = s.heroines[heroineId];
    const playerName = s.player.name;
    const day = s.currentDay;
    const interference = this._activeInterference;
    const misunderstanding = this._getMisunderstandingState();
    const misunderstandingActive = misunderstanding.active && misunderstanding.heroineId === heroineId;
    const options = Array.isArray(conversation.options) ? conversation.options : [];
    const choices = options.length > 0 ? options.map(o => ({ text: o.text })) : [{ text:'「今日はこの辺にしておこう」' }];
    const importantChoice = !!interference || misunderstandingActive || rank === 'closeFriend' || rank === 'loveInterest' || day >= 20;

    TextEngine.showChoices(choices, (idx, opt) => {
      const selected = options[idx] || { fit: 6, delta: 0, success: 'うん、そうだね。', fail: '……今は少し難しいかも。' };
      const fit = Number(selected.fit) || 6;
      const familiarityBonus = { stranger:0, acquaintance:4, friend:7, closeFriend:10, loveInterest:13 }[rank] || 0;
      const baseRate =
        36 +
        familiarityBonus +
        s.player.talkSkill * 0.25 +
        hState.affection * 0.16 +
        s.player.fashion * 0.07 -
        s.player.stress * 0.11 +
        fit * 3.2;
      const adjustedRate = baseRate + (interference?.successRateMod || 0) + (misunderstandingActive ? -9 : 0);
      const successRate = Math.max(12, Math.min(98, adjustedRate));
      const success = Math.random() * 100 < successRate;

      const mult = (s.flags.miracleDayUsed && day >= 28) ? 2 : 1;
      const rankBase = { stranger:4, acquaintance:5, friend:6, closeFriend:7, loveInterest:8 }[rank] || 5;
      let delta;
      if (success) {
        delta = Math.floor((rankBase + (Number(selected.delta) || 0) + Math.floor(Math.random() * 3)) * mult);
      } else {
        const failPenalty = 2 + Math.floor(Math.random() * 3) + Math.max(0, 2 - Math.floor(fit / 6));
        delta = -failPenalty;
      }
      if (interference?.affectionDeltaMod) delta += interference.affectionDeltaMod;
      if (misunderstandingActive) delta += success ? -2 : -1;

      // Apply
      StateManager.modify(`heroines.${heroineId}.affection`, delta);
      StateManager.clamp(`heroines.${heroineId}.affection`, 0, CONFIG.MAX_AFFECTION);
      UIManager.updateAffectionGauge(heroineId);
      hState.topicCursor = (hState.topicCursor || 0) + 1;

      StateManager.modify('stats.totalChoices', 1);

      if (delta > 0) {
        UIManager.showHeartEffect(true);
        AudioManager.play('affection_up');
      } else {
        UIManager.showHeartEffect(false);
        AudioManager.play('affection_down');
      }

      this._dayChanges.push({ label:`${hData.name} 好感度`, delta });
      if (interference) {
        this._dayChanges.push({
          label: interference.kind === 'rival' ? '横槍補正' : '後押し補正',
          delta: interference.affectionDeltaMod || 0
        });
      }
      if (misunderstandingActive) {
        this._dayChanges.push({ label:'誤解補正', delta: success ? -2 : -1 });
      }

      const responseText = (success ? selected.success : selected.fail) || '……。';
      const reactionExp = UIManager.getChoiceReactionExpression(heroineId, success);

      UIManager.showSpeaker(hData.name);
      TextEngine.display(responseText.replace('{player}', playerName), () => {
        this._activeInterference = null;
        const inventory = s.purchaseHistory.filter(p => !s.heroines[heroineId].giftsGiven.includes(p));
        const matchingGifts = inventory.filter(gId => {
          const g = GIFTS[gId];
          return g && (g.target === heroineId || g.target === null);
        });

        if (matchingGifts.length > 0 && s.heroines[heroineId].affection >= 40) {
          UIManager.showSpeaker('');
          TextEngine.display('（プレゼントを渡すチャンスだ……）', () => {
            const giftChoices = [
              ...matchingGifts.map(gId => ({ text: `${GIFTS[gId].icon} ${GIFTS[gId].name}を渡す`, giftId:gId })),
              { text:'今はやめておく' }
            ];
            TextEngine.showChoices(giftChoices, (gIdx, gOpt) => {
              if (gOpt.giftId) {
                this._giveGift(heroineId, gOpt.giftId);
              } else {
                this._checkDisasterThenContinue();
              }
            });
          });
        } else {
          this._checkDisasterThenContinue();
        }
      }, { expressionHint: reactionExp });
    }, { important: importantChoice });
  },

  _giveGift(heroineId, giftId, onComplete) {
    const s = StateManager._state;
    const g = GIFTS[giftId];
    if (!g) {
      if (typeof onComplete === 'function') onComplete();
      else this._checkDisasterThenContinue();
      return;
    }
    const invIdx = s.purchaseHistory.indexOf(giftId);
    if (invIdx === -1) {
      UIManager.showNotification('渡せるプレゼントがありません', 'negative');
      if (typeof onComplete === 'function') onComplete();
      else this._checkDisasterThenContinue();
      return;
    }
    // Consume one item from inventory.
    s.purchaseHistory.splice(invIdx, 1);

    const hData = HEROINES[heroineId];
    const isMatch = g.target === heroineId;
    const timesGiven = s.heroines[heroineId].giftsGiven.filter(gid => gid === giftId).length;
    let affDelta = g.affection;
    if (!isMatch) affDelta = g.target === null ? g.affection : -3;
    if (timesGiven >= 1) affDelta = Math.floor(affDelta / 2); // Diminishing returns

    StateManager.modify(`heroines.${heroineId}.affection`, affDelta);
    StateManager.clamp(`heroines.${heroineId}.affection`, 0, CONFIG.MAX_AFFECTION);
    s.heroines[heroineId].giftsGiven.push(giftId);
    UIManager.updateAffectionGauge(heroineId);

    if (affDelta > 0) {
      UIManager.showHeartEffect(true);
      AudioManager.play('affection_up');
    } else {
      UIManager.showHeartEffect(false);
      AudioManager.play('affection_down');
    }

    this._dayChanges.push({ label:`${hData.name} プレゼント`, delta: affDelta });

    const responseText = isMatch ?
      '「えっ、これ……！ありがとう！すっごく嬉しい！」' :
      (g.target === null ? `「え……${g.name}！？ どこで見つけたのそれ……」` : '「ありがとう……でも、ちょっと趣味が違うかも……」');

    UIManager.showSpeaker(hData.name);
    TextEngine.display(responseText, () => {
      UIManager.updateHeader();
      if (typeof onComplete === 'function') onComplete();
      else this._checkDisasterThenContinue();
    });
  },

  buyGift(giftId) {
    const s = StateManager._state;
    const g = GIFTS[giftId];
    if (!g || s.player.money < g.price) {
      AudioManager.play('error');
      return;
    }
    StateManager.modify('player.money', -g.price);
    s.purchaseHistory.push(giftId);
    AudioManager.play('buy');
    UIManager.showNotification(`${g.icon} ${g.name}を購入！`, 'positive');
    UIManager.updateHeader();
    UIManager.showShop(); // Refresh shop
  },

  _openNightShop() {
    UIManager.showSpeaker('');
    TextEngine.display('夜の商店でプレゼントを選ぶ。買い物が終わったら閉じよう。', () => {
      UIManager.showShop();
      const timer = setInterval(() => {
        const area = document.getElementById('shop-overlay');
        if (!area || !area.classList.contains('active')) {
          clearInterval(timer);
          this._queueSummary();
        }
      }, 200);
    });
  },

  _showNightGiftTargetSelection() {
    const s = StateManager._state;
    const metTargets = Object.entries(s.heroines).filter(([, h]) => h.met).map(([id]) => id);
    if (metTargets.length === 0) {
      UIManager.showSpeaker('');
      TextEngine.display('まだ誰にもプレゼントを渡せない。まずは会話して仲を深めよう。', () => {
        this._queueSummary();
      });
      return;
    }
    if (!s.purchaseHistory.length) {
      UIManager.showSpeaker('');
      TextEngine.display('手持ちのプレゼントがない。今夜は先に購入しよう。', () => {
        this._queueSummary();
      });
      return;
    }

    UIManager.showSpeaker('');
    TextEngine.display('誰にプレゼントを渡す？', () => {
      const choices = metTargets.map((id) => {
        const h = s.heroines[id];
        return { text: `${HEROINES[id].name}に渡す（好感度 ${Math.round(h.affection)}%）`, heroineId: id };
      });
      choices.push({ text:'今夜は渡さない', heroineId:null });
      TextEngine.showChoices(choices, (idx, opt) => {
        if (!opt.heroineId) {
          this._queueSummary();
          return;
        }
        this._showNightGiftChoices(opt.heroineId);
      });
    });
  },

  _showNightGiftChoices(heroineId) {
    const s = StateManager._state;
    const counts = {};
    s.purchaseHistory.forEach((gid) => { counts[gid] = (counts[gid] || 0) + 1; });
    const entries = Object.entries(counts)
      .map(([gid, count]) => ({ giftId: gid, count, gift: GIFTS[gid] }))
      .filter((e) => !!e.gift)
      .filter((e) => e.gift.target === heroineId || e.gift.target === null || e.gift.target === undefined);

    if (!entries.length) {
      UIManager.showSpeaker('');
      TextEngine.display('この相手に渡せるプレゼントが手持ちにない。', () => {
        this._queueSummary();
      });
      return;
    }

    UIManager.showSpeaker('');
    TextEngine.display(`${HEROINES[heroineId].name}に何を渡す？`, () => {
      const choices = entries.map((e) => ({ text: `${e.gift.icon} ${e.gift.name} x${e.count}`, giftId: e.giftId }));
      choices.push({ text:'やめておく', giftId:null });
      TextEngine.showChoices(choices, (idx, opt) => {
        if (!opt.giftId) {
          this._queueSummary();
          return;
        }
        this._giveGift(heroineId, opt.giftId, () => this._queueSummary());
      });
    });
  },

  _checkDisasterThenContinue() {
    if (DisasterEngine.shouldDisasterOccur()) {
      this._runDisaster();
    } else {
      this._continueAfterEncounter();
    }
  },

  _runDisaster() {
    const s = StateManager._state;
    s.currentPhase = 'DISASTER';
    UIManager.updateHeader();
    this.checkTutorial(s.currentDay, 'DISASTER');

    AudioManager.play('disaster');
    UIManager.screenShake();
    UIManager.screenFlash('rgba(255,0,0,0.3)');

    const disaster = DisasterEngine.getDisaster();
    s.disasterLog.push({ day: s.currentDay, id: disaster.id });

    UIManager.showSpeaker('⚠️ 災難発生！');
    TextEngine.display(disaster.text, () => {
      const choices = disaster.options.map((opt) => ({ text: opt.text }));
      TextEngine.showChoices(choices, (idx) => {
        const result = DisasterEngine.processDisasterChoice(disaster, idx, this._currentEncounterHeroine);
        UIManager.updateStressGauge();
        UIManager.updateAffectionGauge(this._currentEncounterHeroine);
        UIManager.updateHeader();

        if (result.affection > 5) {
          AudioManager.play('disaster_clear');
          UIManager.showNotification('災難を好対応！✨', 'positive');
        }

        UIManager.showSpeaker('');
        TextEngine.display(result.result, () => {
          // Check stress game over
          if (StateManager.get('player.stress') >= CONFIG.MAX_STRESS) {
            this.triggerEnding('overwork');
            return;
          }
          this._continueAfterEncounter();
        });
      }, { important: true });
    });
  },

  _continueAfterEncounter() {
    if (this._dayEndLocked) return;
    this._dayEndLocked = true;
    this._currentEncounterHeroine = null;
    UIManager.hideHeroine();
    UIManager.updateAffectionGauge(null);

    const s = StateManager._state;
    s.actionsTakenToday++;
    setTimeout(() => this.startNightPhase(), 250);
  },

  _queueSummary() {
    if (StateManager.get('currentPhase') === 'SUMMARY') return;
    if (this._summaryQueued) return;
    this._summaryQueued = true;
    UIManager.showSpeaker('');
    TextEngine.display('（今日の行動はここまでだ。EnterでDayのまとめへ進む）', () => {
      this.startSummary();
    });
  },

  _rollNightTier(actionId) {
    const s = StateManager._state;
    const baseMap = { talk_train: 5, exercise: 0, part_time: 3, rest: 20 };
    const base = baseMap[actionId] || 0;
    const score =
      Math.random() * 100 +
      s.player.luck * 0.45 +
      s.player.stamina * 0.24 -
      s.player.stress * 0.35 +
      base;
    if (score >= 112) return 'great';
    if (score >= 70) return 'success';
    return 'fail';
  },

  _applyNightChanges(changes) {
    changes.forEach((c) => {
      if (!c || !c.path || !Number.isFinite(Number(c.delta))) return;
      StateManager.modify(c.path, c.delta);
      if (c.path.startsWith('player.money')) StateManager.clamp('player.money', 0, CONFIG.MAX_MONEY);
      if (c.path.startsWith('player.stamina')) StateManager.clamp('player.stamina', 0, CONFIG.MAX_STAT);
      if (c.path.startsWith('player.talkSkill')) StateManager.clamp('player.talkSkill', 0, CONFIG.MAX_STAT);
      if (c.path.startsWith('player.fashion')) StateManager.clamp('player.fashion', 0, CONFIG.MAX_STAT);
      if (c.path.startsWith('player.luck')) StateManager.clamp('player.luck', 0, CONFIG.MAX_STAT);
      if (c.path.startsWith('player.stress')) StateManager.clamp('player.stress', 0, CONFIG.MAX_STRESS);
      this._dayChanges.push({ label: c.label || c.path, delta: c.delta });
    });
  },

  _randomInt(min, max) {
    const lo = Math.ceil(Math.min(min, max));
    const hi = Math.floor(Math.max(min, max));
    return Math.floor(Math.random() * (hi - lo + 1)) + lo;
  },

  _playNightNarrative(lines, onComplete) {
    const seq = Array.isArray(lines) ? lines : [];
    const playNext = (idx) => {
      if (idx >= seq.length) {
        if (typeof onComplete === 'function') onComplete();
        return;
      }
      const line = seq[idx] || {};
      if (line.background) UIManager.setBackground(line.background);
      if (Object.prototype.hasOwnProperty.call(line, 'heroineId')) {
        if (line.heroineId) UIManager.showHeroine(line.heroineId, line.expression || null, line.text || '');
        else UIManager.hideHeroine();
      }
      if (Object.prototype.hasOwnProperty.call(line, 'speaker')) UIManager.showSpeaker(line.speaker || '');
      TextEngine.display(String(line.text || ''), () => playNext(idx + 1), line.expression ? { expressionHint: line.expression } : undefined);
    };
    playNext(0);
  },

  startNightPhase() {
    const s = StateManager._state;
    s.currentPhase = 'NIGHT';
    s.timeOfDay = 'night';
    UIManager.updateHeader();
    UIManager.setBackground(s.currentLocationId || 'park');
    UIManager.hideHeroine();
    this.checkTutorial(s.currentDay, 'NIGHT');
    UIManager.showNightActions();
  },

  selectNightAction(actionId) {
    UIManager.hideNightActions();
    if (actionId === 'buy_gift') {
      this._openNightShop();
      return;
    }
    if (actionId === 'give_gift') {
      this._showNightGiftTargetSelection();
      return;
    }

    const tier = this._rollNightTier(actionId);
    const outcome = this._buildNightOutcome(actionId, tier);
    if (!outcome) {
      UIManager.showNotification('行動を選び直してください', 'negative');
      this.startNightPhase();
      return;
    }

    const finishNightAction = () => {
      this._applyNightChanges(outcome.changes || []);
      if (typeof outcome.afterApply === 'function') outcome.afterApply();
      UIManager.updateHeader();
      UIManager.updateStressGauge();
      if (outcome.notification && outcome.notification.text) {
        UIManager.showNotification(outcome.notification.text, outcome.notification.type || 'info');
      }
      AudioManager.play('click');
      this._queueSummary();
    };

    this._playNightNarrative(outcome.lines || [], finishNightAction);
  },

  _showTanakaAdvice() {
    const s = StateManager._state;
    UIManager.showHeroine('tanaka');
    const met = Object.entries(s.heroines).filter(([id,h]) => h.met);
    if (met.length === 0) {
      UIManager.showSpeaker('田中 大地');
      TextEngine.display('「まだ誰にも会ってないのかよ！明日は積極的に行けよな！」', () => {
        this._queueSummary();
      });
      return;
    }
    const [targetId, targetState] = met[Math.floor(Math.random() * met.length)];
    const h = HEROINES[targetId];
    const isCorrect = Math.random() < 0.5;
    const rank = this.getAffectionRank(targetState.affection);
    const wrongHints = [
      '細かい話は抜きで勢いだけで押せ。',
      '相手の都合より自分の都合を優先しろ。',
      '会話は短いほどいい。すぐ切り上げろ。'
    ];
    const hint = isCorrect ? RELATIONSHIP_HINTS[rank] : wrongHints[Math.floor(Math.random() * wrongHints.length)];

    UIManager.showSpeaker('田中 大地');
    TextEngine.display(`「${h.name}には、${hint}」${isCorrect?'':'　……（この情報は50%の確率で間違っています）'}`, () => {
      this._queueSummary();
    });
  },

  _showDiary() {
    const s = StateManager._state;
    let diaryText = '── これまでの記録 ──\n\n';
    if (s.dailyLog.length === 0) {
      diaryText += 'まだ記録がありません。';
    } else {
      s.dailyLog.slice(-5).forEach(log => {
        diaryText += `Day${log.day}: ${log.summary}\n`;
      });
    }
    UIManager.showSpeaker('📖 日記');
    TextEngine.display(diaryText, () => {
      this._queueSummary();
    });
  },

  startSummary() {
    this._summaryQueued = false;
    TextEngine.stop();
    TextEngine.hideChoices();
    UIManager.hideLocationSelect();
    UIManager.hideNightActions();
    const s = StateManager._state;
    s.currentPhase = 'SUMMARY';
    UIManager.updateHeader();

    // Create daily log entry
    const metHeroines = Object.entries(s.heroines).filter(([id,h]) => h.lastMetDay === s.currentDay).map(([id]) => HEROINES[id].name);
    const logEntry = {
      day: s.currentDay,
      summary: metHeroines.length > 0 ? `${metHeroines.join('、')}と会った。` : '特に何もない一日だった。'
    };
    s.dailyLog.push(logEntry);

    UIManager.showDaySummary({ changes: this._dayChanges });
  },

  endDay() {
    UIManager.hideDaySummary();
    UIManager.showSpeaker('');
    const textEl = document.getElementById('text-content');
    if (textEl) textEl.innerHTML = '';
    const s = StateManager._state;
    this._dayEndLocked = false;
    s.currentDay++;
    this.startDay();
  },

  // ---- Scene player ----
  _playSceneSequence(scenes, heroineId, onComplete) {
    let idx = 0;
    const playerName = StateManager.get('player.name') || 'プレイヤー';

    const playNext = () => {
      if (idx >= scenes.length) {
        if (onComplete) onComplete();
        return;
      }
      const scene = scenes[idx];
      idx++;
      if (scene && scene.background) UIManager.setBackground(scene.background);

      switch(scene.type) {
        case 'narration':
          UIManager.showSpeaker('');
          TextEngine.display(scene.text.replace('{player}', playerName), playNext);
          break;
        case 'dialogue': {
          const lineText = String(scene.text || '').replace('{player}', playerName);
          if (scene.speaker === 'player') {
            UIManager.showSpeaker(playerName);
          } else if (NPCS[scene.speaker]) {
            UIManager.showSpeaker(NPCS[scene.speaker].name);
            UIManager.showHeroine(scene.speaker, scene.expression || null, lineText);
          } else {
            const h = HEROINES[scene.speaker];
            UIManager.showSpeaker(h ? h.name : scene.speaker);
            if (h) UIManager.showHeroine(scene.speaker, scene.expression || null, lineText);
          }
          TextEngine.display(lineText, playNext, scene.expression ? { expressionHint: scene.expression } : undefined);
          break;
        }
        case 'thought':
          UIManager.showSpeaker(playerName + ' (心の声)');
          TextEngine.display(scene.text.replace('{player}', playerName), playNext);
          break;
        case 'choice':
          UIManager.showSpeaker('');
          TextEngine.display('……どうする？', () => {
            TextEngine.showChoices(scene.options, (choiceIdx, opt) => {
              const affDelta = opt.affection || 0;
              if (heroineId && affDelta) {
                StateManager.modify(`heroines.${heroineId}.affection`, affDelta);
                StateManager.clamp(`heroines.${heroineId}.affection`, 0, CONFIG.MAX_AFFECTION);
                UIManager.updateAffectionGauge(heroineId);
                if (affDelta > 0) { UIManager.showHeartEffect(true); AudioManager.play('affection_up'); }
                else if (affDelta < 0) { UIManager.showHeartEffect(false); AudioManager.play('affection_down'); }
                this._dayChanges.push({ label: `${HEROINES[heroineId]?.name || ''} 好感度`, delta: affDelta });
              }
              StateManager.modify('stats.totalChoices', 1);
              const choiceSuccess = affDelta >= 0;
              const reactionExp = heroineId ? UIManager.getChoiceReactionExpression(heroineId, choiceSuccess) : null;
              if (opt.reply) {
                UIManager.showSpeaker(heroineId ? (HEROINES[heroineId]?.name || '') : '');
                TextEngine.display(
                  opt.reply.replace('{player}', playerName),
                  playNext,
                  reactionExp ? { expressionHint: reactionExp } : undefined
                );
              } else {
                if (heroineId && reactionExp) UIManager.showHeroine(heroineId, reactionExp, '');
                playNext();
              }
            }, { important: true });
          });
          break;
        default:
          playNext();
      }
    };

    playNext();
  },

  // ---- Endings ----
  determineEnding() {
    const s = StateManager._state;
    const heroineAffs = Object.entries(s.heroines).map(([id,h]) => ({ id, aff: h.affection }));
    heroineAffs.sort((a,b) => b.aff - a.aff);

    // Check special endings
    // Harem: all >= 80
    if (heroineAffs.every(h => h.aff >= 80)) {
      this.triggerEnding('harem');
      return;
    }

    // Tanaka: encounters >= 30
    if ((s.tanakaEncounters || 0) >= 20) {
      this.triggerEnding('tanaka');
      return;
    }

    // Bocchi: all 0
    if (heroineAffs.every(h => h.aff <= 0)) {
      this.triggerEnding('bocchi');
      return;
    }

    // Normal heroine endings
    const best = heroineAffs[0];
    if (best.aff >= 90) {
      this.triggerEnding('good', best.id);
    } else if (best.aff >= 80) {
      // Check bad end conditions
      if (best.id === 'shiori' && (s.heroines.shiori.lateCount || 0) >= 3) {
        this.triggerEnding('bad', best.id);
      } else if (best.id === 'hana' && (s.heroines.hana.witnessCount || 0) >= 3) {
        this.triggerEnding('bad', best.id);
      } else {
        this.triggerEnding('normal', best.id);
      }
    } else if (best.aff >= 60) {
      this.triggerEnding('normal', best.id);
    } else {
      this.triggerEnding('bocchi');
    }
  },

  triggerEnding(type, heroineId) {
    let endingKey = type;
    let scenes = [];
    let title = '';
    let endType = '';

    switch(type) {
      case 'good':
        scenes = SCENARIOS.confession[heroineId]?.good || [];
        title = `${HEROINES[heroineId]?.name || ''} グッドエンド`;
        endType = '💕 GOOD END';
        endingKey = `${heroineId}_good`;
        break;
      case 'normal':
        scenes = SCENARIOS.confession[heroineId]?.normal || [];
        title = `${HEROINES[heroineId]?.name || ''} ノーマルエンド`;
        endType = '💛 NORMAL END';
        endingKey = `${heroineId}_normal`;
        break;
      case 'bad':
        scenes = SCENARIOS.confession[heroineId]?.bad || [];
        title = `${HEROINES[heroineId]?.name || ''} バッドエンド`;
        endType = '💔 BAD END';
        endingKey = `${heroineId}_bad`;
        break;
      case 'bocchi':
        scenes = SCENARIOS.specialEndings.bocchi;
        title = 'ぼっちエンド';
        endType = '🌅 SPECIAL END';
        break;
      case 'overwork':
        scenes = SCENARIOS.specialEndings.overwork;
        title = '過労エンド';
        endType = '😵 SPECIAL END';
        break;
      case 'harem':
        scenes = SCENARIOS.specialEndings.harem;
        title = 'ハーレムエンド';
        endType = '👑 SPECIAL END';
        break;
      case 'tanaka':
        scenes = SCENARIOS.specialEndings.tanaka;
        title = '田中エンド';
        endType = '🤝 SPECIAL END';
        break;
    }

    // Save to gallery
    const gallery = SaveManager.loadGallery();
    if (!gallery.includes(endingKey)) {
      gallery.push(endingKey);
      SaveManager.saveGallery(gallery);
    }

    // Play ending scenes then show ending screen
    UIManager.showScreen('game-screen');
    if (heroineId) UIManager.showHeroine(heroineId);

    if (type === 'good') AudioManager.play('confession');

    if (scenes.length > 0) {
      this._playSceneSequence(scenes, heroineId, () => {
        setTimeout(() => {
          this._showEndingScreen(endType, title, this._getEndingDescription(endingKey));
        }, 1000);
      });
    } else {
      this._showEndingScreen(endType, title, this._getEndingDescription(endingKey));
    }
  },

  _getEndingDescription(key) {
    const descs = {
      hina_good: '笑顔で痛みを隠してきた陽菜が、最後は涙で「好き」を言えた。ふたりで“続く明日”を選んだ。',
      hina_normal: '告白は保留。でも空元気じゃない声で「また会おう」と約束できた。',
      hina_bad: '告白は失敗。帰り道の車窓が少し遠かった。',
      mitsuki_good: '喪失を恐れて完璧を演じた美月が、初めて弱さごと手を伸ばした。「好きよ、バカ」は震えていた。',
      mitsuki_normal: '手紙をもらった。業務連絡みたいな文面の最後に、小さく「会いたい」が残っていた。',
      mitsuki_bad: '軽口が過ぎて距離を縮めきれなかった。',
      shiori_good: '確率で心を守ってきた詩織が、計算をやめて告白した。旅メモの端が涙で少しにじんでいた。',
      shiori_normal: '「また一緒に調べものをしましょう」の約束に、以前よりずっと人肌の温度があった。',
      shiori_bad: '遅刻と雑さで信頼を失った。積み重ねは大事だ。',
      hana_good: '別れを恐れて距離を保ってきた花が、はじめて「いなくならないで」と言えた。想いはやさしく成就した。',
      hana_normal: '花の種を交換。離れる前提じゃない約束を、少しずつ育てることになった。',
      hana_bad: '一途さを証明しきれず、すれ違いのまま終わった。',
      bocchi: '旅程は完走したが、恋は始まらなかった。',
      overwork: '詰め込み旅程でダウン。休息は戦略だ。',
      harem: '4人同時に好感度MAX。修羅場という名の伝説が生まれた。',
      tanaka: '恋は逃したが、最強の相棒を得た。'
    };
    return descs[key] || 'お疲れ様でした。';
  },

  _showEndingScreen(endType, title, description) {
    document.getElementById('end-type').textContent = endType;
    document.getElementById('end-title').textContent = title;
    document.getElementById('end-text').textContent = description;
    UIManager.showScreen('ending-screen');
  }
};

window.App = {
  startNewGame() {
    AudioManager.ensureContext();
    AudioManager.play('click');
    UIManager.showScreen('name-screen');
    setTimeout(() => document.getElementById('name-input')?.focus(), 100);
  },

  confirmName() {
    const input = document.getElementById('name-input');
    const name = input?.value.trim() || 'ユウキ';
    AudioManager.play('click');
    StateManager.createNew(name);
    this._startGame();
  },

  _startGame() {
    UIManager.showScreen('game-screen');
    const s = StateManager._state;

    // Apply saved settings if any
    try {
      const savedSettings = localStorage.getItem(CONFIG.SETTINGS_KEY);
      if (savedSettings) {
        const settings = JSON.parse(savedSettings);
        if (settings && typeof settings === 'object') {
          if (CONFIG.TEXT_SPEEDS[settings.textSpeed]) s.settings.textSpeed = settings.textSpeed;
          if (typeof settings.effectsEnabled === 'boolean') s.settings.effectsEnabled = settings.effectsEnabled;
        }
      }
    } catch(e) {}

    // Play prologue
    if (!s.flags.prologueDone) {
      UIManager.setBackground('beach');
      UIManager.hideHeroine();
      UIManager.showSpeaker('');

      const tc = document.getElementById('text-content');
      if (tc) tc.onclick = () => TextEngine.advance();

      GameLoop._playSceneSequence(SCENARIOS.prologue, null, () => {
        s.flags.prologueDone = true;
        GameLoop.startDay();
      });
    } else {
      GameLoop.startDay();
    }
  },

  showLoadFromTitle() {
    AudioManager.play('click');
    // Check if any saves exist
    let hasSave = false;
    for (let i = 0; i <= 3; i++) {
      if (SaveManager.getSlotInfo(i)) { hasSave = true; break; }
    }
    if (!hasSave) {
      UIManager.showNotification('セーブデータがありません', 'negative');
      return;
    }
    UIManager.showSaveLoad('load');
  },

  handleSaveLoad(mode, slot) {
    if (mode === 'save') {
      if (SaveManager.save(slot)) {
        AudioManager.play('buy');
        UIManager.showNotification('💾 セーブしました！', 'positive');
        UIManager.closeOverlay('saveload-overlay');
      } else {
        UIManager.showNotification('セーブに失敗しました', 'negative');
      }
    } else {
      const state = SaveManager.load(slot);
      if (state) {
        StateManager.loadState(state);
        UIManager.closeOverlay('saveload-overlay');
        UIManager.showScreen('game-screen');
        UIManager.updateHeader();
        UIManager.updateStressGauge();
        UIManager.setBackground(state.currentLocationId || 'beach');
        AudioManager.play('click');
        UIManager.showNotification('📂 ロードしました！', 'positive');
        // Resume from current phase
        const tc = document.getElementById('text-content');
        if (tc) tc.onclick = () => TextEngine.advance();
        GameLoop.startDay();
      } else {
        UIManager.showNotification('ロードに失敗しました', 'negative');
      }
    }
  },

  updateSetting(key, value) {
    StateManager.set(`settings.${key}`, value);
    // Persist settings
    try {
      const s = StateManager.get('settings');
      localStorage.setItem(CONFIG.SETTINGS_KEY, JSON.stringify(s));

      { key:'bocchi', label:'ぼっちエンド', icon:'🌅' },
      { key:'overwork', label:'過労エンド', icon:'😵' },
      { key:'harem', label:'ハーレムエンド', icon:'👑' },
      { key:'tanaka', label:'田中エンド', icon:'🤝' }
    ];

    grid.innerHTML = allEndings.map(e => {
      const unlocked = gallery.includes(e.key);
      return `<div class="gallery-card${unlocked?' unlocked':''}">
        <div class="g-icon">${unlocked ? e.icon : '🔒'}</div>
        <div>${unlocked ? e.label : '???'}</div>
      </div>`;
    }).join('');

    UIManager.showScreen('gallery-screen');
  },

  backToTitleFromEnd() {
    AudioManager.play('click');
    UIManager.showScreen('title-screen');
  },

  backToTitleFromGallery() {
    AudioManager.play('click');
    UIManager.showScreen('title-screen');
  }
};

// Expose necessary objects
window.GameLoop = GameLoop;
window.UIManager = UIManager;
window.AudioManager = AudioManager;

// ============================================================
// KEYBOARD HANDLER
// ============================================================
document.addEventListener('keydown', (e) => {
  if (e.repeat) return;
  if (e.key === 'Escape') {
    if (UIManager._activeScreen === 'game-screen') {
      UIManager.toggleMenu();
    }
  }
  if (e.key === 'Enter' || e.key === ' ') {
    if (UIManager._activeScreen === 'game-screen' && !UIManager._menuOpen) {
      TextEngine.advance();
    }
    if (UIManager._activeScreen === 'name-screen' && e.key === 'Enter') {
      App.confirmName();
    }
  }
  // Number keys for choices
  if (/^[1-9]$/.test(e.key)) {
    const area = document.getElementById('choices-area');
    if (area && !area.classList.contains('hidden') && area.dataset.locked !== '1') {
      const btns = area.querySelectorAll('.choice-btn');
      const idx = parseInt(e.key) - 1;
      if (btns[idx]) btns[idx].click();
    }
  }
});

// ============================================================
// RESPONSIVE SCALING
// ============================================================
function scaleGame() {
  const gc = document.getElementById('game-container');
  if (!gc) return;
  const w = window.innerWidth, h = window.innerHeight;
  const scaleX = w / 1280, scaleY = h / 720;
  const scale = Math.min(scaleX, scaleY, 1);
  gc.style.transform = `scale(${scale})`;
  gc.style.transformOrigin = 'top center';
  gc.style.marginTop = Math.max(0, (h - 720 * scale) / 2) + 'px';
}
window.addEventListener('resize', scaleGame);
scaleGame();
