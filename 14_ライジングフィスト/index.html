const SpriteStore = {
  cache: {},
  trim: {},
  readyChars: {},
  _scanCanvas: null,
  _scanCtx: null,
  totalCount: 0,
  loadedCount: 0,

  init() {
    this.cache = {};
    this.trim = {};
    this.readyChars = {};
    this.totalCount = 0;
    this.loadedCount = 0;
    this._scanCanvas = document.createElement('canvas');
    this._scanCtx = this._scanCanvas.getContext('2d', { willReadFrequently: true });
    this.loadCharacter('kenji');
    this.loadCharacter('vance'); // FIX #63
    this.loadCharacter('meilin'); // FIX #69
  },

  loadCharacter(charId) {
    const def = SPRITE_DEF[charId];
    if (!def) return;
    const jobs = [];
    for (let action in def) {
      const count = def[action];
      for (let i = 1; i <= count; i++) {
        const frame = String(i).padStart(2, '0');
        const key = `${charId}:${action}:${frame}`;
        const src = `asset/${charId}_${action}_${frame}.png`;
        this.totalCount++;
        jobs.push(new Promise((resolve) => {
          let done = false;
          const finish = (imgRef, trimRef) => {
            if (done) return;
            done = true;
            this.cache[key] = imgRef;
            this.trim[key] = trimRef;
            this.loadedCount++;
            resolve();
          };
          const img = new Image();
          img.decoding = 'async';
          // FIX #39: Shorter watchdog to avoid long "loading" stalls for missing optional sprites.
          const watchdog = setTimeout(() => {
            finish(null, null);
          }, 2500);
          img.onload = () => {
            clearTimeout(watchdog);
            try {
              finish(img, this.computeTrim(img));
            } catch (_e) {
              const w = img.naturalWidth || img.width || 1;
              const h = img.naturalHeight || img.height || 1;
              finish(img, { x:0, y:0, w, h, footX:w * 0.5, footY:h - 1 });
            }
          };
          img.onerror = () => {
            clearTimeout(watchdog);
            finish(null, null);
          };
          img.src = src;
        }));
      }
    }
    Promise.all(jobs).then(() => { this.readyChars[charId] = true; });
  },

  computeTrim(img) {
    const w = img.naturalWidth || img.width;
    const h = img.naturalHeight || img.height;
    if (!w || !h) return { x:0, y:0, w:1, h:1 };

    // FIX #32: fast trim scan (downscaled) to avoid loading stalls with 2K PNGs.
    const MAX_SCAN = 256;
    const scale = Math.min(1, MAX_SCAN / Math.max(w, h));
    const sw = Math.max(1, Math.round(w * scale));
    const sh = Math.max(1, Math.round(h * scale));
    const c = this._scanCanvas;
    const cx = this._scanCtx;
    c.width = sw; c.height = sh;
    cx.clearRect(0, 0, sw, sh);
    cx.drawImage(img, 0, 0, sw, sh);
    const data = cx.getImageData(0, 0, sw, sh).data;

    let minX = sw, minY = sh, maxX = -1, maxY = -1;
    for (let y = 0; y < sh; y++) {
      for (let x = 0; x < sw; x++) {
        const a = data[(y * sw + x) * 4 + 3];
        if (a > 10) {
          if (x < minX) minX = x;
          if (y < minY) minY = y;
          if (x > maxX) maxX = x;
          if (y > maxY) maxY = y;
        }
      }
    }
    if (maxX < 0 || maxY < 0) return { x:0, y:0, w, h, footX: w / 2, footY: h - 1 };

    let footXSum = 0, footCount = 0;
    for (let x = minX; x <= maxX; x++) {
      const a = data[(maxY * sw + x) * 4 + 3];
      if (a > 10) { footXSum += x; footCount++; }
    }
    const inv = 1 / scale;
    const margin = Math.max(1, Math.round(2 * scale));
    const sx = Math.max(0, (minX - margin) * inv);
    const sy = Math.max(0, (minY - margin) * inv);
    const ex = Math.min(w - 1, (maxX + margin) * inv);
    const ey = Math.min(h - 1, (maxY + margin) * inv);
    const tw = Math.max(1, Math.round(ex - sx + 1));
    const th = Math.max(1, Math.round(ey - sy + 1));
    const footX = footCount > 0 ? (footXSum / footCount) * inv : ((sx + ex) * 0.5);
    return {
      x: Math.round(sx), y: Math.round(sy), w: tw, h: th,
      footX: Math.round(footX - sx), footY: Math.round(ey - sy)
    };
  },

  // FIX #35: Resolve sprite actions with graceful fallbacks for missing files.
  get(charId, action, frameIndex) {
    const def = SPRITE_DEF[charId] || {};
    const fallbacks = (SPRITE_ACTION_FALLBACK[charId] || {});
    const actions = [action];
    if (fallbacks[action]) actions.push(fallbacks[action]);

    for (const act of actions) {
      const count = def[act] || 0;
      if (!count) continue;
      const clampedFrame = Math.max(1, Math.min(count, frameIndex));
      const frame = String(clampedFrame).padStart(2, '0');
      const key = `${charId}:${act}:${frame}`;
      if (this.cache[key]) {
        return { img: this.cache[key], trim: this.trim[key] || null };
      }
    }

    for (const act of actions) {
      const count = def[act] || 0;
      if (!count) continue;
      for (let i = 1; i <= count; i++) {
        const key = `${charId}:${act}:${String(i).padStart(2, '0')}`;
        if (this.cache[key]) return { img: this.cache[key], trim: this.trim[key] || null };
      }
    }

    return { img: null, trim: null };
  },

  count(charId, action) {
    const def = SPRITE_DEF[charId] || {};
    if (def[action]) return def[action];
    const fallback = SPRITE_ACTION_FALLBACK[charId] && SPRITE_ACTION_FALLBACK[charId][action];
    return fallback ? (def[fallback] || 0) : 0;
  },

  progress() {
    if (this.totalCount <= 0) return 0;
    return this.loadedCount / this.totalCount;
  },

  isReady(charId) {
    return !!this.readyChars[charId];
  }
};

const BgImageStore = {
  cache: {},
  init() {
    const files = {
      title: ['ui_title_bg_01.png'],
      charSelect: ['ui_charselect_bg_01.png'],
      diffSelect: ['ui_diffselect_bg_01.png'],
      stageEasy: ['stage_easy_01.png'],
      stageNormal: ['stage_normal_01.png'],
      stageHard: ['stage_hard_01.png', 'tage_hard_01.png'] // FIX #52
    };
    for (const key in files) this.loadAny(key, files[key]);
  },
  loadAny(key, names) {
    const tryAt = (idx) => {
      if (idx >= names.length) { this.cache[key] = null; return; }
      const img = new Image();
      img.decoding = 'async';
      img.onload = () => { this.cache[key] = img; };
      img.onerror = () => { tryAt(idx + 1); };
      img.src = `asset/${names[idx]}`;
    };
    tryAt(0);
  },
  get(key) {
    return this.cache[key] || null;
  },
  draw(ctx, key) {
    const img = this.get(key);
    if (!img) return false;
    ctx.drawImage(img, 0, 0, CFG.INTERNAL_W, CFG.INTERNAL_H);
    return true;
  },
  stageKeyForDifficulty(diff) {
    if (diff === 'easy') return 'stageEasy';
    if (diff === 'hard') return 'stageHard';
    return 'stageNormal';
  }
};

  tryLoadPair(attackerId, defenderId, srcs) {

  tryLoad(cacheKey, srcs) {
    if (!srcs || !srcs.length) return;
    const v = document.createElement('video');
    v.muted = true;
    v.playsInline = true;
    v.loop = false;
    v.preload = 'auto';
    const tryAt = (idx) => {
      if (idx >= srcs.length) { this.cache[cacheKey] = null; return; }
      v.onloadeddata = () => { this.cache[cacheKey] = v; };
      v.onerror = () => { tryAt(idx + 1); };
      v.src = srcs[idx];
      v.load();
    };
    tryAt(0);
  },
  get(attackerId, defenderId) {
    const pair = this.cache[this.key(attackerId, defenderId)];
    if (pair) return pair;
    return this.cache[attackerId] || null;
  }
};

/* ===== SECTION 2: UTILITIES ===== */

function clamp(v, min, max) { return v < min ? min : v > max ? max : v; }
function lerp(a, b, t) { return a + (b - a) * t; }
function rand(min, max) { return Math.random() * (max - min) + min; }
function randInt(min, max) { return Math.floor(rand(min, max + 1)); }
function easeOutCubic(t) { return 1 - Math.pow(1 - t, 3); }
function easeInOutCubic(t) { return t < 0.5 ? 4*t*t*t : 1 - Math.pow(-2*t+2,3)/2; }
function hexToRgb(hex) {
  const r = parseInt(hex.slice(1,3),16), g = parseInt(hex.slice(3,5),16), b = parseInt(hex.slice(5,7),16);
  return {r,g,b};
}
function rgbaStr(hex, a) { const c = hexToRgb(hex); return `rgba(${c.r},${c.g},${c.b},${a})`; }

function drawText(ctx, text, x, y, size, color, align, shadow) {
  const supersample = 2;
  const textAlign = align || 'center';
  const logicalSize = size <= 4 ? size + 1.5 : size + 0.5; // FIX #21
  const fontSize = Math.max(1, Math.round(logicalSize * supersample));

  // FIX #21: Draw text at 2x then downscale for better readability on low-res canvas.
  ctx.save();
  ctx.translate(x, y);
  ctx.scale(1 / supersample, 1 / supersample);
  ctx.textAlign = textAlign;
  ctx.textBaseline = 'middle';
  ctx.lineJoin = 'round';
  ctx.miterLimit = 2;
  ctx.font = `700 ${fontSize}px "Trebuchet MS","Hiragino Sans","Yu Gothic","Segoe UI",sans-serif`;

  if (shadow !== false) {
    ctx.fillStyle = 'rgba(0,0,0,0.9)';
    ctx.fillText(text, 2, 2);
  }

  ctx.strokeStyle = 'rgba(0,0,0,0.85)';
  ctx.lineWidth = Math.max(1.4, Math.round(fontSize * 0.14));
  ctx.strokeText(text, 0, 0);

  ctx.fillStyle = color || '#FFFFFF';
  ctx.fillText(text, 0, 0);
  ctx.restore();
}

function drawTitleLogo(ctx, x, y, pulse) {

  ctx.save();

function drawCharacterPortrait(ctx, charId, x, y, w, h, facingRight, opts) {
  const mode = (opts && opts.mode) || 'default';
  const pal = PALETTE[charId];
  ctx.save();
  ctx.beginPath();
  ctx.rect(x, y, w, h);
  ctx.clip();
  ctx.fillStyle = '#0F111A';
  ctx.fillRect(x, y, w, h);
  const g = ctx.createLinearGradient(x, y, x, y + h);
  g.addColorStop(0, 'rgba(255,255,255,0.06)');
  g.addColorStop(1, 'rgba(0,0,0,0.25)');
  ctx.fillStyle = g;
  ctx.fillRect(x, y, w, h);

  if (SpriteStore.isReady(charId)) {
    const sp = SpriteStore.get(charId, 'idle', 1);
    if (sp.img && sp.trim) {
      const t = sp.trim;
      // FIX #47: Separate card/VS portrait framing to avoid head clipping on select cards.
      const sx = t.x;
      const sw = t.w;
      const sy = mode === 'card' ? t.y : (t.y + Math.floor(t.h * 0.04));
      const sh = Math.max(1, Math.floor(t.h * (mode === 'card' ? 0.68 : 0.72)));
      const scale = mode === 'card'
        ? Math.min(w / sw, h / sh) * 1.08
        : Math.max(w / sw, h / sh);
      const dw = sw * scale;
      const dh = sh * scale;
      const dx = x + (w - dw) / 2;
      const dy = mode === 'card'
        ? (y + 1)
        : (y + (h - dh) / 2 + h * 0.08);
      if (facingRight) {
        ctx.drawImage(sp.img, sx, sy, sw, sh, dx, dy, dw, dh);
      } else {
        ctx.save();
        ctx.translate(x + w, 0);
        ctx.scale(-1, 1);
        ctx.drawImage(sp.img, sx, sy, sw, sh, w - (dx - x) - dw, dy, dw, dh);
        ctx.restore();
      }
      ctx.restore();
      return;
    }
  }

  const px = x + w * 0.5;
  const py = y + h * 0.8;
  const dir = facingRight ? 1 : -1;
  ctx.fillStyle = pal.main;
  ctx.fillRect(px - 10, py - 16, 20, 18);
  ctx.fillStyle = pal.skin;
  ctx.fillRect(px - 7, py - 28, 14, 12);
  if (pal.hair) {
    ctx.fillStyle = pal.hair;
    ctx.fillRect(px - 7, py - 28, 14, 5);
  }
  ctx.fillStyle = pal.sub;
  ctx.fillRect(px - 11 + dir * 2, py - 8, 8, 4);
  ctx.fillStyle = pal.outline;
  ctx.strokeRect(px - 10, py - 16, 20, 18);
  ctx.strokeRect(px - 7, py - 28, 14, 12);
  ctx.restore();
}

function aabbOverlap(a, b) {
  return a.x < b.x + b.w && a.x + a.w > b.x && a.y < b.y + b.h && a.y + a.h > b.y;
}

/* ===== SECTION 3: CORE ENGINE ===== */

class EventBus {
  constructor() { this.listeners = {}; }
  on(event, cb) { (this.listeners[event] = this.listeners[event] || []).push(cb); }
  off(event, cb) {
    if (this.listeners[event]) this.listeners[event] = this.listeners[event].filter(c => c !== cb);
  }
  emit(event, data) { (this.listeners[event] || []).forEach(cb => cb(data)); }
  clear() { this.listeners = {}; }
}

const eventBus = new EventBus();

class SceneManager {
  constructor() { this.current = null; this.scenes = {}; }
  add(name, scene) { this.scenes[name] = scene; }
  go(name, data) {
    if (this.current && this.scenes[this.current] && this.scenes[this.current].exit)
      this.scenes[this.current].exit();
    this.current = name;
    if (this.scenes[name] && this.scenes[name].enter)
      this.scenes[name].enter(data);
  }
  update() { if (this.scenes[this.current] && this.scenes[this.current].update) this.scenes[this.current].update(); }
  render(ctx) { if (this.scenes[this.current] && this.scenes[this.current].render) this.scenes[this.current].render(ctx); }
}

class Camera {
  constructor() { this.x = 0; this.shakeX = 0; this.shakeY = 0; this.shakeFrames = 0; this.shakeMag = 0; }
  follow(x1, x2) {
    const mid = (x1 + x2) / 2;
    const halfW = CFG.INTERNAL_W / 2;
    this.x = clamp(mid - halfW, 0, CFG.STAGE_W - CFG.INTERNAL_W);
  }
  shake(mag, frames) { this.shakeMag = mag; this.shakeFrames = frames; }
  update() {
    if (this.shakeFrames > 0) {
      this.shakeX = rand(-this.shakeMag, this.shakeMag);
      this.shakeY = rand(-this.shakeMag, this.shakeMag);
      this.shakeFrames--;
    } else { this.shakeX = 0; this.shakeY = 0; }
  }
  getOffset() { return { x: -this.x + this.shakeX, y: this.shakeY }; }
}

/* ===== SECTION 4: INPUT ===== */

const CommandInterpreter = {
  adjacentMap: {
    1:[1,2,4], 2:[1,2,3], 3:[2,3,6],
    4:[1,4,7], 5:[5],     6:[3,6,9],
    7:[4,7,8], 8:[7,8,9], 9:[6,8,9]
  },
  isNear(inputDir, targetDir) {
    const list = this.adjacentMap[targetDir] || [targetDir];
    return list.includes(inputDir);
  },
  matchSequence(bufferDirs, cmdDirs, tolerance) {
    if (!bufferDirs.length || !cmdDirs.length) return false;
    let cmdIdx = cmdDirs.length - 1;
    let miss = 0;
    const maxMiss = Math.max(tolerance || 0, Math.floor(cmdDirs.length / 2));
    for (let i = bufferDirs.length - 1; i >= 0 && cmdIdx >= 0; i--) {
      if (this.isNear(bufferDirs[i], cmdDirs[cmdIdx])) {
        cmdIdx--;
      } else {
        miss++;
        if (miss > maxMiss) return false;
      }
    }
    return cmdIdx < 0;
  }
};

class InputManager {
  constructor() {
    this.keys = {};
    this.justPressed = {};
    this.prevKeys = {};
    this.dirBuffer = [];
    this.mashCount = 0;
    this.mashTimer = 0;
    this.chargeTimers = { 4: 0, 2: 0 };
    this.chargeReady = { 4: false, 2: false };
    this.chargeRelease = { 4: 0, 2: 0 };
    this._onDown = e => { this.keys[e.code] = true; e.preventDefault(); };
    this._onUp = e => { this.keys[e.code] = false; e.preventDefault(); };
    document.addEventListener('keydown', this._onDown);
    document.addEventListener('keyup', this._onUp);
  }
  update(facingRight) {
    this.justPressed = {};
    for (let k in this.keys) {
      if (this.keys[k] && !this.prevKeys[k]) this.justPressed[k] = true;
    }
    const dir = this.getDirection(facingRight);
    // FIX #5: Command buffer ignores neutral and keeps only directional transitions.
    if (dir !== 5) {
      if (this.dirBuffer.length === 0 || this.dirBuffer[this.dirBuffer.length - 1].dir !== dir) {
        this.dirBuffer.push({ dir, age: 0 });
      }
    }
    for (let i = this.dirBuffer.length - 1; i >= 0; i--) {
      this.dirBuffer[i].age++;
      if (this.dirBuffer[i].age > CFG.INPUT_BUFFER) this.dirBuffer.splice(i, 1);
    }
    // FIX #33: Player mash tracking now uses LP/HP only (MP removed from key layout).
    if (this.justPressed[KEYS.LP] || this.justPressed[KEYS.HP]) {
      this.mashCount++;
      this.mashTimer = CFG.MASH_WINDOW; // FIX #9
    }
    if (this.mashTimer > 0) this.mashTimer--;
    else this.mashCount = 0;

    for (let d of [4, 2]) {
      const held = (d === 4 && this.isHeld(facingRight ? KEYS.LEFT : KEYS.RIGHT)) ||
                   (d === 2 && this.keys[KEYS.DOWN]);
      if (held) {
        this.chargeTimers[d]++;
        if (this.chargeTimers[d] >= CFG.CHARGE_FRAMES) this.chargeReady[d] = true;
        this.chargeRelease[d] = 0;
      } else {
        if (this.chargeReady[d]) {
          this.chargeRelease[d]++;
          if (this.chargeRelease[d] > CFG.CHARGE_HOLD) {
            this.chargeReady[d] = false;
          }
        }
        this.chargeTimers[d] = 0;
      }
    }
    this.prevKeys = Object.assign({}, this.keys);
  }
  isHeld(code) { return !!this.keys[code]; }
  wasPressed(code) { return !!this.justPressed[code]; }
  getDirection(facingRight) {
    const l = this.keys[KEYS.LEFT], r = this.keys[KEYS.RIGHT],
          u = this.keys[KEYS.UP], d = this.keys[KEYS.DOWN];
    let h = 0, v = 0;
    if (l) h = -1; if (r) h = 1;
    if (u) v = -1; if (d) v = 1;
    if (h === 0 && v === 0) return 5;
    const fwd = facingRight ? 1 : -1;
    const relH = h * fwd;
    if (v === -1) { if (relH < 0) return 7; if (relH > 0) return 9; return 8; }
    if (v === 1) { if (relH < 0) return 1; if (relH > 0) return 3; return 2; }
    if (relH < 0) return 4; return 6;
  }
  checkCommand(cmdDirs) {
    // FIX #5: Use partial subsequence matching with diagonal tolerance.
    const dirs = this.dirBuffer.map(e => e.dir).filter(d => d !== 5);
    return CommandInterpreter.matchSequence(dirs, cmdDirs, CFG.COMMAND_MISS_TOLERANCE);
  }
  getPressedButton() {
    if (this.justPressed[KEYS.LP]) return 'LP';
    if (this.justPressed[KEYS.HP]) return 'HP';
    if (this.justPressed[KEYS.LK]) return 'LK';
    if (this.justPressed[KEYS.HK]) return 'HK';
    return null;
  }
  getStrength(btn) {
    if (!btn) return null;
    if (btn.endsWith('P') || btn.endsWith('K')) {
      if (btn.startsWith('L')) return 'L';
      if (btn.startsWith('M')) return 'M';
      return 'H';
    }
    return 'L';
  }
  isAttackButton(btn) { return btn && (btn.endsWith('P') || btn.endsWith('K')); }
  isPunch(btn) { return btn && btn.endsWith('P'); }
  isKick(btn) { return btn && btn.endsWith('K'); }
  reset() {
    this.dirBuffer = [];
    this.mashCount = 0;
    this.mashTimer = 0;
    this.chargeTimers = { 4:0, 2:0 };
    this.chargeReady = { 4:false, 2:false };
    this.chargeRelease = { 4:0, 2:0 };
  }
}

/* ===== SECTION 5: PHYSICS ===== */

const CollisionSystem = {
  checkHit(attacker, defender) {
    if (!attacker.hitBox || !defender.hurtBox) return false;
    return aabbOverlap(attacker.hitBox, defender.hurtBox);
  },
  checkThrow(thrower, target) {
    const dist = Math.abs(thrower.x - target.x);
    return dist <= CFG.THROW_RANGE && target.y >= CFG.GROUND_Y - 2 && !target.isInvincible();
  },
  resolvePushboxes(f1, f2) {
    const clampToStage = (f) => {
      // FIX #75: Keep full sprite body visible at stage edges, not just pushbox center.
      const minX = Math.max(f.pushW / 2, CFG.CHAR_EDGE_PADDING);
      const maxX = CFG.STAGE_W - Math.max(f.pushW / 2, CFG.CHAR_EDGE_PADDING);
      const before = f.x;
      f.x = clamp(f.x, minX, maxX);
      return before !== f.x;
    };
    const pushApart = (a, b, amount) => {
      if (a.x < b.x) { a.x -= amount; b.x += amount; }
      else { a.x += amount; b.x -= amount; }
    };

    clampToStage(f1);
    clampToStage(f2);

    const hw1 = f1.pushW / 2, hw2 = f2.pushW / 2;
    let overlap = (hw1 + hw2) - Math.abs(f1.x - f2.x);
    if (overlap > 0) {
      pushApart(f1, f2, overlap / 2 + 0.5);
    }

    // FIX #4: Re-apply stage clamps after pushbox resolution and resolve residual overlap.
    const c1 = clampToStage(f1);
    const c2 = clampToStage(f2);
    overlap = (hw1 + hw2) - Math.abs(f1.x - f2.x);
    if (overlap > 0) {
      if (c1 && !c2) {
        if (f1.x < f2.x) f2.x += overlap + 0.5;
        else f2.x -= overlap + 0.5;
      } else if (c2 && !c1) {
        if (f1.x < f2.x) f1.x -= overlap + 0.5;
        else f1.x += overlap + 0.5;
      } else {
        pushApart(f1, f2, overlap / 2 + 0.5);
      }
      clampToStage(f1);
      clampToStage(f2);
    }
  }
};

/* ===== SECTION 6: RENDERING ===== */

class ParticleManager {
  constructor() {
    this.pool = [];
    for (let i = 0; i < CFG.MAX_PARTICLES; i++)
      this.pool.push({ active:false, x:0, y:0, vx:0, vy:0, life:0, maxLife:0, color:'#FFF', size:1, gravity:0, fade:true });
    this.idx = 0;
  }
  spawn(x, y, vx, vy, life, color, size, gravity, fade) {
    const p = this.pool[this.idx];
    p.active = true; p.x = x; p.y = y; p.vx = vx; p.vy = vy;
    p.life = life; p.maxLife = life; p.color = color; p.size = size;
    p.gravity = gravity || 0; p.fade = fade !== false;
    this.idx = (this.idx + 1) % CFG.MAX_PARTICLES;
  }
  spawnHitSpark(x, y) {
    for (let i = 0; i < 8; i++) {
      const a = rand(0, Math.PI * 2), s = rand(0.5, 2);
      this.spawn(x, y, Math.cos(a)*s, Math.sin(a)*s, 12, i%2?'#FFFFFF':'#FFFF44', rand(0.5,1.5), 0.05, true);
    }
  }
  spawnBlockSpark(x, y) {
    for (let i = 0; i < 5; i++) {
      const a = rand(0, Math.PI * 2), s = rand(0.3, 1.5);
      this.spawn(x, y, Math.cos(a)*s, Math.sin(a)*s, 8, i%2?'#AACCFF':'#FFFFFF', rand(0.5,1.2), 0.03, true);
    }
  }
  update() {
    for (let p of this.pool) {
      if (!p.active) continue;
      p.x += p.vx; p.y += p.vy; p.vy += p.gravity; p.life--;
      if (p.life <= 0) p.active = false;
    }
  }
  render(ctx) {
    for (let p of this.pool) {
      if (!p.active) continue;
      ctx.globalAlpha = p.fade ? p.life / p.maxLife : 1;
      ctx.fillStyle = p.color;
      // FIX #45: Render particles as soft circles to avoid square artifact flashes.
      ctx.beginPath();
      ctx.arc(Math.round(p.x), Math.round(p.y), Math.max(0.6, p.size * 0.65), 0, Math.PI * 2);
      ctx.fill();
    }
    ctx.globalAlpha = 1;
  }
  clear() { for (let p of this.pool) p.active = false; }
}

const particles = new ParticleManager();

/* ===== SECTION 7: ENTITIES (Fighter + Projectile) ===== */

class Projectile {
  constructor() { this.active = false; }
  fire(x, y, speed, damage, owner, facingRight, styleId) {
    this.active = true;
    this.x = x; this.y = y;
    this.speed = facingRight ? speed : -speed;
    this.damage = damage;
    this.owner = owner;
    this.facingRight = facingRight;
    this.styleId = styleId || 'kenji';
    this.life = CFG.PROJ_MAX_LIFE;
    this.hitBox = { x: x - CFG.PROJ_SIZE/2, y: y - CFG.PROJ_SIZE/2, w: CFG.PROJ_SIZE, h: CFG.PROJ_SIZE };
    this.trail = [];
  }
  update() {
    if (!this.active) return;
    this.trail.push({ x: this.x, y: this.y, age: 0 });
    if (this.trail.length > 3) this.trail.shift();
    for (let t of this.trail) t.age++;
    this.x += this.speed;
    this.hitBox.x = this.x - CFG.PROJ_SIZE/2;
    this.hitBox.y = this.y - CFG.PROJ_SIZE/2;
    this.life--;
    if (this.life <= 0 || this.x < -10 || this.x > CFG.STAGE_W + 10) this.active = false;
  }
  render(ctx, camOff) {
    if (!this.active) return;
    const ox = camOff.x, oy = camOff.y;
    const base = CFG.PROJ_SIZE;
    // FIX #40: Use Kenji hadou-ball PNG when available.
    if (this.styleId === 'kenji') {
      const ball = SpriteStore.get('kenji', 'hadou_ball', 1);
      if (ball.img && ball.trim) {
        const t = ball.trim;
        const pulse = 1 + Math.sin((CFG.PROJ_MAX_LIFE - this.life) * 0.4) * 0.07;
        // FIX #42: Upscale hadou ball to character-class presence.
        const size = Math.max(base * 7.2, 62) * pulse;
        const x = Math.round(this.x + ox);
        const y = Math.round(this.y + oy);
        for (let i = 0; i < this.trail.length; i++) {
          const tr = this.trail[i];
          const a = 0.18 * (i + 1) / this.trail.length;
          const ts = size * (0.78 + i * 0.08);
          ctx.globalAlpha = a;
          ctx.drawImage(ball.img, t.x, t.y, t.w, t.h, Math.round(tr.x + ox - ts * 0.5), Math.round(tr.y + oy - ts * 0.5), Math.round(ts), Math.round(ts));
        }
        // FIX #48: Remove translucent square aura behind projectile image.
        ctx.globalAlpha = 1;
        ctx.drawImage(ball.img, t.x, t.y, t.w, t.h, Math.round(x - size * 0.5), Math.round(y - size * 0.5), Math.round(size), Math.round(size));
        return;
      }
    }
    if (this.styleId === 'vance') {
      // FIX #65: Use Vance sonic-boom sprite when available.
      const ball = SpriteStore.get('vance', 'hadou_ball', 1);
      if (ball.img && ball.trim) {
        const t = ball.trim;
        const pulse = 1 + Math.sin((CFG.PROJ_MAX_LIFE - this.life) * 0.36) * 0.05;
        const sizeW = Math.max(base * 9.5, 84) * pulse;
        const sizeH = Math.max(base * 4.2, 34) * pulse;
        const x = Math.round(this.x + ox);
        const y = Math.round(this.y + oy);
        for (let i = 0; i < this.trail.length; i++) {
          const tr = this.trail[i];
          const a = 0.16 * (i + 1) / this.trail.length;
          ctx.globalAlpha = a;
          ctx.drawImage(
            ball.img, t.x, t.y, t.w, t.h,
            Math.round(tr.x + ox - sizeW * 0.45), Math.round(tr.y + oy - sizeH * 0.5),
            Math.round(sizeW * (0.86 + i * 0.06)), Math.round(sizeH * (0.86 + i * 0.06))
          );
        }
        ctx.globalAlpha = 1;
        ctx.drawImage(ball.img, t.x, t.y, t.w, t.h, Math.round(x - sizeW * 0.5), Math.round(y - sizeH * 0.5), Math.round(sizeW), Math.round(sizeH));
        return;
      }
    }
    if (this.styleId === 'meilin') {
      // FIX #71: Use Mei-Lin projectile sprite when available.
      const ball = SpriteStore.get('meilin', 'hadou_ball', 1);
      if (ball.img && ball.trim) {
        const t = ball.trim;
        const pulse = 1 + Math.sin((CFG.PROJ_MAX_LIFE - this.life) * 0.45) * 0.06;
        const size = Math.max(base * 6.4, 52) * pulse;
        const x = Math.round(this.x + ox);
        const y = Math.round(this.y + oy);
        for (let i = 0; i < this.trail.length; i++) {
          const tr = this.trail[i];
          const a = 0.15 * (i + 1) / this.trail.length;
          const ts = size * (0.8 + i * 0.05);
          ctx.globalAlpha = a;
          ctx.drawImage(ball.img, t.x, t.y, t.w, t.h, Math.round(tr.x + ox - ts * 0.5), Math.round(tr.y + oy - ts * 0.5), Math.round(ts), Math.round(ts));
        }
        ctx.globalAlpha = 1;
        ctx.drawImage(ball.img, t.x, t.y, t.w, t.h, Math.round(x - size * 0.5), Math.round(y - size * 0.5), Math.round(size), Math.round(size));
        return;
      }
    }
    // FIX #14: Character-specific projectile visuals.
    if (this.styleId === 'vance') {
      for (let t of this.trail) {
        ctx.globalAlpha = 0.18 * (1 - t.age / 4);
        ctx.strokeStyle = '#88EEFF';
        ctx.lineWidth = 1.2;
        ctx.beginPath();
        ctx.arc(Math.round(t.x + ox), Math.round(t.y + oy), Math.max(2, base * 0.9 - t.age), 0, Math.PI * 2);
        ctx.stroke();
      }
      ctx.globalAlpha = 1;
      ctx.strokeStyle = '#AAFFFF';
      ctx.lineWidth = 1.8;
      ctx.beginPath();
      ctx.arc(Math.round(this.x + ox), Math.round(this.y + oy), base * 0.9, 0, Math.PI * 2);
      ctx.stroke();
      ctx.strokeStyle = '#44CCFF';
      ctx.beginPath();
      ctx.arc(Math.round(this.x + ox), Math.round(this.y + oy), base * 0.45, 0, Math.PI * 2);
      ctx.stroke();
      return;
    }

    const trailA = this.styleId === 'sagar' ? '#FF7733' : '#77CCFF';
    const trailB = this.styleId === 'sagar' ? '#FFCC66' : '#AADDFF';
    const core = this.styleId === 'sagar' ? '#FFEE88' : '#FFFFFF';
    const trailSize = Math.max(4, Math.round(base * 0.8));
    const shell = Math.max(6, Math.round(base * 1.35));
    const coreSize = Math.max(3, Math.round(base * 0.55));
    for (let t of this.trail) {
      ctx.globalAlpha = 0.35 * (1 - t.age / 4);
      ctx.fillStyle = (t.age % 2 === 0) ? trailA : trailB;
      ctx.fillRect(Math.round(t.x + ox - trailSize / 2), Math.round(t.y + oy - trailSize / 2), trailSize, trailSize);
    }
    ctx.globalAlpha = 1;
    ctx.fillStyle = trailA;
    ctx.fillRect(Math.round(this.x + ox - shell / 2), Math.round(this.y + oy - shell / 2), shell, shell);
    ctx.fillStyle = core;
    ctx.fillRect(Math.round(this.x + ox - coreSize / 2), Math.round(this.y + oy - coreSize / 2), coreSize, coreSize);
  }
  destroy() { this.active = false; }
}

    if (!keepSuper) this.superMeter = 0;
  }

  // FIX #54: Super gauge helpers.
  addSuperMeter(amount) {
    this.superMeter = clamp(this.superMeter + amount, 0, CFG.SUPER_MAX);
  }
  canUseSuper() {
    return this.superMeter >= CFG.SUPER_MAX && this.canAct();
  }
  consumeSuper() {
    this.superMeter = 0;
  }

  isOnGround() { return this.y >= CFG.GROUND_Y - 0.5; }
  isInvincible() { return this.invincibleFrames > 0; }
  isInAttack() {
    return this.state === STATES.STAND_ATTACK || this.state === STATES.CROUCH_ATTACK ||
           this.state === STATES.JUMP_ATTACK || this.state === STATES.SPECIAL;
  }
  isInHitstun() { return this.state === STATES.HITSTUN || this.state === STATES.BLOCKSTUN; }
  isInKnockdown() { return this.state === STATES.KNOCKDOWN || this.state === STATES.GETUP; }
  canAct() {
    return this.state === STATES.IDLE || this.state === STATES.WALK_F ||
           this.state === STATES.WALK_B || this.state === STATES.CROUCH;
  }
  canBlock() {
    return !this.isInAttack() && !this.isInKnockdown() && this.state !== STATES.THROWN &&
           this.state !== STATES.THROW;
  }

  updateFacing(other) {
    if (this.canAct() || this.state === STATES.IDLE) {
      this.facingRight = this.x < other.x;
    }
  }

  takeDamage(dmg, hitstun, blockstun, knockback, isBlocked, type, isSpecial, comboCount) {
    const scaling = CFG.COMBO_SCALING[Math.min(comboCount, CFG.COMBO_SCALING.length - 1)];
    let finalDmg;
    if (isBlocked) {
      finalDmg = isSpecial ? Math.round(dmg * CFG.CHIP_SPECIAL) : 0;
      this.blockstunFrames = blockstun;
      this.state = STATES.BLOCKSTUN;
      this.knockbackVx = (this.facingRight ? -1 : 1) * knockback * 0.1;
    } else {
      finalDmg = Math.round(dmg * scaling);
      if (type === 'low' && this.data.normals.crouchHK && this.data.normals.crouchHK.sweep && hitstun === 0) {
        this.state = STATES.KNOCKDOWN;
        this.stateTimer = CFG.WAKEUP_TIME;
        this.vy = -1.5;
        this.knockbackVx = (this.facingRight ? -1 : 1) * 1.5;
      } else {
        this.hitstunFrames = hitstun;
        this.state = STATES.HITSTUN;
        this.knockbackVx = (this.facingRight ? -1 : 1) * knockback * 0.2;
      }
    }
    this.hp = Math.max(0, this.hp - finalDmg);
    this.stateTimer = 0;
    this.animFrame = 0;
    return finalDmg;
  }

  applyKnockdown() {
    this.state = STATES.KNOCKDOWN;
    this.stateTimer = CFG.WAKEUP_TIME;
    this.vy = -2;
    this.knockbackVx = (this.facingRight ? -1 : 1) * 1;
  }

  startKoBlowAway(attackerX) {
    // FIX #15: KO defeat follows a parabola and includes bounce before settling.
    const awayDir = this.x >= attackerX ? 1 : -1;
    this.state = STATES.KO_FLY;
    this.vy = -3.6;
    this.koVx = awayDir * 2.4;
    this.koBounces = 1;
    this.hitBox = null;
  }

  startAttack(attackName, isCrouch) {
    const atk = this.data.normals[attackName];
    if (!atk) return;
    this.currentAttack = attackName;
    this.currentSpecial = null;
    this.state = isCrouch ? STATES.CROUCH_ATTACK :
                 (attackName.startsWith('jump') ? STATES.JUMP_ATTACK : STATES.STAND_ATTACK);
    this.attackPhase = 'startup';
    this.attackFrame = 0;
    this.hasHitThisAttack = false;
    this.animFrame = 0;
  }

  startSpecial(specialName, version) {
    this.currentSpecial = specialName;
    this.specialVersion = version;
    this.currentAttack = null;
    this.state = STATES.SPECIAL;
    this.attackPhase = 'startup';
    this.attackFrame = 0;
    this.hasHitThisAttack = false;
    this.specialHitCount = 0;
    this.specialHitTimer = 0;
    this.animFrame = 0;
    this.projectilePoseFrames = 0;
  }

  getAttackData() {
    if (this.currentAttack) return this.data.normals[this.currentAttack];
    if (this.currentSpecial) {
      const sp = this.data.specials[this.currentSpecial];
      if (sp && sp.versions) return sp.versions[this.specialVersion] || sp.versions.L;
    }
    return null;
  }

  getSpecialData() {
    if (!this.currentSpecial) return null;
    return this.data.specials[this.currentSpecial];
  }

  markHitConfirm(isBlocked) {
    this.lastHitBlocked = !!isBlocked;
    this.hitConfirmFrames = isBlocked ? 0 : CFG.HIT_CONFIRM_WINDOW;
  }

  canSpecialCancel() {
    return this.hitConfirmFrames > 0 && !this.lastHitBlocked && !!this.currentAttack;
  }

  getCurrentAttackStrength() {
    const name = this.currentAttack || '';
    if (name.endsWith('LP') || name.endsWith('LK')) return 'L';
    if (name.endsWith('MP') || name.endsWith('MK')) return 'M';
    if (name.endsWith('HP') || name.endsWith('HK')) return 'H';
    return null;
  }

  getNormalHitbox(dir, reach) {
    // FIX #68: Expand normal hitboxes to better match visible punch/kick reach.
    const atkName = this.currentAttack || '';
    const isPunch = atkName.endsWith('P');
    const isKick = atkName.endsWith('K');
    const isCrouch = atkName.startsWith('crouch');
    const isJump = atkName.startsWith('jump');
    const strength = this.getCurrentAttackStrength();
    const tier = strength === 'H' ? 2 : (strength === 'M' ? 1 : 0);

    let forward = isPunch ? [16, 21, 27][tier] : [18, 24, 30][tier];
    let backward = isPunch ? [11, 14, 17][tier] : [12, 15, 18][tier];
    let width = forward + backward;
    let height = isPunch ? [14, 16, 18][tier] : [15, 17, 19][tier];
    let yTop = isPunch ? -20 : -13;

    if (isCrouch) {
      yTop += 6;
      if (isKick) { width += 5; forward += 3; backward += 2; }
    }
    if (isJump) {
      yTop -= 2;
      if (isKick) { width += 6; height += 2; }
    }

    const reachBonus = Math.max(0, Math.floor((reach - 12) / 4));
    forward += reachBonus * 2;
    width += reachBonus * 3 + 8;
    height += 1;

    const left = dir > 0 ? (this.x - backward) : (this.x - forward);
    return { x: left, y: this.y + yTop, w: width, h: height };
  }

  getKenjiSpriteAction() {
    const atk = this.currentAttack || '';
    const sp = this.getSpecialData();
    switch (this.state) {
      case STATES.IDLE:
      case STATES.LANDING:
      case STATES.THROW:
        return 'idle';
      case STATES.WALK_F:
        return 'walk_f';
      case STATES.WALK_B:
        return 'walk_b';
      case STATES.CROUCH:
        return 'crouch';
      case STATES.JUMP_RISE:
      case STATES.JUMP_PEAK:
      case STATES.JUMP_FALL:
        return 'jump';
      case STATES.STAND_ATTACK:
      case STATES.CROUCH_ATTACK:
      case STATES.JUMP_ATTACK:
        if (atk.endsWith('P')) return (atk.endsWith('HP') || atk.endsWith('MP')) ? 'stand_hp' : 'stand_lp';
        if (atk.endsWith('K')) return (atk.endsWith('HK') || atk.endsWith('MK')) ? 'stand_hk' : 'stand_lk';
        return 'stand_lp';
      case STATES.SPECIAL:
        if (!sp) return 'stand_hp';
        // FIX #34: Use dedicated special sprite actions when available.
        if (sp.type === 'projectile') return 'hadou';
        if (sp.type === 'antiAir') return 'shoryu';
        if (sp.type === 'rapid') return 'stand_lk';
        if (sp.type === 'advancing') return 'stand_hk';
        if (sp.type === 'teleport') return 'idle';
        return 'stand_hp';
      case STATES.HITSTUN:
        return 'hit';
      case STATES.BLOCKSTUN:
        return 'block';
      case STATES.KNOCKDOWN:
      case STATES.KO_FLY:
      case STATES.THROWN:
      case STATES.LOSE:
      case STATES.GETUP:
        return 'ko';
      case STATES.WIN:
        return 'win';
      default:
        return 'idle';
    }
  }

  updateKenjiSpriteAction(action) {
    if (this.spriteAction !== action) {
      this.spriteAction = action;
      this.spriteActionTime = 0;
      this.spriteFrame = 1;
    }
  }

  getKenjiSpriteFrame(action, count) {
    if (count <= 1) return 1;
    const cfgMap = CHAR_ANIM_CFG[this.charId] || CHAR_ANIM_CFG.kenji;
    const cfg = cfgMap[action] || { frames:[1], fps:8, loop:true };
    const seq = cfg.frames.map((n) => Math.max(1, Math.min(count, n)));
    if (!seq.length) return 1;

    if (action === 'jump') {
      if (this.state === STATES.JUMP_RISE) return seq[0];
      if (this.state === STATES.JUMP_PEAK) return seq[Math.min(1, seq.length - 1)];
      return seq[Math.min(2, seq.length - 1)];
    }
    if (this.state === STATES.STAND_ATTACK || this.state === STATES.CROUCH_ATTACK ||
        this.state === STATES.JUMP_ATTACK || this.state === STATES.SPECIAL) {
      // FIX #61: Always prefer hadou frame 2 once startup has progressed.
      if (action === 'hadou') {
        if (this.attackPhase === 'startup') return seq[0];
        return seq[Math.min(1, seq.length - 1)];
      }
      if (this.attackPhase === 'startup') return seq[0];
      if (this.attackPhase === 'active') return seq[Math.max(0, Math.floor((seq.length - 1) * 0.5))];
      if (this.attackPhase === 'recovery') return seq[seq.length - 1];
      return seq[0];
    }
    if (action === 'ko') {
      if (this.state === STATES.LOSE) return seq[seq.length - 1];
      return this.koBounces > 0 ? seq[0] : seq[seq.length - 1];
    }

    const frameSpan = Math.max(1, Math.round(CFG.FPS / Math.max(1, cfg.fps)));
    let idx = Math.floor(this.spriteActionTime / frameSpan);
    if (cfg.loop) idx %= seq.length;
    else idx = Math.min(seq.length - 1, idx);
    return seq[idx];
  }

  renderKenjiSprite(ctx, dir) {
    const spriteCharId = this.charId;
    if (!SpriteStore.isReady(spriteCharId)) return false;
    const action = this.getKenjiSpriteAction();
    this.updateKenjiSpriteAction(action);
    const frameCount = SpriteStore.count(spriteCharId, action);
    if (!frameCount) return false;
    const frame = this.getKenjiSpriteFrame(action, frameCount);
    const sprite = SpriteStore.get(spriteCharId, action, frame);
    if (!sprite.img || !sprite.trim) return false;
    this.spriteFrame = frame;

    const trim = sprite.trim;
    // FIX #70: Scale all characters to 0.9x.
    const baseHeightMap = { kenji: 77, vance: 77, meilin: 77 };
    const baseHeight = baseHeightMap[spriteCharId] || 77;
    const scaleByAction = action === 'crouch' ? 0.86 :
                          action === 'jump' ? 1.03 :
                          action === 'ko' ? 0.95 : 1.0;
    const drawH = baseHeight * scaleByAction;
    const drawW = drawH * (trim.w / trim.h);
    const footX = (trim.footX / Math.max(1, trim.w)) * drawW;
    const footY = (trim.footY / Math.max(1, trim.h)) * drawH;
    // FIX #59: Push Kenji render position downward to reduce floating look.
    // FIX #82: Lower imported sprites slightly to reduce floating look.
    const groundOffsetMap = { kenji: 16, vance: 16, meilin: 16 };
    const drawY = -footY + (groundOffsetMap[spriteCharId] || 16);

    const drawOne = (img, sx, sy, sw, sh, alpha, offsetX, offsetY) => {
      ctx.save();
      ctx.globalAlpha = alpha;
      const baseX = -footX + offsetX;
      // FIX #67: Use explicit transform mirror so 2P/right-side sprites always face opponent.
      if (dir < 0) {
        ctx.scale(-1, 1);
        ctx.drawImage(img, sx, sy, sw, sh, -(baseX + drawW), drawY + offsetY, drawW, drawH);
      } else {
        ctx.drawImage(img, sx, sy, sw, sh, baseX, drawY + offsetY, drawW, drawH);
      }
      ctx.restore();
    };

    // FIX #30: Add depth shadow and smear trails for high-quality kenji sprite rendering.
    ctx.save();
    ctx.globalAlpha = 0.24;
    ctx.fillStyle = '#000000';
    ctx.translate(0, -1);
    ctx.scale(1, 0.32);
    ctx.beginPath();
    ctx.arc(0, 0, Math.max(3, drawW * 0.28), 0, Math.PI * 2);
    ctx.fill();
    ctx.restore();

    if ((action === 'stand_hp' || action === 'stand_hk') && this.attackPhase === 'active') {
      const prevFrame = Math.max(1, frame - 1);
      const prev = SpriteStore.get(spriteCharId, action, prevFrame);
      if (prev.img && prev.trim) {
        drawOne(prev.img, prev.trim.x, prev.trim.y, prev.trim.w, prev.trim.h, 0.25, dir * -1.8, 0);
      }
    }

    // FIX #29: Render kenji from PNG sprites with automatic alpha-trim anchoring.
    drawOne(sprite.img, trim.x, trim.y, trim.w, trim.h, 1, 0, 0);

    // FIX #60: Remove translucent strong-attack rectangle artifact.
    // FIX #62: Remove translucent hit/block rectangles around Kenji sprite.

    if (GAME.DEBUG) {
      drawText(ctx, `${action}:${String(frame).padStart(2, '0')}`, 0, -drawH - 6, 2.8, '#88FFAA', 'center', false);
    }
    return true;
  }

  updateAttack() {
    const atk = this.getAttackData();
    if (!atk) { this.returnToIdle(); return; }
    this.attackFrame++;
    const sp = this.getSpecialData();

    // FIX #2: Normalize unknown attack phases so attacks always progress to recovery/idle.
    if (this.attackPhase === 'none') {
      this.attackPhase = 'startup';
      this.attackFrame = 0;
    }
    if (this.attackPhase !== 'startup' && this.attackPhase !== 'active' && this.attackPhase !== 'recovery') {
      this.attackPhase = 'recovery';
      this.attackFrame = 0;
      this.hitBox = null;
      this.hasHitThisAttack = true;
    }

    if (this.attackPhase === 'startup') {
      if (sp && sp.type === 'antiAir' && atk.invStart !== undefined) {
        if (this.attackFrame >= atk.invStart && this.attackFrame <= (atk.invEnd || atk.invStart + 5)) {
          this.invincibleFrames = 2;
        }
      }
      if (this.attackFrame >= atk.startup) {
        this.attackPhase = 'active';
        this.attackFrame = 0;
        if (sp && sp.type === 'projectile') {
          const proj = projectiles[this.pi];
          if (!proj.active) {
            const px = this.x + (this.facingRight ? 8 : -8);
            const py = this.y - 12; // FIX #27
            proj.fire(px, py, atk.projSpeed, atk.damage, this.pi, this.facingRight, this.charId); // FIX #14
          }
          this.projectilePoseFrames = 7; // FIX #46
          this.attackPhase = 'recovery';
          this.attackFrame = 0;
          this.hitBox = null;
          this.hasHitThisAttack = true;
        }
        if (sp && sp.type === 'antiAir' && atk.riseV) {
          this.vy = atk.riseV;
          this.y -= 1;
        }
        if (sp && sp.type === 'teleport') {
          this.x += atk.distance * (this.facingRight ? 1 : -1);
          // FIX #75: Teleport also respects edge-safe sprite clamp.
          const edgePad = Math.max(this.pushW / 2, CFG.CHAR_EDGE_PADDING);
          this.x = clamp(this.x, edgePad, CFG.STAGE_W - edgePad);
          this.invincibleFrames = 8;
          this.attackPhase = 'recovery';
          this.attackFrame = 0;
        }
      }
    } else if (this.attackPhase === 'active') {
      const activeFrames = atk.active || 4;
      const reach = (this.currentAttack && this.data.normals[this.currentAttack]) ?
                    (this.data.normals[this.currentAttack].reach || 12) : 12;
      const dir = this.facingRight ? 1 : -1;
      const hbx = this.x + dir * (reach > 20 ? reach / CFG.SCALE : 4);

      if (sp && sp.type === 'projectile') {
        // FIX #2: Projectile specials should never keep an active hitbox alive.
        this.hitBox = null;
        this.attackPhase = 'recovery';
        this.attackFrame = 0;
        this.hasHitThisAttack = true;
        return;
      }

      if (sp && (sp.type === 'advancing' || sp.type === 'rapid')) {
        if (atk.advSpeed) this.x += (this.facingRight ? 1 : -1) * atk.advSpeed * 0.3;
        if (atk.hits && this.specialHitTimer <= 0 && this.specialHitCount < atk.hits) {
          this.hitBox = { x: hbx - 5, y: this.y - 16, w: 12, h: 13 };
          this.specialHitTimer = Math.max(2, Math.floor(activeFrames / (atk.hits || 1)));
        } else {
          this.hitBox = null;
        }
        this.specialHitTimer--;
        if (this.attackFrame >= activeFrames * (atk.hits || 1)) {
          this.attackPhase = 'recovery';
          this.attackFrame = 0;
          this.hitBox = null;
        }
      } else if (sp && sp.type === 'melee') {
        this.hitBox = { x: hbx - 7, y: this.y - 18, w: 16, h: 16 };
        if (atk.hits && this.specialHitTimer <= 0 && this.specialHitCount < atk.hits) {
          this.specialHitTimer = Math.floor(activeFrames / atk.hits);
          this.hasHitThisAttack = false;
        }
        this.specialHitTimer--;
        if (this.attackFrame >= activeFrames) {
          this.attackPhase = 'recovery';
          this.attackFrame = 0;
          this.hitBox = null;
        }
      } else {
        if (!this.hasHitThisAttack) {
          this.hitBox = this.getNormalHitbox(dir, reach);
        } else {
          this.hitBox = null;
        }
        if (this.attackFrame >= activeFrames) {
          this.attackPhase = 'recovery';
          this.attackFrame = 0;
          this.hitBox = null;
        }
      }

      if (sp && sp.type === 'antiAir' && atk.riseV) {
        this.vy += CFG.GRAVITY * 0.3;
      }
    } else if (this.attackPhase === 'recovery') {
      this.hitBox = null;
      const recovFrames = atk.recovery || 15;
      if (this.attackFrame >= recovFrames) {
        this.returnToIdle();
      }
    } else {
      // FIX #2: Final fallback keeps attack finite even when phase desync occurs.
      this.attackPhase = 'recovery';
      this.attackFrame = 0;
      this.hitBox = null;
    }
  }

  returnToIdle() {
    // FIX #1: Exhaustive return path for all action states to prevent AI deadlocks.
    const prevState = this.state;
    if (this.hp <= 0) {
      this.state = STATES.LOSE;
    } else if (this.isOnGround()) {
      this.state = STATES.IDLE;
      if (prevState === STATES.CROUCH || prevState === STATES.CROUCH_ATTACK) {
        this.state = STATES.CROUCH;
      }
    } else {
      this.state = STATES.JUMP_FALL;
    }
    this.attackPhase = 'none';
    this.attackFrame = 0;
    this.currentAttack = null;
    this.currentSpecial = null;
    this.specialVersion = null;
    this.hitBox = null;
    this.hasHitThisAttack = false;
    this.specialHitCount = 0;
    this.specialHitTimer = 0;
    this.projectilePoseFrames = 0;
  }

  update() {
    this.animTimer++;
    if (this.animTimer >= 8) { this.animTimer = 0; this.animFrame++; }
    if (this.charId === 'kenji') this.spriteActionTime++;
    if (this.projectilePoseFrames > 0) this.projectilePoseFrames--;

    if (this.invincibleFrames > 0) this.invincibleFrames--;
    if (this.throwEscapeWindow > 0) this.throwEscapeWindow--;
    if (this.comboTimer > 0) { this.comboTimer--; if (this.comboTimer <= 0) this.comboCount = 0; }
    if (this.hitConfirmFrames > 0) this.hitConfirmFrames--;

    this.displayHp = lerp(this.displayHp, this.hp, 0.08);

    this.hurtBox = { x: this.x - this.pushW/2, y: this.y - this.pushH, w: this.pushW, h: this.pushH };

    switch (this.state) {
      case STATES.HITSTUN:
        this.hitstunFrames--;
        this.x += this.knockbackVx;
        this.knockbackVx *= 0.85;
        if (this.hitstunFrames <= 0) this.state = STATES.IDLE;
        break;
      case STATES.BLOCKSTUN:
        this.blockstunFrames--;
        this.x += this.knockbackVx;
        this.knockbackVx *= 0.85;
        if (this.blockstunFrames <= 0) this.state = STATES.IDLE;
        break;
      case STATES.KNOCKDOWN:
        this.vy += CFG.GRAVITY * 0.15;
        this.y += this.vy;
        this.x += this.knockbackVx;
        this.knockbackVx *= 0.9;
        if (this.y >= CFG.GROUND_Y) {
          this.y = CFG.GROUND_Y;
          this.vy = 0;
          this.stateTimer--;
          if (this.stateTimer <= 0) {
            this.state = STATES.GETUP;
            this.stateTimer = CFG.WAKEUP_INVINCIBLE;
            this.invincibleFrames = CFG.WAKEUP_INVINCIBLE;
          }
        }
        break;
      case STATES.KO_FLY:
        this.vy += CFG.GRAVITY * 0.16;
        this.y += this.vy;
        this.x += this.koVx;
        this.koVx *= 0.985;
        if (this.y >= CFG.GROUND_Y) {
          this.y = CFG.GROUND_Y;
          if (this.koBounces > 0) {
            this.koBounces--;
            this.vy = -Math.max(1.3, Math.abs(this.vy) * 0.45);
            this.koVx *= 0.6;
          } else {
            this.vy = 0;
            this.koVx = 0;
            this.state = STATES.LOSE;
          }
        }
        break;
      case STATES.GETUP:
        this.stateTimer--;
        if (this.stateTimer <= 0) this.state = STATES.IDLE;
        break;
      case STATES.JUMP_RISE:
      case STATES.JUMP_PEAK:
      case STATES.JUMP_FALL:
        this.vy += CFG.GRAVITY * 0.1;
        this.y += this.vy;
        this.x += this.jumpVx;
        if (this.vy >= 0 && this.state === STATES.JUMP_RISE) this.state = STATES.JUMP_PEAK;
        if (this.vy > 0.5) this.state = STATES.JUMP_FALL;
        if (this.y >= CFG.GROUND_Y) {
          this.y = CFG.GROUND_Y; this.vy = 0; this.jumpVx = 0;
          this.state = STATES.LANDING; this.stateTimer = CFG.LANDING_FRAMES;
          this.airAttackUsed = false;
          this.hitBox = null;
          this.returnToIdle();
        }
        break;
      case STATES.LANDING:
        this.stateTimer--;
        if (this.stateTimer <= 0) { this.state = STATES.IDLE; }
        break;
      case STATES.STAND_ATTACK:
      case STATES.CROUCH_ATTACK:
      case STATES.JUMP_ATTACK:
      case STATES.SPECIAL:
        this.updateAttack();
        // FIX #84: Apply airborne special landing logic only while actually airborne.
        if (this.state === STATES.JUMP_ATTACK || (this.state === STATES.SPECIAL && !this.isOnGround())) {
          this.vy += CFG.GRAVITY * 0.1;
          this.y += this.vy;
          this.x += this.jumpVx;
          if (this.y >= CFG.GROUND_Y) {
            this.y = CFG.GROUND_Y; this.vy = 0; this.jumpVx = 0;
            if (this.state === STATES.JUMP_ATTACK || this.attackPhase === 'recovery') {
              this.returnToIdle();
            }
          }
        }
        break;
      case STATES.THROWN:
        this.stateTimer--;
        if (this.stateTimer <= 0) this.applyKnockdown();
        break;
      case STATES.THROW:
        this.stateTimer--;
        if (this.stateTimer <= 0) this.state = STATES.IDLE;
        break;
      case STATES.WIN:
      case STATES.LOSE:
        break;
    }

    // FIX #75: Final per-frame clamp keeps sprite inside viewport at both stage ends.
    const edgePad = Math.max(this.pushW / 2, CFG.CHAR_EDGE_PADDING);
    this.x = clamp(this.x, edgePad, CFG.STAGE_W - edgePad);
  }

  render(ctx, camOff) {
    const ox = camOff.x, oy = camOff.y;
    const renderGroundOffset = 8; // FIX #59
    const sx = Math.round(this.x + ox);
    const sy = Math.round(this.y + oy + renderGroundOffset);
    const dir = this.facingRight ? 1 : -1;

    if (this.invincibleFrames > 0 && this.invincibleFrames % 2 === 0) return;

    ctx.save();
    ctx.translate(sx, sy);
    // FIX #64: Use imported sprite rendering for active sprite characters.
    if ((this.charId === 'kenji' || this.charId === 'vance' || this.charId === 'meilin') && this.renderKenjiSprite(ctx, dir)) {
      ctx.restore();

      // FIX #37: Keep collision debug boxes hidden unless explicitly enabled.
      if (GAME.DEBUG && GAME.SHOW_HITBOXES) {
        if (this.hurtBox) {
          ctx.strokeStyle = 'rgba(0,100,255,0.7)';
          ctx.strokeRect(this.hurtBox.x + ox, this.hurtBox.y + oy, this.hurtBox.w, this.hurtBox.h);
        }
        if (this.hitBox) {
          ctx.strokeStyle = 'rgba(255,0,0,0.7)';
          ctx.strokeRect(this.hitBox.x + ox, this.hitBox.y + oy, this.hitBox.w, this.hitBox.h);
        }
        ctx.strokeStyle = 'rgba(255,255,0,0.5)';
        ctx.strokeRect(this.x - this.pushW/2 + ox, this.y - this.pushH + oy, this.pushW, this.pushH);
      }
      return;
    }
    // FIX #70: Scale fallback fighters to 0.9x of previous values.
    const scaleMap = { kenji: 2.11, vance: 2.21, meilin: 2.05, sagar: 2.16 };
    const spriteScale = scaleMap[this.charId] || 2.11;
    ctx.scale(spriteScale, spriteScale);

    const pal = this.pal;
    const profileMap = {
      // FIX #11: Character-specific body proportions to strengthen silhouette differences.
      kenji: { torsoW:9, torsoH:9, headW:5, headH:6, armLen:6, legLen:5, hipSpread:2 },
      vance: { torsoW:11, torsoH:10, headW:6, headH:7, armLen:7, legLen:6, hipSpread:3 },
      meilin: { torsoW:8, torsoH:8, headW:5, headH:6, armLen:5, legLen:5, hipSpread:2 },
      sagar: { torsoW:10, torsoH:10, headW:5, headH:7, armLen:7, legLen:6, hipSpread:2 }
    };
    const body = profileMap[this.charId] || profileMap.kenji;
    const atkData = this.getAttackData();
    // FIX #12: Sagar gets visible limb stretch during long reach attacks.
    const sagarStretch = this.charId === 'sagar' && atkData ? Math.max(0, Math.floor(((atkData.reach || 24) - 28) / 5)) : 0;

    const drawLimb = (x, y, len, h) => {
      if (len >= 0) ctx.fillRect(x, y, len, h);
      else ctx.fillRect(x + len, y, -len, h);
    };

    const drawBody = (headY, bodyY, bodyH, armAngle, legAngle, armExt, legExt) => {
      const torsoW = body.torsoW;
      const torsoH = Math.max(6, Math.round(bodyH || body.torsoH));
      const torsoX = -Math.floor(torsoW / 2);

      ctx.fillStyle = pal.outline;
      ctx.fillRect(torsoX - 1, bodyY - 1, torsoW + 2, torsoH + 2);
      ctx.fillStyle = pal.main;
      ctx.fillRect(torsoX, bodyY, torsoW, torsoH);

      const headW = body.headW;
      const headH = body.headH;
      ctx.fillStyle = pal.outline;
      ctx.fillRect(-Math.floor(headW / 2) - 1, headY - 1, headW + 2, headH + 2);
      ctx.fillStyle = pal.skin;
      ctx.fillRect(-Math.floor(headW / 2), headY, headW, headH);

      if (pal.hair) {
        ctx.fillStyle = pal.hair;
        ctx.fillRect(-Math.floor(headW / 2), headY, headW, Math.max(2, Math.floor(headH / 3)));
      }
      if (this.charId === 'kenji') {
        ctx.fillStyle = pal.sub;
        ctx.fillRect(-Math.floor(headW / 2) - 1, headY + 1, headW + 2, 1);
      }
      if (this.charId === 'vance') {
        ctx.fillStyle = '#222222';
        ctx.fillRect(-2, headY + 2, 4, 2);
      }
      if (this.charId === 'meilin') {
        ctx.fillStyle = pal.hair || '#111111';
        ctx.fillRect(1, headY - 2, 2, 2);
      }
      if (this.charId === 'sagar') {
        ctx.fillStyle = pal.sub;
        ctx.fillRect(-3, headY + 1, 2, 3);
        ctx.fillRect(1, headY + 1, 2, 3);
      }

      ctx.fillStyle = pal.skin;
      const shoulderX = dir * (Math.floor(torsoW / 2) + 1);
      const armLen = body.armLen + armExt + sagarStretch;
      drawLimb(shoulderX, bodyY + 2 + armAngle, dir * armLen, 2);
      drawLimb(shoulderX, bodyY + 5 - Math.floor(armAngle * 0.5), dir * Math.max(3, armLen - 2), 2);

      const hipY = bodyY + torsoH;
      const legLen = body.legLen + legExt + (this.currentAttack && this.currentAttack.includes('K') ? sagarStretch : 0);
      const frontLegX = dir * (body.hipSpread + 1);
      const backLegX = -dir * body.hipSpread;
      ctx.fillRect(frontLegX - 1, hipY + legAngle, 3, legLen);
      ctx.fillRect(backLegX - 1, hipY - legAngle, 3, Math.max(4, legLen - 1));

      if (this.charId === 'kenji') {
        ctx.fillStyle = pal.sub;
        ctx.fillRect(-Math.floor(torsoW / 2), bodyY + Math.floor(torsoH * 0.5), torsoW, 2);
      }
      if (this.charId === 'vance') {
        ctx.fillStyle = pal.sub;
        ctx.fillRect(-Math.floor(torsoW / 2), bodyY + torsoH - 2, torsoW, 2);
      }
    };
    const drawForwardKick = (y, len, thick, glow) => {
      // FIX #26: Draw forward-extending leg shape so kick impact area is readable.
      const left = dir > 0 ? 4 : (-4 - len);
      ctx.fillStyle = pal.skin;
      ctx.fillRect(left, y, len, thick);
      if (glow > 0) {
        ctx.fillStyle = `rgba(255,220,120,${glow})`;
        ctx.fillRect(left + (dir > 0 ? len - 2 : -2), y - 1, 3, thick + 2);
      }
    };

    switch (this.state) {
      case STATES.IDLE:
      case STATES.LANDING: {
        const bob = Math.sin(this.animFrame * 0.5) * 0.5;
        drawBody(-22 + bob, -15 + bob, body.torsoH, 0, 0, 0, 0);
        break;
      }
      case STATES.WALK_F:
      case STATES.WALK_B: {
        const step = Math.sin(this.animFrame * 0.8) * 2.4;
        drawBody(-22, -15, body.torsoH, step * 0.5, step, 1, 1);
        break;
      }
      case STATES.CROUCH: {
        drawBody(-17, -11, body.torsoH - 2, 1, 2, 1, 1);
        break;
      }
      case STATES.JUMP_RISE:
      case STATES.JUMP_PEAK:
      case STATES.JUMP_FALL: {
        drawBody(-22, -15, body.torsoH, -2, -2, 1, 1);
        break;
      }
      case STATES.STAND_ATTACK: {
        // FIX #24: Distinct visuals for LP/MP/HP and LK/MK/HK.
        const atk = this.currentAttack || '';
        const phaseBoost = this.attackPhase === 'active' ? 2 : (this.attackPhase === 'startup' ? 1 : 0);
        if (atk.endsWith('LP')) {
          drawBody(-22, -15, body.torsoH, 4 + phaseBoost, 0, 4 + phaseBoost, 1);
        } else if (atk.endsWith('MP')) {
          drawBody(-22, -15, body.torsoH, 6 + phaseBoost, 1, 6 + phaseBoost, 1);
          ctx.fillStyle = 'rgba(255,255,255,0.45)';
          ctx.fillRect(dir * 10, -10, dir * 3, 2);
        } else if (atk.endsWith('HP')) {
          ctx.save();
          ctx.rotate(dir * -0.08);
          drawBody(-22, -15, body.torsoH, 8 + phaseBoost, 2, 9 + phaseBoost, 2);
          ctx.restore();
          ctx.fillStyle = 'rgba(255,220,120,0.55)';
          ctx.fillRect(dir * 10, -12, dir * 5, 3);
        } else if (atk.endsWith('LK')) {
          drawBody(-22, -15, body.torsoH, 1, 2 + phaseBoost, 1, 4 + phaseBoost);
          drawForwardKick(-6, 8 + phaseBoost, 2, 0.25);
        } else if (atk.endsWith('MK')) {
          drawBody(-22, -15, body.torsoH, 1, 3 + phaseBoost, 2, 6 + phaseBoost);
          drawForwardKick(-6, 11 + phaseBoost, 2, 0.35);
        } else {
          ctx.save();
          ctx.rotate(dir * 0.08);
          drawBody(-22, -15, body.torsoH, 0, 4 + phaseBoost, 2, 9 + phaseBoost);
          ctx.restore();
          drawForwardKick(-7, 14 + phaseBoost, 3, 0.45);
        }
        break;
      }
      case STATES.CROUCH_ATTACK: {
        const atk = this.currentAttack || '';
        const phaseBoost = this.attackPhase === 'active' ? 2 : (this.attackPhase === 'startup' ? 1 : 0);
        if (atk.endsWith('LP')) {
          drawBody(-17, -11, body.torsoH - 2, 3 + phaseBoost, 1, 3 + phaseBoost, 1);
        } else if (atk.endsWith('MP')) {
          drawBody(-17, -11, body.torsoH - 2, 5 + phaseBoost, 1, 5 + phaseBoost, 1);
        } else if (atk.endsWith('HP')) {
          drawBody(-17, -11, body.torsoH - 2, 7 + phaseBoost, 1, 7 + phaseBoost, 1);
          ctx.fillStyle = 'rgba(255,210,120,0.5)';
          ctx.fillRect(dir * 9, -9, dir * 4, 2);
        } else if (atk.endsWith('LK')) {
          drawBody(-17, -11, body.torsoH - 2, 0, 2 + phaseBoost, 1, 5 + phaseBoost);
          drawForwardKick(-2, 9 + phaseBoost, 2, 0.2);
        } else if (atk.endsWith('MK')) {
          drawBody(-17, -11, body.torsoH - 2, 0, 3 + phaseBoost, 1, 7 + phaseBoost);
          drawForwardKick(-2, 12 + phaseBoost, 2, 0.3);
        } else {
          drawBody(-17, -11, body.torsoH - 2, 0, 4 + phaseBoost, 2, 9 + phaseBoost);
          drawForwardKick(-2, 15 + phaseBoost, 3, 0.4);
        }
        break;
      }
      case STATES.JUMP_ATTACK: {
        const atk = this.currentAttack || '';
        const phaseBoost = this.attackPhase === 'active' ? 2 : (this.attackPhase === 'startup' ? 1 : 0);
        if (atk.endsWith('P')) {
          const arm = atk.endsWith('HP') ? 8 : (atk.endsWith('MP') ? 6 : 4);
          drawBody(-22, -15, body.torsoH, arm + phaseBoost, 2, arm + phaseBoost, 2);
        } else {
          const leg = atk.endsWith('HK') ? 8 : (atk.endsWith('MK') ? 6 : 4);
          drawBody(-22, -15, body.torsoH, 2, 2 + phaseBoost, 2, leg + phaseBoost);
          drawForwardKick(-9, 9 + leg + phaseBoost, 3, atk.endsWith('HK') ? 0.45 : 0.3);
        }
        break;
      }
      case STATES.SPECIAL: {
        const sp = this.getSpecialData();
        if (sp && (sp.type === 'antiAir')) {
          ctx.save();
          ctx.rotate(dir * (this.attackFrame * 0.3));
          drawBody(-22, -15, body.torsoH, 5, -3, 7, 1);
          ctx.restore();
        } else if (sp && sp.type === 'advancing') {
          ctx.save();
          ctx.rotate(dir * (this.attackFrame * 0.5));
          drawBody(-22, -15, body.torsoH, 4, 3, 4, 4);
          ctx.restore();
        } else if (sp && sp.type === 'projectile') {
          const ext = this.attackPhase === 'startup' ? 3 : 5;
          drawBody(-22, -15, body.torsoH, ext, 0, ext, 1);
        } else if (sp && sp.type === 'teleport') {
          ctx.globalAlpha = 0.5;
          drawBody(-22, -15, body.torsoH, 0, 0, 1, 1);
          ctx.globalAlpha = 1;
        } else if (sp && sp.type === 'rapid') {
          const ext = (this.attackFrame % 4 < 2) ? 5 : 2;
          drawBody(-22, -15, body.torsoH, 1, ext, 2, ext);
        } else if (sp && sp.type === 'melee') {
          const ext = this.attackPhase === 'active' ? 6 : 3;
          drawBody(-22, -15, body.torsoH, ext, 0, ext, 1);
          if (this.attackPhase === 'active') {
            ctx.fillStyle = '#FF8800';
            ctx.globalAlpha = 0.6;
            ctx.fillRect(dir * 8, -16, dir * 10, 12);
            ctx.globalAlpha = 1;
          }
        } else {
          drawBody(-22, -15, body.torsoH, 3, 0, 3, 1);
        }
        break;
      }
      case STATES.HITSTUN: {
        ctx.save();
        ctx.translate(1, 0);
        drawBody(-21, -14, body.torsoH, -2, -1, 1, 1);
        ctx.restore();
        break;
      }
      case STATES.BLOCKSTUN: {
        drawBody(-21, -14, body.torsoH, 3, 1, 2, 1);
        break;
      }
      case STATES.KNOCKDOWN: {
        ctx.save();
        const rot = Math.min(this.stateTimer * 0.1, Math.PI / 2);
        ctx.rotate(dir * rot);
        drawBody(-22, -15, body.torsoH, -1, -1, 1, 1);
        ctx.restore();
        break;
      }
      case STATES.KO_FLY: {
        ctx.save();
        const spin = clamp(this.koVx * 0.35 + this.vy * 0.1, -1.2, 1.2);
        ctx.rotate(spin);
        drawBody(-21, -14, body.torsoH, -4, -3, 1, 1);
        ctx.restore();
        break;
      }
      case STATES.GETUP: {
        const t = this.stateTimer / CFG.WAKEUP_INVINCIBLE;
        ctx.globalAlpha = 0.5 + t * 0.5;
        drawBody(-17 - t * 5, -11 - t * 4, body.torsoH - 2 + t * 2, 0, 0, 1, 1);
        ctx.globalAlpha = 1;
        break;
      }
      case STATES.THROWN: {
        ctx.save();
        ctx.rotate(dir * 0.5);
        drawBody(-21, -14, body.torsoH, -3, -2, 1, 1);
        ctx.restore();
        break;
      }
      case STATES.WIN: {
        // FIX #16: Character-specific victory poses.
        if (this.charId === 'kenji') {
          const pump = Math.sin(this.animFrame * 0.3) * 1.5;
          drawBody(-24 + pump, -17 + pump, body.torsoH, -6, 0, 7, 1);
        } else if (this.charId === 'vance') {
          drawBody(-22, -15, body.torsoH, -3, 0, 4, 1);
          ctx.fillStyle = '#FFD700';
          ctx.fillRect(dir * 3, -21, 2, 4);
        } else if (this.charId === 'meilin') {
          const sway = Math.sin(this.animFrame * 0.35) * 2;
          drawBody(-23, -16, body.torsoH, 2, sway, 3, 4);
        } else {
          drawBody(-22, -15, body.torsoH, 0, 0, 4, 1);
          ctx.fillStyle = '#FFAA44';
          ctx.globalAlpha = 0.5;
          ctx.fillRect(-3, -22, 6, 2);
          ctx.globalAlpha = 1;
        }
        break;
      }
      case STATES.LOSE: {
        ctx.globalAlpha = 0.7;
        drawBody(-8, -6, body.torsoH - 2, 2, 3, 1, 1);
        ctx.globalAlpha = 1;
        break;
      }
      default:
        drawBody(-22, -15, body.torsoH, 0, 0, 1, 1);
    }

    ctx.restore();

    // FIX #37: Keep collision debug boxes hidden unless explicitly enabled.
    if (GAME.DEBUG && GAME.SHOW_HITBOXES) {
      if (this.hurtBox) {
        ctx.strokeStyle = 'rgba(0,100,255,0.7)';
        ctx.strokeRect(this.hurtBox.x + ox, this.hurtBox.y + oy, this.hurtBox.w, this.hurtBox.h);
      }
      if (this.hitBox) {
        ctx.strokeStyle = 'rgba(255,0,0,0.7)';
        ctx.strokeRect(this.hitBox.x + ox, this.hitBox.y + oy, this.hitBox.w, this.hitBox.h);
      }
      ctx.strokeStyle = 'rgba(255,255,0,0.5)';
      ctx.strokeRect(this.x - this.pushW/2 + ox, this.y - this.pushH + oy, this.pushW, this.pushH);
    }
  }
}

/* ===== SECTION 8: AI ===== */

class CPUController {
  constructor(difficulty) {
    this.diff = AI_DATA[difficulty] || AI_DATA.normal;
    this.actionTimer = 0;
    this.currentAction = null;
    this.reactionBuffer = [];
  }

  reset() {
    this.actionTimer = 0;
    this.currentAction = null;
    this.reactionBuffer = [];
  }

  update(cpu, player, input) {
    if (cpu.hp <= 0) return;
    const dist = Math.abs(cpu.x - player.x);
    const inAir = cpu.state === STATES.JUMP_RISE || cpu.state === STATES.JUMP_FALL || cpu.state === STATES.JUMP_PEAK;
    const playerCornered = player.x < 24 || player.x > CFG.STAGE_W - 24;
    const playerWakeup = player.state === STATES.KNOCKDOWN || player.state === STATES.GETUP;

    // FIX #10: Hit-confirmed combo extension by CPU during recovery windows.
    if (cpu.isInAttack() && cpu.attackPhase === 'recovery' && player.state === STATES.HITSTUN &&
        Math.random() < this.diff.comboRate) {
      this.continueCombo(cpu);
      return;
    }

    if (!cpu.canAct() && !inAir) return;

    if (inAir) {
      if (!cpu.airAttackUsed && dist < 35 && Math.random() < 0.35) {
        const atkName = Math.random() < 0.5 ? 'jumpHK' : 'jumpMK';
        if (cpu.data.normals[atkName]) { cpu.startAttack(atkName, false); cpu.airAttackUsed = true; }
      }
      return;
    }

    this.actionTimer--;
    if (this.actionTimer > 0) return;
    this.actionTimer = this.diff.reactionDelay + randInt(0, 5);

    if (playerWakeup && dist < 45) {
      this.doWakeupPressure(cpu, player);
      return;
    }
    if (playerCornered && dist < 50) {
      this.doCornerPressure(cpu, player, dist);
      return;
    }

    if (player.isInAttack() && Math.random() < this.diff.guardRate) {
      if (player.y < CFG.GROUND_Y - 5 && Math.random() < this.diff.antiAirRate) {
        this.doAntiAirDirect(cpu);
        return;
      }
      this.doBlockDirect(cpu, input);
      return;
    }

    if (dist > 60) {
      const r = Math.random();
      if (r < this.diff.specialRate * 0.5) {
        this.doProjectileDirect(cpu);
      } else if (r < this.diff.specialRate * 0.5 + 0.15) {
        this.doJumpForward(cpu);
      } else {
        cpu.state = STATES.WALK_F;
        cpu.x += cpu.data.walkF * 3;
      }
    } else if (dist > 25) {
      const r = Math.random();
      if (r < this.diff.specialRate * 0.3) {
        this.doSpecialDirect(cpu);
      } else if (r < this.diff.randomRate + 0.3) {
        this.doNormalDirect(cpu, false);
      } else {
        cpu.state = Math.random() < 0.5 ? STATES.WALK_F : STATES.WALK_B;
        cpu.x += (cpu.state === STATES.WALK_F ? cpu.data.walkF : -cpu.data.walkB) * 2;
      }
    } else {
      const r = Math.random();
      if (r < this.diff.throwRate) {
        cpu.state = STATES.THROW;
        cpu.stateTimer = 15;
      } else if (r < this.diff.comboRate * 0.5 + this.diff.throwRate) {
        this.doComboDirect(cpu);
      } else {
        this.doNormalDirect(cpu, true);
      }
    }
  }

  doBlockDirect(cpu, input) {
    input.keys[KEYS.GUARD] = true; // FIX #28
    if (Math.random() < 0.5) input.keys[KEYS.DOWN] = true;
    setTimeout(() => { input.keys[KEYS.GUARD] = false; input.keys[KEYS.DOWN] = false; }, 400);
  }

  doNormalDirect(cpu, close) {
    const attacks = close ?
      ['standLP','standMP','standLK','standMK','crouchLK','crouchMK'] :
      ['standMP','standHP','standMK','standHK','crouchMK','crouchHK'];
    const atk = attacks[randInt(0, attacks.length - 1)];
    const isCrouch = atk.startsWith('crouch');
    if (cpu.data.normals[atk]) cpu.startAttack(atk, isCrouch);
  }

  doComboDirect(cpu) {
    if (cpu.data.normals.standLP) cpu.startAttack('standLP', false);
  }

  continueCombo(cpu) {
    // FIX #10: Light->Medium->Heavy chain route, then special finisher.
    const strength = cpu.getCurrentAttackStrength();
    if (strength === 'L') {
      if (cpu.data.normals.standMP) cpu.startAttack('standMP', false);
      else this.doNormalDirect(cpu, true);
      return;
    }
    if (strength === 'M') {
      if (cpu.data.normals.standHP) cpu.startAttack('standHP', false);
      else this.doNormalDirect(cpu, true);
      return;
    }
    if (Math.random() < this.diff.specialRate) {
      this.doSpecialDirect(cpu);
    } else {
      this.doNormalDirect(cpu, true);
    }
  }

  doProjectileDirect(cpu) {
    if (this.doChargeSpecialDirect(cpu, 'projectile')) return; // FIX #8
    const specials = cpu.data.specials;
    for (let name in specials) {
      if (specials[name].type === 'projectile') {
        cpu.startSpecial(name, 'M');
        return;
      }
    }
    this.doNormalDirect(cpu, false);
  }

  doSpecialDirect(cpu) {
    const specials = cpu.data.specials;
    const names = Object.keys(specials).filter(n => specials[n].type !== 'teleport');
    if (names.length > 0) {
      const name = names[randInt(0, names.length - 1)];
      const versions = Object.keys(specials[name].versions);
      cpu.startSpecial(name, versions[randInt(0, versions.length - 1)]);
    } else {
      this.doNormalDirect(cpu, false);
    }
  }

  doAntiAirDirect(cpu) {
    if (this.doChargeSpecialDirect(cpu, 'antiAir')) return; // FIX #8
    const specials = cpu.data.specials;
    for (let name in specials) {
      if (specials[name].type === 'antiAir') {
        cpu.startSpecial(name, 'H');
        return;
      }
    }
    if (cpu.data.normals.standHP) cpu.startAttack('standHP', false);
  }

  doChargeSpecialDirect(cpu, preferredType) {
    const specials = cpu.data.specials;
    const chargeNames = Object.keys(specials).filter((name) => {
      const sp = specials[name];
      return typeof sp.command === 'string' && sp.command.startsWith('charge') &&
             (!preferredType || sp.type === preferredType);
    });
    if (!chargeNames.length) return false;
    const name = chargeNames[randInt(0, chargeNames.length - 1)];
    const versions = Object.keys(specials[name].versions);
    cpu.startSpecial(name, versions[randInt(0, versions.length - 1)]);
    return true;
  }

  doWakeupPressure(cpu, player) {
    // FIX #10: Basic oki pressure loop.
    const dist = Math.abs(cpu.x - player.x);
    if (dist > 16) {
      cpu.state = STATES.WALK_F;
      cpu.x += cpu.data.walkF * 2.4;
      return;
    }
    if (Math.random() < 0.35) {
      cpu.state = STATES.THROW;
      cpu.stateTimer = 15;
      return;
    }
    const pressure = ['crouchLK', 'crouchMK', 'standLP', 'standMP'];
    const atk = pressure[randInt(0, pressure.length - 1)];
    if (cpu.data.normals[atk]) cpu.startAttack(atk, atk.startsWith('crouch'));
  }

  doCornerPressure(cpu, player, dist) {
    // FIX #10: Keep offense active when opponent is cornered.
    if (dist > 14) {
      cpu.state = STATES.WALK_F;
      cpu.x += cpu.data.walkF * 2.2;
      return;
    }
    if (Math.random() < this.diff.specialRate * 0.6) {
      this.doSpecialDirect(cpu);
      return;
    }
    if (Math.random() < this.diff.comboRate) {
      this.doComboDirect(cpu);
      return;
    }
    this.doNormalDirect(cpu, true);
  }

  doJumpForward(cpu) {
    cpu.state = STATES.JUMP_RISE;
    cpu.vy = cpu.data.jumpV;
    cpu.y -= 1;
    cpu.jumpVx = cpu.data.walkF * 1.2;
  }
}

/* ===== SECTION 9: GAME SYSTEMS ===== */

class RoundManager {
  constructor() { this.reset(); }
  reset() {
    this.round = 1;
    this.p1Wins = 0;
    this.p2Wins = 0;
    this.roundOver = false;
    this.matchOver = false;
    this.winner = -1;
    this.timerValue = CFG.ROUND_TIME;
    this.timerFrames = 0;
    this.timerRunning = false;
    this.phase = 'pre';
    this.phaseTimer = 0;
    this.isPerfect = false;
    this.matchEndEmitted = false; // FIX #3
    this.lastRoundWinner = -1;
  }
  startRound() {
    this.roundOver = false;
    this.matchOver = false;
    this.timerValue = CFG.ROUND_TIME;
    this.timerFrames = 0;
    this.timerRunning = false;
    this.phase = 'roundStart';
    this.phaseTimer = CFG.ROUND_TEXT_FRAMES;
    this.isPerfect = false;
  }
  update(f1, f2) {
    if (this.phase === 'roundStart') {
      this.phaseTimer--;
      if (this.phaseTimer <= CFG.ROUND_TEXT_FRAMES - CFG.FIGHT_TEXT_FRAMES && this.phaseTimer > 0) {
      }
      if (this.phaseTimer <= 0) {
        this.phase = 'fight';
        this.timerRunning = true;
      }
      return;
    }
    if (this.phase === 'ko') {
      this.phaseTimer--;
      if (this.phaseTimer <= 0) {
        if (this.p1Wins >= CFG.ROUNDS_TO_WIN || this.p2Wins >= CFG.ROUNDS_TO_WIN) {
          this.phase = 'matchEnd';
          this.phaseTimer = CFG.WIN_TEXT_FRAMES;
          this.matchOver = true;
          this.winner = this.p1Wins >= CFG.ROUNDS_TO_WIN ? 0 : 1;
          this.matchEndEmitted = false; // FIX #3
        } else {
          this.phase = 'roundResult'; // FIX #19
          this.phaseTimer = Math.round(CFG.FPS * 1.5); // FIX #19
        }
      }
      return;
    }
    if (this.phase === 'roundResult') {
      this.phaseTimer--;
      if (this.phaseTimer <= 0) {
        this.round++;
        eventBus.emit('nextRound');
      }
      return;
    }
    if (this.phase === 'matchEnd') {
      this.phaseTimer--;
      if (this.phaseTimer <= 0) {
        // FIX #3: Guard against duplicate matchEnd emissions.
        if (!this.matchEndEmitted) {
          this.matchEndEmitted = true;
          eventBus.emit('matchEnd', { winner: this.winner });
        }
      }
      return;
    }
    if (this.phase !== 'fight') return;

    if (this.timerRunning) {
      this.timerFrames++;
      if (this.timerFrames >= 60) {
        this.timerFrames = 0;
        this.timerValue--;
        if (this.timerValue <= 0) {
          this.timerValue = 0;
          this.timerRunning = false;
          this.endRound(f1, f2, 'timeout');
        }
      }
    }

    if (f1.hp <= 0 || f2.hp <= 0) {
      this.timerRunning = false;
      if (f1.hp <= 0 && f2.hp <= 0) {
        this.endRound(f1, f2, 'doubleKO');
      } else if (f1.hp <= 0) {
        this.endRound(f1, f2, 'p2win');
      } else {
        this.endRound(f1, f2, 'p1win');
      }
    }
  }
  endRound(f1, f2, reason) {
    this.roundOver = true;
    this.phase = 'ko';
    this.phaseTimer = CFG.KO_SLOWMO_FRAMES + 60;

    if (reason === 'timeout') {
      if (f1.hp > f2.hp) { this.p1Wins++; this.lastRoundWinner = 0; this.isPerfect = f1.hp >= CFG.MAX_HP; f2.state = STATES.LOSE; f1.state = STATES.WIN; }
      else if (f2.hp > f1.hp) { this.p2Wins++; this.lastRoundWinner = 1; this.isPerfect = f2.hp >= CFG.MAX_HP; f1.state = STATES.LOSE; f2.state = STATES.WIN; }
      else { this.p1Wins++; this.p2Wins++; this.lastRoundWinner = -1; }
    } else if (reason === 'doubleKO') {
      this.p1Wins++; this.p2Wins++;
      this.lastRoundWinner = -1;
      f1.startKoBlowAway(f2.x); // FIX #15
      f2.startKoBlowAway(f1.x);
    } else if (reason === 'p1win') {
      this.p1Wins++;
      this.lastRoundWinner = 0;
      this.isPerfect = f1.hp >= CFG.MAX_HP;
      f2.startKoBlowAway(f1.x); // FIX #15
      f1.state = STATES.WIN;
    } else {
      this.p2Wins++;
      this.lastRoundWinner = 1;
      this.isPerfect = f2.hp >= CFG.MAX_HP;
      f1.startKoBlowAway(f2.x); // FIX #15
      f2.state = STATES.WIN;
    }

    eventBus.emit('roundEnd', { p1Wins: this.p1Wins, p2Wins: this.p2Wins, reason, isPerfect: this.isPerfect });
  }
}

class ScoreManager {
  constructor() { this.score = 0; }
  reset() { this.score = 0; }
  addHit(damage) { this.score += damage * SCORE_TABLE.hitMult; }
  addCombo(comboDmg, hits) { this.score += comboDmg * hits * SCORE_TABLE.comboBonus; }
  addPerfect() { this.score += SCORE_TABLE.perfect; }
  addTimeBonus(remaining) { this.score += remaining * SCORE_TABLE.timeBonus; }
  addRoundWin() { this.score += SCORE_TABLE.roundWin; }
  addMatchWin() { this.score += SCORE_TABLE.matchWin; }
  addGameClear() { this.score += SCORE_TABLE.gameClear; }
}

class ComboCounter {
  constructor() { this.count = 0; this.displayCount = 0; this.timer = 0; this.totalDamage = 0; this.side = 0; }
  addHit(damage, side) {
    this.count++;
    this.totalDamage += damage;
    this.timer = 60;
    this.displayCount = this.count;
    this.side = side;
  }
  update() {
    if (this.timer > 0) this.timer--;
    else { this.count = 0; this.totalDamage = 0; }
  }
  render(ctx) {
    if (this.displayCount >= 2 && this.timer > 0) {
      const x = this.side === 0 ? CFG.INTERNAL_W * 0.75 : CFG.INTERNAL_W * 0.25;
      const y = CFG.GROUND_Y - 30;
      const scale = 1 + (this.timer > 50 ? (60 - this.timer) * 0.05 : 0);
      ctx.save();
      ctx.translate(x, y);
      ctx.scale(scale, scale);
      drawText(ctx, `${this.displayCount} HITS!`, 0, 0, 6, '#FFFF00', 'center');
      drawText(ctx, `${this.totalDamage} DMG`, 0, 7, 4, '#FFCC00', 'center');
      ctx.restore();
    }
  }
}
