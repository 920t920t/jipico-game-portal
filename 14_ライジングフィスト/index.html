const battleScene = {
  p1: null, p2: null,
  cpuInput: null,
  cpuController: null,
  roundMgr: null,
  scoreMgr: null,
  comboCounter: null,
  camera: null,
  stageIdx: 0,
  frozenFrames: 0,
  flashAlpha: 0,
  slowMotion: false,
  slowTimer: 0,
  frameSkip: 0,
  paused: false,
  pauseCursor: 0,
  textOverlay: null,
  textTimer: 0,
  superCutin: null,

  enter() {
    const pCharId = arcadeState.playerChar;
    const oppCharId = arcadeState.opponents[arcadeState.currentMatch];

    this.p1 = new Fighter(pCharId, 0);
    this.p2 = new Fighter(oppCharId, 1);
    this.cpuInput = new InputManager();
    this.cpuController = new CPUController(arcadeState.difficulty);

    const finalIdx = Math.max(0, arcadeState.opponents.length - 1);
    if (arcadeState.currentMatch === finalIdx) {
      const bossLevel = arcadeState.difficulty === 'easy' ? 'normal' : (arcadeState.difficulty === 'normal' ? 'hard' : 'hard');
      this.cpuController = new CPUController(bossLevel);
    }

    this.roundMgr = new RoundManager();
    this.scoreMgr = new ScoreManager();
    this.scoreMgr.score = arcadeState.score;
    this.comboCounter = new ComboCounter();
    this.camera = new Camera();

    this.stageIdx = arcadeState.currentMatch === finalIdx ? 4 : (CHAR_STAGE_MAP[oppCharId] ?? 0);

    this.paused = false;
    this.pauseCursor = 0;
    this.frozenFrames = 0;
    this.flashAlpha = 0;
    this.slowMotion = false;
    this.slowTimer = 0;
    this.textOverlay = null;
    this.textTimer = 0;
    this.superCutin = {
      active:false, timer:0, attacker:null, defender:null, damage:0, video:null,
      introFrames:0, introImage:null, videoStarted:false
    };

    particles.clear();
    projectiles[0].active = false;
    projectiles[1].active = false;

    this.resetPositions(false);
    this.roundMgr.startRound();

    eventBus.clear();
    eventBus.on('roundEnd', (data) => {
      if (data.isPerfect) this.scoreMgr.addPerfect();
      this.scoreMgr.addTimeBonus(this.roundMgr.timerValue);
      if (data.reason === 'p1win' || (data.reason === 'timeout' && this.p1.hp > this.p2.hp)) {
        this.scoreMgr.addRoundWin();
      }
      this.slowMotion = true;
      this.slowTimer = 30;
    });
    eventBus.on('nextRound', () => {
      this.resetPositions(true); // FIX #79
      this.roundMgr.startRound();
      particles.clear();
      projectiles[0].active = false;
      projectiles[1].active = false;
      if (this.superCutin) this.superCutin.active = false; // FIX #55
    });
    eventBus.on('matchEnd', (data) => {
      if (this.superCutin) this.superCutin.active = false; // FIX #55
      arcadeState.score = this.scoreMgr.score;
      if (data.winner === 0) {
        this.scoreMgr.addMatchWin();
        arcadeState.score = this.scoreMgr.score;
        arcadeState.currentMatch++;
        if (arcadeState.currentMatch >= arcadeState.opponents.length) {
          this.scoreMgr.addGameClear();
          arcadeState.score = this.scoreMgr.score;
          setTimeout(() => sceneManager.go('ending'), 100);
        } else {
          setTimeout(() => sceneManager.go('vsScreen'), 100);
        }
      } else {
        arcadeState.score = this.scoreMgr.score;
        setTimeout(() => sceneManager.go('gameOver'), 100);
      }
    });
  },

  exit() {
    if (this.superCutin && this.superCutin.video) {
      try { this.superCutin.video.pause(); this.superCutin.video.currentTime = 0; } catch (_e) {}
    }
    eventBus.clear();
  },

  resetPositions(keepSuper = false) {
    this.p1.reset(CFG.STAGE_W * 0.35, keepSuper);
    this.p2.reset(CFG.STAGE_W * 0.65, keepSuper);
    this.p1.facingRight = true;
    this.p2.facingRight = false;
    this.comboCounter.count = 0;
    this.comboCounter.timer = 0;
  },

  update() {
    if (this.paused) {
      if (inputManager.wasPressed(KEYS.UP) || inputManager.wasPressed('KeyW')) this.pauseCursor = (this.pauseCursor - 1 + 2) % 2;
      if (inputManager.wasPressed(KEYS.DOWN) || inputManager.wasPressed('KeyS')) this.pauseCursor = (this.pauseCursor + 1) % 2;
      if (inputManager.wasPressed(KEYS.CONFIRM)) {
        if (this.pauseCursor === 0) this.paused = false;
        else sceneManager.go('title');
      }
      if (inputManager.wasPressed(KEYS.PAUSE)) this.paused = false;
      inputManager.update(true);
      return;
    }

    if (inputManager.wasPressed(KEYS.PAUSE) && this.roundMgr.phase === 'fight') {
      this.paused = true;
      this.pauseCursor = 0;
      inputManager.update(true);
      return;
    }

    if (this.frozenFrames > 0) {
      this.frozenFrames--;
      inputManager.update(this.p1.facingRight);
      return;
    }

    if (this.slowMotion) {
      this.slowTimer--;
      if (this.slowTimer <= 0) this.slowMotion = false;
      this.frameSkip = (this.frameSkip + 1) % 4;
      if (this.frameSkip !== 0) {
        inputManager.update(this.p1.facingRight);
        return;
      }
    }

    inputManager.update(this.p1.facingRight);

    if (this.superCutin && this.superCutin.active) {
      this.updateSuperCutin();
      this.camera.follow(this.p1.x, this.p2.x);
      this.camera.update();
      particles.update();
      return;
    }

    // FIX #66: Hold battle simulation until required imported sprite sets are ready.
    const needImported = [this.p1 && this.p1.charId, this.p2 && this.p2.charId].some((id) => ACTIVE_CHARS.includes(id));
    const importedReady = ACTIVE_CHARS.every((id) => {
      const used = (this.p1 && this.p1.charId === id) || (this.p2 && this.p2.charId === id);
      return !used || SpriteStore.isReady(id);
    });
    if (needImported && !importedReady) {
      this.camera.follow(this.p1.x, this.p2.x);
      this.camera.update();
      particles.update();
      return;
    }

    this.roundMgr.update(this.p1, this.p2);

    if (this.roundMgr.phase === 'fight') {
      this.cpuController.update(this.p2, this.p1, this.cpuInput);
      this.cpuInput.update(this.p2.facingRight);

      if (this.p2.canUseSuper() && Math.random() < 0.012) {
        if (this.tryStartSuper(this.p2, this.p1)) {
          this.camera.follow(this.p1.x, this.p2.x);
          this.camera.update();
          return;
        }
      }

      this.handlePlayerInput(this.p1, inputManager);
      if (this.superCutin && this.superCutin.active) {
        this.camera.follow(this.p1.x, this.p2.x);
        this.camera.update();
        return;
      }

      this.p1.updateFacing(this.p2);
      this.p2.updateFacing(this.p1);

      this.p1.update();
      this.p2.update();

      for (let p of projectiles) p.update();

      CollisionSystem.resolvePushboxes(this.p1, this.p2);

      this.checkCombat(this.p1, this.p2, 0);
      this.checkCombat(this.p2, this.p1, 1);
      this.checkProjectiles();

      this.comboCounter.update();
    } else {
      this.p1.update();
      this.p2.update();
    }

    this.camera.follow(this.p1.x, this.p2.x);
    this.camera.update();
    particles.update();

    if (this.flashAlpha > 0) this.flashAlpha -= 0.05;
    if (this.textTimer > 0) this.textTimer--;
  },

  getOpponent(fighter) {
    return fighter === this.p1 ? this.p2 : this.p1;
  },

  // FIX #55: Build/consume super gauge and resolve super-cinematic damage.
  awardSuper(attacker, defender, dmg, isBlocked) {
    // FIX #83: Reduce super gain to 0.5x of the current setting (0.25x original pace).
    const baseAtk = isBlocked ? 4 : (8 + Math.round(dmg / 25));
    const baseDef = isBlocked ? 3 : (6 + Math.round(dmg / 35));
    const atkGain = Math.max(1, Math.round(baseAtk * 0.25));
    const defGain = Math.max(1, Math.round(baseDef * 0.25));
    attacker.addSuperMeter(atkGain);
    defender.addSuperMeter(defGain);
  },

  tryStartSuper(attacker, defender) {
    if (!attacker || !defender) return false;
    if (!attacker.canUseSuper()) return false;
    if (attacker.hp <= 0 || defender.hp <= 0) return false;
    if (!this.superCutin || this.superCutin.active) return false;

    attacker.consumeSuper();
    const video = SuperVideoStore.get(attacker.charId, defender.charId);
    const introImage = SAImageStore.get(attacker.charId);
    let cutinFrames = CFG.SUPER_CUTIN_FRAMES;
    if (video) {
      try {
        video.pause();
        video.currentTime = 0;
        video.playbackRate = 1;
        video.loop = false;
      } catch (_e) {}
      const hasDuration = Number.isFinite(video.duration) && video.duration > 0;
      const durationFrames = hasDuration ? Math.ceil(video.duration * CFG.FPS) : CFG.FPS * 10;
      cutinFrames = Math.max(CFG.SUPER_CUTIN_FRAMES, durationFrames);
    }
    this.superCutin = {
      active: true,
      timer: cutinFrames, // FIX #77
      attacker,
      defender,
      damage: CFG.SUPER_DAMAGE,
      video,
      introFrames: CFG.FPS, // FIX #80
      introImage,
      videoStarted: false
    };
    this.frozenFrames = 0;
    this.flashAlpha = 0.15;
    return true;
  },

  updateSuperCutin() {
    if (!this.superCutin || !this.superCutin.active) return false;
    if (this.superCutin.introFrames > 0) {
      this.superCutin.introFrames--;
      return true;
    }

    if (this.superCutin.video && !this.superCutin.videoStarted) {
      this.superCutin.videoStarted = true;
      try {
        this.superCutin.video.currentTime = 0;
        const p = this.superCutin.video.play();
        if (p && p.catch) p.catch(() => {});
      } catch (_e) {}
    }

    this.superCutin.timer--;
    if (this.superCutin.video) {
      const stillPlaying = !this.superCutin.video.ended && this.superCutin.timer > 0;
      if (stillPlaying) return true;
    } else if (this.superCutin.timer > 0) {
      return true;
    }

    const atk = this.superCutin.attacker;
    const def = this.superCutin.defender;
    if (this.superCutin.video) {
      try { this.superCutin.video.pause(); this.superCutin.video.currentTime = 0; } catch (_e) {}
    }
    if (atk && def && def.hp > 0) {
      const dealt = def.takeDamage(this.superCutin.damage, 20, 0, 10, false, 'mid', true, 0);
      this.awardSuper(atk, def, dealt, false);
      this.comboCounter.addHit(dealt, atk.pi);
      this.scoreMgr.addHit(dealt);
      const cam = this.camera.getOffset();
      particles.spawnHitSpark((atk.x + def.x) * 0.5 + cam.x, Math.min(atk.y, def.y) - 14 + cam.y);
      this.camera.shake(2.4, 14);
      this.flashAlpha = 0.42;
      if (def.hp <= 0) {
        this.slowMotion = true;
        this.slowTimer = CFG.KO_SLOWMO_FRAMES;
      }
    }
    this.superCutin.active = false;
    return true;
  },

  renderSuperCutin(ctx) {
    if (!this.superCutin || !this.superCutin.active) return;
    const sc = this.superCutin;
    const W = CFG.INTERNAL_W;
    const H = CFG.INTERNAL_H;
    const barH = 10;
    if (sc.introFrames > 0 && sc.introImage) {
      // FIX #80: Show SA splash art for ~1s before cinematic video.
      ctx.fillStyle = '#05060A';
      ctx.fillRect(0, 0, W, H);
      ctx.drawImage(sc.introImage, 0, 0, W, H);
    } else if (sc.video && sc.video.readyState >= 2) {
      // FIX #78: Fullscreen SA video with cinematic top/bottom black bars.
      ctx.drawImage(sc.video, 0, 0, W, H);
    } else {
      const t = Math.max(0, (CFG.SUPER_CUTIN_FRAMES - sc.timer) * 0.08);
      const g = ctx.createLinearGradient(0, 0, W, H);
      g.addColorStop(0, '#101226');
      g.addColorStop(1, '#263553');
      ctx.fillStyle = g;
      ctx.fillRect(0, 0, W, H);
      ctx.fillStyle = 'rgba(120,220,255,0.25)';
      for (let i = 0; i < 7; i++) {
        const lx = 8 + ((i * 42 + t * 30) % (W - 16));
        ctx.fillRect(lx, barH + 2, 2, H - (barH + 2) * 2);
      }
      drawText(ctx, 'SUPER ARTS', W / 2, H / 2 - 3, 8, '#D9F7FF', 'center');
      drawText(ctx, sc.attacker ? sc.attacker.data.name : 'FIGHTER', W / 2, H / 2 + 10, 5, '#7FDBFF', 'center');
    }

    ctx.fillStyle = 'rgba(0,0,0,0.92)';
    ctx.fillRect(0, 0, W, barH);
    ctx.fillRect(0, H - barH, W, barH);
    ctx.fillStyle = 'rgba(255,255,255,0.18)';
    ctx.fillRect(0, barH - 1, W, 1);
    ctx.fillRect(0, H - barH, W, 1);
    // FIX #81: No text on cinematic bars.
  },

  strengthRank(strength) {
    if (strength === 'L') return 0;
    if (strength === 'M') return 1;
    if (strength === 'H') return 2;
    return -1;
  },

  tryStartSpecialFromInput(fighter, input, btn, str, dir, requireHitConfirmCancel) {
    if (!btn) return false;
    if (requireHitConfirmCancel && !fighter.canSpecialCancel()) return false;

    const charSpecials = fighter.data.specials;
    for (let spName in charSpecials) {
      const sp = charSpecials[spName];

      // FIX #9: Mei-Lin mash trigger relaxed to 3 presses / 20F.
      if (sp.command === 'mash_P' && input.mashCount >= CFG.MASH_THRESHOLD && input.isPunch(btn)) {
        fighter.startSpecial(spName, str || 'L');
        input.mashCount = 0;
        return true;
      }

      if (sp.command === 'teleport') {
        if (input.checkCommand([6,2,3]) && input.isKick(btn)) {
          fighter.startSpecial(spName, 'forward');
          return true;
        }
        if (input.checkCommand([4,2,1]) && input.isKick(btn)) {
          fighter.startSpecial(spName, 'backward');
          return true;
        }
      }

      if (typeof sp.command === 'string' && sp.command.startsWith('charge')) {
        const chargeDir = sp.chargeDir;
        const releaseDir = sp.releaseDir;
        const needBtn = sp.command.endsWith('P') ? 'P' : 'K';
        if (input.chargeReady[chargeDir]) {
          // FIX #8: Allow adjacent release directions for charge moves (6/3/9 or 8/7/9).
          const forwardRelease = (dir === 6 || dir === 3 || dir === 9);
          const upRelease = (dir === 8 || dir === 7 || dir === 9);
          const releaseDirMatch = (releaseDir === 6 && forwardRelease) || (releaseDir === 8 && upRelease);
          if (releaseDirMatch && ((needBtn === 'P' && input.isPunch(btn)) || (needBtn === 'K' && input.isKick(btn)))) {
            fighter.startSpecial(spName, str || 'L');
            input.chargeReady[chargeDir] = false;
            input.chargeTimers[chargeDir] = 0;
            input.chargeRelease[chargeDir] = 0;
            return true;
          }
        }
        continue;
      }

      if (Array.isArray(sp.command)) {
        const [cmdDirs, cmdBtn] = sp.command;
        if ((cmdBtn === 'P' && input.isPunch(btn)) || (cmdBtn === 'K' && input.isKick(btn))) {
          if (input.checkCommand(cmdDirs)) {
            fighter.startSpecial(spName, str || 'L');
            input.dirBuffer = [];
            return true;
          }
        }
      }
    }
    return false;
  },

  tryChainCancel(fighter, opponent, btn, dir, str) {
    if (!btn || !fighter.currentAttack || fighter.currentSpecial) return false;
    if (fighter.state !== STATES.STAND_ATTACK && fighter.state !== STATES.CROUCH_ATTACK) return false;
    if (fighter.attackPhase !== 'recovery') return false;
    if (opponent.state !== STATES.HITSTUN) return false;

    const currentRank = this.strengthRank(fighter.getCurrentAttackStrength());
    const nextRank = this.strengthRank(str);
    if (nextRank !== currentRank + 1) return false;

    // FIX #6: Chain combo cancel from recovery when next strength is entered during hitstun.
    const isCrouch = (dir === 1 || dir === 2 || dir === 3) || fighter.state === STATES.CROUCH_ATTACK;
    const nextAttack = (isCrouch ? 'crouch' : 'stand') + btn;
    if (!fighter.data.normals[nextAttack]) return false;
    fighter.startAttack(nextAttack, isCrouch);
    fighter.hitConfirmFrames = 0;
    return true;
  },

  tryAttackCancelInput(fighter, opponent, input, btn, str, dir) {
    if (!btn || !fighter.isInAttack()) return false;
    if (this.tryChainCancel(fighter, opponent, btn, dir, str)) return true;

    const canCancelNormal = (fighter.state === STATES.STAND_ATTACK || fighter.state === STATES.CROUCH_ATTACK) &&
                            fighter.attackPhase !== 'startup';
    if (!canCancelNormal) return false;
    // FIX #7: Special cancel on hit-confirm while normal attack is still in progress/recovery.
    return this.tryStartSpecialFromInput(fighter, input, btn, str, dir, true);
  },

  // FIX #33: Direct special triggers on O/L, with character-specific mapping.
  trySpecialBySlot(fighter, dir, slot, requireHitConfirmCancel) {
    if (requireHitConfirmCancel && !fighter.canSpecialCancel()) return false;
    if (!requireHitConfirmCancel && !fighter.canAct()) return false;

    const specials = fighter.data.specials || {};
    const names = Object.keys(specials);
    if (!names.length) return false;

    let pickName = null;
    if (fighter.charId === 'kenji') {
      if (slot === 'SP1') pickName = specials.spiritFist ? 'spiritFist' : null;
      if (slot === 'SP2') pickName = specials.risingDragon ? 'risingDragon' : null;
    }

    if (!pickName) {
      const desiredTypes = slot === 'SP1' ? ['projectile', 'advancing', 'rapid'] : ['antiAir', 'advancing', 'projectile'];
      for (const type of desiredTypes) {
        pickName = names.find((n) => specials[n].type === type);
        if (pickName) break;
      }
      if (!pickName) pickName = names.find((n) => specials[n].type !== 'teleport') || names[0];
    }

    const sp = specials[pickName];
    if (!sp) return false;
    if (sp.type === 'teleport') {
      fighter.startSpecial(pickName, (dir === 4 || dir === 1 || dir === 7) ? 'backward' : 'forward');
      return true;
    }
    fighter.startSpecial(pickName, slot === 'SP1' ? 'L' : 'H');
    return true;
  },

  handlePlayerInput(fighter, input) {
    if (fighter.hp <= 0) return;
    const dir = input.getDirection(fighter.facingRight);
    const btn = input.getPressedButton();
    const str = input.getStrength(btn);
    const opponent = this.getOpponent(fighter);

    if (input.wasPressed(KEYS.SUPER) && this.tryStartSuper(fighter, opponent)) return; // FIX #56
    if (this.tryAttackCancelInput(fighter, opponent, input, btn, str, dir)) return;
    if (input.wasPressed(KEYS.SP1) && this.trySpecialBySlot(fighter, dir, 'SP1', fighter.isInAttack())) return;
    if (input.wasPressed(KEYS.SP2) && this.trySpecialBySlot(fighter, dir, 'SP2', fighter.isInAttack())) return;

    if (!fighter.canAct()) {
      if ((fighter.state === STATES.JUMP_RISE || fighter.state === STATES.JUMP_FALL ||
           fighter.state === STATES.JUMP_PEAK) && !fighter.airAttackUsed) {
        if (btn) {
          const jumpAtk = 'jump' + btn;
          if (fighter.data.normals[jumpAtk]) {
            fighter.startAttack(jumpAtk, false);
            fighter.airAttackUsed = true;
          }
        }
      }
      return;
    }

    if (btn) {
      const throwCheck = input.wasPressed(KEYS.LP) && input.wasPressed(KEYS.LK);
      if (throwCheck || (input.justPressed[KEYS.LP] && input.keys[KEYS.LK]) || (input.justPressed[KEYS.LK] && input.keys[KEYS.LP])) {
        if (fighter.canAct()) {
          fighter.state = STATES.THROW;
          fighter.stateTimer = 15;
          return;
        }
      }

      if (!this.tryStartSpecialFromInput(fighter, input, btn, str, dir, false)) {
        let atkName;
        const isCrouch = dir === 1 || dir === 2 || dir === 3;
        if (isCrouch) {
          atkName = 'crouch' + btn;
        } else {
          atkName = 'stand' + btn;
        }
        if (fighter.data.normals[atkName]) {
          fighter.startAttack(atkName, isCrouch);
        }
      }
      return;
    }

    if (dir === 8 || dir === 7 || dir === 9) {
      fighter.state = STATES.JUMP_RISE;
      fighter.vy = fighter.data.jumpV;
      fighter.y -= 1;
      if (dir === 9) fighter.jumpVx = fighter.data.walkF * 1.2;
      else if (dir === 7) fighter.jumpVx = -fighter.data.walkB * 1.2;
      else fighter.jumpVx = 0;
    } else if (dir === 6) {
      fighter.state = STATES.WALK_F;
      fighter.x += fighter.data.walkF;
    } else if (dir === 4) {
      fighter.state = STATES.WALK_B;
      fighter.x -= fighter.data.walkB;
    } else if (dir === 1 || dir === 2 || dir === 3) {
      fighter.state = STATES.CROUCH;
    } else {
      if (fighter.state === STATES.WALK_F || fighter.state === STATES.WALK_B || fighter.state === STATES.CROUCH) {
        fighter.state = STATES.IDLE;
      }
    }
  },

  checkCombat(attacker, defender, attackerIdx) {
    if (attacker.state === STATES.THROW && attacker.stateTimer === 13) {
      if (CollisionSystem.checkThrow(attacker, defender) && defender.canAct()) {
        defender.state = STATES.THROWN;
        defender.stateTimer = 20;
        const dmg = defender.takeDamage(120, 0, 0, 3, false, 'mid', false, 0);
        this.awardSuper(attacker, defender, dmg, false); // FIX #55
        this.scoreMgr.addHit(dmg);
        return;
      }
    }

    if (!attacker.hitBox || attacker.hasHitThisAttack) return;

    const hit = CollisionSystem.checkHit(attacker, defender);
    if (!hit) return;

    if (defender.isInvincible()) return;

    const atkData = attacker.getAttackData();
    if (!atkData) return;

    const isSpecial = !!attacker.currentSpecial;
    const spData = attacker.getSpecialData();
    const damage = spData && spData.type === 'advancing' && atkData.damagePerHit ? atkData.damagePerHit :
                   spData && spData.type === 'rapid' && atkData.damagePerHit ? atkData.damagePerHit :
                   spData && spData.type === 'melee' && atkData.damage ? Math.round(atkData.damage / (atkData.hits || 1)) :
                   atkData.damage || 30;

    const isBlocked = this.checkBlock(defender, atkData.type || 'mid');
    const hitstun = atkData.hitstun || 12;
    const blockstun = atkData.blockstun || 8;
    const kb = atkData.knockback || 3;

    const comboCount = isBlocked ? 0 : this.comboCounter.count;
    const actualDmg = defender.takeDamage(damage, hitstun, blockstun, kb, isBlocked, atkData.type, isSpecial, comboCount);
    this.awardSuper(attacker, defender, actualDmg, isBlocked); // FIX #55
    attacker.markHitConfirm(isBlocked);

    if (!isBlocked) {
      this.comboCounter.addHit(actualDmg, attackerIdx);
      this.scoreMgr.addHit(actualDmg);

      const hitX = (attacker.x + defender.x) / 2;
      const hitY = Math.min(attacker.y, defender.y) - 10;
      particles.spawnHitSpark(hitX + this.camera.getOffset().x, hitY + this.camera.getOffset().y);

      const stopFrames = isSpecial ? 10 : (damage > 70 ? 8 : (damage > 40 ? 5 : 3));
      this.frozenFrames = stopFrames;

      if (damage > 60 || isSpecial) {
        this.camera.shake(1, 8);
      }
      if (isSpecial) {
        this.flashAlpha = 0.3;
      }
    } else {
      const hitX = (attacker.x + defender.x) / 2;
      const hitY = Math.min(attacker.y, defender.y) - 10;
      particles.spawnBlockSpark(hitX + this.camera.getOffset().x, hitY + this.camera.getOffset().y);
      this.frozenFrames = 2;
    }

    if (spData && (spData.type === 'advancing' || spData.type === 'rapid' || spData.type === 'melee')) {
      attacker.specialHitCount++;
      if (attacker.specialHitCount < (atkData.hits || 1)) {
        attacker.hasHitThisAttack = false;
      } else {
        attacker.hasHitThisAttack = true;
      }
    } else {
      attacker.hasHitThisAttack = true;
    }

    if (atkData.sweep && !isBlocked) {
      defender.applyKnockdown();
    }

    if (defender.hp <= 0) {
      this.slowMotion = true;
      this.slowTimer = CFG.KO_SLOWMO_FRAMES;
      this.camera.shake(2, 15);
      this.flashAlpha = 0.5;
    }
  },

  checkBlock(defender, atkType) {
    if (!defender.canBlock()) return false;
    const defInput = defender.pi === 0 ? inputManager : this.cpuInput;
    const dir = defInput.getDirection(defender.facingRight);

    // FIX #28: Switch guard condition from back direction to dedicated guard button.
    const isGuardPressed = defInput.isHeld(KEYS.GUARD);
    const isCrouching = (dir === 1 || dir === 2 || dir === 3);

    if (!isGuardPressed) return false;

    if (atkType === 'high' && isCrouching) return false;
    if (atkType === 'low' && !isCrouching) return false;
    if (atkType === 'overhead' && isCrouching) return false;

    return true;
  },

  checkProjectiles() {
    for (let p of projectiles) {
      if (!p.active) continue;
      const target = p.owner === 0 ? this.p2 : this.p1;
      if (target.hurtBox && aabbOverlap(p.hitBox, target.hurtBox)) {
        if (!target.isInvincible()) {
          const isBlocked = this.checkBlock(target, 'mid');
          const dealt = target.takeDamage(p.damage, 12, 8, 3, isBlocked, 'mid', true, 0);
          const ownerF = p.owner === 0 ? this.p1 : this.p2;
          this.awardSuper(ownerF, target, dealt, isBlocked); // FIX #55
          if (!isBlocked) {
            particles.spawnHitSpark(p.x + this.camera.getOffset().x, p.y + this.camera.getOffset().y);
            this.frozenFrames = 5;
          } else {
            particles.spawnBlockSpark(p.x + this.camera.getOffset().x, p.y + this.camera.getOffset().y);
          }
        }
        p.destroy();
      }
    }
    if (projectiles[0].active && projectiles[1].active) {
      if (aabbOverlap(projectiles[0].hitBox, projectiles[1].hitBox)) {
        const mx = (projectiles[0].x + projectiles[1].x) / 2;
        const my = (projectiles[0].y + projectiles[1].y) / 2;
        particles.spawnHitSpark(mx + this.camera.getOffset().x, my + this.camera.getOffset().y);
        projectiles[0].destroy();
        projectiles[1].destroy();
      }
    }
  },

  render(ctx) {
    const camOff = this.camera.getOffset();
    const stage = STAGE_DATA[this.stageIdx];

    ctx.save();
    ctx.translate(Math.round(camOff.x * 0), Math.round(camOff.y));
    const diffStageKey = BgImageStore.stageKeyForDifficulty(arcadeState.difficulty);
    if (!BgImageStore.draw(ctx, diffStageKey)) {
      stage.drawBg(ctx, this.camera.x);
    }
    ctx.restore();

    this.p1.render(ctx, camOff);
    this.p2.render(ctx, camOff);

    for (let p of projectiles) p.render(ctx, camOff);

    particles.render(ctx);

    this.renderHUD(ctx);

    this.comboCounter.render(ctx);

    const needImported = [this.p1 && this.p1.charId, this.p2 && this.p2.charId].some((id) => ACTIVE_CHARS.includes(id));
    const importedReady = ACTIVE_CHARS.every((id) => {
      const used = (this.p1 && this.p1.charId === id) || (this.p2 && this.p2.charId === id);
      return !used || SpriteStore.isReady(id);
    });
    if (needImported && !importedReady) {
      const p = Math.round(SpriteStore.progress() * 100);
      ctx.fillStyle = 'rgba(0,0,0,0.45)';
      ctx.fillRect(0, 0, CFG.INTERNAL_W, CFG.INTERNAL_H);
      drawText(ctx, 'LOADING SPRITES', CFG.INTERNAL_W / 2, CFG.INTERNAL_H / 2 - 6, 5, '#FFFFFF', 'center');
      drawText(ctx, `${p}%`, CFG.INTERNAL_W / 2, CFG.INTERNAL_H / 2 + 6, 4, '#FFDD66', 'center');
    }

    if (this.roundMgr.phase === 'roundStart') {
      const t = this.roundMgr.phaseTimer;
      if (t > CFG.FIGHT_TEXT_FRAMES) {
        const scale = easeOutCubic(1 - (t - CFG.FIGHT_TEXT_FRAMES) / (CFG.ROUND_TEXT_FRAMES - CFG.FIGHT_TEXT_FRAMES));
        ctx.save();
        ctx.translate(CFG.INTERNAL_W / 2, CFG.INTERNAL_H / 2 - 10);
        ctx.scale(scale * 2, scale * 2);
        drawText(ctx, `ROUND ${this.roundMgr.round}`, 0, 0, 8, '#FFFFFF', 'center');
        ctx.restore();
      } else {
        const scale = easeOutCubic(1 - t / CFG.FIGHT_TEXT_FRAMES);
        ctx.save();
        ctx.translate(CFG.INTERNAL_W / 2, CFG.INTERNAL_H / 2 - 10);
        ctx.scale(scale * 2 + 0.5, scale * 2 + 0.5);
        drawText(ctx, 'FIGHT!', 0, 0, 10, '#FF4444', 'center');
        ctx.restore();
      }
    }

    if (this.roundMgr.phase === 'ko') {
      const t = this.roundMgr.phaseTimer;
      if (t > 60) {
        drawText(ctx, this.roundMgr.timerValue <= 0 ? 'TIME UP!' : 'K.O.!', CFG.INTERNAL_W / 2, CFG.INTERNAL_H / 2 - 10, 12, '#FF2222', 'center');
      } else {
        const winnerName = this.roundMgr.p1Wins > this.roundMgr.p2Wins ? this.p1.data.name :
                           (this.roundMgr.p2Wins > this.roundMgr.p1Wins ? this.p2.data.name : 'DRAW');
        drawText(ctx, `${winnerName} WINS!`, CFG.INTERNAL_W / 2, CFG.INTERNAL_H / 2 - 10, 8, '#FFCC00', 'center');
        if (this.roundMgr.isPerfect) {
          drawText(ctx, 'PERFECT!', CFG.INTERNAL_W / 2, CFG.INTERNAL_H / 2 + 5, 6, '#FFFF00', 'center');
        }
      }
    }

    if (this.roundMgr.phase === 'roundResult') {
      // FIX #19: Show winner + updated win marks for 1.5s between rounds.
      const winnerName = this.roundMgr.lastRoundWinner === 0 ? this.p1.data.name :
                         (this.roundMgr.lastRoundWinner === 1 ? this.p2.data.name : 'DRAW');
      drawText(ctx, `${winnerName} ROUND WIN`, CFG.INTERNAL_W / 2, CFG.INTERNAL_H / 2 - 10, 8, '#FFDD55', 'center');
      drawText(ctx, `★ ${this.roundMgr.p1Wins} - ${this.roundMgr.p2Wins} ★`, CFG.INTERNAL_W / 2, CFG.INTERNAL_H / 2 + 5, 6, '#FFFFFF', 'center');
    }

    if (this.flashAlpha > 0) {
      ctx.fillStyle = `rgba(255,255,255,${this.flashAlpha})`;
      ctx.fillRect(0, 0, CFG.INTERNAL_W, CFG.INTERNAL_H);
    }

    this.renderSuperCutin(ctx); // FIX #55

    if (this.paused) {
      ctx.fillStyle = 'rgba(0,0,0,0.7)';
      ctx.fillRect(0, 0, CFG.INTERNAL_W, CFG.INTERNAL_H);
      drawText(ctx, 'PAUSED', CFG.INTERNAL_W / 2, 40, 10, '#FFFFFF', 'center');
      const items = ['RESUME', 'QUIT TO TITLE'];
      for (let i = 0; i < items.length; i++) {
        const sel = i === this.pauseCursor;
        drawText(ctx, (sel ? '► ' : '  ') + items[i], CFG.INTERNAL_W / 2, 65 + i * 12, 6, sel ? '#FFFFFF' : '#888888', 'center');
      }
    }

    if (GAME.DEBUG) {
      drawText(ctx, `FPS: ${GAME.measuredFps || 60}`, CFG.INTERNAL_W - 5, CFG.INTERNAL_H - 5, 3, '#00FF00', 'right', false);
    }
  },

  renderHUD(ctx) {
    // FIX #76: Richer HUD rendering with layered panels, framed bars, and animated accents.
    const W = CFG.INTERNAL_W;
    const topH = 24;
    const barW = 84;
    const barH = 6;
    const barY = 7;
    const p1BarX = 30;
    const p2BarX = W - 30 - barW;
    const now = Date.now();

    const drawFaceIcon = (x, y, charId, faceRight) => {
      const pal = PALETTE[charId];
      ctx.save();
      ctx.translate(x, y);
      ctx.fillStyle = '#101624';
      ctx.fillRect(-7, -7, 14, 14);
      ctx.fillStyle = '#CFD8EA';
      ctx.fillRect(-8, -8, 16, 16);
      ctx.fillStyle = '#0C111B';
      ctx.fillRect(-7, -7, 14, 14);
      if (!faceRight) ctx.scale(-1, 1);
      ctx.fillStyle = pal.outline;
      ctx.fillRect(-5, -5, 10, 10);
      ctx.fillStyle = pal.skin;
      ctx.fillRect(-4, -4, 8, 7);
      if (pal.hair) {
        ctx.fillStyle = pal.hair;
        ctx.fillRect(-4, -5, 8, 3);
      }
      ctx.fillStyle = pal.main;
      ctx.fillRect(-5, 2, 10, 3);
      ctx.restore();
    };

    const getHpColor = (r) => r > 0.5 ? '#1EDB3A' : (r > 0.25 ? '#F0C531' : '#E84C4C');
    const drawHpBar = (x, ratio, actRatio, mirror) => {
      ctx.fillStyle = 'rgba(0,0,0,0.55)';
      ctx.fillRect(x - 1, barY - 1, barW + 2, barH + 2);
      ctx.fillStyle = '#283548';
      ctx.fillRect(x, barY, barW, barH);
      ctx.fillStyle = '#A7B5CC';
      const trailW = barW * clamp(ratio, 0, 1);
      if (mirror) ctx.fillRect(x + barW - trailW, barY, trailW, barH);
      else ctx.fillRect(x, barY, trailW, barH);
      ctx.fillStyle = getHpColor(actRatio);
      const hpW = barW * clamp(actRatio, 0, 1);
      if (mirror) ctx.fillRect(x + barW - hpW, barY, hpW, barH);
      else ctx.fillRect(x, barY, hpW, barH);
      if (actRatio <= 0.25 && Math.floor(now / 220) % 2 === 0) {
        ctx.fillStyle = 'rgba(255,80,80,0.3)';
        if (mirror) ctx.fillRect(x + barW - hpW, barY, hpW, barH);
        else ctx.fillRect(x, barY, hpW, barH);
      }
    };

    const topGrad = ctx.createLinearGradient(0, 0, 0, topH);
    topGrad.addColorStop(0, 'rgba(32,48,72,0.88)');
    topGrad.addColorStop(1, 'rgba(18,24,34,0.72)');
    ctx.fillStyle = topGrad;
    ctx.fillRect(0, 0, W, topH);
    ctx.fillStyle = 'rgba(190,216,255,0.28)';
    ctx.fillRect(0, 0, W, 1);
    ctx.fillStyle = 'rgba(0,0,0,0.45)';
    ctx.fillRect(0, topH - 1, W, 1);

    drawFaceIcon(12, barY + 2, this.p1.charId, true);
    drawFaceIcon(W - 12, barY + 2, this.p2.charId, false);

    const p1Ratio = this.p1.displayHp / CFG.MAX_HP;
    const p2Ratio = this.p2.displayHp / CFG.MAX_HP;
    const p1ActRatio = this.p1.hp / CFG.MAX_HP;
    const p2ActRatio = this.p2.hp / CFG.MAX_HP;
    drawHpBar(p1BarX, p1Ratio, p1ActRatio, false);
    drawHpBar(p2BarX, p2Ratio, p2ActRatio, true);

    const timerW = 22;
    const timerX = Math.floor(W / 2 - timerW / 2);
    const timerPulse = Math.sin(now * 0.012) * 0.5 + 0.5;
    ctx.fillStyle = '#1A0606';
    ctx.fillRect(timerX - 1, 2, timerW + 2, 12);
    ctx.fillStyle = `rgba(98,16,16,${0.78 + timerPulse * 0.12})`;
    ctx.fillRect(timerX, 3, timerW, 10);
    ctx.fillStyle = 'rgba(255,220,220,0.2)';
    ctx.fillRect(timerX, 3, timerW, 2);
    drawText(ctx, String(this.roundMgr.timerValue).padStart(2, '0'), W / 2, 8, 8, '#FFFFFF', 'center');

    const drawRoundPip = (x, y, lit) => {
      ctx.beginPath();
      ctx.moveTo(x, y - 2);
      ctx.lineTo(x + 2, y);
      ctx.lineTo(x, y + 2);
      ctx.lineTo(x - 2, y);
      ctx.closePath();
      ctx.fillStyle = lit ? '#FFD44A' : '#556070';
      ctx.fill();
      if (lit) {
        ctx.fillStyle = 'rgba(255,240,170,0.4)';
        ctx.fillRect(x - 1, y - 2, 2, 1);
      }
    };
    for (let i = 0; i < CFG.ROUNDS_TO_WIN; i++) {
      drawRoundPip(20 + i * 6, barY + 2, i < this.roundMgr.p1Wins);
      drawRoundPip(W - 20 - i * 6, barY + 2, i < this.roundMgr.p2Wins);
    }

    ctx.fillStyle = 'rgba(8,14,24,0.75)';
    ctx.fillRect(p1BarX - 1, 14, 42, 6);
    ctx.fillRect(W - (p1BarX - 1) - 42, 14, 42, 6);
    drawText(ctx, this.p1.data.name, p1BarX + 1, 17, 3.1, '#E9F2FF', 'left');
    drawText(ctx, this.p2.data.name, p2BarX + barW - 1, 17, 3.1, '#E9F2FF', 'right');

    const mW = 56;
    const mH = 5;
    const mY = CFG.INTERNAL_H - 9;
    const p1mx = 6;
    const p2mx = W - 6 - mW;
    const p1mr = this.p1.superMeter / CFG.SUPER_MAX;
    const p2mr = this.p2.superMeter / CFG.SUPER_MAX;
    const fullPulse = Math.sin(now * 0.02) * 0.5 + 0.5;

    const drawSuperBar = (x, ratio, mirror, ready) => {
      ctx.fillStyle = 'rgba(0,0,0,0.55)';
      ctx.fillRect(x - 1, mY - 1, mW + 2, mH + 2);
      ctx.fillStyle = '#3C3C3C';
      ctx.fillRect(x, mY, mW, mH);
      const glowAlpha = ready ? (0.72 + fullPulse * 0.25) : 1;
      ctx.fillStyle = ready ? `rgba(255,215,90,${glowAlpha})` : '#4CB2FF';
      const fillW = mW * clamp(ratio, 0, 1);
      if (mirror) ctx.fillRect(x + mW - fillW, mY, fillW, mH);
      else ctx.fillRect(x, mY, fillW, mH);
      if (ready) {
        ctx.fillStyle = 'rgba(255,245,170,0.35)';
        if (mirror) ctx.fillRect(x + mW - fillW, mY, fillW, 1);
        else ctx.fillRect(x, mY, fillW, 1);
      }
    };

    drawSuperBar(p1mx, p1mr, false, p1mr >= 1);
    drawSuperBar(p2mx, p2mr, true, p2mr >= 1);
    drawText(ctx, 'SUPER', p1mx, mY - 3, 2.8, '#A6D7FF', 'left');
    drawText(ctx, 'SUPER', p2mx + mW, mY - 3, 2.8, '#A6D7FF', 'right');
    if (p1mr >= 1) drawText(ctx, 'SPACE', p1mx + mW + 3, mY + 1, 2.5, '#FFE177', 'left');
    if (p2mr >= 1) drawText(ctx, 'SPACE', p2mx - 3, mY + 1, 2.5, '#FFE177', 'right');
  }
};

sceneManager.add('battle', battleScene);

// Ending Scene
sceneManager.add('ending', {
  timer: 0,
  enter() { this.timer = 0; SaveManager.updateScore(arcadeState.playerChar, arcadeState.difficulty, arcadeState.score); },
  exit() {},
  update() {
    this.timer++;
    if (this.timer > 60 && inputManager.wasPressed(KEYS.CONFIRM)) sceneManager.go('title');
    inputManager.update(true);
  },
  render(ctx) {
    ctx.fillStyle = '#0A0A1A';
    ctx.fillRect(0, 0, CFG.INTERNAL_W, CFG.INTERNAL_H);

    const ch = CHARACTERS[arcadeState.playerChar];
    const pal = PALETTE[arcadeState.playerChar];

    drawText(ctx, '- CONGRATULATIONS -', CFG.INTERNAL_W / 2, 15, 7, '#FFCC00', 'center');

    ctx.fillStyle = pal.main;
    ctx.fillRect(CFG.INTERNAL_W / 2 - 8, 25, 16, 30);
    ctx.fillStyle = pal.skin;
    ctx.fillRect(CFG.INTERNAL_W / 2 - 5, 20, 10, 8);

    const lines = ch.ending;
    for (let i = 0; i < lines.length; i++) {
      const alpha = clamp((this.timer - 60 - i * 30) / 30, 0, 1);
      ctx.globalAlpha = alpha;
      drawText(ctx, lines[i], CFG.INTERNAL_W / 2, 65 + i * 10, 4, '#CCCCCC', 'center');
    }
    ctx.globalAlpha = 1;

    drawText(ctx, `FINAL SCORE: ${arcadeState.score.toLocaleString()}`, CFG.INTERNAL_W / 2, 100, 5, '#FFFF00', 'center');

    if (this.timer > 90 && this.timer % 60 < 40) {
      drawText(ctx, 'PRESS ENTER', CFG.INTERNAL_W / 2, 120, 4, '#888888', 'center');
    }
  }
});

// Game Over Scene
sceneManager.add('gameOver', {
  timer: 0,
  enter() { this.timer = 0; SaveManager.updateScore(arcadeState.playerChar, arcadeState.difficulty, arcadeState.score); },
  exit() {},
  update() {
    this.timer++;
    if (this.timer > 60 && inputManager.wasPressed(KEYS.CONFIRM)) sceneManager.go('title');
    inputManager.update(true);
  },
  render(ctx) {
    ctx.fillStyle = '#1A0A0A';
    ctx.fillRect(0, 0, CFG.INTERNAL_W, CFG.INTERNAL_H);

    const pulse = 1 + Math.sin(this.timer * 0.08) * 0.03;
    ctx.save();
    ctx.translate(CFG.INTERNAL_W / 2, 40);
    ctx.scale(pulse, pulse);
    drawText(ctx, 'GAME OVER', 0, 0, 12, '#CC2222', 'center');
    ctx.restore();

    drawText(ctx, `SCORE: ${arcadeState.score.toLocaleString()}`, CFG.INTERNAL_W / 2, 70, 6, '#FFCC00', 'center');
    drawText(ctx, `MATCH ${arcadeState.currentMatch + 1} / ${ACTIVE_CHARS.length}`, CFG.INTERNAL_W / 2, 85, 4, '#888888', 'center');

    if (this.timer > 60 && this.timer % 60 < 40) {
      drawText(ctx, 'PRESS ENTER TO CONTINUE', CFG.INTERNAL_W / 2, 110, 4, '#888888', 'center');
    }
  }
});

// Records Scene
sceneManager.add('records', {
  timer: 0,
  enter() { this.timer = 0; },
  exit() {},
  update() {
    this.timer++;
    if (inputManager.wasPressed(KEYS.CONFIRM) || inputManager.wasPressed(KEYS.PAUSE)) sceneManager.go('title');
    inputManager.update(true);
  },
  render(ctx) {
    ctx.fillStyle = '#0A0A1A';
    ctx.fillRect(0, 0, CFG.INTERNAL_W, CFG.INTERNAL_H);
    drawText(ctx, 'HIGH SCORES', CFG.INTERNAL_W / 2, 12, 8, '#FFCC00', 'center');

    const data = SaveManager.load();
    const chars = ACTIVE_CHARS;
    const diffs = ['easy', 'normal', 'hard'];

    drawText(ctx, '', 30, 28, 3, '#888888', 'left');
    for (let d = 0; d < diffs.length; d++) {
      drawText(ctx, diffs[d].toUpperCase(), 100 + d * 50, 28, 3, '#888888', 'center');
    }

    for (let c = 0; c < chars.length; c++) {
      const ch = CHARACTERS[chars[c]];
      drawText(ctx, ch.name, 40, 40 + c * 15, 4, '#FFFFFF', 'left');
      for (let d = 0; d < diffs.length; d++) {
        const score = data.records[chars[c]] ? (data.records[chars[c]][diffs[d]] || 0) : 0;
        const scoreStr = score > 0 ? score.toLocaleString() : '---';
        drawText(ctx, scoreStr, 100 + d * 50, 40 + c * 15, 3, score > 0 ? '#FFFF88' : '#444444', 'center');
      }
    }

    drawText(ctx, 'ENTER / ESC: BACK', CFG.INTERNAL_W / 2, CFG.INTERNAL_H - 8, 3, '#555555', 'center');
  }
});

/* ===== SECTION 11: STAGES (handled in STAGE_DATA above) ===== */

/* ===== SECTION 12: CHARACTER SPRITES (handled in Fighter.render) ===== */

/* ===== SECTION 13: SAVE/LOAD ===== */

const SaveManager = {
  KEY: 'RISING_FIST_SAVE_V1',
  defaultData() {
    return {
      version: 1,
      records: {
        kenji: { easy:0, normal:0, hard:0 },
        vance: { easy:0, normal:0, hard:0 },
        meilin: { easy:0, normal:0, hard:0 }
      },
      totalPlayTime: 0, totalMatches: 0, lastPlayed: null
    };
  },
  load() {
    try {
      const raw = localStorage.getItem(this.KEY);
      if (!raw) return this.defaultData();
      const data = JSON.parse(raw);
      if (!data || data.version !== 1) return this.defaultData();
      if (!data.records) data.records = this.defaultData().records;
      for (let c of ACTIVE_CHARS) {
        if (!data.records[c]) data.records[c] = { easy:0, normal:0, hard:0 };
      }
      return data;
    } catch(e) {
      return this.defaultData();
    }
  },
  save(data) {
    try { localStorage.setItem(this.KEY, JSON.stringify(data)); } catch(e) {}
  },
  updateScore(charId, diff, score) {
    const data = this.load();
    if (data.records[charId] && score > (data.records[charId][diff] || 0)) {
      data.records[charId][diff] = score;
    }
    data.totalMatches++;
    data.lastPlayed = new Date().toISOString();
    this.save(data);
  },
  reset() {
    try { localStorage.removeItem(this.KEY); } catch(e) {}
  }
};

/* ===== SECTION 14: BOOTSTRAP ===== */

(function boot() {
  const displayCanvas = document.getElementById('game');
  displayCanvas.width = CFG.DISPLAY_W;
  displayCanvas.height = CFG.DISPLAY_H;
  const displayCtx = displayCanvas.getContext('2d');

  const internalCanvas = document.createElement('canvas');
  // FIX #21: Render at higher offscreen resolution to reduce jagged/rough visuals.
  internalCanvas.width = CFG.INTERNAL_W * CFG.RENDER_SCALE;
  internalCanvas.height = CFG.INTERNAL_H * CFG.RENDER_SCALE;
  const ctx = internalCanvas.getContext('2d');
  ctx.setTransform(CFG.RENDER_SCALE, 0, 0, CFG.RENDER_SCALE, 0, 0);
  SpriteStore.init(); // FIX #29
  BgImageStore.init(); // FIX #53
  SuperVideoStore.init(); // FIX #55
  SAImageStore.init(); // FIX #80

  GAME.measuredFps = 60;
  let fpsFrames = 0, fpsTime = 0;
  let lastTime = performance.now();
  let accumulator = 0;

  sceneManager.go('title');

  function gameLoop(timestamp) {
    requestAnimationFrame(gameLoop);

    const elapsed = timestamp - lastTime;
    lastTime = timestamp;
    accumulator += elapsed;

    fpsFrames++;
    fpsTime += elapsed;
    if (fpsTime >= 1000) {
      GAME.measuredFps = fpsFrames;
      fpsFrames = 0;
      fpsTime = 0;
    }

    let updates = 0;
    while (accumulator >= CFG.FRAME_TIME && updates < 4) {
      sceneManager.update();
      accumulator -= CFG.FRAME_TIME;
      updates++;
    }
    if (updates === 0 && accumulator > CFG.FRAME_TIME * 0.5) {
      sceneManager.update();
      accumulator = 0;
    }

    ctx.clearRect(0, 0, CFG.INTERNAL_W, CFG.INTERNAL_H);
    sceneManager.render(ctx);

    displayCtx.imageSmoothingEnabled = true; // FIX #21
    displayCtx.clearRect(0, 0, CFG.DISPLAY_W, CFG.DISPLAY_H);
    displayCtx.drawImage(internalCanvas, 0, 0);
  }

  requestAnimationFrame(gameLoop);
})();

</script>
