<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard | Jipico CMS</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;700&family=DotGothic16&display=swap"
        rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="supabase_config.js"></script>
    <style>
        :root {
            --p: #a855f7;
            --bg: #0a0a0c;
            --card: rgba(255, 255, 255, 0.05);
        }

        body {
            background: var(--bg);
            color: #fff;
            font-family: 'Outfit', sans-serif;
            padding: 2rem;
        }

        .container {
            max-width: 800px;
            margin: 0 auto;
        }

        h1 {
            font-family: 'DotGothic16';
            border-bottom: 2px solid var(--p);
            padding-bottom: 1rem;
            margin-bottom: 2rem;
        }

        /* Auth Overlay */
        #auth-overlay {
            position: fixed;
            inset: 0;
            background: var(--bg);
            z-index: 9999;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .auth-box {
            background: var(--card);
            padding: 3rem;
            border-radius: 12px;
            text-align: center;
            border: 1px solid var(--p);
        }

        input {
            background: #1a1a1e;
            border: 1px solid #333;
            color: #fff;
            padding: 0.8rem;
            border-radius: 4px;
            width: 100%;
            margin: 1rem 0;
        }

        button {
            background: var(--p);
            border: none;
            color: #fff;
            padding: 0.8rem 2rem;
            border-radius: 4px;
            cursor: pointer;
            font-weight: 700;
            width: 100%;
        }

        /* Dashboard */
        .game-list-item {
            background: var(--card);
            padding: 1rem;
            margin-bottom: 1rem;
            display: flex;
            align-items: center;
            justify-content: space-between;
            border-radius: 8px;
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        .controls {
            display: flex;
            gap: 0.5rem;
        }

        .btn-sm {
            padding: 0.4rem 0.8rem;
            font-size: 0.8rem;
            background: #333;
        }

        .btn-save {
            background: #14b8a6;
            margin-top: 2rem;
        }

        .status {
            padding: 1rem;
            margin-top: 1rem;
            border-radius: 4px;
            display: none;
        }

        .success {
            display: block;
            background: rgba(20, 184, 166, 0.2);
            color: #14b8a6;
        }
    </style>
</head>

<body>
    <div id="auth-overlay">
        <div class="auth-box">
            <h2>ADMIN PORTAL</h2>
            <input type="password" id="admin-pass" placeholder="Password (default: jipico)">
            <button onclick="checkAuth()">Login</button>
        </div>
    </div>

    <div class="container">
        <h1>じぴこの管理画面</h1>

        <section>
            <h3>表示順序の設定 (GALLERY_ORDER)</h3>
            <p style="font-size: 0.8rem; color: #888;">上にあるゲームがトップページで大きく表示されます。▲▼で移動。</p>
            <div id="sortable-list"></div>
            <div style="display:flex; gap:1rem; align-items:center; margin-top:1rem;">
                <button class="btn-save" onclick="saveOrder()" style="margin-top:0;">表示順序を保存して反映</button>
                <button class="btn-save" onclick="addEmptyGame()" style="margin-top:0; background:var(--s);">＋
                    新しいゲームを追加</button>
            </div>
            <div id="status-msg" class="status"></div>
        </section>

        <section style="margin-top: 4rem;">
            <h3>ゲーム情報の編集・公開設定</h3>
            <p style="font-size:0.8rem; color:#888;">タイトル、説明文、公開設定などを変更できます。</p>
            <div id="games-edit-list"></div>
        </section>

        <section style="margin-top: 4rem;">
            <h3>コメント管理</h3>
            <p style="font-size:0.8rem; color:#888;">全ゲームの最新コメントを表示します。不適切なコメントは削除できます。</p>
            <div id="comments-admin-list"
                style="background:var(--card); border-radius:12px; padding:1.5rem; max-height:600px; overflow-y:auto; border:1px solid rgba(255,255,255,0.05);">
                <p style="text-align:center; color:#888;">読み込み中...</p>
            </div>
            <!-- デバッグログ表示エリア -->
            <div id="admin-debug-log"
                style="margin-top:1rem; font-family:monospace; font-size:0.7rem; color:#f87171; background:rgba(248,113,113,0.1); padding:0.5rem; border-radius:4px; display:none;">
            </div>
        </section>

        <div style="margin-top: 4rem; opacity: 0.5;">
            <a href="index.html" style="color: #fff;">← サイトに戻る</a>
        </div>
    </div>

    <!-- Edit Modal -->
    <div id="edit-modal"
        style="display:none; position:fixed; inset:0; background:rgba(0,0,0,0.8); z-index:1000; overflow-y:auto; padding:2rem;">
        <div
            style="background:#1a1a1e; max-width:600px; margin:0 auto; padding:2rem; border-radius:12px; border:1px solid var(--p);">
            <h2 id="modal-title-display">ゲーム編集</h2>
            <input type="hidden" id="edit-id">

            <label>タイトル</label>
            <input type="text" id="edit-title">

            <div style="display:grid; grid-template-columns:1fr 1fr; gap:1rem;">
                <div>
                    <label>プログラムパス (src)</label>
                    <input type="text" id="edit-src" placeholder="例: 13_LSG/index.html">
                </div>
                <div>
                    <label>サムネイルパス</label>
                    <input type="text" id="edit-thumb" placeholder="例: 13_LSG/title.jpg">
                </div>
            </div>

            <div style="display:grid; grid-template-columns:1fr 1fr 1.5fr; gap:0.5rem;">
                <div>
                    <label>幅 (width)</label>
                    <input type="number" id="edit-width" placeholder="1280">
                </div>
                <div>
                    <label>高さ (height)</label>
                    <input type="number" id="edit-height" placeholder="720">
                </div>
                <div>
                    <label>アスペクト比</label>
                    <input type="text" id="edit-ratio" placeholder="16 / 9">
                </div>
            </div>

            <label>説明文 (改行はそのまま反映されます)</label>
            <textarea id="edit-desc"
                style="width:100%; height:100px; background:#0a0a0c; color:#fff; border:1px solid #333; padding:0.5rem; margin-bottom:1rem;"></textarea>

            <label>操作方法</label>
            <textarea id="edit-controls"
                style="width:100%; height:80px; background:#0a0a0c; color:#fff; border:1px solid #333; padding:0.5rem; margin-bottom:1rem;"></textarea>

            <label>バグ・注意報</label>
            <textarea id="edit-bugs"
                style="width:100%; height:80px; background:#0a0a0c; color:#fff; border:1px solid #333; padding:0.5rem; margin-bottom:1rem;"></textarea>

            <div style="display:flex; justify-content:space-between; margin-top:1rem; gap:1rem;">
                <button style="background:#333;" onclick="closeModal()">キャンセル</button>
                <button onclick="saveGameDetail()">変更を保存</button>
            </div>
        </div>
    </div>

    <script>
        const DEFAULT_PASS = "0062920tjipico";
        let currentOrder = [];
        let allGames = {};

        // supabase_config.jsで初期化されるのを待つ
        function getSupabase() {
            if (window.supabase && window.supabase.createClient) {
                // supabase_config.js の設定がまだならここで初期化（保険）
                return window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
            }
            return window.supabase;
        }

        function checkAuth() {
            const pass = document.getElementById('admin-pass').value;
            if (pass === DEFAULT_PASS) {
                document.getElementById('auth-overlay').style.display = 'none';
                loadData();
            } else {
                alert('パスワードが違います');
            }
        }

        async function loadData() {
            const list = document.getElementById('sortable-list');
            list.innerHTML = '<p style="text-align:center; padding:1rem; color:#888;">データを読み込み中...</p>';

            // 確実にクライアントインスタンスを取得（ライブラリ本体と混同しないようにする）
            let client = (typeof supabase !== 'undefined' && supabase && supabase.from) ? supabase : null;
            if (!client && typeof getDbClient === 'function') {
                client = getDbClient();
            }

            if (!client || !client.from) {
                console.error('Supabase client initialization failed.', client);
                list.innerHTML = '<p style="color:red; padding:1rem;">クライアントの初期化に失敗しました。ページを数回リロードしてみてください。</p>';
                return;
            }

            try {
                // 表示順序（settingsテーブル）とゲーム一覧を並行して取得
                const [settingsRes, gamesRes] = await Promise.all([
                    client.from('settings').select('value').eq('key', 'gallery_order').maybeSingle(),
                    client.from('games').select('*')
                ]);

                if (gamesRes.error) throw gamesRes.error;

                // ゲームデータをIDでマッピング（詳細項目も保持）
                allGames = (gamesRes.data || []).reduce((acc, g) => {
                    acc[g.id] = {
                        ...g,
                        title: g.title || g.タイトル || g.id,
                        description: g.description || g.説明 || '',
                        controls: g.controls || g.コントロール || '',
                        bugs: g.bugs || g.バグ || '',
                        is_public: g.is_public !== undefined ? g.is_public : true
                    };
                    return acc;
                }, {});

                // 表示順序の設定（DBに無ければテーブル全件表示）
                const savedOrder = settingsRes.data ? settingsRes.data.value : [];
                const allIds = Object.keys(allGames);

                // 保存された順序をベースにしつつ、DBにあるものだけを抽出、足りないものを末尾に追加
                currentOrder = savedOrder.filter(id => allIds.includes(id));
                allIds.forEach(id => {
                    if (!currentOrder.includes(id)) currentOrder.push(id);
                });

                if (currentOrder.length === 0) {
                    list.innerHTML = '<p style="text-align:center; padding:1rem; color:#f87171;">ゲームが見つかりません。Table Editorでデータが入っているか確認してください。</p>';
                } else {
                    renderOrderList();
                    renderEditList();
                    renderCommentsList();
                }

            } catch (err) {
                console.error('Fetch error:', err);
                list.innerHTML = '<p style="color:red; padding:1rem;">読み込みエラー：' + (err.message || '通信に失敗しました') + '</p>';
            }
        }

        function renderOrderList() {
            const list = document.getElementById('sortable-list');
            list.innerHTML = '';
            currentOrder.forEach((id, index) => {
                const game = allGames[id] || { title: id };
                const item = document.createElement('div');
                item.className = 'game-list-item';
                item.innerHTML = `
                    <span>${index + 1}. <strong>${game.title}</strong> <small style="color:#666">(${id})</small></span>
                    <div class="controls">
                        <button class="btn-sm" onclick="move(${index}, -1)">▲</button>
                        <button class="btn-sm" onclick="move(${index}, 1)">▼</button>
                    </div>
                `;
                list.appendChild(item);
            });
        }

        function move(index, direction) {
            const newIndex = index + direction;
            if (newIndex < 0 || newIndex >= currentOrder.length) return;
            const temp = currentOrder[index];
            currentOrder[index] = currentOrder[newIndex];
            currentOrder[newIndex] = temp;
            renderOrderList();
        }

        async function saveOrder() {
            const msg = document.getElementById('status-msg');
            msg.style.display = 'block';
            msg.textContent = 'データベースに保存中...';
            msg.className = 'status success';

            try {
                let client = (supabase && supabase.from) ? supabase : getDbClient();

                if (!client) {
                    throw new Error('Supabaseクライアントが準備できていません');
                }

                console.log('Saving order:', currentOrder);

                const { data, error } = await client
                    .from('settings')
                    .upsert({ key: 'gallery_order', value: currentOrder }, { onConflict: 'key' })
                    .select();

                if (error) {
                    throw error;
                } else {
                    msg.textContent = '保存完了！トップページをリロードして確認してください。';
                    setTimeout(() => { msg.style.display = 'none'; }, 3000);
                }
            } catch (err) {
                console.error('Save error:', err);
                alert('保存に失敗しました:\n' + err.message);
                msg.style.display = 'none';
            }
        }

        function renderEditList() {
            const list = document.getElementById('games-edit-list');
            list.innerHTML = '';
            // 全てのゲームを一覧表示（公開ボタンと編集ボタン付き）
            Object.values(allGames).forEach(game => {
                const item = document.createElement('div');
                item.className = 'game-list-item';
                item.innerHTML = `
                    <div>
                        <strong>${game.title}</strong>
                        <div style="font-size:0.7rem; color:#888;">
                            状態: <span id="status-${game.id}" style="color:${game.is_public ? '#14b8a6' : '#f87171'}">${game.is_public ? '公開中' : '非公開'}</span>
                        </div>
                    </div>
                    <div class="controls">
                        <button class="btn-sm" style="background:#444" onclick="refreshGame('${game.id}')" title="ファイルを新しくした時に押すと、キャッシュを消して最新状態を表示させます">🔄 最新に更新</button>
                        <button class="btn-sm" style="background:${game.is_public ? '#333' : '#14b8a6'}" onclick="togglePublic('${game.id}')">
                            ${game.is_public ? '非公開にする' : '公開する'}
                        </button>
                        <button class="btn-sm" style="background:var(--p)" onclick="openModal('${game.id}')">編集</button>
                    </div>
                `;
                list.appendChild(item);
            });
        }

        async function togglePublic(id) {
            const game = allGames[id];
            const newState = !game.is_public;

            try {
                let client = (supabase && supabase.from) ? supabase : getDbClient();
                const { error } = await client.from('games').update({ is_public: newState }).eq('id', id);
                if (error) throw error;

                game.is_public = newState;
                renderEditList();
                alert(newState ? '公開に設定しました' : '非公開に設定しました');
            } catch (err) {
                alert('切替失敗: ' + err.message);
            }
        }

        function openModal(id) {
            const game = allGames[id];
            document.getElementById('edit-id').value = id;
            document.getElementById('edit-title').value = game.title;
            document.getElementById('edit-src').value = game.src || '';
            document.getElementById('edit-thumb').value = game.thumbnail || '';
            document.getElementById('edit-width').value = game.width || '';
            document.getElementById('edit-height').value = game.height || '';
            document.getElementById('edit-ratio').value = game.aspect_ratio || '';
            document.getElementById('edit-desc').value = game.description;
            document.getElementById('edit-controls').value = game.controls;
            document.getElementById('edit-bugs').value = game.bugs;
            document.getElementById('modal-title-display').textContent = `編集: ${game.title}`;
            document.getElementById('edit-modal').style.display = 'flex';
        }

        function closeModal() {
            document.getElementById('edit-modal').style.display = 'none';
        }

        async function saveGameDetail() {
            const id = document.getElementById('edit-id').value;
            const updateData = {
                title: document.getElementById('edit-title').value,
                src: document.getElementById('edit-src').value,
                thumbnail: document.getElementById('edit-thumb').value,
                width: parseInt(document.getElementById('edit-width').value) || null,
                height: parseInt(document.getElementById('edit-height').value) || null,
                aspect_ratio: document.getElementById('edit-ratio').value,
                description: document.getElementById('edit-desc').value,
                controls: document.getElementById('edit-controls').value,
                bugs: document.getElementById('edit-bugs').value
            };

            try {
                let client = (supabase && supabase.from) ? supabase : getDbClient();
                const { error } = await client.from('games').update(updateData).eq('id', id);
                if (error) throw error;

                // local data update
                allGames[id] = { ...allGames[id], ...updateData };
                renderOrderList();
                renderEditList();
                closeModal();
                alert('保存しました');
            } catch (err) {
                alert('保存失敗: ' + err.message);
            }
        }

        async function addEmptyGame() {
            const newId = prompt('新しいゲームのIDを入力してください (半角英数、例: mynewgame)');
            if (!newId) return;

            if (allGames[newId]) {
                alert('そのIDは既に使用されています');
                return;
            }

            try {
                let client = (supabase && supabase.from) ? supabase : getDbClient();
                const { error } = await client.from('games').insert({
                    id: newId,
                    title: '新しいゲーム',
                    is_public: false
                });

                if (error) throw error;

                alert('作成しました！リストの一番下に追加されています。');
                loadData();
            } catch (err) {
                alert('作成失敗: ' + err.message);
            }
        }

        async function refreshGame(id) {
            const newVersion = Date.now();
            try {
                let client = (supabase && supabase.from) ? supabase : getDbClient();
                const { error } = await client.from('games').update({ version: newVersion }).eq('id', id);
                if (error) throw error;

                allGames[id].version = newVersion;
                alert('最新ファイルへの更新命令（キャッシュ更新）を送信しました！サイトを確認してください。');
            } catch (err) {
                alert('更新失敗: ' + err.message);
            }
        }

        async function renderCommentsList() {
            const list = document.getElementById('comments-admin-list');
            let client = (supabase && supabase.from) ? supabase : getDbClient();

            if (!client) return;

            try {
                const { data: comments, error } = await client
                    .from('comments')
                    .select('*')
                    .order('created_at', { ascending: false });

                if (error) throw error;

                if (!comments || comments.length === 0) {
                    list.innerHTML = '<p style="text-align:center; padding:1rem; color:#888;">コメントはありません。</p>';
                    return;
                }

                list.innerHTML = '';
                comments.forEach(c => {
                    const game = allGames[c.game_id] || { title: c.game_id };
                    const dateStr = new Date(c.created_at).toLocaleString('ja-JP');
                    const item = document.createElement('div');
                    item.className = 'game-list-item';
                    item.style.flexDirection = 'column';
                    item.style.alignItems = 'flex-start';
                    item.style.gap = '0.5rem';
                    item.innerHTML = `
                        <div style="display:flex; justify-content:space-between; width:100%; border-bottom:1px solid rgba(255,255,255,0.05); padding-bottom:0.3rem;">
                            <span style="font-size:0.8rem; color:var(--p)">${game.title}</span>
                            <span style="font-size:0.7rem; color:#666;">${dateStr}</span>
                        </div>
                        <div style="width:100%; display:flex; justify-content:space-between; align-items:flex-start;">
                            <div style="flex:1;">
                                <strong style="font-size:0.9rem;">${c.nickname || '名無しさん'}:</strong>
                                <p style="font-size:0.85rem; color:#ccc; margin:0.3rem 0; white-space:pre-wrap;">${c.content}</p>
                            </div>
                            <button class="btn-sm delete-admin-btn" style="background:#f87171; margin-left:1rem;">削除</button>
                        </div>
                    `;

                    const btn = item.querySelector('.delete-admin-btn');
                    btn.addEventListener('click', () => {
                        console.log('Delete button clicked for ID:', c.id);
                        deleteCommentAdmin(c.id);
                    });

                    list.appendChild(item);
                });
            } catch (err) {
                console.error('Fetch comments error:', err);
                list.innerHTML = '<p style="color:red; padding:1rem;">コメントの読み込みに失敗しました。</p>';
            }
        }

        function showDebugLog(msg) {
            const logArea = document.getElementById('admin-debug-log');
            logArea.style.display = 'block';
            logArea.textContent = 'Debug: ' + msg;
            console.log('AdminDebug:', msg);
        }

        async function deleteCommentAdmin(id) {
            showDebugLog('削除ボタンが押されました。ID: ' + id);
            if (!confirm('管理権限でこのコメントを削除しますか？')) {
                showDebugLog('削除がキャンセルされました。');
                return;
            }

            try {
                showDebugLog('Supabaseクライアントを取得中...');
                let client = (typeof supabase !== 'undefined' && supabase && supabase.from) ? supabase : null;
                if (!client && typeof getDbClient === 'function') {
                    client = getDbClient();
                }

                if (!client || !client.from) {
                    showDebugLog('クライアントの初期化に失敗しました。');
                    throw new Error('Supabaseクライアントが初期化できていません。ページをリロードしてください。');
                }

                showDebugLog('削除リクエストを送信中... ID: ' + id);
                const { error } = await client.from('comments').delete().eq('id', id);

                if (error) {
                    showDebugLog('削除失敗エラー: ' + JSON.stringify(error));
                    throw error;
                }

                showDebugLog('削除成功。');
                alert('削除しました');
                renderCommentsList();
            } catch (err) {
                console.error('Delete error:', err);
                showDebugLog('例外発生: ' + err.message);
                alert('削除失敗: ' + (err.message || '不明なエラーが発生しました'));
            }
        }
    </script>
</body>

</html>
