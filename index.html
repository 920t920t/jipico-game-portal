<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Game Portal</title>
    <meta name="description" content="自作のHTMLゲームをまとめたポータルサイト">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div class="background-animation"></div>
    <header>
        <div class="logo">Game<span class="highlight">Portal</span></div>
        <nav>
            <button class="login-btn">Login / Ranking (実装予定)</button>
        </nav>
    </header>

    <main>
        <section class="hero video-bg-container">
            <!-- ユーザー指定のYouTubeチャンネル動画 -->
            <iframe class="hero-video"
                src="https://www.youtube.com/embed/-Tq2TuT3f_4?autoplay=1&mute=1&loop=1&playlist=-Tq2TuT3f_4&controls=0&showinfo=0&rel=0&iv_load_policy=3&modestbranding=1"
                frameborder="0" allow="autoplay; encrypted-media" allowfullscreen>
            </iframe>
            <div class="hero-video-overlay"></div>
            <div class="hero-content">
                <h1>Welcome to the <span class="highlight">Universe</span> of Games</h1>
                <p>PLAY, COMPETE, AND CONQUER</p>
            </div>
        </section>

        <section class="game-gallery">
            <h2 class="section-title">Latest Games</h2>
            <div class="grid">
                <!-- Game Card 1: LSG -->
                <a href="play.html?id=lsg" class="game-card">
                    <div class="game-image"
                        style="background-image: url('13_LSG/screenshot1.jpg'); background-size: cover; background-position: center;">
                        <!-- Icon removed for cleaner look -->
                    </div>
                    <div class="game-info">
                        <h3>告白デスマーチ 修学旅行編</h3>
                        <p>4人の女子との恋愛シミュレーションゲーム。</p>
                        <span class="play-btn">Play Now</span>
                    </div>
                </a>

                <!-- Game Card 2: Spelunker -->
                <a href="play.html?id=spelunker" class="game-card">
                    <div class="game-image"
                        style="background-image: url('16_spelunker/screenshot1.jpg'); background-size: cover; background-position: center;">
                    </div>
                    <div class="game-info">
                        <h3>Spelunker Adventure</h3>
                        <p>深い洞窟を探検し、お化けを避けてお宝を集めよう。</p>
                        <span class="play-btn">Play Now</span>
                    </div>
                </a>

                <!-- Game Card 3: Rising Fist -->
                <a href="play.html?id=risingfist" class="game-card">
                    <div class="game-image"
                        style="background-image: url('14_risingfist/screenshot1.jpg'); background-size: cover; background-position: center;">
                    </div>
                    <div class="game-info">
                        <h3>ライジングフィスト</h3>
                        <p>迫り来る敵を倒す爽快アクションゲーム。</p>
                        <span class="play-btn">Play Now</span>
                    </div>
                </a>

                <!-- Placeholder Card removed as we now have 3 games to fill the grid nicely -->
            </div>
        </section>
    </main>

    <script src="script.js"></script>
</body>

</html>
