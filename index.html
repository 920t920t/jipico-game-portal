<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Game Portal</title>
    <meta name="description" content="自作のHTMLゲームをまとめたポータルサイト">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div class="background-animation"></div>
    <header>
        <div class="logo">じぴこの<span class="highlight">ゲームポータル</span></div>
        <nav>
            <button class="login-btn">ログイン / ランキング (実装予定)</button>
        </nav>
    </header>

    <main>
        <section class="hero">
            <div class="hero-content">
                <h1>最高の<span class="highlight">ゲーム体験</span>を</h1>
                <p>遊んで、競って、楽しもう</p>
            </div>
        </section>

        <section class="game-gallery">
            <h2 class="section-title">最新のゲーム</h2>
            <div class="grid">
                <!-- Game Card 1: LSG -->
                <a href="play.html?id=lsg" class="game-card">
                    <div class="game-image"
                        style="background-image: url('13_LSG/screenshot2.jpg'); background-size: cover; background-position: center;">
                        <!-- Icon removed for cleaner look -->
                    </div>
                    <div class="game-info">
                        <h3>告白デスマーチ 修学旅行編</h3>
                        <p>4人の女子との恋愛シミュレーションゲーム。</p>
                        <span class="play-btn">今すぐプレイ</span>
                    </div>
                </a>

                <!-- Game Card 2: Spelunker -->
                <a href="play.html?id=spelunker" class="game-card">
                    <div class="game-image"
                        style="background-image: url('16_spelunker/screenshot2.jpg'); background-size: cover; background-position: center;">
                    </div>
                    <div class="game-info">
                        <h3>Spelunker Adventure</h3>
                        <p>深い洞窟を探検し、お化けを避けてお宝を集めよう。</p>
                        <span class="play-btn">今すぐプレイ</span>
                    </div>
                </a>

                <!-- Game Card 3: Rising Fist -->
                <a href="play.html?id=risingfist" class="game-card">
                    <div class="game-image"
                        style="background-image: url('14_risingfist/screenshot2.jpg'); background-size: cover; background-position: center;">
                    </div>
                    <div class="game-info">
                        <h3>ライジングフィスト</h3>
                        <p>迫り来る敵を倒す爽快アクションゲーム。</p>
                        <span class="play-btn">今すぐプレイ</span>
                    </div>
                </a>

                <!-- Placeholder Card removed as we now have 3 games to fill the grid nicely -->
            </div>
        </section>
    </main>

    <script src="script.js"></script>
</body>

</html>
