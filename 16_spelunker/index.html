<!DOCTYPE html>
<html lang="ja">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cave Explorer v3</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap');

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box
    }

    html,
    body {
      width: 100%;
      height: 100%;
      background: #000;
      overflow: hidden;
      font-family: 'Press Start 2P', monospace
    }

    #game-container {
      position: relative;
      width: 960px;
      height: 540px;
      margin: auto;
      margin-top: calc(50vh - 270px);
      border: 3px solid #333;
      box-shadow: 0 0 40px rgba(0, 100, 200, 0.15)
    }

    canvas {
      display: block;
      width: 960px;
      height: 540px;
      image-rendering: pixelated;
      image-rendering: crisp-edges
    }

    #menu-overlay {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      display: none;
      z-index: 10
    }

    #menu-overlay.active {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center
    }

    .menu-bg {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0, 0, 10, 0.92)
    }

    .menu-content {
      position: relative;
      z-index: 1;
      text-align: center;
      color: #fff
    }

    .menu-title {
      font-size: 36px;
      color: #e8c838;
      text-shadow: 3px 3px #543200, 0 0 30px rgba(232, 168, 56, 0.5);
      margin-bottom: 10px;
      letter-spacing: 6px;
      animation: titlePulse 2s ease-in-out infinite
    }

    .menu-subtitle {
      font-size: 10px;
      color: #7799aa;
      margin-bottom: 35px;
      letter-spacing: 2px
    }

    .menu-item {
      font-size: 14px;
      color: #667788;
      padding: 12px 30px;
      cursor: pointer;
      transition: all 0.15s;
      letter-spacing: 3px;
      margin: 4px 0;
      border: 1px solid transparent
    }

    .menu-item:hover,
    .menu-item.selected {
      color: #fff;
      text-shadow: 0 0 15px #4488ff;
      border-color: rgba(68, 136, 255, 0.3)
    }

    .menu-item.locked {
      color: #333;
      cursor: default
    }

    .menu-item.locked:hover {
      color: #333;
      text-shadow: none;
      border-color: transparent
    }

    .result-text {
      font-size: 11px;
      color: #aabbcc;
      margin: 8px 0;
      letter-spacing: 2px
    }

    .result-score {
      font-size: 20px;
      color: #ffd700;
      margin: 15px 0;
      text-shadow: 0 0 10px rgba(255, 215, 0, 0.5)
    }

    .briefing-text {
      font-size: 11px;
      color: #88ccff;
      margin: 20px 0;
      font-style: italic;
      line-height: 1.8
    }

    @keyframes titlePulse {

      0%,
      100% {
        opacity: 1
      }

      50% {
        opacity: 0.85
      }
    }
  </style>
</head>

<body>
  <div id="game-container">
    <canvas id="game" width="320" height="180"></canvas>
    <div id="menu-overlay">
      <div class="menu-bg"></div>
      <div class="menu-content" id="menu-content"></div>
    </div>
  </div>
  <script>
    'use strict';

    // ===== MODULE: CONFIG =====
    const CONFIG = {
      INTERNAL_WIDTH: 320,
      INTERNAL_HEIGHT: 180,
      DISPLAY_WIDTH: 960,
      DISPLAY_HEIGHT: 540,
      TILE_SIZE: 16,
      FPS: 60,
      FIXED_STEP: 1 / 60,
      GRAVITY: 480,
      PLAYER_SPEED: 80,
      JUMP_VELOCITY: -180,
      MAX_FALL_SPEED: 240,
      LETHAL_FALL_HEIGHT: 33,
      LADDER_SPEED: 60,
      ROPE_SWAY_SPEED: 40,
      COYOTE_FRAMES: 6,
      JUMP_BUFFER_FRAMES: 6,
      ENERGY_MAX: 400,
      LIVES_INITIAL: 3,
      LIVES_MAX: 5,
      BOMBS_MAX: 3,
      FLASHES_MAX: 3,
      CAMERA_LERP: 0.08,
      PARTICLE_POOL_SIZE: 50,
      ENTITY_CULL_MARGIN: 64,
      RESPAWN_DELAY: 90,
      GUN_SPEED: 200,
      GUN_RANGE: 120,
      GUN_COOLDOWN_FRAMES: 18,
      GUN_LOCK_FRAMES: 10,
      BOMB_RADIUS: 32,
      BOMB_FUSE_FRAMES: 180,
      FLASH_RADIUS: 80,
      BAT_DROP_INTERVAL_FRAMES: 80,
      STEAM_ON_FRAMES: 120,
      STEAM_OFF_FRAMES: 90,
      CRUMBLE_DELAY: 60,
      CRUMBLE_RESPAWN: 240,
      DEBUG: false
    };

    // ===== MODULE: COLORS =====
    const COLORS = {
      bg_dark: '#000000',
      bg_mid: '#111111',
      bg_light: '#202020',
      bg_cave1: '#151515',
      bg_cave2: '#0d0d0d',
      bg_cave3: '#060606',
      dirt: '#b86f00',
      dirt_shade: '#7a4200',
      dirt_light: '#f0ae2d',
      dirt_top: '#d88a13',
      rock: '#4b4033',
      rock_shade: '#2d241b',
      rock_light: '#685742',
      rock_highlight: '#8d754f',
      water: '#2266bb',
      water_light: '#4488dd',
      water_deep: '#1144aa',
      water_surface: '#66aaff',
      lava: '#cc4400',
      lava_light: '#ff6622',
      lava_bright: '#ffaa44',
      lava_dark: '#882200',
      player_skin: '#ffd2a3',
      player_hat: '#ff7a18',
      player_hat_light: '#ffbf66',
      player_body: '#2f6dd8',
      player_body_light: '#68a1ff',
      player_boots: '#1c2450',
      player_belt: '#ffe169',
      player_outline: '#0a0f22',
      bat_body: '#2f63d9',
      bat_wing: '#8dc5ff',
      bat_eye: '#ffef66',
      ghost_body: '#f5f5ff',
      ghost_dark: '#98a6d8',
      ghost_eye: '#20264f',
      key_red: '#ee3333',
      key_blue: '#3388ee',
      key_gold: '#ffcc00',
      item_green: '#22bb22',
      item_green_light: '#66ee66',
      item_red: '#ee2222',
      bomb_color: '#1a1a1a',
      bomb_fuse: '#cc8833',
      flash_color: '#ddeeff',
      gem_color: '#9933ff',
      gem_sparkle: '#ddaaff',
      sign_color: '#6f4120',
      sign_board: '#d2a56b',
      rope_color: '#cfd6df',
      rope_shade: '#8e9aa8',
      ladder_color: '#8b3fd6',
      ladder_light: '#bf79ff',
      ladder_dark: '#5a2494',
      door_color: '#774422',
      door_metal: '#888888',
      checkpoint_color: '#3377bb',
      checkpoint_glow: '#66bbff',
      checkpoint_bright: '#aaddff',
      steam_color: '#bbbbbb',
      hud_text: '#f4f6ff',
      hud_bg: '#03070f',
      hud_border: '#4ea7ff',
      energy_high: '#35d66b',
      energy_mid: '#ffc842',
      energy_low: '#ff4b4b',
      energy_bg: '#12243d',
      white: '#ffffff',
      black: '#000000'
    };

    // ===== MODULE: UTIL =====
    const Util = {
      clamp(v, min, max) { return Math.max(min, Math.min(max, v)); },
      lerp(a, b, t) { return a + (b - a) * t; },
      rand(min, max) { return Math.random() * (max - min) + min; },
      randInt(min, max) { return Math.floor(Math.random() * (max - min + 1)) + min; },
      aabbOverlap(a, b) {
        return a.x < b.x + b.w && a.x + a.w > b.x && a.y < b.y + b.h && a.y + a.h > b.y;
      },
      dist(x1, y1, x2, y2) { return Math.sqrt((x2 - x1) ** 2 + (y2 - y1) ** 2); },
      padScore(n) {
        let s = String(Math.floor(n));
        while (s.length < 6) s = '0' + s;
        return s;
      }
    };

    // ===== MODULE: EVENTS =====
    const Events = {
      _listeners: {},
      on(event, cb) {
        if (!this._listeners[event]) this._listeners[event] = [];
        this._listeners[event].push(cb);
      },
      off(event, cb) {
        if (!this._listeners[event]) return;
        this._listeners[event] = this._listeners[event].filter(c => c !== cb);
      },
      emit(event, data) {
        if (!this._listeners[event]) return;
        for (const cb of this._listeners[event]) cb(data);
      },
      clear() { this._listeners = {}; }
    };

    // ===== MODULE: INPUT =====
    const Input = {
      keys: {},
      justPressed: {},
      _prev: {},
      init() {
        window.addEventListener('keydown', e => {
          e.preventDefault();
          this.keys[e.code] = true;
        });
        window.addEventListener('keyup', e => {
          e.preventDefault();
          this.keys[e.code] = false;
        });
      },
      poll() {
        this.justPressed = {};
        for (const k in this.keys) {
          if (this.keys[k] && !this._prev[k]) this.justPressed[k] = true;
        }
        this._prev = { ...this.keys };
      },
      isDown(action) {
        const bind = GameState.settings.keyBindings;
        return !!this.keys[bind[action]];
      },
      wasPressed(action) {
        const bind = GameState.settings.keyBindings;
        return !!this.justPressed[bind[action]];
      }
    };

    // ===== MODULE: GAME STATE =====
    const GameState = {
      scene: 'TITLE',
      player: null,
      entities: [],
      projectiles: [],
      stage: null,
      area: null,
      areaIndex: 0,
      stageIndex: 0,
      camera: { x: 0, y: 0 },
      particles: [],
      frameCount: 0,
      paused: false,
      screenShake: { x: 0, y: 0, intensity: 0, decay: 0 },
      hitStop: 0,
      fadeAlpha: 0,
      fadeDir: 0,
      fadeCallback: null,
      deathCount: 0,
      consecutiveDeaths: 0,
      lastCheckpointIndex: 0,
      stageStartTime: 0,
      totalPlayTime: 0,
      collectedItemIds: {},
      collectedGems: [],
      keysHeld: [],
      steamTimers: {},
      crumbleTimers: {},
      transitionTimer: 0,
      transitionText: '',
      settings: {
        bgmVolume: 0.3,
        seVolume: 0.7,
        screenShake: true,
        flashEffect: true,
        keyBindings: {
          left: 'ArrowLeft', right: 'ArrowRight',
          up: 'ArrowUp', down: 'ArrowDown',
          jump: 'Space', item: 'KeyZ',
          attack: 'KeyX', pause: 'Enter', restart: 'KeyR'
        }
      },
      unlocks: { timeAttack: false, hardMode: false },
      highScores: [],
      hardMode: false,
      timeAttackMode: false
    };

    function resetPlayer() {
      GameState.player = {
        x: 32, y: 128, vx: 0, vy: 0,
        state: 'idle', facing: 'right',
        lives: CONFIG.LIVES_INITIAL,
        energy: CONFIG.ENERGY_MAX,
        maxEnergy: CONFIG.ENERGY_MAX,
        bombs: 0, flashes: 0,
        score: 0, onGround: false,
        onLadder: false, onRope: false,
        ladderMounting: false,
        gunCooldownTimer: 0,
        attackLockTimer: 0,
        jumpStartY: 0, coyoteTimer: 0,
        jumpBufferTimer: 0, invincible: 0,
        animFrame: 0, animTimer: 0,
        deathTimer: 0, width: 12, height: 16,
        ropeSwing: 0
      };
    }

    // ===== MODULE: SPRITE ENGINE =====
    const SpriteEngine = {
      spriteCache: {},

      drawRect(ctx, x, y, w, h, color) {
        ctx.fillStyle = color;
        ctx.fillRect(Math.floor(x), Math.floor(y), w, h);
      },

      drawPlayer(ctx, p) {
        const x = Math.floor(p.x);
        const y = Math.floor(p.y);
        const flip = p.facing === 'left';
        ctx.save();
        if (flip) {
          ctx.translate(x + p.width, y);
          ctx.scale(-1, 1);
        } else {
          ctx.translate(x, y);
        }

        // --- FC Spelunker-style explorer sprite ---
        // Helmet (explorer hat)
        ctx.fillStyle = COLORS.player_hat;
        ctx.fillRect(3, 0, 7, 2); // top brim
        ctx.fillRect(2, 2, 9, 2); // hat body
        ctx.fillStyle = COLORS.player_hat_light;
        ctx.fillRect(4, 0, 3, 1); // highlight
        // Helmet lamp
        ctx.fillStyle = '#fff4a8';
        ctx.fillRect(5, 1, 2, 1);

        // Head/face
        ctx.fillStyle = COLORS.player_skin;
        ctx.fillRect(3, 4, 6, 3);
        // Eyes
        ctx.fillStyle = COLORS.black;
        ctx.fillRect(4, 5, 1, 1);
        ctx.fillRect(7, 5, 1, 1);

        // Body (jumpsuit)
        ctx.fillStyle = COLORS.player_body;
        ctx.fillRect(3, 7, 6, 4);
        ctx.fillStyle = COLORS.player_body_light;
        ctx.fillRect(4, 7, 4, 1); // collar highlight
        // Belt
        ctx.fillStyle = COLORS.player_belt;
        ctx.fillRect(3, 10, 6, 1);

        // Arms + Legs based on state
        if (p.state === 'walk') {
          const f = Math.floor(p.animFrame) % 4;
          // Arms swing
          ctx.fillStyle = COLORS.player_body;
          if (f < 2) {
            ctx.fillRect(1, 7, 2, 3);
            ctx.fillRect(9, 8, 2, 3);
          } else {
            ctx.fillRect(1, 8, 2, 3);
            ctx.fillRect(9, 7, 2, 3);
          }
          // Hands
          ctx.fillStyle = COLORS.player_skin;
          ctx.fillRect(f < 2 ? 1 : 1, f < 2 ? 10 : 11, 2, 1);
          ctx.fillRect(f < 2 ? 9 : 9, f < 2 ? 11 : 10, 2, 1);
          // Legs
          ctx.fillStyle = COLORS.player_boots;
          if (f < 2) {
            ctx.fillRect(3, 11, 3, 2);
            ctx.fillRect(6, 12, 3, 2);
            ctx.fillRect(3, 13, 2, 3);
            ctx.fillRect(7, 14, 2, 2);
          } else {
            ctx.fillRect(3, 12, 3, 2);
            ctx.fillRect(6, 11, 3, 2);
            ctx.fillRect(3, 14, 2, 2);
            ctx.fillRect(7, 13, 2, 3);
          }
        } else if (p.state === 'climb') {
          const f = Math.floor(p.animFrame) % 2;
          // Arms reaching up alternating
          ctx.fillStyle = COLORS.player_body;
          ctx.fillRect(1, 5 + f * 3, 2, 3);
          ctx.fillRect(9, 5 + (1 - f) * 3, 2, 3);
          ctx.fillStyle = COLORS.player_skin;
          ctx.fillRect(1, 5 + f * 3, 2, 1);
          ctx.fillRect(9, 5 + (1 - f) * 3, 2, 1);
          // Legs
          ctx.fillStyle = COLORS.player_boots;
          ctx.fillRect(3, 11 + f, 3, 3);
          ctx.fillRect(6, 11 + (1 - f), 3, 3);
          ctx.fillRect(3, 14 + f, 2, 2);
          ctx.fillRect(7, 14 + (1 - f), 2, 2);
        } else if (p.state === 'jump' || p.state === 'fall') {
          // Arms out
          ctx.fillStyle = COLORS.player_body;
          ctx.fillRect(0, 7, 3, 2);
          ctx.fillRect(9, 7, 3, 2);
          ctx.fillStyle = COLORS.player_skin;
          ctx.fillRect(0, 7, 1, 2);
          ctx.fillRect(11, 7, 1, 2);
          // Legs tucked/spread
          ctx.fillStyle = COLORS.player_boots;
          if (p.state === 'jump') {
            ctx.fillRect(3, 11, 3, 3);
            ctx.fillRect(6, 11, 3, 3);
            ctx.fillRect(2, 14, 3, 2);
            ctx.fillRect(7, 14, 3, 2);
          } else {
            ctx.fillRect(3, 11, 3, 2);
            ctx.fillRect(6, 11, 3, 2);
            ctx.fillRect(3, 13, 2, 3);
            ctx.fillRect(7, 13, 2, 3);
          }
        } else {
          // Idle
          ctx.fillStyle = COLORS.player_body;
          ctx.fillRect(1, 8, 2, 3);
          ctx.fillRect(9, 8, 2, 3);
          ctx.fillStyle = COLORS.player_skin;
          ctx.fillRect(1, 11, 2, 1);
          ctx.fillRect(9, 11, 2, 1);
          ctx.fillStyle = COLORS.player_boots;
          ctx.fillRect(3, 11, 3, 2);
          ctx.fillRect(6, 11, 3, 2);
          ctx.fillRect(3, 13, 2, 3);
          ctx.fillRect(7, 13, 2, 3);
        }

        // Outer edge accents to keep sprite readable on dark cave tiles
        ctx.fillStyle = COLORS.player_outline;
        ctx.fillRect(2, 3, 1, 8);
        ctx.fillRect(9, 3, 1, 8);
        ctx.fillRect(3, 15, 2, 1);
        ctx.fillRect(7, 15, 2, 1);
        ctx.restore();
      },

      drawBat(ctx, e) {
        const x = Math.floor(e.x);
        const y = Math.floor(e.y);
        const f = Math.floor(e.animFrame) % 2;
        // Body
        ctx.fillStyle = COLORS.bat_body;
        ctx.fillRect(x + 3, y + 2, 4, 3);
        ctx.fillRect(x + 4, y + 1, 2, 1);
        // Ears
        ctx.fillRect(x + 3, y, 1, 2);
        ctx.fillRect(x + 6, y, 1, 2);
        // Wings
        ctx.fillStyle = COLORS.bat_wing;
        if (f === 0) {
          // Wings up
          ctx.fillRect(x, y, 3, 2);
          ctx.fillRect(x + 1, y + 2, 2, 2);
          ctx.fillRect(x + 7, y, 3, 2);
          ctx.fillRect(x + 7, y + 2, 2, 2);
        } else {
          // Wings down
          ctx.fillRect(x, y + 3, 3, 2);
          ctx.fillRect(x + 1, y + 2, 2, 1);
          ctx.fillRect(x + 7, y + 3, 3, 2);
          ctx.fillRect(x + 7, y + 2, 2, 1);
        }
        // Eyes (glowing red)
        ctx.fillStyle = COLORS.bat_eye;
        ctx.fillRect(x + 4, y + 2, 1, 1);
        ctx.fillRect(x + 6, y + 2, 1, 1);
        // Fangs
        ctx.fillStyle = '#ffffff';
        ctx.fillRect(x + 4, y + 4, 1, 1);
        ctx.fillRect(x + 6, y + 4, 1, 1);
        // Dark edge + highlight for sharper 8bit look
        ctx.fillStyle = '#1a2f72';
        ctx.fillRect(x + 3, y + 2, 1, 3);
        ctx.fillRect(x + 6, y + 2, 1, 3);
        ctx.fillStyle = '#d7ecff';
        ctx.fillRect(x + 4, y + 1, 1, 1);
      },

      drawGhost(ctx, e) {
        const x = Math.floor(e.x);
        const y = Math.floor(e.y);
        const f = Math.floor(e.animFrame) % 2;
        const hover = Math.sin(GameState.frameCount * 0.08 + e.x) * 1.5;
        const dy = Math.floor(hover);
        ctx.save();
        ctx.globalAlpha = 0.72 + Math.sin(GameState.frameCount * 0.05) * 0.1;
        // Body (rounder shape)
        ctx.fillStyle = COLORS.ghost_body;
        ctx.fillRect(x + 3, y + dy, 6, 2);
        ctx.fillRect(x + 2, y + 2 + dy, 8, 8);
        ctx.fillRect(x + 1, y + 4 + dy, 10, 4);
        // Shading
        ctx.fillStyle = COLORS.ghost_dark;
        ctx.fillRect(x + 1, y + 8 + dy, 2, 2);
        ctx.fillRect(x + 9, y + 8 + dy, 2, 2);
        // Wavy bottom
        ctx.fillStyle = COLORS.ghost_body;
        ctx.fillRect(x + 1, y + 10 + dy, 3, 2 + f);
        ctx.fillRect(x + 5, y + 10 + dy, 3, 2 + (1 - f));
        ctx.fillRect(x + 9, y + 10 + dy, 2, 2 + f);
        // Eyes (hollow, dark)
        ctx.fillStyle = COLORS.ghost_eye;
        ctx.fillRect(x + 3, y + 4 + dy, 2, 3);
        ctx.fillRect(x + 7, y + 4 + dy, 2, 3);
        // Eye pupils
        ctx.fillStyle = '#000022';
        ctx.fillRect(x + 3, y + 5 + dy, 1, 2);
        ctx.fillRect(x + 7, y + 5 + dy, 1, 2);
        // Mouth
        ctx.fillStyle = COLORS.ghost_dark;
        ctx.fillRect(x + 4, y + 8 + dy, 4, 1);
        ctx.fillStyle = '#dfe7ff';
        ctx.fillRect(x + 4, y + 3 + dy, 3, 1);
        ctx.restore();
      },

      drawRock(ctx, e) {
        const x = Math.floor(e.x);
        const y = Math.floor(e.y);
        ctx.fillStyle = COLORS.rock_shade;
        ctx.fillRect(x + 1, y, 6, 7);
        ctx.fillRect(x, y + 1, 8, 5);
        ctx.fillStyle = COLORS.rock;
        ctx.fillRect(x + 1, y + 1, 5, 4);
      },

      drawPlacedBomb(ctx, e) {
        const x = Math.floor(e.x);
        const y = Math.floor(e.y);
        ctx.fillStyle = COLORS.bomb_color;
        ctx.fillRect(x + 1, y + 1, 6, 6);
        ctx.fillStyle = '#555';
        ctx.fillRect(x + 3, y - 1, 2, 2);
        // Blink faster as fuse gets close to explosion.
        const blinkRate = e.fuse < 60 ? 4 : 8;
        if (Math.floor(GameState.frameCount / blinkRate) % 2 === 0) {
          ctx.fillStyle = COLORS.bomb_fuse;
          ctx.fillRect(x + 3, y - 2, 2, 1);
        }
      },

      drawBatDrop(ctx, e) {
        const x = Math.floor(e.x);
        const y = Math.floor(e.y);
        ctx.fillStyle = '#4f3b2a';
        ctx.fillRect(x + 1, y, 2, 4);
        ctx.fillStyle = '#75604c';
        ctx.fillRect(x + 1, y, 2, 1);
      },

      drawItem(ctx, e) {
        const drawScale = 1.25;
        const x = 0;
        const y = 0;
        const blink = Math.floor(GameState.frameCount / 15) % 2;
        ctx.save();
        ctx.translate(Math.floor(e.x), Math.floor(e.y));
        ctx.scale(drawScale, drawScale);
        switch (e.itemType) {
          case 'energy_capsule':
            ctx.fillStyle = blink ? COLORS.item_green : '#22aa22';
            ctx.fillRect(x + 1, y + 1, 6, 6);
            ctx.fillStyle = '#88ff88';
            ctx.fillRect(x + 3, y + 2, 2, 1);
            break;
          case 'life_up':
            ctx.fillStyle = COLORS.item_red;
            ctx.fillRect(x + 1, y + 2, 3, 3);
            ctx.fillRect(x + 4, y + 2, 3, 3);
            ctx.fillRect(x + 2, y + 4, 4, 3);
            break;
          case 'key_red': case 'key_blue': case 'key_gold':
            const kc = e.itemType === 'key_red' ? COLORS.key_red : e.itemType === 'key_blue' ? COLORS.key_blue : COLORS.key_gold;
            ctx.fillStyle = kc;
            ctx.fillRect(x + 2, y, 4, 4);
            ctx.fillRect(x + 3, y + 4, 2, 6);
            ctx.fillRect(x + 5, y + 7, 2, 1);
            ctx.fillRect(x + 5, y + 9, 2, 1);
            break;
          case 'bomb':
            ctx.fillStyle = COLORS.bomb_color;
            ctx.fillRect(x + 1, y + 2, 6, 5);
            ctx.fillStyle = '#666';
            ctx.fillRect(x + 3, y, 2, 2);
            if (blink) { ctx.fillStyle = '#ff6600'; ctx.fillRect(x + 3, y - 1, 2, 1); }
            break;
          case 'flash':
            ctx.fillStyle = blink ? COLORS.flash_color : '#ccccff';
            ctx.fillRect(x + 2, y + 1, 4, 6);
            ctx.fillRect(x + 1, y + 3, 6, 2);
            break;
          case 'gem':
            const gc = blink ? COLORS.gem_color : '#cc66ff';
            ctx.fillStyle = gc;
            ctx.fillRect(x + 2, y + 1, 4, 2);
            ctx.fillRect(x + 1, y + 3, 6, 2);
            ctx.fillRect(x + 2, y + 5, 4, 2);
            ctx.fillStyle = '#fff';
            ctx.fillRect(x + 3, y + 2, 1, 1);
            break;
          case 'miracle':
            const mc = Math.floor(GameState.frameCount / 8) % 3;
            ctx.fillStyle = ['#ff88ff', '#88ffff', '#ffff88'][mc];
            ctx.fillRect(x + 1, y + 1, 6, 6);
            ctx.fillStyle = '#fff';
            ctx.fillRect(x + 3, y + 3, 2, 2);
            break;
        }
        ctx.restore();
      },

      drawProjectile(ctx, p) {
        if (p.isFlash) {
          // Flash/flare - glowing light going upward
          ctx.fillStyle = '#ffffff';
          ctx.fillRect(Math.floor(p.x), Math.floor(p.y), 4, 4);
          ctx.fillStyle = '#88ccff';
          ctx.fillRect(Math.floor(p.x) - 1, Math.floor(p.y) + 1, 6, 2);
          ctx.fillRect(Math.floor(p.x) + 1, Math.floor(p.y) - 1, 2, 6);
        } else {
          // Machine gun bullet
          ctx.fillStyle = '#aaddff';
          ctx.fillRect(Math.floor(p.x), Math.floor(p.y), 4, 3);
          ctx.fillStyle = '#ffffff';
          ctx.fillRect(Math.floor(p.x) + 1, Math.floor(p.y) + 1, 2, 1);
        }
      },

      drawSign(ctx, x, y) {
        // Pole
        ctx.fillStyle = '#4a2d16';
        ctx.fillRect(x + 7, y + 8, 2, 8);
        // Board frame
        ctx.fillStyle = COLORS.sign_color;
        ctx.fillRect(x + 1, y + 1, 14, 8);
        // Board surface
        ctx.fillStyle = COLORS.sign_board;
        ctx.fillRect(x + 2, y + 2, 12, 6);
        // Simple engraved marks for retro sign look
        ctx.fillStyle = '#8e6030';
        ctx.fillRect(x + 3, y + 3, 8, 1);
        ctx.fillRect(x + 4, y + 5, 6, 1);
      }
    };

    // ===== MODULE: TILE RENDERER =====
    const TileRenderer = {
      tileCache: null,

      initCache(ctx) {
        this.tileCache = {};
        const ts = CONFIG.TILE_SIZE;
        const types = [
          { id: 1, fn: this.drawDirtTile },
          { id: 2, fn: this.drawRockTile },
          { id: 3, fn: this.drawLadderTile },
          { id: 4, fn: this.drawRopeTile },
          { id: 5, fn: this.drawWaterTile },
          { id: 6, fn: this.drawLavaTile },
          { id: 7, fn: this.drawSteamTile },
          { id: 8, fn: this.drawCrumbleTile },
          { id: 9, fn: this.drawPlatformTile },
          { id: 10, fn: this.drawDoorTile },
          { id: 11, fn: this.drawBreakWallTile },
          { id: 12, fn: this.drawCheckpointTile },
          { id: 13, fn: this.drawGoalTile }
        ];
        for (const t of types) {
          const c = document.createElement('canvas');
          c.width = ts; c.height = ts;
          const tc = c.getContext('2d');
          t.fn(tc, ts);
          this.tileCache[t.id] = c;
        }
      },

      drawDirtTile(ctx, s) {
        // Base cave wall
        ctx.fillStyle = COLORS.dirt;
        ctx.fillRect(0, 0, s, s);

        // Brighter ledge edge
        ctx.fillStyle = COLORS.dirt_top;
        ctx.fillRect(0, 0, s, 3);
        ctx.fillStyle = COLORS.dirt_light;
        ctx.fillRect(1, 1, 3, 1);
        ctx.fillRect(6, 1, 4, 1);
        ctx.fillRect(12, 1, 3, 1);

        // Chunky cave texture
        ctx.fillStyle = COLORS.dirt_shade;
        ctx.fillRect(1, 5, 2, 2);
        ctx.fillRect(4, 7, 3, 2);
        ctx.fillRect(9, 5, 2, 3);
        ctx.fillRect(13, 6, 2, 2);
        ctx.fillRect(2, 11, 3, 2);
        ctx.fillRect(8, 10, 4, 2);
        ctx.fillRect(13, 12, 2, 2);

        // Highlights and tiny dark cavities
        ctx.fillStyle = COLORS.dirt_light;
        ctx.fillRect(5, 4, 1, 1);
        ctx.fillRect(11, 4, 1, 1);
        ctx.fillRect(7, 9, 1, 1);
        ctx.fillRect(2, 13, 1, 1);
        ctx.fillRect(10, 13, 1, 1);
        ctx.fillStyle = '#3a2300';
        ctx.fillRect(6, 6, 1, 1);
        ctx.fillRect(12, 8, 1, 1);
        ctx.fillRect(4, 12, 1, 1);
      },
      drawRockTile(ctx, s) {
        // Dark cave stone
        ctx.fillStyle = COLORS.rock;
        ctx.fillRect(0, 0, s, s);

        // Fracture and shadow
        ctx.fillStyle = COLORS.rock_shade;
        ctx.fillRect(0, 0, s, 2);
        ctx.fillRect(2, 4, 3, 2);
        ctx.fillRect(9, 3, 4, 2);
        ctx.fillRect(5, 8, 5, 2);
        ctx.fillRect(1, 11, 3, 3);
        ctx.fillRect(11, 10, 3, 3);

        // Mineral highlights
        ctx.fillStyle = COLORS.rock_highlight;
        ctx.fillRect(5, 2, 2, 1);
        ctx.fillRect(13, 4, 1, 1);
        ctx.fillRect(7, 9, 2, 1);
        ctx.fillRect(3, 13, 1, 1);

        // Lower edge lift
        ctx.fillStyle = COLORS.rock_light;
        ctx.fillRect(0, s - 2, s, 1);
      },
      drawLadderTile(ctx, s) {
        // Side rails
        ctx.fillStyle = COLORS.ladder_dark;
        ctx.fillRect(1, 0, 1, s);
        ctx.fillRect(13, 0, 1, s);
        ctx.fillStyle = COLORS.ladder_color;
        ctx.fillRect(2, 0, 2, s);
        ctx.fillRect(12, 0, 2, s);
        ctx.fillStyle = COLORS.ladder_light;
        ctx.fillRect(3, 0, 1, s);
        ctx.fillRect(13, 0, 1, s);

        // Rungs
        ctx.fillStyle = COLORS.ladder_dark;
        ctx.fillRect(4, 3, 8, 1);
        ctx.fillRect(4, 11, 8, 1);
        ctx.fillStyle = COLORS.ladder_color;
        ctx.fillRect(4, 4, 8, 1);
        ctx.fillRect(4, 12, 8, 1);
        ctx.fillStyle = COLORS.ladder_light;
        ctx.fillRect(4, 2, 8, 1);
        ctx.fillRect(4, 10, 8, 1);

        // Sparkle pixels to pop against dark cave
        ctx.fillStyle = '#f2d7ff';
        ctx.fillRect(5, 4, 1, 1);
        ctx.fillRect(10, 12, 1, 1);
      },
      drawRopeTile(ctx, s) {
        ctx.fillStyle = COLORS.rope_color;
        ctx.fillRect(7, 0, 2, s);
      },
      drawWaterTile(ctx, s) {
        ctx.fillStyle = COLORS.water_deep;
        ctx.fillRect(0, 0, s, s);
        ctx.fillStyle = COLORS.water;
        ctx.fillRect(0, 0, s, 6);
        const f = Math.floor(GameState.frameCount / 12) % 4;
        ctx.fillStyle = COLORS.water_light;
        ctx.fillRect((f * 4) % s, 1, 5, 2);
        ctx.fillRect(((f * 3) + 9) % s, 4, 4, 1);
        ctx.fillStyle = COLORS.water_surface;
        ctx.fillRect((f * 5 + 2) % s, 0, 3, 1);
        ctx.fillRect(((f * 5) + 8) % s, 0, 4, 1);
        // Depth shading
        ctx.fillStyle = COLORS.water_deep;
        ctx.fillRect(0, 10, s, 6);
        ctx.fillRect((f * 3 + 3) % s, 8, 3, 2);
      },
      drawLavaTile(ctx, s) {
        ctx.fillStyle = COLORS.lava_dark;
        ctx.fillRect(0, 0, s, s);
        ctx.fillStyle = COLORS.lava;
        ctx.fillRect(0, 0, s, 10);
        const f = Math.floor(GameState.frameCount / 8) % 4;
        ctx.fillStyle = COLORS.lava_light;
        ctx.fillRect((f * 4) % s, 1, 5, 3);
        ctx.fillRect(((f * 4) + 8) % s, 5, 4, 3);
        ctx.fillStyle = COLORS.lava_bright;
        ctx.fillRect(((f * 3) + 2) % s, 2, 3, 1);
        ctx.fillRect(((f * 3) + 10) % s, 6, 2, 1);
        // Bubbles
        ctx.fillRect(((f * 6) + 4) % s, 0, 2, 2);
        ctx.fillStyle = COLORS.lava_dark;
        ctx.fillRect(0, 12, s, 4);
        ctx.fillRect((f * 4 + 5) % s, 10, 3, 2);
      },
      drawSteamTile(ctx, s) {
        ctx.fillStyle = COLORS.rock;
        ctx.fillRect(0, 0, s, s);
        ctx.fillStyle = '#888';
        ctx.fillRect(5, 0, 2, 3);
        ctx.fillRect(9, 0, 2, 3);
      },
      drawCrumbleTile(ctx, s) {
        ctx.fillStyle = '#aa8844';
        ctx.fillRect(0, 0, s, s);
        ctx.fillStyle = '#886633';
        ctx.fillRect(0, 0, s, 2);
        ctx.fillRect(4, 6, 3, 2);
        ctx.fillRect(9, 10, 4, 2);
        // cracks
        ctx.fillStyle = '#664422';
        ctx.fillRect(3, 3, 1, 4);
        ctx.fillRect(8, 2, 1, 3);
        ctx.fillRect(12, 7, 1, 5);
      },
      drawPlatformTile(ctx, s) {
        ctx.fillStyle = COLORS.dirt_top;
        ctx.fillRect(0, 0, s, 2);
        ctx.fillStyle = COLORS.dirt;
        ctx.fillRect(0, 2, s, 3);
        ctx.fillStyle = COLORS.rock_shade;
        ctx.fillRect(0, 5, s, 1);
        ctx.fillStyle = COLORS.dirt_light;
        ctx.fillRect(2, 1, 3, 1);
        ctx.fillRect(9, 1, 3, 1);
      },
      drawDoorTile(ctx, s) {
        ctx.fillStyle = COLORS.door_color;
        ctx.fillRect(0, 0, s, s);
        ctx.fillStyle = '#aa6633';
        ctx.fillRect(2, 2, 12, 12);
        ctx.fillStyle = COLORS.key_gold;
        ctx.fillRect(10, 7, 2, 2);
      },
      drawBreakWallTile(ctx, s) {
        ctx.fillStyle = COLORS.rock;
        ctx.fillRect(0, 0, s, s);
        ctx.fillStyle = '#8899aa';
        ctx.fillRect(2, 2, 5, 5);
        ctx.fillRect(9, 8, 5, 5);
        ctx.fillStyle = '#556';
        ctx.fillRect(3, 3, 3, 3);
        ctx.fillRect(10, 9, 3, 3);
      },
      drawCheckpointTile(ctx, s) {
        // Flagpole
        ctx.fillStyle = '#666677';
        ctx.fillRect(7, 2, 2, 14);
        // Flag
        ctx.fillStyle = COLORS.checkpoint_color;
        ctx.fillRect(9, 2, 5, 4);
        ctx.fillStyle = COLORS.checkpoint_glow;
        ctx.fillRect(9, 2, 5, 2);
        // Base
        ctx.fillStyle = '#555566';
        ctx.fillRect(5, 14, 6, 2);
        // Glow
        ctx.fillStyle = COLORS.checkpoint_bright;
        ctx.fillRect(8, 3, 1, 1);
      },
      drawGoalTile(ctx, s) {
        // Treasure chest
        ctx.fillStyle = '#885522';
        ctx.fillRect(2, 6, 12, 8);
        ctx.fillStyle = '#aa6633';
        ctx.fillRect(3, 7, 10, 6);
        // Lid
        ctx.fillStyle = '#996633';
        ctx.fillRect(2, 4, 12, 3);
        ctx.fillStyle = '#bb8844';
        ctx.fillRect(3, 4, 10, 2);
        // Gold trim
        ctx.fillStyle = COLORS.key_gold;
        ctx.fillRect(6, 7, 4, 2);
        // Lock
        ctx.fillStyle = '#ffee88';
        ctx.fillRect(7, 8, 2, 1);
        // Sparkle
        ctx.fillStyle = '#ffffff';
        ctx.fillRect(4, 5, 1, 1);
        ctx.fillRect(11, 5, 1, 1);
      },

      drawTile(ctx, id, x, y) {
        if (id === 0) return;
        // For animated tiles (water, lava), redraw dynamically
        if (id === 5 || id === 6) {
          const ts = CONFIG.TILE_SIZE;
          if (id === 5) {
            ctx.fillStyle = COLORS.water_deep;
            ctx.fillRect(x, y, ts, ts);
            ctx.fillStyle = COLORS.water;
            ctx.fillRect(x, y, ts, 6);
            const f = Math.floor(GameState.frameCount / 12) % 4;
            ctx.fillStyle = COLORS.water_light;
            ctx.fillRect(x + (f * 4) % ts, y + 1, 5, 2);
            ctx.fillRect(x + ((f * 3) + 9) % ts, y + 4, 4, 1);
            ctx.fillStyle = COLORS.water_surface;
            ctx.fillRect(x + (f * 5 + 2) % ts, y, 3, 1);
            ctx.fillRect(x + ((f * 5) + 8) % ts, y, 4, 1);
            ctx.fillStyle = COLORS.water_deep;
            ctx.fillRect(x, y + 10, ts, 6);
          } else {
            ctx.fillStyle = COLORS.lava_dark;
            ctx.fillRect(x, y, ts, ts);
            ctx.fillStyle = COLORS.lava;
            ctx.fillRect(x, y, ts, 10);
            const f = Math.floor(GameState.frameCount / 8) % 4;
            ctx.fillStyle = COLORS.lava_light;
            ctx.fillRect(x + (f * 4) % ts, y + 1, 5, 3);
            ctx.fillRect(x + ((f * 4) + 8) % ts, y + 5, 4, 3);
            ctx.fillStyle = COLORS.lava_bright;
            ctx.fillRect(x + ((f * 3) + 2) % ts, y + 2, 3, 1);
            ctx.fillRect(x + ((f * 6) + 4) % ts, y, 2, 2);
            ctx.fillStyle = COLORS.lava_dark;
            ctx.fillRect(x, y + 12, ts, 4);
          }
          return;
        }
        if (this.tileCache && this.tileCache[id]) {
          ctx.drawImage(this.tileCache[id], x, y);
        }
      }
    };

    // ===== MODULE: PARTICLE SYSTEM =====
    const Particles = {
      pool: [],
      init() {
        this.pool = [];
        for (let i = 0; i < CONFIG.PARTICLE_POOL_SIZE; i++) {
          this.pool.push({ active: false, x: 0, y: 0, vx: 0, vy: 0, life: 0, maxLife: 0, color: '#fff', size: 2 });
        }
      },
      spawn(x, y, count, color, spread, speed) {
        let spawned = 0;
        for (const p of this.pool) {
          if (!p.active && spawned < count) {
            p.active = true;
            p.x = x; p.y = y;
            p.vx = Util.rand(-spread, spread) * speed;
            p.vy = Util.rand(-spread, 0) * speed;
            p.life = Util.rand(15, 30);
            p.maxLife = p.life;
            p.color = color;
            p.size = Util.randInt(1, 3);
            spawned++;
          }
        }
      },
      update() {
        for (const p of this.pool) {
          if (!p.active) continue;
          p.x += p.vx * CONFIG.FIXED_STEP;
          p.y += p.vy * CONFIG.FIXED_STEP;
          p.vy += 200 * CONFIG.FIXED_STEP;
          p.life--;
          if (p.life <= 0) p.active = false;
        }
      },
      draw(ctx) {
        for (const p of this.pool) {
          if (!p.active) continue;
          const alpha = p.life / p.maxLife;
          ctx.globalAlpha = alpha;
          ctx.fillStyle = p.color;
          ctx.fillRect(Math.floor(p.x), Math.floor(p.y), p.size, p.size);
        }
        ctx.globalAlpha = 1;
      }
    };

    // ===== MODULE: CAMERA =====
    const Camera = {
      update() {
        const p = GameState.player;
        if (!p || !GameState.area) return;
        const ts = CONFIG.TILE_SIZE;
        const mapW = GameState.area.width * ts;
        const mapH = GameState.area.height * ts;
        const targetX = p.x + p.width / 2 - CONFIG.INTERNAL_WIDTH / 2;
        const targetY = p.y + p.height / 2 - CONFIG.INTERNAL_HEIGHT / 2;
        GameState.camera.x = Util.lerp(GameState.camera.x, targetX, CONFIG.CAMERA_LERP);
        GameState.camera.y = Util.lerp(GameState.camera.y, targetY, 0.15);
        GameState.camera.x = Util.clamp(GameState.camera.x, 0, Math.max(0, mapW - CONFIG.INTERNAL_WIDTH));
        GameState.camera.y = Util.clamp(GameState.camera.y, 0, Math.max(0, mapH - CONFIG.INTERNAL_HEIGHT));
      }
    };

    // ===== MODULE: AUDIO MANAGER =====
    const Audio = {
      ctx: null,
      initialized: false,
      bgmNodes: [],
      bgmPlaying: false,
      currentBGM: null,

      init() {
        try {
          this.ctx = new (window.AudioContext || window.webkitAudioContext)();
          this.initialized = true;
        } catch (e) {
          console.warn('Web Audio not available');
        }
      },

      resume() {
        if (this.ctx && this.ctx.state === 'suspended') {
          this.ctx.resume();
        }
      },

      playNote(freq, duration, type, volume, startTime) {
        if (!this.initialized) return;
        const c = this.ctx;
        const t = startTime || c.currentTime;
        const osc = c.createOscillator();
        const gain = c.createGain();
        osc.type = type || 'square';
        osc.frequency.setValueAtTime(freq, t);
        gain.gain.setValueAtTime(volume * GameState.settings.seVolume, t);
        gain.gain.exponentialRampToValueAtTime(0.001, t + duration);
        osc.connect(gain);
        gain.connect(c.destination);
        osc.start(t);
        osc.stop(t + duration);
      },

      playSE(name) {
        if (!this.initialized) return;
        const c = this.ctx;
        const t = c.currentTime;
        const vol = GameState.settings.seVolume;
        switch (name) {
          case 'jump':
            this.playNote(200, 0.1, 'square', 0.2 * vol, t);
            this.playNote(400, 0.08, 'square', 0.15 * vol, t + 0.03);
            break;
          case 'land':
            this.playNoise(0.05, 0.2 * vol, 800);
            break;
          case 'death':
            this.playNote(400, 0.15, 'square', 0.3 * vol, t);
            this.playNote(200, 0.2, 'square', 0.25 * vol, t + 0.15);
            this.playNote(100, 0.3, 'square', 0.2 * vol, t + 0.3);
            break;
          case 'item':
            this.playNote(523, 0.06, 'square', 0.2 * vol, t);
            this.playNote(659, 0.06, 'square', 0.2 * vol, t + 0.05);
            this.playNote(784, 0.1, 'square', 0.2 * vol, t + 0.1);
            break;
          case 'punch':
            this.playNoise(0.035, 0.2 * vol, 1800);
            this.playNote(180, 0.04, 'square', 0.16 * vol, t);
            break;
          case 'kick':
            this.playNoise(0.05, 0.22 * vol, 1200);
            this.playNote(120, 0.06, 'triangle', 0.2 * vol, t);
            break;
          case 'click':
            this.playNote(980, 0.018, 'square', 0.08 * vol, t);
            this.playNote(740, 0.02, 'square', 0.06 * vol, t + 0.015);
            break;
          case 'key':
            this.playNote(523, 0.08, 'square', 0.25 * vol, t);
            this.playNote(659, 0.08, 'square', 0.25 * vol, t + 0.08);
            this.playNote(784, 0.15, 'square', 0.25 * vol, t + 0.16);
            this.playNote(1047, 0.2, 'triangle', 0.2 * vol, t + 0.25);
            break;
          case 'checkpoint':
            for (let i = 0; i < 5; i++) {
              this.playNote(262 * Math.pow(2, i / 5), 0.08, 'triangle', 0.2 * vol, t + i * 0.06);
            }
            break;
          case 'door':
            this.playNote(300, 0.15, 'square', 0.2 * vol, t);
            this.playNote(400, 0.2, 'square', 0.25 * vol, t + 0.15);
            break;
          case 'enemy_kill':
            this.playNoise(0.1, 0.25 * vol, 2000);
            break;
          case 'bomb':
            this.playNoise(0.3, 0.4 * vol, 500);
            this.playNote(60, 0.3, 'sine', 0.3 * vol, t);
            break;
          case 'bomb_set':
            this.playNote(220, 0.04, 'square', 0.12 * vol, t);
            this.playNote(180, 0.06, 'triangle', 0.1 * vol, t + 0.035);
            break;
          case 'bomb_tick':
            this.playNote(1100, 0.015, 'square', 0.06 * vol, t);
            break;
          case 'flash':
            this.playNote(800, 0.05, 'sine', 0.3 * vol, t);
            this.playNote(1200, 0.1, 'sine', 0.2 * vol, t + 0.05);
            break;
          case 'gun':
            this.playNote(600, 0.05, 'square', 0.15 * vol, t);
            this.playNote(300, 0.05, 'square', 0.1 * vol, t + 0.03);
            break;
          case 'energy_warn':
            this.playNote(880, 0.05, 'square', 0.2 * vol, t);
            this.playNote(880, 0.05, 'square', 0.2 * vol, t + 0.15);
            break;
          case 'stageclear':
            const notes = [523, 659, 784, 1047, 784, 1047];
            notes.forEach((n, i) => this.playNote(n, 0.15, 'square', 0.25 * vol, t + i * 0.15));
            break;
          case 'gameover':
            this.playNote(392, 0.3, 'triangle', 0.25 * vol, t);
            this.playNote(330, 0.3, 'triangle', 0.25 * vol, t + 0.3);
            this.playNote(262, 0.5, 'triangle', 0.3 * vol, t + 0.6);
            break;
          case 'menu_select':
            this.playSE('click');
            break;
          case 'menu_confirm':
            this.playSE('click');
            this.playNote(880, 0.06, 'square', 0.12 * vol, t + 0.03);
            break;
        }
      },

      playNoise(duration, volume, cutoff) {
        if (!this.initialized) return;
        const c = this.ctx;
        const bufSize = c.sampleRate * duration;
        const buf = c.createBuffer(1, bufSize, c.sampleRate);
        const data = buf.getChannelData(0);
        for (let i = 0; i < bufSize; i++) data[i] = Math.random() * 2 - 1;
        const src = c.createBufferSource();
        src.buffer = buf;
        const gain = c.createGain();
        gain.gain.setValueAtTime(volume, c.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.001, c.currentTime + duration);
        const filter = c.createBiquadFilter();
        filter.type = 'lowpass';
        filter.frequency.value = cutoff || 2000;
        src.connect(filter);
        filter.connect(gain);
        gain.connect(c.destination);
        src.start();
      },

      stopBGM() {
        for (const n of this.bgmNodes) {
          try { n.stop(); } catch (e) { }
        }
        this.bgmNodes = [];
        this.bgmPlaying = false;
        this.currentBGM = null;
      },

      playBGM(name) {
        if (!this.initialized || !name) return;
        this.resume();
        if (this.bgmPlaying && this.currentBGM === name) return;
        this.stopBGM();
        this.bgmPlaying = true;
        this.currentBGM = name;
        this._scheduleBGM(name);
      },

      _scheduleBGM(name) {
        if (!this.bgmPlaying || this.currentBGM !== name) return;
        const c = this.ctx;
        const vol = GameState.settings.bgmVolume * 0.22;
        const t = c.currentTime + 0.05;

        let notes = [];
        let bass = [];
        let bpm = 120;
        let beatLen;

        switch (name) {
          case 'title':
            bpm = 80; beatLen = 60 / bpm;
            notes = [[220, 2], [0, 1], [165, 1], [196, 2], [0, 1], [165, 1], [220, 2], [262, 2], [220, 4]];

            notes = [[220, 1], [262, 1], [330, 1], [440, 1], [392, 2], [330, 1], [262, 1], [220, 1], [196, 1], [220, 2], [0, 1], [262, 1], [330, 1], [440, 1], [523, 2], [440, 1], [392, 1], [330, 2], [0, 2]];

        let offset = 0;
        for (const [freq, beats] of notes) {
          if (freq > 0) {

          }
          offset += beatLen * beats;
        }
        const loopLen = offset;

        offset = 0;
        for (const [freq, beats] of bass) {
          if (freq > 0) {
            this._bgmNote(freq, beatLen * beats * 0.9, 'triangle', vol * 0.8, t + offset);
          }
          offset += beatLen * beats;
        }

        // Simple 8-bit percussion layer.
        for (let bt = 0; bt < loopLen; bt += beatLen) {
          const step = Math.floor(bt / beatLen) % 4;
          const cutoff = step === 0 ? 900 : 2200;
          const dVol = step === 0 ? vol * 0.55 : vol * 0.28;
          this._bgmNoise(0.02, dVol, cutoff, t + bt);
        }

        // Schedule next loop
        setTimeout(() => this._scheduleBGM(name), loopLen * 1000);

      _bgmNote(freq, dur, type, vol, startTime) {
        if (!this.initialized || !this.bgmPlaying) return;
        const c = this.ctx;
        const osc = c.createOscillator();
        const gain = c.createGain();
        osc.type = type;
        osc.frequency.setValueAtTime(freq, startTime);
        gain.gain.setValueAtTime(vol, startTime);
        gain.gain.setValueAtTime(vol, startTime + dur * 0.8);
        gain.gain.exponentialRampToValueAtTime(0.001, startTime + dur);
        osc.connect(gain);
        gain.connect(c.destination);
        osc.start(startTime);
        osc.stop(startTime + dur);
        this.bgmNodes.push(osc);
        // Cleanup reference
        osc.onended = () => {
          const idx = this.bgmNodes.indexOf(osc);
          if (idx >= 0) this.bgmNodes.splice(idx, 1);
        };
      },

      _bgmNoise(duration, volume, cutoff, startTime) {
        if (!this.initialized || !this.bgmPlaying) return;
        const c = this.ctx;
        const size = Math.max(1, Math.floor(c.sampleRate * duration));
        const buf = c.createBuffer(1, size, c.sampleRate);
        const data = buf.getChannelData(0);
        for (let i = 0; i < size; i++) data[i] = Math.random() * 2 - 1;
        const src = c.createBufferSource();
        src.buffer = buf;
        const filter = c.createBiquadFilter();
        filter.type = 'lowpass';
        filter.frequency.value = cutoff || 1800;
        const gain = c.createGain();
        gain.gain.setValueAtTime(volume, startTime);
        gain.gain.exponentialRampToValueAtTime(0.001, startTime + duration);
        src.connect(filter);
        filter.connect(gain);
        gain.connect(c.destination);
        src.start(startTime);
        src.stop(startTime + duration);
        this.bgmNodes.push(src);
        src.onended = () => {
          const idx = this.bgmNodes.indexOf(src);
          if (idx >= 0) this.bgmNodes.splice(idx, 1);
        };
      }

        try { localStorage.setItem('_test', '1'); localStorage.removeItem('_test'); return true; }
        catch (e) { return false; }
      },

      _read(key) {
        if (!this._canUseStorage()) return null;
        try {
          const raw = localStorage.getItem(key);
          if (!raw) return null;
          const parsed = JSON.parse(raw);
          return parsed;
        } catch (e) {
          localStorage.removeItem(key);
          return null;
        }
      },

      _write(key, data) {
        if (!this._canUseStorage()) return;
        try {
          localStorage.setItem(key, JSON.stringify({ version: this.VERSION, data }));
        } catch (e) {
          console.warn('Save failed:', e);
        }
      },

      saveGame() {
        const p = GameState.player;

        const d = this._read(this.SAVE_KEY);
        if (!d || !d.data) return null;
        return d.data;
      },

      deleteSave() {
        if (this._canUseStorage()) localStorage.removeItem(this.SAVE_KEY);
      },

      saveSettings() {

          // from both below and above across all areas.
          for (let y = 0; y < h; y++) {

      // Area 4-3 (55x17) entry to deeper abyss
      stage4.areas.push(makeArea(55, 17, (x, y, w, h) => {

      // Area 4-4 (55x28) vertical descent challenge

        if (y === 19 && (x === 24 || x === 29 || x === 35 || x === 45)) return 7;

      },

          { type: 'bomb', x: 30 * S, y: 11 * S },
          { type: 'flash', x: 44 * S, y: 15 * S },
          { type: 'bat', x: 16 * S, y: 6 * S, triggerRange: 100 },
          { type: 'bat', x: 29 * S, y: 10 * S, triggerRange: 100 },
          { type: 'bat', x: 42 * S, y: 14 * S, triggerRange: 100 },
          { type: 'ghost', x: 26 * S, y: 18 * S },
          { type: 'ghost', x: 48 * S, y: 22 * S },
          { type: 'gem', x: 52 * S, y: 23 * S, hidden: true }
        ],
        [
          { x: 3 * S, y: 3 * S },

        ],
        [{ x: 53 * S, y: 23 * S, targetArea: 4, targetX: 3 * S, targetY: 3 * S }],
        [
          { x: 4 * S, y: 3 * S, text: 'DESCEND TO THE ABYSS' },

        ]));

      // Area 4-5 (55x30) final abyss: deep vertical route + treasure
      stage4.areas.push(makeArea(55, 30, (x, y, w, h) => {

        if (y === 9 && x >= 10 && x <= 26) return 1;
        if (y === 14 && x >= 24 && x <= 41) return 1;
        if (y === 19 && x >= 39 && x <= 53) return 1;
        if (y === 24 && x >= 30 && x <= 44) return 1;
        if (y === 26 && x >= 45 && x <= 53) return 1;

        // Dangerous gimmicks
        if (y === 18 && (x === 20 || x === 33 || x === 47)) return 7;
        if (y === 23 && ((x >= 12 && x <= 14) || (x >= 35 && x <= 37))) return 8;

      },
        [
          { type: 'energy_capsule', x: 11 * S, y: 3 * S },
          { type: 'energy_capsule', x: 25 * S, y: 8 * S },
          { type: 'energy_capsule', x: 40 * S, y: 13 * S },
          { type: 'energy_capsule', x: 52 * S, y: 18 * S },
          { type: 'bomb', x: 41 * S, y: 18 * S },
          { type: 'flash', x: 32 * S, y: 23 * S },
          { type: 'miracle', x: 48 * S, y: 25 * S },
          { type: 'bat', x: 18 * S, y: 8 * S, triggerRange: 110 },
          { type: 'bat', x: 35 * S, y: 13 * S, triggerRange: 110 },
          { type: 'bat', x: 49 * S, y: 18 * S, triggerRange: 110 },
          { type: 'ghost', x: 27 * S, y: 22 * S },
          { type: 'ghost', x: 46 * S, y: 24 * S },

        ],
