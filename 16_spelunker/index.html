    }

    const STAGES = generateStages();

    // ===== MODULE: TILEMAP =====
    const TileMap = {
      getTile(tx, ty) {
        const area = GameState.area;
        if (!area) return 1;
        if (tx < 0 || tx >= area.width || ty < 0 || ty >= area.height) return 1;
        return area.tiles[ty][tx];
      },

      isSolid(tx, ty) {
        const t = this.getTile(tx, ty);
        return t === 1 || t === 2 || t === 10 || t === 11;
      },

      isPlatform(tx, ty) {
        const t = this.getTile(tx, ty);
        return t === 9;
      },

      isCrumble(tx, ty) {
        const t = this.getTile(tx, ty);
        return t === 8;
      },

      isLadder(tx, ty) {
        return this.getTile(tx, ty) === 3;
      },

      isRope(tx, ty) {
        return this.getTile(tx, ty) === 4;
      },

      isLethal(tx, ty) {
        const t = this.getTile(tx, ty);
        return t === 5 || t === 6;
      },

      isSteam(tx, ty) {
        return this.getTile(tx, ty) === 7;
      },

      isDoor(tx, ty) {
        return this.getTile(tx, ty) === 10;
      },

      isBreakWall(tx, ty) {
        return this.getTile(tx, ty) === 11;
      },

      isCheckpoint(tx, ty) {
        return this.getTile(tx, ty) === 12;
      },

      isGoal(tx, ty) {
        return this.getTile(tx, ty) === 13;
      },

      // Check if a crumble tile is active (not yet crumbled)
      isCrumbleActive(tx, ty) {
        const key = tx + ',' + ty;
        const timer = GameState.crumbleTimers[key];
        if (timer === undefined) return true;
        return timer > 0; // still solid if timer hasn't expired
      },

      startCrumble(tx, ty) {
        const key = tx + ',' + ty;
        if (GameState.crumbleTimers[key] === undefined) {
          GameState.crumbleTimers[key] = CONFIG.CRUMBLE_DELAY;
        }
      },

      // Resolve solid collision for an entity
      collideEntity(e) {
        const ts = CONFIG.TILE_SIZE;
        // Horizontal
        const startTx = Math.floor(e.x / ts);
        const endTx = Math.floor((e.x + e.width - 1) / ts);
        const startTy = Math.floor(e.y / ts);
        const endTy = Math.floor((e.y + e.height - 1) / ts);

        // Check lethal tiles
        for (let ty = startTy; ty <= endTy; ty++) {
          for (let tx = startTx; tx <= endTx; tx++) {
            if (this.isLethal(tx, ty)) return 'lethal';
            if (this.isGoal(tx, ty)) return 'goal';
            if (this.isCheckpoint(tx, ty)) return 'checkpoint';
          }
        }

        // Check steam
        for (let ty = startTy; ty <= endTy; ty++) {
          for (let tx = startTx; tx <= endTx; tx++) {
            if (this.isSteam(tx, ty)) {
              const key = tx + ',' + ty;
              const timer = GameState.steamTimers[key];
              if (timer === undefined || timer < CONFIG.STEAM_ON_FRAMES) {
                return 'steam';
              }
            }
          }
        }

        return null;
      },

      draw(ctx) {
        const area = GameState.area;
        if (!area) return;
        const ts = CONFIG.TILE_SIZE;
        const cam = GameState.camera;
        const startTx = Math.max(0, Math.floor(cam.x / ts));
        const endTx = Math.min(area.width - 1, Math.floor((cam.x + CONFIG.INTERNAL_WIDTH) / ts));
        const startTy = Math.max(0, Math.floor(cam.y / ts));
        const endTy = Math.min(area.height - 1, Math.floor((cam.y + CONFIG.INTERNAL_HEIGHT) / ts));

        for (let ty = startTy; ty <= endTy; ty++) {
          for (let tx = startTx; tx <= endTx; tx++) {
            const tile = area.tiles[ty][tx];
            if (tile === 0) continue;

            const sx = tx * ts - Math.floor(cam.x);
            const sy = ty * ts - Math.floor(cam.y);

            // Handle crumble tile visibility
            if (tile === 8) {
              const key = tx + ',' + ty;
              const timer = GameState.crumbleTimers[key];
              if (timer !== undefined && timer <= 0) {
                // Check respawn
                if (timer <= -CONFIG.CRUMBLE_RESPAWN) {
                  delete GameState.crumbleTimers[key];
                } else {
                  continue; // don't draw, tile is gone
                }
              } else if (timer !== undefined && timer < 20) {
                // Shaking effect
                const shake = (timer % 4 < 2) ? 1 : -1;
                TileRenderer.drawTile(ctx, tile, sx + shake, sy);
                continue;
              }
            }

            // Handle steam animation
            if (tile === 7) {
              TileRenderer.drawTile(ctx, tile, sx, sy);
              const key = tx + ',' + ty;
              let timer = GameState.steamTimers[key];
              if (timer === undefined) {
                GameState.steamTimers[key] = 0;
                timer = 0;
              }
              if (timer < CONFIG.STEAM_ON_FRAMES) {
                // Draw steam cloud
                const steamH = Math.min(3, Math.floor(timer / 10)) + 1;
                ctx.fillStyle = COLORS.steam_color;
                ctx.globalAlpha = 0.6;
                for (let si = 0; si < steamH; si++) {
                  ctx.fillRect(sx + 3, sy - (si + 1) * 6, 10, 5);
                }
                ctx.globalAlpha = 1;
              }
              continue;
            }

            TileRenderer.drawTile(ctx, tile, sx, sy);
          }
        }
      }
    };

    // ===== MODULE: PLAYER LOGIC =====
    const Player = {
      update() {
        const p = GameState.player;
        if (!p || p.state === 'dead') return;

        const ts = CONFIG.TILE_SIZE;
        const dt = CONFIG.FIXED_STEP;

        // Energy consumption
        const rate = STAGES[GameState.stageIndex].energyConsumeRate * (GameState.hardMode ? 2 : 1);
        p.energy -= rate * dt;
        if (p.energy <= 0) {
          p.energy = 0;
          this.kill('energy');
          return;
        }

        // Energy warning
        if (p.energy < CONFIG.ENERGY_MAX * 0.2 && GameState.frameCount % 180 === 0) {
          Audio.playSE('energy_warn');
        }

        // Invincibility countdown
        if (p.invincible > 0) p.invincible--;
        if (p.gunCooldownTimer > 0) p.gunCooldownTimer--;
        if (p.attackLockTimer > 0) p.attackLockTimer--;

        // Jump buffer
        if (Input.wasPressed('jump')) {
          p.jumpBufferTimer = CONFIG.JUMP_BUFFER_FRAMES;
        }
        if (p.jumpBufferTimer > 0) p.jumpBufferTimer--;
        const canControl = p.attackLockTimer <= 0;

        // Determine tile positions
        const centerTx = Math.floor((p.x + p.width / 2) / ts);
        const footTy = Math.floor((p.y + p.height) / ts);
        const bodyTy = Math.floor((p.y + p.height / 2) / ts);

        const onLadder = TileMap.isLadder(centerTx, bodyTy) || TileMap.isLadder(centerTx, footTy);
        const ladderBelow = TileMap.isLadder(centerTx, footTy + 1);
        const onRope = TileMap.isRope(centerTx, bodyTy);

        // Ladder/Rope grab
        if (onLadder && (Input.isDown('up') || Input.isDown('down')) && p.state !== 'climb') {
          p.state = 'climb';
          p.vx = 0;
          p.vy = 0;
          p.onLadder = true;
          p.ladderMounting = false;
          p.jumpStartY = p.y;
          p.x = centerTx * ts + (ts - p.width) / 2;
        }

        // Mount ladder from top: standing on ground with ladder below feet
        if (!onLadder && ladderBelow && Input.isDown('down') && p.onGround && p.state !== 'climb') {
          p.state = 'climb';
          p.vx = 0;
          p.vy = 0;
          p.onLadder = true;
          p.ladderMounting = true;
          p.onGround = false;
          p.jumpStartY = p.y;
          p.x = centerTx * ts + (ts - p.width) / 2;
          p.y += 4; // Move player past the ground tile
        }

        if (onRope && Input.wasPressed('jump') && p.state !== 'rope' && !p.onGround) {
          p.state = 'rope';
          p.vx = 0;
          p.vy = 0;
          p.onRope = true;
          p.x = centerTx * ts + (ts - p.width) / 2;
          p.ropeSwing = 0;
        }

        // State machine
        if (p.state === 'climb') {
          // Ladder movement
          p.onLadder = true;
          p.jumpStartY = p.y; // climbing should not accumulate lethal fall distance
          p.vx = 0;
          p.vy = 0;
          if (canControl && Input.isDown('up')) p.vy = -CONFIG.LADDER_SPEED;
          if (canControl && Input.isDown('down')) p.vy = CONFIG.LADDER_SPEED;
          if (canControl && Input.isDown('left')) { p.vx = -CONFIG.PLAYER_SPEED * 0.5; p.facing = 'left'; }
          if (canControl && Input.isDown('right')) { p.vx = CONFIG.PLAYER_SPEED * 0.5; p.facing = 'right'; }

          if (canControl && Input.wasPressed('jump')) {
            p.state = 'jump';
            p.vy = CONFIG.JUMP_VELOCITY;
            p.onLadder = false;
            p.ladderMounting = false;
            p.jumpStartY = p.y;
            Audio.playSE('jump');
          }

          const climbCenterTx = Math.floor((p.x + p.width / 2) / ts);
          const climbFootTy = Math.floor((p.y + p.height) / ts);
          const climbBodyTy = Math.floor((p.y + p.height / 2) / ts);
          const ladderAtBody = TileMap.isLadder(climbCenterTx, climbBodyTy);
          const ladderAtFeet = TileMap.isLadder(climbCenterTx, climbFootTy);
          const ladderOneBelow = TileMap.isLadder(climbCenterTx, climbFootTy + 1);
          const descendingIntoLadder = canControl && Input.isDown('down') && ladderOneBelow;

          if (p.ladderMounting && (ladderAtFeet || !canControl || !Input.isDown('down'))) {
            p.ladderMounting = false;
          }

          if (!ladderAtBody && !ladderAtFeet && !descendingIntoLadder) {
            p.state = 'fall';
            p.onLadder = false;
            p.ladderMounting = false;
          }

          p.animTimer += dt;
          if (p.animTimer > 0.12) { p.animFrame++; p.animTimer = 0; }

        } else if (p.state === 'rope') {
          p.vx = 0;
          p.vy = 0;
          p.ropeSwing += dt * 3;
          const sway = Math.sin(p.ropeSwing) * CONFIG.ROPE_SWAY_SPEED;
          p.x += sway * dt;

          if (canControl && Input.wasPressed('jump')) {
            p.state = 'fall';
            p.onRope = false;
            p.vy = -80;
            p.vx = sway;
            p.jumpStartY = p.y;
          }

          if (!TileMap.isRope(Math.floor((p.x + p.width / 2) / ts), bodyTy)) {
            p.state = 'fall';
            p.onRope = false;
          }

        } else {
          // Normal movement
          p.vx = 0;
          if (canControl && Input.isDown('left')) { p.vx = -CONFIG.PLAYER_SPEED; p.facing = 'left'; }
          if (canControl && Input.isDown('right')) { p.vx = CONFIG.PLAYER_SPEED; p.facing = 'right'; }

          // Coyote time
          if (p.onGround) {
            p.coyoteTimer = CONFIG.COYOTE_FRAMES;
          } else {
            if (p.coyoteTimer > 0) p.coyoteTimer--;
          }

          // Jump
          const canJump = p.onGround || p.coyoteTimer > 0;
          if (canControl && (Input.wasPressed('jump') || p.jumpBufferTimer > 0) && canJump && p.state !== 'jump') {
            p.state = 'jump';
            p.vy = CONFIG.JUMP_VELOCITY;
            p.onGround = false;
            p.coyoteTimer = 0;
            p.jumpBufferTimer = 0;
            p.jumpStartY = p.y;
            Audio.playSE('jump');
          }

          // Gravity
          if (!p.onGround) {
            p.vy += CONFIG.GRAVITY * dt;
            if (p.vy > CONFIG.MAX_FALL_SPEED) p.vy = CONFIG.MAX_FALL_SPEED;
          }

          // Update state
          if (p.onGround) {
            if (Math.abs(p.vx) > 0) {
              p.state = 'walk';
              p.animTimer += dt;
              if (p.animTimer > 0.1) { p.animFrame++; p.animTimer = 0; }
            } else {
              p.state = 'idle';
              p.animTimer += dt;
              if (p.animTimer > 0.5) { p.animFrame++; p.animTimer = 0; }
            }
          } else {
            if (p.vy < 0) p.state = 'jump';
            else p.state = 'fall';
          }
        }

        // Apply movement
        this.moveAndCollide(p, dt);

        // Check tile interactions
        const result = TileMap.collideEntity(p);
        if (result === 'lethal') {
          this.kill('tile');
          return;
        }
        if (result === 'steam') {
          this.kill('steam');
          return;
        }
        if (result === 'goal') {
          Events.emit('stage:complete');
          return;
        }
        if (result === 'checkpoint') {
          this.reachCheckpoint();
        }

        // Check entity collisions
        this.checkEntityCollisions();

        // Attack - direction-dependent (本家スペランカー準拠)
        // X単体 = マシンガン（前方発射、対ゴースト有効）
        // ↓+X = 爆弾（岩を破壊）
        // ↑+X = フラッシュ（上方発射、対コウモリ）
        if (canControl && Input.wasPressed('attack')) {
          if (Input.isDown('down')) {
            this.useBomb();
          } else if (Input.isDown('up')) {
            this.useFlash();
          } else {
            this.fireGun();
          }
        }

        // Restart
        if (Input.wasPressed('restart')) {
          Events.emit('stage:restart');
        }
      },

      moveAndCollide(p, dt) {
        const ts = CONFIG.TILE_SIZE;

        // Move X
        p.x += p.vx * dt;
        // Collide X
        const left = Math.floor(p.x / ts);
        const right = Math.floor((p.x + p.width - 1) / ts);
        const top = Math.floor(p.y / ts);
        const bottom = Math.floor((p.y + p.height - 1) / ts);

        for (let ty = top; ty <= bottom; ty++) {
          if (p.vx > 0) {
            const rtx = Math.floor((p.x + p.width - 1) / ts);
            if (TileMap.isSolid(rtx, ty) || (TileMap.isCrumble(rtx, ty) && TileMap.isCrumbleActive(rtx, ty))) {
              p.x = rtx * ts - p.width;
              p.vx = 0;
              break;
            }
          }
          if (p.vx < 0) {
            const ltx = Math.floor(p.x / ts);
            if (TileMap.isSolid(ltx, ty) || (TileMap.isCrumble(ltx, ty) && TileMap.isCrumbleActive(ltx, ty))) {
              p.x = (ltx + 1) * ts;
              p.vx = 0;
              break;
            }
          }
        }

        // Move Y
        const prevY = p.y;
        p.y += p.vy * dt;
        p.onGround = false;

        // Collide Y
        const left2 = Math.floor(p.x / ts);
        const right2 = Math.floor((p.x + p.width - 1) / ts);

        if (p.vy >= 0 && (p.state !== 'climb' || !p.ladderMounting)) {
          // Falling - check floor
          const feetTy = Math.floor((p.y + p.height) / ts);
          for (let tx = left2; tx <= right2; tx++) {
            const solid = TileMap.isSolid(tx, feetTy);
            const crumbleSolid = TileMap.isCrumble(tx, feetTy) && TileMap.isCrumbleActive(tx, feetTy);
            const platform = TileMap.isPlatform(tx, feetTy) && prevY + p.height <= feetTy * ts + 1;

            if (solid || crumbleSolid || platform) {
              // Check fall distance
              if (p.state === 'fall' || p.state === 'jump') {
                const fallDist = p.y - p.jumpStartY;
                if (fallDist > CONFIG.LETHAL_FALL_HEIGHT && !p.onLadder && !p.onRope) {
                  this.kill('fall');
                  return;
                }
              }
              p.y = feetTy * ts - p.height;
              p.vy = 0;
              p.onGround = true;
              p.jumpStartY = p.y;

              // Trigger crumble
              if (crumbleSolid) {
                TileMap.startCrumble(tx, feetTy);
              }
              break;
            }
          }
        } else {
          // Rising - check ceiling
          const headTy = Math.floor(p.y / ts);
          for (let tx = left2; tx <= right2; tx++) {
            if (TileMap.isSolid(tx, headTy)) {
              p.y = (headTy + 1) * ts;
              p.vy = 0;
              break;
            }
          }
        }

        // Clamp to map
        const area = GameState.area;
        if (area) {
          p.x = Util.clamp(p.x, 0, area.width * ts - p.width);
          if (p.y > area.height * ts) {
            this.kill('fall');
          }
        }
      },

      kill(reason) {
        const p = GameState.player;
        if (!p || p.state === 'dead') return;
        p.state = 'dead';
        p.deathTimer = CONFIG.RESPAWN_DELAY;
        p.lives--;
        GameState.deathCount++;
        GameState.consecutiveDeaths++;

        Audio.playSE('death');

        // Particles
        Particles.spawn(p.x + p.width / 2, p.y + p.height / 2, 12, COLORS.player_hat, 1, 100);

        // Hit stop
        if (GameState.settings.flashEffect) {
          GameState.hitStop = 4;
        }

        // Screen shake
        if (GameState.settings.screenShake) {
          GameState.screenShake = { intensity: 3, decay: 0.9 };
        }

        if (p.lives <= 0) {
          setTimeout(() => Events.emit('gameover'), 1500);
        }
      },

      respawn() {
        const p = GameState.player;
        const area = GameState.area;
        if (!area) return;

        const cp = area.checkpoints[GameState.lastCheckpointIndex] || area.checkpoints[0];
        if (cp) {
          p.x = cp.x; p.y = cp.y;
        } else {
          p.x = 32; p.y = 128;
        }
        p.vx = 0; p.vy = 0;
        p.state = 'idle';
        p.onGround = false;
        p.onLadder = false;
        p.onRope = false;
        p.ladderMounting = false;
        p.gunCooldownTimer = 0;
        p.attackLockTimer = 0;
        p.jumpStartY = p.y;
        p.deathTimer = 0;
        GameState.consecutiveDeaths = 0;

        // Reset entities to initial state
        loadAreaEntities();
      },

      reachCheckpoint() {
        const p = GameState.player;
        const area = GameState.area;
        if (!area) return;
        const ts = CONFIG.TILE_SIZE;

        for (let i = 0; i < area.checkpoints.length; i++) {
          const cp = area.checkpoints[i];
          const dx = Math.abs(p.x - cp.x);
          const dy = Math.abs(p.y - cp.y);
          if (dx < ts * 2 && dy < ts * 2 && i > GameState.lastCheckpointIndex) {
            GameState.lastCheckpointIndex = i;
            Audio.playSE('checkpoint');
            Particles.spawn(cp.x + 8, cp.y, 8, COLORS.checkpoint_glow, 0.5, 60);
            SaveManager.saveGame();
            break;
          }
        }
      },

      fireGun() {
        const p = GameState.player;
        if (!p) return;
        if (p.gunCooldownTimer > 0) return;
        // Machine gun is intentionally weak: only one normal bullet can exist.
        for (const proj of GameState.projectiles) {
          if (!proj.isFlash) return;
        }
        Audio.playSE('gun');
        const dir = p.facing === 'right' ? 1 : -1;
        GameState.projectiles.push({
          x: p.x + (dir > 0 ? p.width : -4),
          y: p.y + 6,
          vx: CONFIG.GUN_SPEED * 0.8 * dir,
          life: 20,
          width: 4, height: 3
        });
        p.gunCooldownTimer = CONFIG.GUN_COOLDOWN_FRAMES;
        p.attackLockTimer = CONFIG.GUN_LOCK_FRAMES;
        p.vx = 0;
      },

      useFlash() {
        const p = GameState.player;
        if (!p || p.flashes <= 0) return;
        p.flashes--;
        p.energy -= 10; // フラッシュ使用時のエネルギー消費
        Audio.playSE('flash');

        // Flash projectile going upward
        GameState.projectiles.push({
          x: p.x + p.width / 2 - 2,
          y: p.y - 4,
          vx: 0,
          vy: -CONFIG.GUN_SPEED * 0.8,
          life: 40,
          width: 4, height: 4,
          isFlash: true
        });

        // Visual flash
        if (GameState.settings.flashEffect) {
          GameState.fadeAlpha = 0.5;
          GameState.fadeDir = -0.03;
        }
      },

      useBomb() {
        const p = GameState.player;
        if (!p || p.bombs <= 0) return;
        p.bombs--;
        p.energy -= 15; // 爆弾使用時のエネルギー消費
        const bx = p.x + p.width / 2 - 4;
        const by = p.y + p.height - 8;
        GameState.entities.push({
          type: 'bomb_placed',
          x: bx, y: by,
          vx: 0, vy: 0,
          active: true,
          width: 8, height: 8,
          fuse: CONFIG.BOMB_FUSE_FRAMES,
          animFrame: 0, animTimer: 0,
          isItem: false
        });
        Audio.playSE('bomb_set');
        Particles.spawn(bx + 4, by + 2, 4, COLORS.bomb_fuse, 0.4, 40);
      },

      // Legacy useItem - now redirects
      useItem() {
        if (Input.isDown('up')) {
          this.useFlash();
        } else {
          this.useBomb();
        }
      },

      checkEntityCollisions() {
        const p = GameState.player;
        if (!p || p.state === 'dead') return;

        const phb = { x: p.x + 1, y: p.y, w: p.width - 2, h: p.height };

        for (const e of GameState.entities) {
          if (!e.active) continue;

          if (e.type === 'bat' || e.type === 'ghost' || e.type === 'rock_falling' || e.type === 'bat_drop') {
            const ehb = { x: e.x, y: e.y, w: e.width || 10, h: e.height || 8 };
            if (Util.aabbOverlap(phb, ehb)) {
              this.kill(e.type);
              return;
            }
          }

          if (e.isItem) {
            const ehb = { x: e.x, y: e.y, w: e.width || 8, h: e.height || 8 };
            if (Util.aabbOverlap(phb, ehb)) {
              this.collectItem(e);
            }
          }
        }

        // Check exit triggers
        const area = GameState.area;
        if (area && area.exits) {
          for (const ex of area.exits) {
            if (Math.abs(p.x - ex.x) < 16 && Math.abs(p.y - ex.y) < 24) {
              if (ex.targetArea === -1) {
                Events.emit('stage:complete');
              } else {
                Events.emit('area:change', ex);
              }
              return;
            }
          }
        }
      },

      collectItem(e) {
        const p = GameState.player;
        if (!p) return;

        const itemId = GameState.stageIndex + '-' + GameState.areaIndex + '-' + e.spawnIndex;
        if (GameState.collectedItemIds[itemId]) return;

        e.active = false;
        GameState.collectedItemIds[itemId] = true;

        Audio.playSE(e.itemType.startsWith('key') ? 'key' : 'item');

        switch (e.itemType) {
          case 'energy_capsule':
            p.energy = Math.min(p.maxEnergy, p.energy + 100);
            p.score += 200;
            break;
          case 'life_up':
            p.lives = Math.min(CONFIG.LIVES_MAX, p.lives + 1);
            p.score += 200;
            break;
          case 'key_red': case 'key_blue': case 'key_gold':
            GameState.keysHeld.push(e.itemType.replace('key_', ''));
            p.score += 500;
            // Open matching doors
            this.openDoors(e.itemType.replace('key_', ''));
            break;
          case 'bomb':
            p.bombs = Math.min(CONFIG.BOMBS_MAX, p.bombs + 1);
            p.score += 200;
            break;
          case 'flash':
            p.flashes = Math.min(CONFIG.FLASHES_MAX, p.flashes + 1);
            p.score += 200;
            break;
          case 'gem':
            GameState.collectedGems.push(itemId);
            p.score += 1000;
            Particles.spawn(e.x + 4, e.y + 4, 10, COLORS.gem_color, 1, 80);
            break;
          case 'miracle':
            p.energy = p.maxEnergy;
            p.lives = Math.min(CONFIG.LIVES_MAX, p.lives + 1);
            p.score += 200;
            Particles.spawn(e.x + 4, e.y + 4, 15, COLORS.miracle_color, 1, 100);
            break;
        }
      },

      openDoors(color) {
        const area = GameState.area;
        if (!area) return;
        Audio.playSE('door');
        for (let ty = 0; ty < area.height; ty++) {
          for (let tx = 0; tx < area.width; tx++) {
            if (area.tiles[ty][tx] === 10) {
              area.tiles[ty][tx] = 0;
              Particles.spawn(tx * CONFIG.TILE_SIZE + 8, ty * CONFIG.TILE_SIZE + 8, 6, COLORS.key_gold, 0.5, 60);
            }
          }
        }
      },

      draw(ctx) {
        const p = GameState.player;
        if (!p) return;
        if (p.state === 'dead') {
          if (p.deathTimer > CONFIG.RESPAWN_DELAY - 10) return; // brief invisible
          return;
        }

        const cam = GameState.camera;
        const drawX = p.x - cam.x;
        const drawY = p.y - cam.y;

        const drawP = { ...p, x: drawX, y: drawY };
        SpriteEngine.drawPlayer(ctx, drawP);
      }
    };

    // ===== MODULE: ENTITY MANAGEMENT =====
    function loadAreaEntities() {
      GameState.entities = [];
      GameState.projectiles = [];
      const area = GameState.area;
      if (!area) return;

      area.entities.forEach((def, idx) => {
        const e = {
          type: def.type,
          x: def.x, y: def.y,
          vx: 0, vy: 0,
          active: true,
          spawnIndex: idx,
          animFrame: 0,
          animTimer: 0,
          triggerRange: def.triggerRange || 80,
          triggered: false,
          startX: def.x, startY: def.y,
          stunTimer: 0,
          phaseOffset: Math.random() * Math.PI * 2,
          spawnTimer: 0,
          dropTimer: def.dropTimer || Util.randInt(50, 110),
          fuse: def.fuse || 0,
          interval: def.interval || 90,
          width: 10, height: 8,
          hp: def.hp || 1,
          isItem: false,
          itemType: null,
          hidden: def.hidden || false
        };

        switch (def.type) {
          case 'bat':
            e.width = 10; e.height = 8;
            e.hp = 1;
            break;
          case 'ghost':
            e.width = 12; e.height = 14;
            e.hp = def.hp || 5;
            break;
          case 'rock_spawner':
            e.active = true;
            e.width = 0; e.height = 0;
            break;
          case 'energy_capsule': case 'life_up': case 'bomb': case 'flash':
          case 'gem': case 'miracle':
          case 'key_red': case 'key_blue': case 'key_gold':
            e.isItem = true;
            e.itemType = def.type;
            e.width = 10; e.height = 10;
            // Check if already collected
            const itemId = GameState.stageIndex + '-' + GameState.areaIndex + '-' + idx;
            if (GameState.collectedItemIds[itemId]) e.active = false;
            break;
        }

        GameState.entities.push(e);
      });
    }

    function explodeBomb(cx, cy) {
      const area = GameState.area;
      if (!area) return;
      const ts = CONFIG.TILE_SIZE;

      // Break nearby break walls.
      for (let ty = 0; ty < area.height; ty++) {
        for (let tx = 0; tx < area.width; tx++) {
          if (!TileMap.isBreakWall(tx, ty)) continue;
          const wx = tx * ts + ts / 2;
          const wy = ty * ts + ts / 2;
          if (Util.dist(cx, cy, wx, wy) < CONFIG.BOMB_RADIUS * 2) {
            area.tiles[ty][tx] = 0;
            Particles.spawn(wx, wy, 8, COLORS.rock, 1, 80);
          }
        }
      }

      // Damage nearby enemies.
      for (const e of GameState.entities) {
        if (!e.active || e.isItem || e.type === 'rock_spawner' || e.type === 'bomb_placed') continue;
        const ex = e.x + (e.width || 8) / 2;
        const ey = e.y + (e.height || 8) / 2;
        if (Util.dist(cx, cy, ex, ey) > CONFIG.BOMB_RADIUS * 1.35) continue;

        if (e.type === 'ghost') {
          e.hp = (e.hp || 5) - 3;
          if (e.hp <= 0) {
            e.active = false;
            if (GameState.player) GameState.player.score += 200;
            Particles.spawn(ex, ey, 8, '#bfe0ff', 0.6, 70);
          }
        } else {
          e.active = false;
          if (GameState.player) GameState.player.score += 80;
          Particles.spawn(ex, ey, 6, COLORS.bat_wing, 0.5, 60);
        }
      }

      // Player also dies if too close to explosion.
      const p = GameState.player;
      if (p && p.state !== 'dead') {
        const px = p.x + p.width / 2;
        const py = p.y + p.height / 2;
        if (Util.dist(cx, cy, px, py) < CONFIG.BOMB_RADIUS * 1.4) {
          Player.kill('bomb_blast');
        }
      }

      Audio.playSE('bomb');
      Particles.spawn(cx, cy, 18, COLORS.lava_light, 1, 120);
      if (GameState.settings.screenShake) {
        GameState.screenShake = { intensity: 4, decay: 0.9 };
      }
    }

    function updateEntities() {
      const p = GameState.player;
      if (!p) return;
      const cam = GameState.camera;
      const dt = CONFIG.FIXED_STEP;
      const cullMargin = CONFIG.ENTITY_CULL_MARGIN;
      const stageEnemyFactor = GameState.stageIndex === 1 ? 1.35 : 1;
      const stageRockFactor = GameState.stageIndex === 1 ? 0.75 : 1;

      for (const e of GameState.entities) {
        if (!e.active && e.stunTimer <= 0 && e.type !== 'rock_spawner') continue;

        // Stun recovery (ghost)
        if (e.stunTimer > 0) {
          e.stunTimer--;
          if (e.stunTimer <= 0 && e.type === 'ghost') {
            e.active = true;
            e.x = e.startX;
            e.y = e.startY;
          }
          continue;
        }

        // Culling
        if (e.type !== 'rock_spawner' && e.type !== 'bomb_placed') {
          const ex = e.x - cam.x;
          const ey = e.y - cam.y;
          if (ex < -cullMargin || ex > CONFIG.INTERNAL_WIDTH + cullMargin ||
            ey < -cullMargin || ey > CONFIG.INTERNAL_HEIGHT + cullMargin) {
            if (e.type === 'rock_falling' || e.type === 'bat_drop') { e.active = false; }
            continue;
          }
        }

        e.animTimer += dt;
        if (e.animTimer > 0.12) { e.animFrame++; e.animTimer = 0; }

        switch (e.type) {
          case 'bat':
            if (!e.triggered) {
              const d = Util.dist(p.x, p.y, e.x, e.y);
              if (d < e.triggerRange) {
                e.triggered = true;
              }
            }
            if (e.triggered) {
              // More threatening bat behavior: pursue both X/Y so they keep diving.
              const dx = p.x - e.x;
              const dy = p.y - e.y;
              const dist = Math.sqrt(dx * dx + dy * dy) || 1;
              const targetVx = (dx / dist) * 75 * stageEnemyFactor;
              const targetVy = (dy / dist) * 95 * stageEnemyFactor;
              e.vx += (targetVx - e.vx) * 0.12;
              e.vy += (targetVy - e.vy) * 0.14;
              e.x += e.vx * dt;
              e.y += e.vy * dt;
              e.y += Math.sin(GameState.frameCount * 0.22 + e.phaseOffset) * 0.7;

              // Bat droppings: dangerous falling hazard.
              e.dropTimer--;
              if (e.dropTimer <= 0) {
                GameState.entities.push({
                  type: 'bat_drop',
                  x: e.x + e.width / 2 - 2,
                  y: e.y + e.height - 1,
                  vx: e.vx * 0.2 + Util.rand(-8, 8),
                  vy: 60,
                  active: true,
                  width: 4, height: 4,
                  animFrame: 0, animTimer: 0,
                  isItem: false
                });
                const baseDrop = Math.max(20, Math.floor(CONFIG.BAT_DROP_INTERVAL_FRAMES / stageEnemyFactor));
                e.dropTimer = baseDrop + Util.randInt(-12, 24);
              }
            }
            break;

          case 'ghost':
            // Chase player slowly
            const dxg = p.x - e.x;
            const dyg = p.y - e.y;
            const distg = Math.sqrt(dxg * dxg + dyg * dyg) || 1;
            const ghostSpeed = 30 * stageEnemyFactor;
            e.x += (dxg / distg) * ghostSpeed * dt;
            e.y += (dyg / distg) * ghostSpeed * dt;
            break;

          case 'rock_spawner':
            e.spawnTimer++;
            const variance = Util.randInt(-18, 18);
            if (e.spawnTimer >= Math.max(24, Math.floor(e.interval * stageRockFactor)) + variance) {
              e.spawnTimer = 0;
              // Spawn a falling rock
              GameState.entities.push({
                type: 'rock_falling',
                x: e.x, y: e.y,
                vx: 0, vy: 0,
                active: true,
                width: 8, height: 8,
                animFrame: 0, animTimer: 0,
                isItem: false
              });
            }
            break;

          case 'rock_falling':
            e.vy += CONFIG.GRAVITY * dt;
            e.y += e.vy * dt;
            // Check ground collision
            const ts = CONFIG.TILE_SIZE;
            const fty = Math.floor((e.y + e.height) / ts);
            const ftx = Math.floor((e.x + 4) / ts);
            if (TileMap.isSolid(ftx, fty) || TileMap.isCrumble(ftx, fty)) {
              e.active = false;
              Particles.spawn(e.x + 4, e.y + 4, 5, COLORS.rock_shade, 0.5, 60);
            }
            if (e.y > GameState.area.height * ts) e.active = false;
            break;

          case 'bat_drop': {
            e.vy += CONFIG.GRAVITY * dt * 0.8;
            e.x += e.vx * dt;
            e.y += e.vy * dt;
            const ts = CONFIG.TILE_SIZE;
            const tx = Math.floor((e.x + e.width / 2) / ts);
            const ty = Math.floor((e.y + e.height) / ts);
            if (TileMap.isSolid(tx, ty) || TileMap.isPlatform(tx, ty) || TileMap.isLethal(tx, ty) || TileMap.isCrumble(tx, ty)) {
              e.active = false;
            }
            if (e.y > GameState.area.height * ts) e.active = false;
            break;
          }

          case 'bomb_placed': {
            const ts = CONFIG.TILE_SIZE;
            e.fuse--;
            e.vy += CONFIG.GRAVITY * dt;
            e.y += e.vy * dt;
            const feetTy = Math.floor((e.y + e.height) / ts);
            const centerTx = Math.floor((e.x + e.width / 2) / ts);
            if (
              TileMap.isSolid(centerTx, feetTy) ||
              (TileMap.isCrumble(centerTx, feetTy) && TileMap.isCrumbleActive(centerTx, feetTy)) ||
              TileMap.isPlatform(centerTx, feetTy)
            ) {
              e.y = feetTy * ts - e.height;
              e.vy = 0;
            }

            if (e.fuse % 20 === 0 && e.fuse > 0) {
              Particles.spawn(e.x + 4, e.y, 2, COLORS.bomb_fuse, 0.2, 25);
              Audio.playSE('bomb_tick');
            }
            if (e.fuse <= 0) {
              explodeBomb(e.x + e.width / 2, e.y + e.height / 2);
              e.active = false;
            }
            break;
          }
        }
      }

      // Update projectiles
      for (let i = GameState.projectiles.length - 1; i >= 0; i--) {
        const proj = GameState.projectiles[i];
        proj.x += proj.vx * dt;
        if (proj.vy) proj.y += proj.vy * dt;
        proj.life--;

        // Check hit enemies
        for (const e of GameState.entities) {
          if (!e.active || e.isItem || e.type === 'rock_spawner') continue;
          if (e.type === 'rock_falling' || e.type === 'bat_drop' || e.type === 'bomb_placed') continue; // gun doesn't work on hazards
          // Machine gun works on ghosts and bats
          const ehb = { x: e.x, y: e.y, w: e.width, h: e.height };
          const phb = { x: proj.x, y: proj.y, w: proj.width, h: proj.height };
          if (Util.aabbOverlap(phb, ehb)) {
            const isGhost = e.type === 'ghost';
            if (isGhost && proj.isFlash) {
              // Flash can disable ghosts briefly but does not delete them.
              e.active = false;
              e.stunTimer = Math.max(e.stunTimer || 0, 180);
              proj.life = 0;
              Audio.playSE('kick');
              Particles.spawn(e.x + e.width / 2, e.y + e.height / 2, 6, '#aaddff', 0.5, 60);
            } else if (isGhost) {
              e.hp = (e.hp || 5) - 1;
              proj.life = 0;
              Audio.playSE('kick');
              Particles.spawn(e.x + e.width / 2, e.y + e.height / 2, 4, '#9fc6ff', 0.4, 40);
              if (e.hp <= 0) {
                e.active = false;
                if (GameState.player) GameState.player.score += 250;
                Audio.playSE('enemy_kill');
                Particles.spawn(e.x + e.width / 2, e.y + e.height / 2, 8, '#bfe0ff', 0.6, 70);
              }
            } else {
              e.active = false;
              proj.life = 0;
              if (GameState.player) GameState.player.score += 100;
              Audio.playSE('punch');
              Audio.playSE('enemy_kill');
              Particles.spawn(e.x + e.width / 2, e.y + e.height / 2, 6, COLORS.bat_wing, 0.5, 60);
            }
            // Flash projectile: also stun nearby ghosts/bats
            if (proj.isFlash) {
              for (const e2 of GameState.entities) {
                if (!e2.active || e2.isItem) continue;
                if (e2.type === 'bat' || e2.type === 'ghost') {
                  const d2 = Util.dist(proj.x, proj.y, e2.x, e2.y);
                  if (d2 < CONFIG.FLASH_RADIUS) {
                    if (e2.type === 'ghost') {
                      e2.active = false;
                      e2.stunTimer = Math.max(e2.stunTimer || 0, 180);
                      Particles.spawn(e2.x + 5, e2.y + 5, 6, '#aaddff', 0.5, 60);
                    } else {
                      e2.active = false;
                      if (GameState.player) GameState.player.score += 100;
                      Particles.spawn(e2.x + 5, e2.y + 5, 6, '#aaddff', 0.5, 60);
                    }
                  }
                }
              }
            }
          }
        }

        // Check wall collision
        const ts = CONFIG.TILE_SIZE;
        const tx = Math.floor(proj.x / ts);
        const ty = Math.floor(proj.y / ts);
        if (TileMap.isSolid(tx, ty)) proj.life = 0;

        if (proj.life <= 0) {
          GameState.projectiles.splice(i, 1);
        }
      }

      // Clean up dead entities
      GameState.entities = GameState.entities.filter(e => {
        if ((e.type === 'rock_falling' || e.type === 'bat_drop' || e.type === 'bomb_placed') && !e.active) return false;
        return true;
      });
    }

    function drawEntities(ctx) {
      const cam = GameState.camera;

      for (const e of GameState.entities) {
        if (!e.active) continue;
        if (e.type === 'rock_spawner') continue;

        const dx = e.x - cam.x;
        const dy = e.y - cam.y;
        if (dx < -32 || dx > CONFIG.INTERNAL_WIDTH + 32) continue;
        if (dy < -32 || dy > CONFIG.INTERNAL_HEIGHT + 32) continue;

        switch (e.type) {
          case 'bat':
            SpriteEngine.drawBat(ctx, { ...e, x: dx, y: dy });
            break;
          case 'ghost':
            SpriteEngine.drawGhost(ctx, { ...e, x: dx, y: dy });
            break;
          case 'rock_falling':
            SpriteEngine.drawRock(ctx, { ...e, x: dx, y: dy });
            break;
          case 'bomb_placed':
            SpriteEngine.drawPlacedBomb(ctx, { ...e, x: dx, y: dy });
            break;
          case 'bat_drop':
            SpriteEngine.drawBatDrop(ctx, { ...e, x: dx, y: dy });
            break;
          default:
            if (e.isItem) {
              SpriteEngine.drawItem(ctx, { ...e, x: dx, y: dy });
            }
            break;
        }
      }

      // Draw projectiles
      for (const proj of GameState.projectiles) {
        SpriteEngine.drawProjectile(ctx, { x: proj.x - cam.x, y: proj.y - cam.y, isFlash: proj.isFlash });
      }
    }

    // ===== MODULE: HUD =====
    const HUD = {
      scorePopups: [],

      addPopup(x, y, text) {
        this.scorePopups.push({ x, y, text, life: 30 });
      },

      update() {
        for (let i = this.scorePopups.length - 1; i >= 0; i--) {
          this.scorePopups[i].life--;
          this.scorePopups[i].y -= 0.5;
          if (this.scorePopups[i].life <= 0) this.scorePopups.splice(i, 1);
        }
      },

      draw(ctx) {
        const p = GameState.player;
        if (!p) return;

        const W = CONFIG.INTERNAL_WIDTH;

        // HUD background bar
        ctx.fillStyle = 'rgba(3,7,15,0.92)';
        ctx.fillRect(0, 0, W, 28);
        ctx.fillStyle = 'rgba(18,36,61,0.95)';
        ctx.fillRect(0, 0, W, 2);
        ctx.fillStyle = COLORS.hud_border;
        ctx.fillRect(0, 28, W, 1);

        // Lives (hearts)
        for (let i = 0; i < p.lives; i++) {
          ctx.fillStyle = COLORS.item_red;
          const hx = 4 + i * 12;
          ctx.fillRect(hx, 4, 4, 4);
          ctx.fillRect(hx + 5, 4, 4, 4);
          ctx.fillRect(hx + 1, 7, 7, 3);
          ctx.fillRect(hx + 2, 10, 5, 1);
          ctx.fillRect(hx + 3, 11, 3, 1);
        }

        // Energy bar
        const barX = 70;
        const barY = 5;
        const barW = 90;
        const barH = 7;
        // Bar border
        ctx.fillStyle = COLORS.hud_border;
        ctx.fillRect(barX - 1, barY - 1, barW + 2, barH + 2);
        // Bar background
        ctx.fillStyle = COLORS.energy_bg;
        ctx.fillRect(barX, barY, barW, barH);
        const pct = p.energy / p.maxEnergy;
        const eColor = pct > 0.5 ? COLORS.energy_high : pct > 0.2 ? COLORS.energy_mid : COLORS.energy_low;
        ctx.fillStyle = eColor;
        const fillW = Math.floor(barW * pct);
        ctx.fillRect(barX, barY, fillW, barH);
        // Highlight on bar
        ctx.fillStyle = 'rgba(255,255,255,0.2)';
        ctx.fillRect(barX, barY, fillW, 2);
        // Blink when low
        if (pct <= 0.2 && Math.floor(GameState.frameCount / 15) % 2) {
          ctx.fillStyle = 'rgba(255,50,50,0.4)';
          ctx.fillRect(barX, barY, fillW, barH);
        }

        // Label
        this.drawText(ctx, 'ENERGY', barX, barY + barH + 3, '#8ed2ff', 1);

        // Score
        const scoreStr = Util.padScore(p.score);
        this.drawText(ctx, scoreStr, W - 58, 4, '#ffe58c', 1);
        this.drawText(ctx, 'SCORE', W - 58, 14, '#8ed2ff', 1);

        // Stage
        const stageAreaCount = (STAGES[GameState.stageIndex] && STAGES[GameState.stageIndex].areas)
          ? STAGES[GameState.stageIndex].areas.length
          : 1;
        const stageStr = stageAreaCount > 1
          ? (GameState.stageIndex + 1) + '-' + (GameState.areaIndex + 1)
          : String(GameState.stageIndex + 1);
        this.drawText(ctx, 'STAGE', W - 95, 4, '#8ed2ff', 1);
        this.drawText(ctx, stageStr, W - 95, 14, '#d7ecff', 1);

        // Bombs/Flashes icons
        if (p.bombs > 0) {
          ctx.fillStyle = COLORS.bomb_color;
          ctx.fillRect(4, 18, 5, 5);
          ctx.fillStyle = COLORS.bomb_fuse;
          ctx.fillRect(6, 16, 1, 2);
          this.drawText(ctx, 'x' + p.bombs, 11, 18, '#d7ecff', 1);
        }
        if (p.flashes > 0) {
          ctx.fillStyle = COLORS.flash_color;
          ctx.fillRect(28, 18, 5, 5);
          ctx.fillStyle = '#aabbcc';
          ctx.fillRect(30, 16, 1, 2);
          this.drawText(ctx, 'x' + p.flashes, 35, 18, '#d7ecff', 1);
        }

        // Score popups
        const cam = GameState.camera;
        for (const pop of this.scorePopups) {
          const alpha = pop.life / 30;
          ctx.globalAlpha = alpha;
          this.drawText(ctx, pop.text, pop.x - cam.x, pop.y - cam.y, '#ffd24f', 1);
        }
        ctx.globalAlpha = 1;

        // Signs text
        if (GameState.area && GameState.area.signs) {
          for (const sign of GameState.area.signs) {
            const sx = sign.x - cam.x;
            const sy = sign.y - cam.y;
            if (sx > -100 && sx < W + 100) {
              const dist = Util.dist(p.x, p.y, sign.x, sign.y);
              if (dist < 48) {
                const text = sign.text;
                const charStep = 6;
                const textW = Math.max(1, text.length * charStep - 1);
                const textX = Math.floor((sx + 8) - textW / 2);
                const textY = Math.floor(sy - 14);
                const panelX = textX - 3;
                const panelY = textY - 2;
                const panelW = textW + 6;
                const panelH = 11;

                ctx.fillStyle = 'rgba(0,0,0,0.88)';
                ctx.fillRect(panelX, panelY, panelW, panelH);
                ctx.fillStyle = '#b8b8b8';
                ctx.fillRect(panelX, panelY, panelW, 1);
                ctx.fillRect(panelX, panelY + panelH - 1, panelW, 1);
                ctx.fillRect(panelX, panelY, 1, panelH);
                ctx.fillRect(panelX + panelW - 1, panelY, 1, panelH);

                this.drawText(ctx, text, textX + 1, textY + 1, '#000000', 1);
                this.drawText(ctx, text, textX, textY, '#ffffff', 1);
              }
              SpriteEngine.drawSign(ctx, sx, sy);
            }
          }
        }

        // Exit/Goal markers (always visible when on screen)
        if (GameState.area && GameState.area.exits) {
          for (const ex of GameState.area.exits) {
            const sx = Math.floor(ex.x - cam.x);
            const sy = Math.floor(ex.y - cam.y);
            if (sx < -24 || sx > W + 24 || sy < 24 || sy > CONFIG.INTERNAL_HEIGHT + 16) continue;

            const isGoalExit = ex.targetArea === -1;
            const label = isGoalExit ? 'GOAL' : 'EXIT';
            const markerColor = isGoalExit ? '#ffd24f' : '#7fd4ff';
            const borderColor = isGoalExit ? '#7a5a0f' : '#1b4f7a';

            // Pole
            ctx.fillStyle = '#d9e8ff';
            ctx.fillRect(sx - 1, sy - 14, 2, 14);
            // Flag
            ctx.fillStyle = markerColor;
            ctx.fillRect(sx + 1, sy - 13, 8, 5);
            ctx.fillStyle = borderColor;
            ctx.fillRect(sx + 1, sy - 13, 8, 1);
            // Label panel
            const tw = label.length * 6 - 1;
            const tx = sx - Math.floor(tw / 2);
            const ty = sy - 24;
            ctx.fillStyle = 'rgba(0,0,0,0.85)';
            ctx.fillRect(tx - 2, ty - 2, tw + 4, 10);
            this.drawText(ctx, label, tx, ty, markerColor, 1);
          }
        }
      },

      drawText(ctx, text, x, y, color, scale) {
        ctx.fillStyle = color || '#fff';
        const s = scale || 1;
        const charW = 5 * s;
        const charH = 7 * s;

        for (let i = 0; i < text.length; i++) {
          const ch = text[i];
          const cx = Math.floor(x + i * (charW + s));
          const cy = Math.floor(y);

          if (ch === ' ') continue;
          if (ch === '!' || ch === '.' || ch === ',' || ch === ':' || ch === '/' || ch === '+' || ch === '-' || ch === '=' || ch === '←' || ch === '→') {
            // Simple punctuation
            if (ch === '.') ctx.fillRect(cx + 1, cy + charH - s, s * 2, s);
            else if (ch === ':') { ctx.fillRect(cx + 1, cy + s, s * 2, s); ctx.fillRect(cx + 1, cy + charH - 2 * s, s * 2, s); }
            else if (ch === '-') ctx.fillRect(cx, cy + Math.floor(charH / 2), charW, s);
            else if (ch === '=') { ctx.fillRect(cx, cy + Math.floor(charH / 2) - s, charW, s); ctx.fillRect(cx, cy + Math.floor(charH / 2) + s, charW, s); }
            else if (ch === '+') { ctx.fillRect(cx, cy + Math.floor(charH / 2), charW, s); ctx.fillRect(cx + Math.floor(charW / 2), cy + s, s, charH - 2 * s); }
            else if (ch === '/') { for (let j = 0; j < charH; j++) ctx.fillRect(cx + Math.floor((charH - j - 1) * charW / charH), cy + j, s, s); }
            else ctx.fillRect(cx + Math.floor(charW / 2), cy, s, charH);
            continue;
          }

          // Bitmap number/letter rendering
          const code = ch.charCodeAt(0);
          if (code >= 48 && code <= 57) {
            // Numbers
            this.drawDigit(ctx, ch, cx, cy, s);
          } else if (code >= 65 && code <= 90) {
            this.drawLetter(ctx, ch, cx, cy, s);
          } else if (code >= 97 && code <= 122) {
            this.drawLetter(ctx, ch.toUpperCase(), cx, cy, s);
          } else {
            // Unknown char - just draw a block
            ctx.fillRect(cx, cy, charW, charH);
          }
        }
      },

      drawDigit(ctx, d, x, y, s) {
        const w = 5 * s, h = 7 * s, t = s; // thickness
        const segs = {
          '0': [1, 1, 1, 0, 1, 1, 1], '1': [0, 0, 1, 0, 0, 1, 0], '2': [1, 0, 1, 1, 1, 0, 1],
          '3': [1, 0, 1, 1, 0, 1, 1], '4': [0, 1, 1, 1, 0, 1, 0], '5': [1, 1, 0, 1, 0, 1, 1],
          '6': [1, 1, 0, 1, 1, 1, 1], '7': [1, 0, 1, 0, 0, 1, 0], '8': [1, 1, 1, 1, 1, 1, 1],
          '9': [1, 1, 1, 1, 0, 1, 1]
        };
        const seg = segs[d] || segs['0'];
        // top, top-left, top-right, mid, bot-left, bot-right, bot
        if (seg[0]) ctx.fillRect(x, y, w, t);
        if (seg[1]) ctx.fillRect(x, y, t, h / 2);
        if (seg[2]) ctx.fillRect(x + w - t, y, t, h / 2);
        if (seg[3]) ctx.fillRect(x, y + h / 2 - t / 2, w, t);
        if (seg[4]) ctx.fillRect(x, y + h / 2, t, h / 2);
        if (seg[5]) ctx.fillRect(x + w - t, y + h / 2, t, h / 2);
        if (seg[6]) ctx.fillRect(x, y + h - t, w, t);
      },

      drawLetter(ctx, ch, x, y, s) {
        const t = s;
        const w = 5 * s, h = 7 * s;
        // Simple bitmap letters - only most used ones
        switch (ch) {
          case 'A': ctx.fillRect(x, y, w, t); ctx.fillRect(x, y, t, h); ctx.fillRect(x + w - t, y, t, h); ctx.fillRect(x, y + h / 2, w, t); break;
          case 'B': ctx.fillRect(x, y, w - t, t); ctx.fillRect(x, y, t, h); ctx.fillRect(x + w - t, y + t, t, h / 2 - t); ctx.fillRect(x, y + h / 2, w - t, t); ctx.fillRect(x + w - t, y + h / 2, t, h / 2 - t); ctx.fillRect(x, y + h - t, w - t, t); break;
          case 'C': ctx.fillRect(x, y, w, t); ctx.fillRect(x, y, t, h); ctx.fillRect(x, y + h - t, w, t); break;
          case 'D': ctx.fillRect(x, y, w - t, t); ctx.fillRect(x, y, t, h); ctx.fillRect(x + w - t, y + t, t, h - 2 * t); ctx.fillRect(x, y + h - t, w - t, t); break;
          case 'E': ctx.fillRect(x, y, w, t); ctx.fillRect(x, y, t, h); ctx.fillRect(x, y + h / 2, w - t, t); ctx.fillRect(x, y + h - t, w, t); break;
          case 'F': ctx.fillRect(x, y, w, t); ctx.fillRect(x, y, t, h); ctx.fillRect(x, y + h / 2, w - t, t); break;
          case 'G': ctx.fillRect(x, y, w, t); ctx.fillRect(x, y, t, h); ctx.fillRect(x, y + h - t, w, t); ctx.fillRect(x + w - t, y + h / 2, t, h / 2); ctx.fillRect(x + w / 2, y + h / 2, w / 2, t); break;
          case 'H': ctx.fillRect(x, y, t, h); ctx.fillRect(x + w - t, y, t, h); ctx.fillRect(x, y + h / 2, w, t); break;
          case 'I': ctx.fillRect(x, y, w, t); ctx.fillRect(x + w / 2 - t / 2, y, t, h); ctx.fillRect(x, y + h - t, w, t); break;
          case 'J': ctx.fillRect(x + w - t, y, t, h); ctx.fillRect(x, y + h - t, w, t); ctx.fillRect(x, y + h / 2, t, h / 2); break;
          case 'K': ctx.fillRect(x, y, t, h); ctx.fillRect(x + w - t, y, t, h / 2); ctx.fillRect(x + t, y + h / 2 - t, w - 2 * t, t); ctx.fillRect(x + w - t, y + h / 2, t, h / 2); break;
          case 'L': ctx.fillRect(x, y, t, h); ctx.fillRect(x, y + h - t, w, t); break;
          case 'M': ctx.fillRect(x, y, t, h); ctx.fillRect(x + w - t, y, t, h); ctx.fillRect(x + t, y + t, t, t); ctx.fillRect(x + w / 2 - t / 2, y + 2 * t, t, t); ctx.fillRect(x + w - 2 * t, y + t, t, t); break;
          case 'N': ctx.fillRect(x, y, t, h); ctx.fillRect(x + w - t, y, t, h); ctx.fillRect(x + t, y + t, t, 2 * t); ctx.fillRect(x + 2 * t, y + 2 * t, t, 2 * t); ctx.fillRect(x + 3 * t, y + 3 * t, t, 2 * t); break;
          case 'O': ctx.fillRect(x, y, w, t); ctx.fillRect(x, y, t, h); ctx.fillRect(x + w - t, y, t, h); ctx.fillRect(x, y + h - t, w, t); break;
          case 'P': ctx.fillRect(x, y, w, t); ctx.fillRect(x, y, t, h); ctx.fillRect(x + w - t, y, t, h / 2); ctx.fillRect(x, y + h / 2, w, t); break;
          case 'R': ctx.fillRect(x, y, w, t); ctx.fillRect(x, y, t, h); ctx.fillRect(x + w - t, y, t, h / 2); ctx.fillRect(x, y + h / 2, w, t); ctx.fillRect(x + w - t, y + h / 2, t, h / 2); break;
          case 'S': ctx.fillRect(x, y, w, t); ctx.fillRect(x, y, t, h / 2); ctx.fillRect(x, y + h / 2, w, t); ctx.fillRect(x + w - t, y + h / 2, t, h / 2); ctx.fillRect(x, y + h - t, w, t); break;
          case 'T': ctx.fillRect(x, y, w, t); ctx.fillRect(x + w / 2 - t / 2, y, t, h); break;
          case 'U': ctx.fillRect(x, y, t, h); ctx.fillRect(x + w - t, y, t, h); ctx.fillRect(x, y + h - t, w, t); break;
          case 'V': ctx.fillRect(x, y, t, h - 2 * t); ctx.fillRect(x + w - t, y, t, h - 2 * t); ctx.fillRect(x + t, y + h - 2 * t, t, t); ctx.fillRect(x + w - 2 * t, y + h - 2 * t, t, t); ctx.fillRect(x + w / 2 - t / 2, y + h - t, t, t); break;
          case 'W': ctx.fillRect(x, y, t, h); ctx.fillRect(x + w - t, y, t, h); ctx.fillRect(x + w / 2 - t / 2, y + h / 2, t, h / 2); ctx.fillRect(x, y + h - t, w, t); break;
          case 'X': ctx.fillRect(x, y, t, h / 2); ctx.fillRect(x + w - t, y, t, h / 2); ctx.fillRect(x + t, y + h / 2 - t, w - 2 * t, t); ctx.fillRect(x, y + h / 2, t, h / 2); ctx.fillRect(x + w - t, y + h / 2, t, h / 2); break;
          case 'Y': ctx.fillRect(x, y, t, h / 2); ctx.fillRect(x + w - t, y, t, h / 2); ctx.fillRect(x + w / 2 - t / 2, y + h / 2, t, h / 2); ctx.fillRect(x, y + h / 2, w, t); break;
          case 'Z': ctx.fillRect(x, y, w, t); ctx.fillRect(x + w - t, y, t, h / 2); ctx.fillRect(x, y + h / 2, w, t); ctx.fillRect(x, y + h / 2, t, h / 2); ctx.fillRect(x, y + h - t, w, t); break;
          default: ctx.fillRect(x, y, w, h); break;
        }
      }
    };

    // ===== MODULE: MENU =====
    const Menu = {
      overlay: null,
      content: null,
      selectedIndex: 0,
      items: [],
      active: false,

      init() {
        this.overlay = document.getElementById('menu-overlay');
        this.content = document.getElementById('menu-content');
      },

      show(config) {
        this.active = true;
        this.selectedIndex = 0;
        this.items = config.items || [];
        this.overlay.classList.add('active');
        this.render(config);
        this.updateSelection();
      },

      hide() {
        this.active = false;
        this.overlay.classList.remove('active');
      },

      render(config) {
        let html = '';
        if (config.title) html += `<div class="menu-title">${config.title}</div>`;
        if (config.subtitle) html += `<div class="menu-subtitle">${config.subtitle}</div>`;
        if (config.briefing) html += `<div class="briefing-text">${config.briefing}</div>`;
        if (config.resultLines) {
          for (const line of config.resultLines) {
            html += `<div class="result-text">${line}</div>`;
          }
        }
        if (config.score) html += `<div class="result-score">SCORE: ${Util.padScore(config.score)}</div>`;

        for (let i = 0; i < this.items.length; i++) {
          const item = this.items[i];
          const cls = item.locked ? 'menu-item locked' : 'menu-item';
          html += `<div class="${cls}" data-idx="${i}">${item.label}</div>`;
        }
        this.content.innerHTML = html;

        // Add click handlers
        const menuItems = this.content.querySelectorAll('.menu-item:not(.locked)');
        menuItems.forEach(el => {
          el.addEventListener('click', () => {
            const idx = parseInt(el.dataset.idx);
            this.selectedIndex = idx;
            this.confirm();
          });
        });
      },

      updateSelection() {
        const els = this.content.querySelectorAll('.menu-item');
        els.forEach((el, i) => {
          el.classList.toggle('selected', i === this.selectedIndex);
        });
      },

      handleInput() {
        if (!this.active) return;

        if (Input.wasPressed('up')) {
          do {
            this.selectedIndex = (this.selectedIndex - 1 + this.items.length) % this.items.length;
          } while (this.items[this.selectedIndex].locked);
          this.updateSelection();
          Audio.playSE('menu_select');
        }
        if (Input.wasPressed('down')) {
          do {
            this.selectedIndex = (this.selectedIndex + 1) % this.items.length;
          } while (this.items[this.selectedIndex].locked);
          this.updateSelection();
          Audio.playSE('menu_select');
        }
        if (Input.wasPressed('jump') || Input.justPressed['Enter']) {
          this.confirm();
        }
      },

      confirm() {
        const item = this.items[this.selectedIndex];
        if (item && !item.locked && item.action) {
          Audio.playSE('menu_confirm');
          Audio.resume();
          item.action();
        }
      }
    };

    // ===== MODULE: SCENE MANAGEMENT =====
    const Scene = {
      showTitle() {
        GameState.scene = 'TITLE';
        Audio.stopBGM();
        Audio.playBGM('title');

        const hasSave = !!SaveManager.loadGame();
        const items = [
          { label: 'START GAME', action: () => Scene.startNewGame() },
          { label: 'STAGE SELECT', action: () => Scene.showStageSelect() },
          { label: 'CONTINUE', action: () => Scene.continueGame(), locked: !hasSave },
          { label: 'TIME ATTACK', action: () => Scene.startTimeAttack(), locked: !GameState.unlocks.timeAttack },
          { label: 'HIGH SCORES', action: () => Scene.showHighScores() },
          { label: 'HARD MODE', action: () => Scene.startHardMode(), locked: !GameState.unlocks.hardMode }
        ];

        Menu.show({
          title: 'CAVE EXPLORER',
          subtitle: 'Cave Explorer - Arrow Keys + Space/Z/X',
          items
        });
      },

      prepareFreshRun(stageIdx) {
        Menu.hide();
        resetPlayer();
        GameState.stageIndex = stageIdx;
        GameState.areaIndex = 0;
        GameState.lastCheckpointIndex = 0;
        GameState.deathCount = 0;
        GameState.consecutiveDeaths = 0;
        GameState.collectedItemIds = {};
        GameState.collectedGems = [];
        GameState.keysHeld = [];
        GameState.totalPlayTime = 0;
        GameState.stageStartTime = GameState.frameCount;
        SaveManager.deleteSave();
      },

      startNewGame() {
        GameState.hardMode = false;
        GameState.timeAttackMode = false;
        this.prepareFreshRun(0);
        this.showBriefing(0);
      },

      startTimeAttack() {
        GameState.timeAttackMode = true;
        this.startNewGame();
      },

      startHardMode() {
        GameState.hardMode = true;
        this.startNewGame();
      },

      showStageSelect() {
        const items = STAGES.map((stage, i) => ({
          label: 'STAGE ' + (i + 1) + ' - ' + stage.name,
          action: () => Scene.startFromStage(i)
        }));
        items.push({ label: 'BACK', action: () => Scene.showTitle() });
        Menu.show({
          title: 'STAGE SELECT',
          subtitle: 'Start From Any Stage',
          items
        });
      },

      startFromStage(stageIdx) {
        GameState.hardMode = false;
        GameState.timeAttackMode = false;
        this.prepareFreshRun(stageIdx);
        this.showBriefing(stageIdx);
      },

      continueGame() {
        Menu.hide();
        const save = SaveManager.loadGame();
        if (!save) { this.showTitle(); return; }

        resetPlayer();
        const p = GameState.player;
        p.lives = save.player.lives;
        p.energy = save.player.energy;
        p.bombs = save.player.bombs;
        p.flashes = save.player.flashes;
        p.score = save.player.score;
        GameState.stageIndex = save.stageIndex;
        GameState.areaIndex = save.areaIndex;
        GameState.lastCheckpointIndex = save.checkpointIndex;
        GameState.collectedItemIds = save.collectedItemIds || {};
        GameState.collectedGems = save.collectedGems || [];
        GameState.keysHeld = save.keysHeld || [];
        GameState.deathCount = save.deathCount || 0;
        GameState.totalPlayTime = save.totalPlayTime || 0;

        this.loadCurrentArea();
        const cp = GameState.area.checkpoints[GameState.lastCheckpointIndex];
        if (cp) { p.x = cp.x; p.y = cp.y; }
        p.jumpStartY = p.y;

        GameState.scene = 'GAME';
        Audio.stopBGM();
        Audio.playBGM(STAGES[GameState.stageIndex].bgm);
      },

      showBriefing(stageIdx) {
        const stage = STAGES[stageIdx];
        Menu.show({
          title: 'STAGE ' + (stageIdx + 1),
          subtitle: stage.name,
          briefing: stage.briefing,
          items: [{ label: 'START', action: () => Scene.enterStage(stageIdx) }]
        });
      },

      enterStage(stageIdx) {
        Menu.hide();
        GameState.stageIndex = stageIdx;
        GameState.areaIndex = 0;
        GameState.lastCheckpointIndex = 0;
        GameState.crumbleTimers = {};
        GameState.steamTimers = {};
        GameState.keysHeld = [];
        GameState.stageStartTime = GameState.frameCount;

        this.loadCurrentArea();
        const p = GameState.player;
        const cp = GameState.area.checkpoints[0];
        if (cp) { p.x = cp.x; p.y = cp.y; }
        p.jumpStartY = p.y;
        p.vx = 0; p.vy = 0; p.state = 'idle';

        GameState.scene = 'GAME';
        Audio.stopBGM();
        Audio.playBGM(STAGES[stageIdx].bgm);
      },

      loadCurrentArea() {
        const stage = STAGES[GameState.stageIndex];
        GameState.stage = stage;
        GameState.area = JSON.parse(JSON.stringify(stage.areas[GameState.areaIndex])); // Deep copy
        GameState.crumbleTimers = {};
        GameState.steamTimers = {};
        loadAreaEntities();
        Camera.update();
      },

      changeArea(exit) {
        if (GameState.transitionTimer > 0) return;
        GameState.transitionTimer = 10; // brief cooldown
        GameState.areaIndex = exit.targetArea;
        GameState.lastCheckpointIndex = 0;
        this.loadCurrentArea();
        const p = GameState.player;
        p.x = exit.targetX;
        p.y = (exit.targetY != null && exit.targetY > 0) ? exit.targetY : (GameState.area.checkpoints[0] ? GameState.area.checkpoints[0].y : 128);
        p.vx = 0; p.vy = 0; p.state = 'idle';
        p.jumpStartY = p.y;
        p.onGround = false;
        Camera.update();
        // Snap camera
        GameState.camera.x = Util.clamp(p.x - CONFIG.INTERNAL_WIDTH / 2, 0, GameState.area.width * CONFIG.TILE_SIZE - CONFIG.INTERNAL_WIDTH);
        GameState.camera.y = Util.clamp(p.y - CONFIG.INTERNAL_HEIGHT / 2, 0, GameState.area.height * CONFIG.TILE_SIZE - CONFIG.INTERNAL_HEIGHT);
      },

      stageComplete() {
        if (GameState.scene !== 'GAME') return; // prevent duplicate
        const p = GameState.player;
        if (!p) return;

        Audio.playSE('stageclear');
        Audio.stopBGM();

        const clearTime = Math.floor((GameState.frameCount - GameState.stageStartTime) / CONFIG.FPS);
        const timeBonus = Math.max(0, (240 - clearTime) * 50);
        const lifeBonus = p.lives * 2000;
        p.score += 5000 + timeBonus + lifeBonus;

        const totalSec = Math.floor(GameState.totalPlayTime);

        const nextStage = GameState.stageIndex + 1;
        const gemCount = GameState.collectedGems.length;
        const gemTarget = STAGES.reduce((total, stage) => {
          return total + stage.areas.reduce((sum, area) => {
            return sum + area.entities.filter(e => e.type === 'gem').length;
          }, 0);
        }, 0);

        if (nextStage >= STAGES.length) {
          // Game complete!
          const noMiss = GameState.deathCount === 0 ? 10000 : 0;
          p.score += noMiss;

          SaveManager.saveHighScore(p.score, totalSec, gemCount);

          // Check unlocks
          GameState.unlocks.timeAttack = true;
          if (gemCount >= gemTarget) GameState.unlocks.hardMode = true;
          SaveManager.saveUnlocks();
          SaveManager.deleteSave();

          const lines = [
            `TIME: ${Math.floor(totalSec / 60)}:${String(totalSec % 60).padStart(2, '0')}`,
            `GEMS: ${gemCount}/${gemTarget}`,
            `DEATHS: ${GameState.deathCount}`,
            `TIME BONUS: +${timeBonus}`,
            `LIFE BONUS: +${lifeBonus}`,
            noMiss > 0 ? 'NO MISS BONUS: +10000' : ''
          ].filter(Boolean);

          const isTrue = gemCount >= gemTarget;

          Menu.show({
            title: isTrue ? 'TRUE ENDING' : 'CONGRATULATIONS',
            subtitle: isTrue
              ? '全ての宝石を集めたあなたに、洞窟は真の姿を見せた...'
              : 'おめでとう！洞窟の秘宝を手に入れた！',
            resultLines: lines,
            score: p.score,
            items: [{ label: 'TITLE', action: () => Scene.showTitle() }]
          });
          GameState.scene = 'ENDING';
        } else {
          const lines = [
            `CLEAR TIME: ${clearTime}s`,
            `TIME BONUS: +${timeBonus}`,
            `LIFE BONUS: +${lifeBonus}`,
            `GEMS: ${gemCount}/${gemTarget}`
          ];

          Menu.show({
            title: 'STAGE ' + (GameState.stageIndex + 1) + ' CLEAR!',
            resultLines: lines,
            score: p.score,
            items: [{ label: 'NEXT STAGE', action: () => Scene.showBriefing(nextStage) }]
          });
          GameState.scene = 'RESULT';
          SaveManager.saveGame();
        }
      },

      gameOver() {
        Audio.playSE('gameover');
        Audio.stopBGM();

        const p = GameState.player;
        Menu.show({
          title: 'GAME OVER',
          score: p ? p.score : 0,
          resultLines: [`DEATHS: ${GameState.deathCount}`],
          items: [
            {
              label: 'CONTINUE', action: () => {
                Menu.hide();
                resetPlayer();
                const pp = GameState.player;
                pp.score = p ? p.score : 0;
                Scene.enterStage(GameState.stageIndex);
              }
            },
            { label: 'TITLE', action: () => Scene.showTitle() }
          ]
        });
        GameState.scene = 'GAME_OVER';
      },

      showPause() {
        GameState.scene = 'PAUSE';
        Menu.show({
          title: 'PAUSED',
          items: [
            { label: 'RESUME', action: () => { Menu.hide(); GameState.scene = 'GAME'; } },
            { label: 'RESTART STAGE', action: () => { Menu.hide(); Events.emit('stage:restart'); } },
            { label: 'QUIT TO TITLE', action: () => { SaveManager.saveGame(); Scene.showTitle(); } }
          ]
        });
      },

      showHighScores() {
        const scores = SaveManager.loadHighScores();
        const lines = scores.length > 0
          ? scores.map((s, i) => `${i + 1}. ${Util.padScore(s.score)} - ${Math.floor(s.time / 60)}:${String(s.time % 60).padStart(2, '0')} - ${s.gems}gems`)
          : ['No scores yet'];

        Menu.show({
          title: 'HIGH SCORES',
          resultLines: lines,
          items: [{ label: 'BACK', action: () => Scene.showTitle() }]
        });
      }
    };

    // ===== MODULE: GAME LOOP =====
    const Game = {
      canvas: null,
      ctx: null,
      lastTime: 0,
      accumulator: 0,
      running: false,

      init() {
        this.canvas = document.getElementById('game');
        this.ctx = this.canvas.getContext('2d');
        this.ctx.imageSmoothingEnabled = false;

        Input.init();
        Audio.init();
        Menu.init();
        Particles.init();
        TileRenderer.initCache(this.ctx);

        SaveManager.loadSettings();
        SaveManager.loadUnlocks();
        SaveManager.loadHighScores();

        // Event listeners
        Events.on('stage:complete', () => Scene.stageComplete());
        Events.on('area:change', (exit) => Scene.changeArea(exit));
        Events.on('gameover', () => Scene.gameOver());
        Events.on('stage:restart', () => {
          Menu.hide();
          resetPlayer();
          const p = GameState.player;
          // Keep score
          GameState.collectedItemIds = {};
          GameState.keysHeld = [];
          Scene.enterStage(GameState.stageIndex);
        });
        Events.on('item:collect', (data) => {
          if (data && data.score) {
            HUD.addPopup(data.x || 0, data.y || 0, '+' + data.score);
          }
        });

        // Start
        Scene.showTitle();
        this.running = true;
        this.lastTime = performance.now();
        requestAnimationFrame(t => this.loop(t));
      },

      loop(timestamp) {
        if (!this.running) return;
        requestAnimationFrame(t => this.loop(t));

        const dt = Math.min((timestamp - this.lastTime) / 1000, 0.1);
        this.lastTime = timestamp;

        Input.poll();

        // Hit stop
        if (GameState.hitStop > 0) {
          GameState.hitStop--;
          this.draw();
          return;
        }

        this.accumulator += dt;
        while (this.accumulator >= CONFIG.FIXED_STEP) {
          this.update();
          this.accumulator -= CONFIG.FIXED_STEP;
        }

        this.draw();
      },

      update() {
        GameState.frameCount++;

        // Menu input
        if (Menu.active) {
          Menu.handleInput();
          return;
        }

        if (GameState.scene !== 'GAME') return;

        // Transition cooldown
        if (GameState.transitionTimer > 0) GameState.transitionTimer--;

        // Pause
        if (Input.wasPressed('pause')) {
          Scene.showPause();
          return;
        }

        // Update steam timers
        for (const key in GameState.steamTimers) {
          GameState.steamTimers[key]++;
          const total = CONFIG.STEAM_ON_FRAMES + CONFIG.STEAM_OFF_FRAMES;
          if (GameState.steamTimers[key] >= total) {
            GameState.steamTimers[key] = 0;
          }
        }

        // Update crumble timers
        for (const key in GameState.crumbleTimers) {
          GameState.crumbleTimers[key]--;
          if (GameState.crumbleTimers[key] <= -CONFIG.CRUMBLE_RESPAWN) {
            delete GameState.crumbleTimers[key];
          }
        }

        // Player death timer
        const p = GameState.player;
        if (p && p.state === 'dead') {
          p.deathTimer--;
          if (p.deathTimer <= 0 && p.lives > 0) {
            // Check rescue offer
            if (GameState.consecutiveDeaths >= 3) {
              // Auto-rescue: full energy recovery
              p.energy = p.maxEnergy;
              GameState.consecutiveDeaths = 0;
            }
            Player.respawn();
          }
          Particles.update();
          return;
        }

        // Update game
        Player.update();
        updateEntities();
        Camera.update();
        Particles.update();
        HUD.update();

        // Screen shake decay
        if (GameState.screenShake.intensity > 0.1) {
          GameState.screenShake.intensity *= GameState.screenShake.decay || 0.9;
        } else {
          GameState.screenShake.intensity = 0;
        }

        // Fade
        if (GameState.fadeDir !== 0) {
          GameState.fadeAlpha += GameState.fadeDir;
          if (GameState.fadeAlpha <= 0) {
            GameState.fadeAlpha = 0;
            GameState.fadeDir = 0;
          }
        }

        // Track play time
        GameState.totalPlayTime += CONFIG.FIXED_STEP;
      },

      draw() {
        const ctx = this.ctx;
        const W = CONFIG.INTERNAL_WIDTH;
        const H = CONFIG.INTERNAL_HEIGHT;

        // Background
        ctx.fillStyle = COLORS.bg_dark;
        ctx.fillRect(0, 0, W, H);

        if (GameState.scene === 'GAME' || (GameState.scene === 'PAUSE')) {
          // Draw retro cave background
          const cam = GameState.camera;

          // Layer 0: deep black cave base
          ctx.fillStyle = COLORS.bg_cave3;
          ctx.fillRect(0, 0, W, H);

          // Layer 1: distant cave blocks
          ctx.fillStyle = COLORS.bg_cave2;
          const bgOff1 = Math.floor(cam.x * 0.06) % 48;
          for (let bx = -48; bx < W + 48; bx += 48) {
            const xp = bx - (bgOff1 % 48);
            const n = Math.floor((bx + 96) / 48);
            const y1 = 16 + (n % 5) * 18;
            const y2 = 28 + (n % 4) * 20;
            ctx.fillRect(xp + 4, y1, 12, 6);
            ctx.fillRect(xp + 28, y2, 10, 5);
            ctx.fillRect(xp + 18, y2 + 62, 14, 7);
          }

          // Layer 2: jagged ceiling / floor silhouettes
          ctx.fillStyle = COLORS.bg_cave1;
          const bgOff2 = Math.floor(cam.x * 0.12) % 64;
          for (let bx = -64; bx < W + 64; bx += 64) {
            const xp = bx - (bgOff2 % 64);
            const n = Math.floor((bx + 128) / 64);
            const top1 = 10 + (n % 3) * 5;
            const top2 = 6 + (n % 4) * 4;
            const bot1 = 8 + (n % 4) * 3;
            const bot2 = 12 + (n % 3) * 4;
            ctx.fillRect(xp + 8, 0, 5, top1);
            ctx.fillRect(xp + 26, 0, 4, top2);
            ctx.fillRect(xp + 46, 0, 6, top1 - 2);
            ctx.fillRect(xp + 14, H - bot1, 4, bot1);
            ctx.fillRect(xp + 32, H - bot2, 5, bot2);
            ctx.fillRect(xp + 52, H - (bot1 + 2), 3, bot1 + 2);
          }

          // Layer 3: faint mineral glints
          ctx.fillStyle = '#1a2344';
          const bgOff3 = Math.floor(cam.x * 0.18) % 36;
          for (let bx = -36; bx < W + 36; bx += 36) {
            const xp = bx - (bgOff3 % 36);
            const n = Math.floor((bx + 72) / 36);
            const gy = 42 + (n % 8) * 24;
            ctx.fillRect(xp + 10, gy, 2, 2);
          }

          // Subtle vignette effect
          ctx.fillStyle = 'rgba(0,0,0,0.15)';
          ctx.fillRect(0, 0, W, 8);
          ctx.fillRect(0, H - 8, W, 8);
          ctx.fillRect(0, 0, 8, H);
          ctx.fillRect(W - 8, 0, 8, H);

          // Apply screen shake
          ctx.save();
          if (GameState.screenShake.intensity > 0) {
            const sx = (Math.random() - 0.5) * GameState.screenShake.intensity * 2;
            const sy = (Math.random() - 0.5) * GameState.screenShake.intensity * 2;
            ctx.translate(Math.floor(sx), Math.floor(sy));
          }

          // Draw tilemap
          TileMap.draw(ctx);

          // Draw entities
          drawEntities(ctx);

          // Draw player
          Player.draw(ctx);

          // Draw particles
          Particles.draw(ctx);

          ctx.restore();

          // Draw HUD
          HUD.draw(ctx);

          // Death flash
          if (GameState.fadeAlpha > 0) {
            ctx.fillStyle = `rgba(255,255,255,${GameState.fadeAlpha})`;
            ctx.fillRect(0, 0, W, H);
          }

          // Death overlay
          const p = GameState.player;
          if (p && p.state === 'dead') {
            const alpha = Math.min(0.7, (CONFIG.RESPAWN_DELAY - p.deathTimer) / 30);
            ctx.fillStyle = `rgba(0,0,0,${alpha})`;
            ctx.fillRect(0, 0, W, H);
          }
        }

        // FPS counter (debug)
        if (CONFIG.DEBUG) {
          ctx.fillStyle = '#0f0';
          HUD.drawText(ctx, 'FPS:' + Math.round(1 / ((performance.now() - this.lastTime) / 1000 || 0.016)), 2, H - 10, '#0f0', 0.8);
        }
      }
    };

    // ===== MODULE: INIT =====
    try {
      // Handle first user interaction for audio
      const startHandler = () => {
        Audio.resume();
        document.removeEventListener('click', startHandler);
        document.removeEventListener('keydown', startHandler);
      };
      document.addEventListener('click', startHandler);
      document.addEventListener('keydown', startHandler);

      window.addEventListener('load', () => {
        Game.init();
      });
    } catch (e) {
      console.error('Game initialization failed:', e);
      document.body.innerHTML = '<div style="color:red;padding:40px;font-family:monospace">Game failed to initialize: ' + e.message + '</div>';
    }
  </script>
</body>
